<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>장바구니 — petmilyday</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f0f2f7;--bg2:#e6e9f2;--bg3:#d8dced;
      --surface:#ffffff;--border:#d0d5e8;--border2:#b8bfdc;
      --text:#0d1433;--text2:#3d4670;--text3:#8890b8;
      --accent:#2b44cc;--accent-light:#eaedfa;--accent-mid:#3d58e0;
      --rose:#b52844;
      --r:8px;--rl:14px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html { overflow-y: scroll; }
    body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}

    .gnb{position:sticky;top:0;z-index:100;background:var(--text);display:flex;align-items:center;height:56px;padding:0 28px}
    .logo{font-size:15px;font-weight:700;color:#fff;margin-right:36px;letter-spacing:.5px}
    .logo span{color:var(--accent-light);opacity:.7;font-weight:300}
    .nav-links{display:flex;gap:2px;flex:1;align-items:center}
    .nav-link{padding:6px 14px;border-radius:var(--r);font-size:12px;color:rgba(255,255,255,.5);cursor:pointer;border:none;background:none;font-family:'Sora',sans-serif;font-weight:400;transition:all .15s;letter-spacing:.2px;white-space:nowrap}
    .nav-link:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.08)}
    .nav-link.active{color:#fff;background:var(--accent);font-weight:600}
    .nav-right{display:flex;align-items:center;gap:8px}

    .nav-btn{padding:6px 16px;border-radius:var(--r);font-size:12px;cursor:pointer;font-family:'Sora',sans-serif;font-weight:500}
    .nav-btn-ghost{border:1px solid rgba(255,255,255,.25);background:none;color:rgba(255,255,255,.7)}
    .nav-btn-fill{border:none;background:var(--accent);color:#fff}
    .nav-icon{width:32px;height:32px;border-radius:var(--r);background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}

    /* [★수정] 장바구니 너비 1200px로 확장하여 리스트 영역 확보 */
    .wrap{max-width:1200px;margin:0 auto;padding:40px 28px 80px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:24px}

    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;height:40px;padding:0 20px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s; font-family:'Sora';}
    .btn-sm{height:32px;padding:0 14px;font-size:12px}
    .btn-accent{background:var(--accent);color:#fff}
    .btn-accent:hover{background:var(--accent-mid)}
    .btn-surface{background:var(--surface);border:1px solid var(--border);color:var(--text)}
    .btn-surface:hover{background:var(--bg)}

    .fxb{display:flex;align-items:center;justify-content:space-between}

    .cart-grid { display: grid; grid-template-columns: 1fr 340px; gap: 32px; align-items: start; margin-top: 24px; }

    .cart-header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 16px; border-bottom: 2px solid var(--text); margin-bottom: 16px; }

    .cart-item { display: flex; align-items: center; gap: 20px; padding: 16px 0; border-bottom: 1px solid var(--border); transition: opacity 0.3s;}
    .cart-item:last-child { border-bottom: none; padding-bottom: 0; }

    .cart-item-img { width: 90px; height: 90px; background: var(--bg2); border-radius: var(--r); overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1px solid var(--border);}
    .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }

    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cart-item-price { font-size: 14px; font-weight: 500; color: var(--text2); }

    .qty-box { display: flex; align-items: center; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; background: var(--surface); width: fit-content; height: 32px; }
    .qty-btn { width: 32px; height: 100%; background: none; border: none; font-size: 14px; font-weight: 600; color: var(--text2); cursor: pointer; transition: background 0.15s; }
    .qty-btn:hover { background: var(--bg2); }
    .qty-input { width: 40px; height: 100%; border: none; border-left: 1px solid var(--border); border-right: 1px solid var(--border); text-align: center; font-size: 13px; font-weight: 600; color: var(--text); font-family: 'Sora'; }
    .qty-input::-webkit-outer-spin-button, .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    .cart-item-total { width: 100px; text-align: right; font-size: 16px; font-weight: 700; color: var(--accent); }
    .cart-item-del { cursor: pointer; color: var(--text3); font-size: 20px; border: none; background: none; padding: 4px; margin-left: 12px; transition: color 0.15s; }
    .cart-item-del:hover { color: var(--rose); }

    /* [★수정] 결제 창 위치를 아래로 살짝 내림 */
    .summary-box { position: sticky; top: 100px; margin-top: 48px; }
    .summary-row { display: flex; justify-content: space-between; margin-bottom: 16px; font-size: 14px; color: var(--text2); }
    .summary-total { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 20px; border-top: 2px solid var(--border); font-size: 18px; font-weight: 700; color: var(--text); }

    input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
  </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="wrap">
  <div class="fxb">
    <h1 style="font-size:24px; font-weight:700;">장바구니</h1>
    <button class="btn btn-surface btn-sm" onclick="location.href='/shop?category=ALL'">쇼핑 계속하기</button>
  </div>

  <div class="cart-grid">
    <!-- 왼쪽: 장바구니 상품 리스트 -->
    <div class="card">
      <div class="cart-header">
        <!-- [★수정] 괄호 안 숫자 여백 제거 및 구조 개선 -->
        <label style="display:flex; align-items:center; gap:8px; font-weight:600; cursor:pointer;">
          <input type="checkbox" id="checkAll" checked onchange="toggleAll()">
          전체 선택 (<span id="checkedCount">2</span>/<span id="totalCount">2</span>)
        </label>
        <!-- [★수정] 선택 삭제 클릭 이벤트 추가 -->
        <button class="btn btn-surface btn-sm" style="height:28px;" onclick="deleteSelected()">선택 삭제</button>
      </div>

      <div id="cartItemList">
        <div class="cart-item" th:each="item : ${cartItems}">
          <input type="checkbox" class="item-check" checked onchange="updateSummary()"
                 th:data-price="${item.price}" th:data-id="${item.cartItemId}">

          <div class="cart-item-img">
            <img th:if="${item.imgUrl != null}" th:src="${item.imgUrl}" alt="상품 이미지">
            <div th:if="${item.imgUrl == null}">🛋️ Product</div>
          </div>

          <div class="cart-item-info">
            <div class="cart-item-title" th:title="${item.name}" th:text="${item.name}">상품명</div>
            <div class="cart-item-price" th:text="${#numbers.formatInteger(item.price, 3, 'COMMA') + '원'}">0원</div>
          </div>

          <div class="qty-box">
            <button class="qty-btn" th:onclick="changeCartQty(this, -1, [[${item.price}]], [[${item.cartItemId}]])">-</button>
            <input type="number" class="qty-input" th:value="${item.quantity}" min="1" readonly>
            <button class="qty-btn" th:onclick="changeCartQty(this, 1, [[${item.price}]], [[${item.cartItemId}]])">+</button>
          </div>

          <div class="cart-item-total item-total-display"
               th:text="${#numbers.formatInteger(item.price * item.quantity, 3, 'COMMA') + '원'}">0원</div>

          <button class="cart-item-del" th:onclick="deleteItem(this, [[${item.cartItemId}]])" title="삭제">&times;</button>
        </div>

        <div th:if="${#lists.isEmpty(cartItems)}" style="text-align:center; padding: 40px 0; color:var(--text3);">
          장바구니가 비어있습니다. 🛒
        </div>
      </div>
    </div>

    <div class="card summary-box">
      <h3 style="margin-bottom: 24px; font-size: 16px;">결제 정보</h3>

      <div class="summary-row">
        <span>총 상품 금액</span>
        <span id="sumProductPrice" style="font-weight: 600; color: var(--text);">0원</span>
      </div>
      <div class="summary-row">
        <span>배송비</span>
        <span id="sumShippingPrice" style="font-weight: 600; color: var(--text);">무료</span>
      </div>
      <div class="summary-row" style="font-size:12px; color:var(--text3); margin-top:-10px;">
        <span>(50,000원 이상 구매 시 무료배송)</span>
      </div>

      <div class="summary-total">
        <span>총 결제 금액</span>
        <span id="finalTotalPrice" style="color: var(--accent);">0원</span>
      </div>

      <button class="btn btn-accent" style="width: 100%; height: 48px; font-size: 15px; margin-top: 24px;" onclick="alert('결제 모듈 준비 중!')">
        <span id="orderBtnText">0원</span> 주문하기
      </button>
    </div>
  </div>
</div>

<script>
  // 페이지 로딩 완료 시 최초 계산 한 번 실행
  document.addEventListener("DOMContentLoaded", () => {
    updateTotalCount();
    updateSummary();
  });

  // 수량 변경 (DB 연동)
  function changeCartQty(btn, amount, basePrice, cartItemId) {
    const box = btn.parentElement;
    const input = box.querySelector('.qty-input');
    const display = box.parentElement.querySelector('.item-total-display');

    let val = parseInt(input.value) + amount;
    if (val < 1) return;

    // 백엔드로 수량 업데이트 API 쏘기
    fetch('/api/cart/update/' + cartItemId, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ quantity: val })
    }).then(res => {
      if (res.ok) {
        input.value = val;
        display.innerText = (basePrice * val).toLocaleString('ko-KR') + '원';
        updateSummary();
      } else {
        alert('수량 변경에 실패했습니다.');
      }
    });
  }

  // 전체 선택 토글
  function toggleAll() {
    const checkAll = document.getElementById('checkAll').checked;
    const items = document.querySelectorAll('.item-check');
    items.forEach(item => item.checked = checkAll);
    updateSummary();
  }

  // 개별 삭제 (DB 연동)
  function deleteItem(btn, cartItemId) {
    if(confirm('이 상품을 삭제하시겠습니까?')) {
      fetch('/api/cart/delete', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify([cartItemId])
      }).then(res => {
        if (res.ok) {
          btn.closest('.cart-item').remove();
          updateTotalCount();
          updateSummary();
        }
      });
    }
  }

  // 선택 삭제 (DB 연동)
  function deleteSelected() {
    const checkedItems = document.querySelectorAll('.item-check:checked');
    if (checkedItems.length === 0) {
      return alert('삭제할 상품을 선택해주세요.');
    }

    const ids = Array.from(checkedItems).map(item => parseInt(item.getAttribute('data-id')));

    if(confirm(`선택하신 ${checkedItems.length}개의 상품을 삭제하시겠습니까?`)) {
      fetch('/api/cart/delete', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(ids)
      }).then(res => {
        if (res.ok) {
          checkedItems.forEach(item => item.closest('.cart-item').remove());
          updateTotalCount();
          updateSummary();
        }
      });
    }
  }

  function updateTotalCount() {
    const totalItems = document.querySelectorAll('.cart-item').length;
    const totalSpan = document.getElementById('totalCount');
    if(totalSpan) totalSpan.innerText = totalItems;

    if (totalItems === 0) {
      document.getElementById('cartItemList').innerHTML = '<div style="text-align:center; padding: 40px 0; color:var(--text3);">장바구니가 비어있습니다. 🛒</div>';
      const checkAll = document.getElementById('checkAll');
      if(checkAll) checkAll.checked = false;
    }
  }

  function updateSummary() {
    const items = document.querySelectorAll('.cart-item');
    let totalProductPrice = 0;
    let checkedCount = 0;

    items.forEach(item => {
      const checkbox = item.querySelector('.item-check');
      if (checkbox && checkbox.checked) {
        checkedCount++;
        const qty = parseInt(item.querySelector('.qty-input').value);
        const price = parseInt(checkbox.getAttribute('data-price'));
        totalProductPrice += (price * qty);
      }
    });

    const checkedSpan = document.getElementById('checkedCount');
    if(checkedSpan) checkedSpan.innerText = checkedCount;

    let shippingPrice = 0;
    if (totalProductPrice > 0 && totalProductPrice < 50000) {
      shippingPrice = 3000;
    }

    const finalPrice = totalProductPrice + shippingPrice;

    document.getElementById('sumProductPrice').innerText = totalProductPrice.toLocaleString('ko-KR') + '원';
    document.getElementById('sumShippingPrice').innerText = shippingPrice === 0 ? (totalProductPrice === 0 ? '0원' : '무료') : shippingPrice.toLocaleString('ko-KR') + '원';
    document.getElementById('finalTotalPrice').innerText = finalPrice.toLocaleString('ko-KR') + '원';
    document.getElementById('orderBtnText').innerText = finalPrice.toLocaleString('ko-KR') + '원';

    const checkAll = document.getElementById('checkAll');
    if (checkAll && items.length > 0) {
      checkAll.checked = (checkedCount === items.length);
    }
  }
</script>
</body>
</html>
