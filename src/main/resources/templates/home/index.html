<!DOCTYPE html>
<html xmlns:th=\"http://www.thymeleaf.org\"
      xmlns:sec=\"http://www.thymeleaf.org/extras/spring-security\">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>펫밀리데이 - 메인 홈</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f0f2f7;--bg2:#e6e9f2;--bg3:#d8dced;
      --surface:#ffffff;--border:#d0d5e8;--border2:#b8bfdc;
      --text:#0d1433;--text2:#3d4670;--text3:#8890b8;
      --accent:#2b44cc;--accent-light:#eaedfa;--accent-mid:#3d58e0;
      --indigo:#4a2bcc;--indigo-light:#eeebfa;
      --sky:#0e88cc;--sky-light:#e7f4fb;
      --amber:#b56a0a;--amber-light:#fdf2e3;
      --rose:#b52844;--rose-light:#fceef1;
      --green:#1a7a48;--green-light:#e6f4ec;
      --r:8px;--rl:14px;
    }
    *{box-sizes:border-box;margin:0;padding:0;font-family:'Sora',sans-serif;}
    body{background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}

    /* 와이어프레임에 있던 기존 클래스 스타일들 지정 */
    .gnb { display: flex; align-items: center; padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
    .logo { font-size: 20px; font-weight: 700; color: var(--text); }
    .logo span { color: var(--accent); }
    .nav-link { margin-left: 24px; color: var(--text2); text-decoration: none; font-weight: 500; }
    .nav-link.active { color: var(--accent); font-weight: 600; }
    .btn { padding: 8px 16px; border-radius: var(--r); font-weight: 500; text-decoration: none; font-size: 13px; }
    .btn-outline { border: 1px solid var(--border2); color: var(--text2); }
    .btn-accent { background: var(--accent); color: white; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    .hero { background: linear-gradient(135deg, var(--indigo), var(--sky)); color: white; padding: 40px; border-radius: var(--rl); margin: 24px; }
    .hero h1 { font-size: 32px; margin-bottom: 16px; font-weight: 700; }
    .hero p { font-size: 16px; opacity: 0.9; }

    .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 0 24px; }
    .card { background: var(--surface); border: 1px solid var(--border); padding: 24px; border-radius: var(--r); text-align: center; }
    .text-center { text-align: center; }
    .mb8 { margin-bottom: 8px; }
    .mb16 { margin-bottom: 16px; }
    .lg { font-size: 24px; }
    .sm { font-size: 14px; }
    .w5 { font-weight: 500; }
    .w6 { font-weight: 600; }
  </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main id="main">
  <div class="page active">
    <div class="hero">
      <div style="color:var(--sky-light); font-weight:600; font-size:12px; margin-bottom:8px; letter-spacing:1px">PET HEALTH PLATFORM</div>
      <h1>우리 아이의 건강,<br>petmilyday와 함께</h1>
      <p>병원 예약부터 AI 진단, 물품 구매까지<br>반려동물의 모든 것을 한 곳에서 해결하세요.</p>
    </div>

    <div style="padding: 0 24px; margin-bottom: 16px;">
      <div class="w6" style="font-size:16px; color:var(--text)">빠른 메뉴</div>
    </div>

    <div class="grid4">
      <div class="card"><div class="lg mb8">🏥</div><div class="sm w5">동물병원 예약</div></div>
      <div class="card"><div class="lg mb8">🤖</div><div class="sm w5">AI 자가진단</div></div>
      <div class="card"><div class="lg mb8">🛍️</div><div class="sm w5">동물용품샵</div></div>
      <div class="card"><div class="lg mb8">♻️</div><div class="sm w5">중고거래</div></div>
    </div>
  </div>
</main>

</body>
</html>
