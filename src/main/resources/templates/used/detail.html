<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>petmilyday - 게시글 상세</title>

    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/used/used-detail.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="main-container"
     id="usedDetailPage"
     th:data-member-id="${memberId}"
     th:data-used-post-id="${post.id}">

    <div th:if="${param.reportSuccess}"
         class="alert alert-success">
        신고가 접수되었습니다.
    </div>

    <div class="detail-top-card">
        <div class="d-flex justify-content-between align-items-center">

            <div>
                <h3>
                    게시글 상세
                </h3>

                <p>
                    상품 정보와 판매자 정보를 확인해보세요.
                </p>
            </div>

            <a href="/used/list"
               class="btn btn-light back-btn">
                목록으로
            </a>

        </div>
    </div>

    <div class="detail-card">

        <div class="text-center">

            <img id="mainImage"
                 th:if="${post.imageUrlList != null and !post.imageUrlList.isEmpty()}"
                 th:src="${post.imageUrlList[0]}"
                 th:alt="${post.title}"
                 class="main-image">

            <div th:if="${post.imageUrlList == null or post.imageUrlList.isEmpty()}"
                 class="main-image no-detail-image">
                <div class="no-detail-icon">🐾</div>
                <div class="no-detail-title">등록된 이미지가 없습니다</div>
                <div class="no-detail-desc">상품 설명을 확인해주세요.</div>
            </div>

        </div>

        <div class="thumbnail-list"
             th:if="${post.imageUrlList != null and !post.imageUrlList.isEmpty()}">

            <img th:each="img, stat : ${post.imageUrlList}"
                 th:src="${img}"
                 th:alt="${post.title}"
                 th:attr="data-img=${img}"
                 th:classappend="${stat.index == 0} ? 'active-thumb'"
                 class="js-thumb">

        </div>

        <div class="mt-4">

            <div class="d-flex justify-content-between align-items-start">

                <div>

                    <h2 class="fw-bold mb-2"
                        th:text="${post.title}">
                        제목
                    </h2>

                    <div class="price-text"
                         th:text="${#numbers.formatInteger(post.price, 0, 'COMMA')} + '원'">
                        0원
                    </div>

                </div>

                <div class="text-end">

                    <span class="status-badge"
                          th:text="${post.statusLabel}">
                    </span>

                    <div class="mt-3 d-flex gap-2 justify-content-end flex-wrap">

                        <form th:if="${!isWriter}"
                              th:action="@{/wishlist/toggle}"
                              method="post">

                            <input type="hidden"
                                   name="usedPostId"
                                   th:value="${post.id}">

                            <div class="d-flex align-items-center gap-2">

                                <button type="button"
                                        id="wishBtn"
                                        class="btn btn-outline-danger action-btn">
                                    🤍 찜하기
                                </button>

                                <span>
                                    찜 <b id="wishCount">0</b>
                                </span>

                            </div>
                        </form>

                        <form th:if="${!isWriter}"
                              action="/chat/room"
                              method="post">

                            <input type="hidden"
                                   name="postId"
                                   th:value="${post.id}">

                            <button type="submit"
                                    class="btn btn-primary action-btn">
                                1:1 채팅
                            </button>

                        </form>

                        <div th:if="${!isWriter and post.status.name() == 'SELLING'}">

                            <a th:href="@{/payment/confirm(postId=${post.id})}"
                               class="btn btn-success action-btn">
                                결제하기
                            </a>

                        </div>

                        <div th:if="${post.status.name() == 'SOLD'}">

                            <button class="btn btn-secondary action-btn"
                                    disabled>
                                판매완료
                            </button>

                        </div>

                        <button th:if="${!isWriter and !alreadyReported}"
                                class="btn btn-outline-danger action-btn"
                                data-bs-toggle="modal"
                                data-bs-target="#reportModal">
                            신고
                        </button>

                        <button th:if="${alreadyReported}"
                                class="btn btn-secondary action-btn"
                                disabled>
                            신고완료
                        </button>

                        <a th:if="${isWriter}"
                           th:href="@{/used/edit/{id}(id=${post.id})}"
                           class="btn btn-outline-secondary action-btn">
                            수정
                        </a>

                        <form th:if="${isWriter and post.status.name() != 'SOLD'}"
                              th:action="@{/used/complete/{id}(id=${post.id})}"
                              method="post">

                            <button type="submit"
                                    class="btn btn-success action-btn">
                                판매완료
                            </button>

                        </form>

                        <form th:if="${isWriter and post.status.name() == 'SOLD'}"
                              th:action="@{/used/delete/{id}(id=${post.id})}"
                              method="post"
                              class="delete-form">

                            <button type="submit"
                                    class="btn btn-outline-danger action-btn">
                                삭제
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

        <div class="writer-box">

            <div class="info-text">

                <div class="seller-score">
                    ⭐ 매너점수
                    <span th:text="${#numbers.formatDecimal(mannerAverage, 1, 1)}">
                        0.0
                    </span>
                </div>

                <div class="info-grid">

                    <div class="info-item">
                        <span class="info-label">작성자</span>
                        <span class="info-value"
                              th:text="${post.writerName}">
                            관리자
                        </span>
                    </div>

                    <div class="info-item">
                        <span class="info-label">카테고리</span>
                        <span class="info-value"
                              th:text="${post.category}">
                            카테고리
                        </span>
                    </div>

                    <div class="info-item">
                        <span class="info-label">지역</span>
                        <span class="info-value"
                              th:text="${post.region}">
                            서울
                        </span>
                    </div>

                    <div class="info-item">
                        <span class="info-label">상품상태</span>
                        <span class="info-value"
                              th:text="${post.itemConditionLabel}">
                            중고
                        </span>
                    </div>

                    <div class="info-item">
                        <span class="info-label">가격제안</span>

                        <span th:if="${post.offerAccepted}"
                              class="info-value offer-yes">
                            가능
                        </span>

                        <span th:unless="${post.offerAccepted}"
                              class="info-value offer-no">
                            불가능
                        </span>
                    </div>

                    <div class="info-item">
                        <span class="info-label">누적 신고</span>
                        <span class="info-value">
                            <span th:text="${post.reportCount}">0</span> 회
                        </span>
                    </div>

                    <div class="info-item">
                        <span class="info-label">작성일</span>
                        <span class="info-value"
                              th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">
                            2026-05-26
                        </span>
                    </div>

                    <div class="info-item">
                        <span class="info-label">수정일</span>
                        <span class="info-value"
                              th:text="${#temporals.format(post.updatedAt, 'yyyy-MM-dd HH:mm')}">
                            2026-05-26
                        </span>
                    </div>

                </div>

            </div>

        </div>

        <div class="content-title">
            상품 설명
        </div>

        <div class="content-box"
             th:text="${post.content}">
            게시글 내용
        </div>

    </div>

</div>

<div class="modal fade"
     id="reportModal"
     tabindex="-1"
     aria-hidden="true">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header border-0">

                <h5 class="modal-title fw-bold">
                    게시글 신고
                </h5>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <form th:action="@{/used/report/{id}(id=${post.id})}"
                  method="post">

                <div class="modal-body">

                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            신고 사유
                        </label>

                        <select name="reason"
                                class="form-select"
                                required>

                            <option value="">
                                선택하세요
                            </option>

                            <option value="욕설/비방">
                                욕설/비방
                            </option>

                            <option value="사기 의심">
                                사기 의심
                            </option>

                            <option value="거래 금지 품목">
                                거래 금지 품목
                            </option>

                            <option value="도배">
                                도배
                            </option>

                            <option value="기타">
                                기타
                            </option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            상세 내용
                        </label>

                        <textarea name="content"
                                  rows="4"
                                  class="report-reason"
                                  placeholder="신고 내용을 입력해주세요."></textarea>

                    </div>

                    <div class="text-muted small">
                        허위 신고 시 서비스 이용에 제한이 생길 수 있습니다.
                    </div>

                </div>

                <div class="modal-footer border-0">

                    <button type="button"
                            class="btn btn-light"
                            data-bs-dismiss="modal">
                        취소
                    </button>

                    <button type="submit"
                            class="btn btn-danger">
                        신고하기
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/used/used-detail.js}"></script>

</body>
</html>
