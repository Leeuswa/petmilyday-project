<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>petmilyday - 게시글 상세</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            background-color: #f4f6fa;
            font-family: 'Pretendard', sans-serif;
        }

        .navbar-custom {
            background-color: #0f172a;
            padding: 15px 0;
            color: white;
        }

        .nav-link {
            color: #cbd5e1 !important;
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.95rem;
        }

        .nav-link.active {
            color: white !important;
            font-weight: bold;
            background: #3b82f6;
            padding: 5px 15px;
            border-radius: 8px;
        }

        .btn-outline-light {
            border-color: #334155;
            color: white;
        }

        .main-container {
            max-width: 1000px;
            margin: 40px auto;
        }

        .detail-card {
            background: white;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            padding: 30px;
        }

        .main-image {
            width: 100%;
            max-height: 450px;
            object-fit: contain;
            border-radius: 12px;
            background: #f1f5f9;
            cursor: pointer;
            transition: 0.2s;
        }

        .main-image:hover {
            opacity: 0.95;
        }

        .thumbnail-list {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .thumbnail-list img {
            width: 90px;
            height: 90px;
            border-radius: 10px;
            object-fit: cover;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }

        .thumbnail-list img:hover {
            transform: scale(1.05);
        }

        .thumbnail-list img.active-thumb {
            border-color: #0d6efd;
        }

        .price-text {
            font-size: 2rem;
            font-weight: bold;
            color: #0d6efd;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            background: #e0f2f1;
            color: #00796b;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .info-text {
            color: #64748b;
            font-size: 0.95rem;
            line-height: 1.8;
        }

        .content-box {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid #e2e8f0;
            white-space: pre-line;
            line-height: 1.8;
            min-height: 200px;
        }

        .back-btn {
            border-radius: 10px;
            padding: 10px 20px;
        }

        .action-btn {
            border-radius: 10px;
            font-weight: 600;
            padding: 7px 14px;
        }

        .writer-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 18px;
            margin-top: 30px;
        }

        .modal-content {
            border-radius: 16px;
            border: none;
        }

        .report-reason {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #dee2e6;
            width: 100%;
            resize: none;
        }

    </style>
</head>

<body>

<nav class="navbar-custom">

    <div class="container d-flex align-items-center">

        <h4 class="fw-bold mb-0 me-5">
            petmilyday
        </h4>

        <div class="d-flex flex-grow-1">
            <a href="#" class="nav-link">홈</a>
            <a href="#" class="nav-link">동물병원 예약</a>
            <a href="#" class="nav-link">AI 자가진단</a>
            <a href="#" class="nav-link">동물용품샵</a>
            <a href="#" class="nav-link active">중고거래</a>
            <a href="#" class="nav-link">커뮤니티</a>
        </div>

        <div class="d-flex align-items-center">
            <span class="me-3">🔔</span>

            <button class="btn btn-sm btn-outline-light me-2">
                로그인
            </button>

            <button class="btn btn-sm btn-primary">
                회원가입
            </button>
        </div>

    </div>

</nav>

<div class="main-container">

    <!-- 상단 -->
    <div class="mb-4 d-flex justify-content-between align-items-center">

        <h3 class="fw-bold">
            게시글 상세
        </h3>

        <a href="/used/list"
           class="btn btn-outline-secondary back-btn">

            목록으로

        </a>

    </div>

    <div class="detail-card">

        <!-- 대표 이미지 -->
        <div class="text-center">

            <img
                    id="mainImage"

                    th:if="${post.imageUrlList != null and !post.imageUrlList.isEmpty()}"

                    th:src="${post.imageUrlList[0].startsWith('/uploads/')
                    ? post.imageUrlList[0]
                    : '/uploads/' + post.imageUrlList[0]}"

                    class="main-image"

                    onclick="resetMainImage()">

            <div
                    th:if="${post.imageUrlList == null or post.imageUrlList.isEmpty()}"

                    class="main-image d-flex justify-content-center align-items-center text-muted">

                이미지 없음

            </div>

        </div>

        <!-- 썸네일 -->
        <div class="thumbnail-list"

             th:if="${post.imageUrlList != null and !post.imageUrlList.isEmpty()}">

            <img

                    th:each="img, stat : ${post.imageUrlList}"

                    th:src="${img.startsWith('/uploads/')
                    ? img
                    : '/uploads/' + img}"

                    th:attr="data-img=${img.startsWith('/uploads/')
                    ? img
                    : '/uploads/' + img}"

                    th:classappend="${stat.index == 0} ? 'active-thumb'"

                    onclick="changeMainImage(this)">

        </div>

        <!-- 제목 + 버튼 -->
        <div class="mt-4">

            <div class="d-flex justify-content-between align-items-start">

                <div>

                    <h2 class="fw-bold mb-2"
                        th:text="${post.title}">

                        제목

                    </h2>

                    <div class="price-text"

                         th:text="${#numbers.formatInteger(post.price, 0, 'COMMA')} + '원'">

                        0원

                    </div>

                </div>

                <div class="text-end">

                    <span class="status-badge"
                          th:text="${post.status}">
                    </span>

                    <div class="mt-3 d-flex gap-2 justify-content-end">

                        <!-- 찜 -->
                        <form th:action="@{/wishlist/toggle}" method="post">
                            <input type="hidden" name="usedPostId" th:value="${post.id}">
                            <input type="hidden" name="memberId" value="1">

                            <!-- 찜 -->
                            <div class="d-flex align-items-center gap-2">

                                <button type="button"
                                        id="wishBtn"
                                        class="btn btn-outline-danger action-btn"
                                        onclick="toggleWish()">
                                    🤍 찜하기
                                </button>

                                <span>
                                    찜 <b id="wishCount">0</b>
                                </span>

                            </div>
                        </form>

                        <!-- 채팅 -->
                        <form action="/chat/room" method="post">
                            <input type="hidden" name="postId" th:value="${post.id}">
                            <input type="hidden" name="buyerId" value="1">

                            <button type="submit" class="btn btn-primary action-btn">
                                1:1 채팅
                            </button>
                        </form>

                        <!-- 신고 -->
                        <button class="btn btn-outline-danger action-btn"
                                data-bs-toggle="modal"
                                data-bs-target="#reportModal">
                            신고
                        </button>

                        <!-- 수정 -->
                        <a th:if="${isWriter}"
                           th:href="@{/used/edit/{id}(id=${post.id})}"
                           class="btn btn-outline-secondary action-btn">
                            수정
                        </a>

                        <!-- 판매완료 -->
                        <form th:if="${isWriter and post.status.name() != 'SOLD'}"
                              th:action="@{/used/complete/{id}(id=${post.id})}"
                              method="post">
                            <button type="submit" class="btn btn-success action-btn">
                                판매완료
                            </button>
                        </form>

                    </div>

                </div>

            </div>

        </div>

        <!-- 작성자 정보 -->
        <div class="writer-box">

            <div class="info-text">

                <div>
                    작성자 :
                    <strong th:text="${post.writerName}">
                        관리자
                    </strong>
                </div>

                <div>
                    지역 :
                    <span th:text="${post.region}">
                        서울
                    </span>
                </div>

                <div>
                    상품상태 :
                    <span th:text="${post.itemCondition}">
                        USED
                    </span>
                </div>

                <!-- 여기 추가 -->

                <div>
                    가격제안 :
                    <span th:if="${post.offerAccepted}">
                        가능
                    </span>

                    <span th:unless="${post.offerAccepted}">
                        불가능
                    </span>
                </div>

                <div>
                    작성일 :
                    <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">
                        2026-05-26
                    </span>
                </div>

                <div>
                    수정일 :
                    <span th:text="${#temporals.format(post.updatedAt, 'yyyy-MM-dd HH:mm')}">
                        2026-05-26
                    </span>
                </div>

                <div>
                    누적 신고 :
                    <span th:text="${post.reportCount}">
                        0
                    </span> 회
                </div>

            </div>

        </div>

        <!-- 내용 -->
        <div class="content-box"

             th:text="${post.content}">

            게시글 내용

        </div>

    </div>

</div>

<!-- 신고 모달 -->
<div class="modal fade"
     id="reportModal"
     tabindex="-1"
     aria-hidden="true">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header border-0">

                <h5 class="modal-title fw-bold">

                    게시글 신고

                </h5>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">

                </button>

            </div>

            <form th:action="@{/used/report/{id}(id=${post.id})}"
                  method="post">

                <div class="modal-body">

                    <!-- 신고 사유 -->
                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            신고 사유

                        </label>

                        <select name="reason"
                                class="form-select"
                                required>

                            <option value="">
                                선택하세요
                            </option>

                            <option value="욕설/비방">
                                욕설/비방
                            </option>

                            <option value="사기 의심">
                                사기 의심
                            </option>

                            <option value="거래 금지 품목">
                                거래 금지 품목
                            </option>

                            <option value="도배">
                                도배
                            </option>

                            <option value="기타">
                                기타
                            </option>

                        </select>

                    </div>

                    <!-- 상세 내용 -->
                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            상세 내용

                        </label>

                        <textarea
                                name="content"
                                rows="4"
                                class="report-reason"
                                placeholder="신고 내용을 입력해주세요."></textarea>

                    </div>

                    <div class="text-muted small">

                        허위 신고 시 서비스 이용에 제한이 생길 수 있습니다.

                    </div>

                </div>

                <div class="modal-footer border-0">

                    <button type="button"
                            class="btn btn-light"
                            data-bs-dismiss="modal">

                        취소

                    </button>

                    <button type="submit"
                            class="btn btn-danger">

                        신고하기

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

    let mainImage = document.getElementById("mainImage");

    let defaultImage = mainImage ? mainImage.src : "";

    function changeMainImage(element) {

        mainImage.src = element.dataset.img;

        document.querySelectorAll(".thumbnail-list img")
            .forEach(img => img.classList.remove("active-thumb"));

        element.classList.add("active-thumb");
    }

    function resetMainImage() {

        mainImage.src = defaultImage;

        const thumbs = document.querySelectorAll(".thumbnail-list img");

        thumbs.forEach(img => img.classList.remove("active-thumb"));

        if (thumbs.length > 0) {

            thumbs[0].classList.add("active-thumb");

        }
    }

</script>
<script th:inline="javascript">

    let memberId = 1; // 임시
    let usedPostId = [[${post.id}]];

    window.onload = function () {
        loadWishCount();
        checkWish();
    };

    // 찜 토글
    function toggleWish() {

        fetch("/wishlist/toggle", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: "memberId=" + memberId + "&usedPostId=" + usedPostId
        })
            .then(res => res.json())
            .then(data => {
                updateWishUI(data.wished);
                loadWishCount();
            });
    }

    // 찜 개수
    function loadWishCount() {

        fetch("/wishlist/count?usedPostId=" + usedPostId)
            .then(res => res.json())
            .then(count => {
                document.getElementById("wishCount").innerText = count;
            });
    }

    // 내가 찜했는지
    function checkWish() {

        fetch("/wishlist/check?memberId=" + memberId + "&usedPostId=" + usedPostId)
            .then(res => res.json())
            .then(isWished => {
                updateWishUI(isWished);
            });
    }

    // UI 변경
    function updateWishUI(isWished) {

        const btn = document.getElementById("wishBtn");

        if (!btn) return;

        if (isWished) {
            btn.innerText = "❤️ 찜취소";
            btn.classList.remove("btn-outline-danger");
            btn.classList.add("btn-danger");
        } else {
            btn.innerText = "🤍 찜하기";
            btn.classList.remove("btn-danger");
            btn.classList.add("btn-outline-danger");
        }
    }

</script>

</body>
</html>
