<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>매너 평가</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            background-color: #f4f6fa;
            font-family: 'Pretendard', sans-serif;
        }

        .navbar-custom {
            background-color: #0f172a;
            padding: 15px 0;
            color: white;
        }

        .main-container {
            max-width: 600px;
            margin: 60px auto;
        }

        .card-box {
            background: white;
            border-radius: 12px;
            padding: 30px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .sub-text {
            color: #6c757d;
            margin-bottom: 25px;
        }

        select.form-select {
            padding: 10px;
            border-radius: 10px;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
        }

    </style>
</head>

<body>

<div class="navbar-custom">
    <div class="container">
        <h5 class="mb-0">petmilyday</h5>
    </div>
</div>

<div class="main-container">

    <div class="card-box">

        <div class="title">
            ⭐ 매너 평가하기
        </div>

        <div class="sub-text">
            거래 상대방에게 1~5점 매너 점수를 남겨주세요.
        </div>

        <form action="/manner/evaluate" method="post">

            <input type="hidden"
                   name="postId"
                   th:value="${postId}">

            <input type="hidden"
                   name="targetMemberId"
                   th:value="${targetMemberId}">


            <div class="mb-3">

                <label class="form-label fw-bold">
                    점수 선택
                </label>

                <select name="score"
                        class="form-select">

                    <option value="5">★★★★★ (5점)</option>
                    <option value="4">★★★★☆ (4점)</option>
                    <option value="3">★★★☆☆ (3점)</option>
                    <option value="2">★★☆☆☆ (2점)</option>
                    <option value="1">★☆☆☆☆ (1점)</option>

                </select>

            </div>

            <button type="submit"
                    class="btn btn-primary btn-submit">
                평가하기
            </button>

        </form>

    </div>

</div>

</body>
</html>
