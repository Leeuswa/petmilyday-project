<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>petmilyday - 매너 평가</title>

    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/used/used-manner-evaluate.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="manner-page">

    <div class="manner-hero">

        <div class="hero-icon-left">
            🐾
        </div>

        <div class="hero-center">
            <h2>
                매너 평가
            </h2>

            <p>
                거래 상대방에게 매너 점수를 남겨주세요.<br>
                좋은 평가는 안전한 거래 문화에 도움이 됩니다.
            </p>
        </div>

        <div class="hero-icon-right">
            ⭐
        </div>

    </div>

    <div class="manner-layout">

        <div class="manner-card">

            <div class="card-title-area">

                <div class="title-icon">
                    ⭐
                </div>

                <div>
                    <h3>
                        매너 평가하기
                    </h3>

                    <p>
                        거래 상대방에게 1~5점 매너 점수를 남겨주세요.
                    </p>
                </div>

            </div>

            <form action="/manner/evaluate"
                  method="post"
                  id="mannerForm">

                <input type="hidden"
                       name="postId"
                       th:value="${postId}">

                <input type="hidden"
                       name="targetMemberId"
                       th:value="${targetMemberId}">

                <div class="score-box">

                    <label class="form-label">
                        점수 선택
                    </label>

                    <select name="score"
                            class="form-select"
                            id="scoreSelect"
                            required>

                        <option value="5">★★★★★ (5점)</option>
                        <option value="4">★★★★☆ (4점)</option>
                        <option value="3">★★★☆☆ (3점)</option>
                        <option value="2">★★☆☆☆ (2점)</option>
                        <option value="1">★☆☆☆☆ (1점)</option>

                    </select>

                    <div class="score-preview"
                         id="scorePreview">
                        매우 만족스러운 거래였어요.
                    </div>

                </div>

                <div class="guide-box">

                    <strong>
                        평가 안내
                    </strong>

                    <p>
                        거래 완료 후 상대방의 응답, 약속 준수, 친절함 등을 기준으로 평가해주세요.
                    </p>

                </div>

                <button type="submit"
                        class="submit-btn"
                        id="submitBtn">
                    평가하기
                </button>

            </form>

        </div>

    </div>

</div>

<script th:src="@{/js/used/used-manner-evaluate.js}"></script>

</body>
</html>
