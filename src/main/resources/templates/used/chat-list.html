<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>petmilyday - 채팅목록</title>

    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/used/used-chat-list.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="main-container">

    <div class="chat-list-hero">
        <div>
            <h3>
                내 채팅 목록
            </h3>

            <p>
                중고거래 게시글별 채팅방을 확인할 수 있습니다.
            </p>
        </div>

        <a href="/used/list"
           class="btn btn-light back-btn">
            중고거래로
        </a>
    </div>

    <div th:if="${#lists.isEmpty(rooms)}"
         class="empty-box">

        <div class="empty-icon">
            💬
        </div>

        <h5>
            진행중인 채팅이 없습니다.
        </h5>

        <p>
            관심 있는 중고거래 게시글에서 1:1 채팅을 시작해보세요.
        </p>

    </div>

    <div th:unless="${#lists.isEmpty(rooms)}">

        <a th:each="room : ${rooms}"
           th:href="@{/chat/room/{id}(id=${room.roomId})}"
           class="room-link">

            <div class="room-card">

                <div class="room-content">

                    <div class="room-main">

                        <div class="room-title-row">

                            <h5 class="room-title"
                                th:text="${room.postTitle}">
                                게시글 제목
                            </h5>

                            <span th:if="${room.unreadCount > 0}"
                                  class="unread-badge"
                                  th:text="${room.unreadCount}">
                                1
                            </span>

                        </div>

                        <div class="opponent-line">

                            상대방 :
                            <span th:text="${room.opponentName}">
                                상대방
                            </span>

                        </div>

                        <div class="last-message"
                             th:text="${room.lastMessage != null and !room.lastMessage.isBlank() ? room.lastMessage : '아직 메시지가 없습니다.'}">
                            마지막 메시지
                        </div>

                        <div class="message-time"
                             th:if="${room.lastMessageTime != null}"
                             th:text="${#temporals.format(room.lastMessageTime,'MM-dd HH:mm')}">
                            시간
                        </div>

                    </div>

                    <div class="room-action">
                        <span class="enter-badge">
                            입장
                        </span>
                    </div>

                </div>

            </div>

        </a>

    </div>

</div>

</body>
</html>
