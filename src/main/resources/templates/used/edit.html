<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>petmilyday - 게시글 수정</title>

    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/used/used-edit.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="main-container">

    <div class="edit-hero">
        <div class="d-flex justify-content-between align-items-center">

            <div>
                <h3>
                    게시글 수정
                </h3>

                <p>
                    등록한 중고거래 게시글 정보를 수정할 수 있습니다.
                </p>
            </div>

            <a th:href="@{/used/detail/{id}(id=${post.id})}"
               class="btn btn-light back-btn">
                뒤로가기
            </a>

        </div>
    </div>

    <div class="write-card">

        <form th:action="@{/used/edit/{id}(id=${post.id})}"
              method="post"
              id="editForm">

            <div class="form-section-title">
                기본 정보
            </div>

            <div class="mb-4">

                <label class="form-label">
                    제목
                </label>

                <input type="text"
                       name="title"
                       class="form-control"
                       th:value="${post.title}"
                       placeholder="게시글 제목을 입력하세요"
                       required>

            </div>

            <div class="row g-4">

                <div class="col-md-6">

                    <label class="form-label">
                        카테고리
                    </label>

                    <select name="category"
                            class="form-select"
                            required>

                        <option value="사료/간식"
                                th:selected="${post.category == '사료/간식'}">
                            사료/간식
                        </option>

                        <option value="장난감"
                                th:selected="${post.category == '장난감'}">
                            장난감
                        </option>

                        <option value="의류"
                                th:selected="${post.category == '의류'}">
                            의류
                        </option>

                        <option value="가구/매트"
                                th:selected="${post.category == '가구/매트'}">
                            가구/매트
                        </option>

                    </select>

                </div>

                <div class="col-md-6">

                    <label class="form-label">
                        거래 지역
                    </label>

                    <input type="text"
                           name="region"
                           class="form-control"
                           th:value="${post.region}"
                           placeholder="예: 서울 강남구"
                           required>

                </div>

            </div>

            <div class="row g-4 mt-1">

                <div class="col-md-6">

                    <label class="form-label">
                        판매 가격
                    </label>

                    <input type="number"
                           name="price"
                           class="form-control"
                           th:value="${post.price}"
                           placeholder="가격을 입력하세요"
                           min="0"
                           required>

                </div>

                <div class="col-md-6">

                    <label class="form-label">
                        상품 상태
                    </label>

                    <select name="itemCondition"
                            class="form-select"
                            required>

                        <option value="NEW"
                                th:selected="${post.itemCondition.name() == 'NEW'}">
                            새제품
                        </option>

                        <option value="LIKE_NEW"
                                th:selected="${post.itemCondition.name() == 'LIKE_NEW'}">
                            거의새것
                        </option>

                        <option value="USED"
                                th:selected="${post.itemCondition.name() == 'USED'}">
                            중고
                        </option>

                    </select>

                </div>

            </div>

            <div class="offer-box mt-4">

                <input type="checkbox"
                       name="offerAccepted"
                       value="true"
                       class="form-check-input"
                       id="offerCheck"
                       th:checked="${post.offerAccepted}">

                <label class="form-check-label"
                       for="offerCheck">
                    가격 제안 가능
                </label>

                <p>
                    구매자가 채팅으로 가격을 제안할 수 있도록 허용합니다.
                </p>

            </div>

            <div class="form-section-title mt-4">
                상세 내용
            </div>

            <div class="mb-4">

                <label class="form-label">
                    내용
                </label>

                <textarea name="content"
                          class="form-control content-area"
                          placeholder="상품 상태, 사용 기간, 거래 희망 장소 등을 입력하세요."
                          required
                          th:text="${post.content}"></textarea>

            </div>

            <div class="notice-box">
                이미지는 게시글 작성 시 등록된 이미지가 유지됩니다. 이미지 변경 기능은 별도 수정이 필요합니다.
            </div>

            <div class="d-flex justify-content-end gap-2 mt-4">

                <a th:href="@{/used/detail/{id}(id=${post.id})}"
                   class="btn btn-outline-secondary submit-btn">
                    취소
                </a>

                <button type="submit"
                        class="btn btn-primary submit-btn"
                        id="editSubmitBtn">
                    수정완료
                </button>

            </div>

        </form>

    </div>

</div>

<script th:src="@{/js/used/used-edit.js}"></script>

</body>
</html>
