<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>petmilyday - 중고거래 글쓰기</title>

    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/used/used-write.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="main-container">

    <div class="write-hero">
        <h3>
            중고거래 글쓰기
        </h3>

        <p>
            반려동물 용품 정보를 입력하고 중고거래 게시글을 등록할 수 있습니다.
        </p>
    </div>

    <div class="write-box">

        <form th:action="@{/used/write}"
              method="post"
              enctype="multipart/form-data"
              id="writeForm">

            <div class="form-section-title">
                작성자 정보
            </div>

            <div class="mb-4">
                <label class="form-label">
                    작성자
                </label>

                <input type="text"
                       class="form-control readonly-input"
                       th:value="${writerName != null and !#strings.isEmpty(writerName)} ? ${writerName} : ${memberId}"
                       readonly>
            </div>

            <div class="form-section-title">
                상품 정보
            </div>

            <div class="mb-4">
                <label class="form-label">
                    제목
                </label>

                <input type="text"
                       name="title"
                       class="form-control"
                       placeholder="게시글 제목을 입력하세요"
                       maxlength="100"
                       required>
            </div>

            <div class="row">

                <div class="col-md-6 mb-4">
                    <label class="form-label">
                        카테고리
                    </label>

                    <select name="category"
                            class="form-select"
                            required>
                        <option value="">카테고리</option>
                        <option value="사료/간식">사료/간식</option>
                        <option value="장난감">장난감</option>
                        <option value="의류">의류</option>
                        <option value="가구/매트">가구/매트</option>
                    </select>
                </div>

                <div class="col-md-6 mb-4">
                    <label class="form-label">
                        거래 지역
                    </label>

                    <input type="text"
                           name="region"
                           class="form-control"
                           placeholder="예: 서울 강남구"
                           required>
                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-4">
                    <label class="form-label">
                        판매 가격 (원)
                    </label>

                    <input type="number"
                           name="price"
                           class="form-control"
                           min="0"
                           max="1000000000"
                           placeholder="가격을 입력하세요"
                           required>
                </div>

                <div class="col-md-6 mb-4">
                    <label class="form-label">
                        상품 상태
                    </label>

                    <select name="itemCondition"
                            class="form-select"
                            required>
                        <option value="NEW">새상품</option>
                        <option value="LIKE_NEW">거의 새것</option>
                        <option value="USED">사용감 있음</option>
                    </select>
                </div>

            </div>

            <div class="offer-box mb-4">

                <input type="checkbox"
                       name="offerAccepted"
                       value="true"
                       class="form-check-input"
                       id="offerCheck">

                <label class="form-check-label"
                       for="offerCheck">
                    가격 제안 가능
                </label>

                <p>
                    구매자가 채팅으로 가격을 제안할 수 있도록 허용합니다.
                </p>

            </div>

            <div class="mb-4">
                <label class="form-label">
                    상품 이미지
                </label>

                <input type="file"
                       name="images"
                       class="form-control"
                       id="imageInput"
                       multiple
                       accept="image/*">

                <div class="file-help"
                     id="imageHelp">
                    이미지는 여러 장 선택할 수 있습니다.
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">
                    내용
                </label>

                <textarea name="content"
                          class="form-control content-area"
                          placeholder="상품 상태, 사용 기간, 거래 희망 장소 등을 입력하세요."
                          maxlength="2000"
                          required></textarea>
            </div>

            <div class="notice-box">
                등록한 이미지는 S3에 저장되고, 게시글 상세 화면에서 확인할 수 있습니다.
            </div>

            <div class="d-flex justify-content-center gap-3 mt-4">

                <a href="/used/list"
                   class="btn btn-light px-5 border submit-btn">
                    취소
                </a>

                <button type="submit"
                        class="btn btn-primary px-5 submit-btn"
                        id="writeSubmitBtn">
                    등록하기
                </button>

            </div>

        </form>

    </div>

</div>

<script th:src="@{/js/used/used-write.js}"></script>

</body>
</html>
