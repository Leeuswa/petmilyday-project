<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    <meta charset="UTF-8">
    <title>petmilyday - 중고거래 글쓰기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6fa; font-family: 'Pretendard', sans-serif; }
        .main-container { max-width: 800px; margin: 40px auto; }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sora', sans-serif;
        }

        body {
            background: #f0f2f7;
            color: #0d1433;
            font-size: 14px;
            line-height: 1.5;
        }
        .write-box { background: white; padding: 40px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .form-label { font-weight: 600; color: #334155; }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="main-container">
    <div class="mb-4">
        <h3 class="fw-bold">중고거래 글쓰기</h3>
    </div>

    <div class="write-box">
        <form th:action="@{/used/write}" method="post" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">작성자</label>
                <input type="text"
                       class="form-control"
                       th:value="${writerName != null and !#strings.isEmpty(writerName)} ? ${writerName} : ${memberId}"
                       readonly
                       style="background-color: #e9ecef;">
            </div>

            <div class="mb-3">
                <label class="form-label">제목</label>
                <input type="text" name="title" class="form-control" required>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">카테고리</label>
                    <select name="category" class="form-select" required>
                        <option value="">카테고리</option>
                        <option value="사료/간식">사료/간식</option>
                        <option value="장난감">장난감</option>
                        <option value="의류">의류</option>
                        <option value="가구/매트">가구/매트</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">거래 지역</label>
                    <input type="text" name="region" class="form-control" placeholder="예: 서울 강남구" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">판매 가격 (원)</label>
                    <input type="number"
                           name="price"
                           class="form-control"
                           min="0"
                           max="1000000000"
                           placeholder="가격을 입력하세요"
                           required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">상품 상태</label>
                    <select name="itemCondition" class="form-select" required>
                        <option value="NEW">새상품</option>
                        <option value="LIKE_NEW">거의 새것</option>
                        <option value="USED">사용감 있음</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <input type="checkbox" name="offerAccepted" value="true" class="form-check-input" id="offerCheck">
                <label class="form-check-label" for="offerCheck">가격 제안 가능</label>
            </div>

            <div class="mb-3">
                <label class="form-label">상품 이미지</label>
                <input type="file" name="images" class="form-control" multiple accept="image/*">
            </div>

            <div class="mb-4">
                <label class="form-label">내용</label>
                <textarea name="content" class="form-control" rows="8" required></textarea>
            </div>

            <div class="d-flex justify-content-center gap-3">
                <a href="/used/list" class="btn btn-light px-5 border">취소</a>
                <button type="submit" class="btn btn-primary px-5">등록하기</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
