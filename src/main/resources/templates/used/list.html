<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>petmilyday - 중고거래</title>

    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/used/used-list.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="main-container">

    <div class="page-header">
        <div class="d-flex justify-content-between align-items-center">

            <div>
                <h3 class="fw-bold">
                    중고거래
                </h3>

                <p>
                    반려동물 용품을 안전하게 사고팔 수 있는 공간입니다.
                </p>
            </div>

            <div class="d-flex gap-2">

                <a href="/chat/list"
                   class="btn btn-light px-4">
                    채팅 목록
                </a>

                <a href="/used/write"
                   class="btn btn-dark px-4">
                    게시글 등록
                </a>

            </div>

        </div>
    </div>

    <form th:action="@{/used/list}"
          method="get"
          class="filter-box mb-4"
          id="usedSearchForm">

        <div class="row g-2 align-items-center">

            <div class="col-md-5">
                <input type="text"
                       name="keyword"
                       class="form-control"
                       placeholder="상품명, 키워드 검색"
                       th:value="${keyword}">
            </div>

            <div class="col-md-2">

                <select name="category"
                        class="form-select">

                    <option value="">
                        카테고리
                    </option>

                    <option value="사료/간식"
                            th:selected="${category == '사료/간식'}">
                        사료/간식
                    </option>

                    <option value="장난감"
                            th:selected="${category == '장난감'}">
                        장난감
                    </option>

                    <option value="의류"
                            th:selected="${category == '의류'}">
                        의류
                    </option>

                    <option value="가구/매트"
                            th:selected="${category == '가구/매트'}">
                        가구/매트
                    </option>

                </select>

            </div>

            <div class="col-md-3">
                <input type="text"
                       name="region"
                       class="form-control"
                       placeholder="지역 검색 (예:서울 강남구)"
                       th:value="${region}">
            </div>

            <div class="col-md-2">
                <button type="submit"
                        class="btn btn-primary w-100"
                        id="searchBtn">
                    검색
                </button>
            </div>

        </div>

    </form>

    <div class="mb-4">

        <div class="filter-btn-group">

            <a th:href="@{/used/list}"
               class="btn-filter"
               th:classappend="${condition == null and (offerAccepted == null or offerAccepted == false) and onlyWish != true} ? ' active'">
                전체
            </a>

            <a th:href="@{/used/list(
                keyword=${keyword},
                category=${category},
                region=${region},
                condition='NEW'
            )}"
               class="btn-filter"
               th:classappend="${condition != null and condition.name() == 'NEW'} ? ' active'">
                새제품
            </a>

            <a th:href="@{/used/list(
                keyword=${keyword},
                category=${category},
                region=${region},
                condition='LIKE_NEW'
            )}"
               class="btn-filter"
               th:classappend="${condition != null and condition.name() == 'LIKE_NEW'} ? ' active'">
                거의새것
            </a>

            <a th:href="@{/used/list(
                keyword=${keyword},
                category=${category},
                region=${region},
                condition='USED'
            )}"
               class="btn-filter"
               th:classappend="${condition != null and condition.name() == 'USED'} ? ' active'">
                중고
            </a>

            <a th:href="@{/used/list(
                keyword=${keyword},
                category=${category},
                region=${region},
                offerAccepted=true
            )}"
               class="btn-filter"
               th:classappend="${offerAccepted == true} ? ' active'">
                가격제안가능
            </a>

            <a th:href="@{/used/list(onlyWish=true)}"
               class="btn-filter"
               th:classappend="${onlyWish == true} ? ' active'">
                찜한 게시글
            </a>

        </div>

    </div>

    <div id="post-list">

        <div th:if="${posts == null or posts.content.isEmpty()}">

            <div class="empty-card">

                <div class="empty-icon">
                    🐾
                </div>

                <h5 class="text-muted">
                    등록된 게시글이 없습니다.
                </h5>

                <p class="text-muted small mt-2">
                    검색 조건을 변경하거나 새로운 게시글을 등록해보세요.
                </p>

            </div>

        </div>

        <div th:if="${posts != null and not posts.content.isEmpty()}">

            <a th:each="post : ${posts.content}"
               th:href="@{/used/detail/{id}(id=${post.id})}"
               class="post-link">

                <div class="post-card">

                    <div class="img-box">

                        <img th:if="${post.imageUrlList != null and not post.imageUrlList.isEmpty()}"
                             th:src="${post.imageUrlList[0]}"
                             th:alt="${post.title}">

                        <span th:if="${post.imageUrlList == null or post.imageUrlList.isEmpty()}">
                            이미지 없음
                        </span>

                    </div>

                    <div class="flex-grow-1">

                        <span class="category-badge"
                              th:text="${post.category}">
                            카테고리
                        </span>

                        <h5 class="post-title"
                            th:text="${post.title}">
                            제목
                        </h5>

                        <div class="price-line">

                            <span class="price-text"
                                  th:text="${#numbers.formatInteger(post.price, 0, 'COMMA')} + '원'">
                                0원
                            </span>

                            <span th:if="${post.offerAccepted}"
                                  class="offer-badge">
                                가격제안 가능
                            </span>

                        </div>

                        <div class="meta-line">

                            작성자:
                            <span th:text="${post.writerName}"></span>

                            <span class="ms-2 text-warning fw-semibold">
                                ⭐
                                <span th:text="${post.mannerAverage != null ? #numbers.formatDecimal(post.mannerAverage, 1, 1) : '0.0'}">
                                    0.0
                                </span>
                            </span>

                        </div>

                        <div class="bottom-meta">

                            <span th:text="${post.region}">
                                지역
                            </span>

                            <span>·</span>

                            <span class="condition-badge"
                                  th:text="${post.itemConditionLabel}">
                                상태
                            </span>

                        </div>

                    </div>

                    <div class="text-end">

                        <span class="status-badge"
                              th:text="${post.statusLabel}">
                        </span>

                    </div>

                </div>

            </a>

        </div>

        <nav th:if="${posts != null and posts.totalPages > 0}">
            <ul class="pagination justify-content-center">

                <li class="page-item"
                    th:classappend="${posts.first} ? 'disabled'">

                    <a class="page-link"
                       th:href="@{/used/list(
                           page=${posts.number - 1},
                           keyword=${keyword},
                           category=${category},
                           region=${region},
                           condition=${condition},
                           offerAccepted=${offerAccepted},
                           onlyWish=${onlyWish}
                       )}">
                        이전
                    </a>

                </li>

                <li class="page-item"
                    th:each="i : ${#numbers.sequence(startPage,endPage)}"
                    th:classappend="${i == currentPage} ? 'active'">

                    <a class="page-link"
                       th:href="@{/used/list(
                           page=${i},
                           keyword=${keyword},
                           category=${category},
                           region=${region},
                           condition=${condition},
                           offerAccepted=${offerAccepted},
                           onlyWish=${onlyWish}
                       )}"
                       th:text="${i + 1}">
                    </a>

                </li>

                <li class="page-item"
                    th:classappend="${posts.last} ? 'disabled'">

                    <a class="page-link"
                       th:href="@{/used/list(
                           page=${posts.number + 1},
                           keyword=${keyword},
                           category=${category},
                           region=${region},
                           condition=${condition},
                           offerAccepted=${offerAccepted},
                           onlyWish=${onlyWish}
                       )}">
                        다음
                    </a>

                </li>

            </ul>
        </nav>

    </div>

</div>

<script th:src="@{/js/used/used-list.js}"></script>

</body>
</html>
