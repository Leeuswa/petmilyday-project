<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>petmilyday - 채팅</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            background-color: #f4f6fa;
            font-family: 'Pretendard', sans-serif;
        }

        .navbar-custom {
            background-color: #0f172a;
            padding: 15px 0;
            color: white;
        }

        .nav-link {
            color: #cbd5e1 !important;
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.95rem;
        }

        .nav-link.active {
            color: white !important;
            font-weight: bold;
            background: #3b82f6;
            padding: 5px 15px;
            border-radius: 8px;
        }

        .main-container {
            max-width: 900px;
            margin: 40px auto;
        }

        .chat-card {
            background: white;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 75vh;
        }

        .chat-header {
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: #f8fafc;
            border-radius: 12px;
        }

        .msg {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 14px;
            margin-bottom: 10px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .msg.me {
            background: #3b82f6;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .msg.other {
            background: #e2e8f0;
            color: #111827;
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }

        .chat-input {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .chat-input input {
            flex: 1;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            padding: 10px;
        }

    </style>
</head>

<body>

<nav class="navbar-custom">
    <div class="container d-flex align-items-center">

        <h4 class="fw-bold mb-0 me-5">petmilyday</h4>

        <div class="d-flex flex-grow-1">
            <a href="/used/list" class="nav-link">중고거래</a>
            <a href="/chat/list" class="nav-link active">채팅</a>
        </div>

    </div>
</nav>

<div class="main-container">

    <div class="chat-card">

        <!-- 헤더 -->
        <div class="chat-header">
            <h5 class="fw-bold mb-0">💬 채팅</h5>
        </div>

        <!-- 메시지 영역 -->
        <div id="chatBox" class="chat-box">

            <div th:each="msg : ${messages}">

                <div th:classappend="${msg.senderId == 1} ? 'msg me' : 'msg other'"
                     class="msg">

                    <span th:text="${msg.message}"></span>

                </div>

            </div>

        </div>

        <!-- 입력 -->
        <div class="chat-input">

            <input type="text"
                   id="msgInput"
                   placeholder="메시지를 입력하세요"
                   required>

            <button type="button"
                    class="btn btn-primary"
                    onclick="sendMessage()">
                전송
            </button>

        </div>

    </div>

</div>

<!-- WebSocket -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script th:inline="javascript">

    let roomId = [[${roomId}]];
    let senderId = 1; // TODO: session으로 변경

    let sock = new SockJS("/ws-chat");
    let stomp = Stomp.over(sock);

    stomp.connect({}, function () {

        stomp.subscribe("/topic/chat/room/" + roomId, function (res) {

            let msg = JSON.parse(res.body);

            let box = document.getElementById("chatBox");

            let div = document.createElement("div");

            div.classList.add("msg");

            if (msg.senderId === senderId) {
                div.classList.add("me");
            } else {
                div.classList.add("other");
            }

            div.innerText = msg.message;

            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });
    });

    function sendMessage() {

        let input = document.getElementById("msgInput");
        let message = input.value;

        if (message.trim() === "") return;

        stomp.send("/app/chat.send", {}, JSON.stringify({
            roomId: roomId,
            senderId: senderId,
            message: message
        }));

        input.value = "";
    }

</script>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>
    let stompClient = null;
    let roomId = [[${roomId}]];
    let senderId = 1; // 임시

    function connect() {
        let socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {

            stompClient.subscribe('/topic/chat/' + roomId, function (msg) {
                let data = JSON.parse(msg.body);
                showMessage(data);
            });
        });
    }

    function sendMessage() {
        let message = document.getElementById("msg").value;

        stompClient.send("/app/chat/send", {}, JSON.stringify({
            roomId: roomId,
            senderId: senderId,
            message: message
        }));

        document.getElementById("msg").value = "";
    }

    function showMessage(data) {
        let box = document.getElementById("chatBox");

        let div = document.createElement("div");
        div.innerText = data.senderId + " : " + data.message;

        box.appendChild(div);
    }

    connect();
</script>
</body>
</html>
