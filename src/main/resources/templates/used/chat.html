<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>petmilyday - 채팅</title>

    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/used/used-chat.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="chat-page"
     id="chatPage"
     th:data-room-id="${roomId}"
     th:data-sender-id="${senderId}">

    <div class="chat-hero">

        <div class="hero-icon-left">
            🐾
        </div>

        <div class="hero-center">
            <h2>
                1:1 채팅
            </h2>

            <p>
                거래 상대방과 상품 상태, 가격, 거래 장소를 이야기해보세요.<br>
                안전한 거래를 위해 충분히 소통하는 것이 좋아요.
            </p>
        </div>

        <a th:href="@{'/used/detail/' + ${postId}}"
           class="hero-back-btn">
            ← 게시글로 돌아가기
        </a>

        <div class="hero-icon-right">
            💬
        </div>

    </div>

    <div class="chat-layout">

        <main class="chat-main">

            <div class="chat-card">

                <div class="chat-header">

                    <div class="chat-title-area">

                        <div class="chat-icon">
                            💬
                        </div>

                        <div>
                            <h5 th:text="${postTitle}">
                                게시글 제목
                            </h5>

                            <p>
                                상대방 :
                                <span th:text="${opponentName}">
                                    상대방
                                </span>
                            </p>
                        </div>

                    </div>

                    <a th:href="@{'/used/detail/' + ${postId}}"
                       class="back-post-btn">
                        게시글 보기
                    </a>

                </div>

                <div id="chatBox"
                     class="chat-box">

                    <th:block th:each="msg, stat : ${messages}">

                        <div class="date-divider"
                             th:if="${msg.createdAt != null and (stat.first or #temporals.format(msg.createdAt, 'yyyy-MM-dd') != #temporals.format(messages[stat.index - 1].createdAt, 'yyyy-MM-dd'))}">
                            <span th:text="${#temporals.format(msg.createdAt, 'yyyy년 MM월 dd일')}">
                                날짜
                            </span>
                        </div>

                        <div th:class="${msg.senderId == senderId} ? 'msg-row me' : 'msg-row other'">

                            <div th:if="${msg.senderId == senderId}"
                                 class="msg-time"
                                 th:text="${msg.createdAt != null ? #temporals.format(msg.createdAt, 'HH:mm') : ''}">
                            </div>

                            <div th:class="${msg.senderId == senderId} ? 'msg me' : 'msg other'"
                                 th:text="${msg.message}">
                                메시지
                            </div>

                            <div th:if="${msg.senderId != senderId}"
                                 class="msg-time"
                                 th:text="${msg.createdAt != null ? #temporals.format(msg.createdAt, 'HH:mm') : ''}">
                            </div>

                        </div>

                    </th:block>

                </div>

                <div th:if="${canEvaluate}"
                     class="evaluate-area">

                    <a th:href="@{/manner/evaluate(
                            postId=${postId},
                            targetMemberId=${targetMemberId}
                        )}"
                       class="evaluate-btn">
                        ⭐ 거래 평가하기
                    </a>

                </div>

                <div class="chat-input">

                    <input type="text"
                           id="msgInput"
                           placeholder="메시지를 입력하세요"
                           autocomplete="off"
                           required>

                    <button type="button"
                            id="sendBtn">
                        전송
                    </button>

                </div>

            </div>

        </main>

        <aside class="chat-side">

            <div class="side-card pink-card">

                <div class="side-title">
                    채팅 안내
                </div>

                <ul>
                    <li>상품 상태를 충분히 확인하세요.</li>
                    <li>가격과 거래 장소를 미리 정하세요.</li>
                    <li>개인정보 공유는 신중하게 해주세요.</li>
                </ul>

            </div>

            <div class="side-card mint-card">

                <div class="side-title">
                    안전 거래 팁
                </div>

                <p>
                    직거래는 사람이 많은 장소에서 진행하고, 결제 전 상품 상태를 다시 확인하는 것을 권장합니다.
                </p>

            </div>

        </aside>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script th:src="@{/js/used/used-chat.js}"></script>

</body>
</html>
