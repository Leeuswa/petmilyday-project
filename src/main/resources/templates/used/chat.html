<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>petmilyday - 채팅</title>

    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/used/used-chat.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="main-container"
     id="chatPage"
     th:data-room-id="${roomId}"
     th:data-sender-id="${senderId}">

    <div class="chat-card">

        <div class="chat-header">

            <div>
                <h5 class="fw-bold mb-1"
                    th:text="${postTitle}">
                    게시글 제목
                </h5>

                <div class="text-muted">
                    상대방 :
                    <span th:text="${opponentName}">
                        상대방
                    </span>
                </div>
            </div>

            <a th:href="@{'/used/detail/' + ${postId}}"
               class="btn btn-sm btn-secondary back-post-btn">
                ⬅ 게시글로 돌아가기
            </a>

        </div>

        <div id="chatBox"
             class="chat-box">

            <th:block th:each="msg, stat : ${messages}">

                <div class="date-divider"
                     th:if="${msg.createdAt != null and (stat.first or #temporals.format(msg.createdAt, 'yyyy-MM-dd') != #temporals.format(messages[stat.index - 1].createdAt, 'yyyy-MM-dd'))}">
                    <span th:text="${#temporals.format(msg.createdAt, 'yyyy년 MM월 dd일')}">
                        날짜
                    </span>
                </div>

                <div th:class="${msg.senderId == senderId} ? 'msg-row me' : 'msg-row other'">

                    <div th:if="${msg.senderId == senderId}"
                         class="msg-time"
                         th:text="${msg.createdAt != null ? #temporals.format(msg.createdAt, 'HH:mm') : ''}">
                    </div>

                    <div th:class="${msg.senderId == senderId} ? 'msg me' : 'msg other'"
                         th:text="${msg.message}">
                        메시지
                    </div>

                    <div th:if="${msg.senderId != senderId}"
                         class="msg-time"
                         th:text="${msg.createdAt != null ? #temporals.format(msg.createdAt, 'HH:mm') : ''}">
                    </div>

                </div>

            </th:block>

        </div>

        <div th:if="${canEvaluate}"
             class="mb-3 text-end mt-2">

            <a th:href="@{/manner/evaluate(
                    postId=${postId},
                    targetMemberId=${targetMemberId}
                )}"
               class="btn btn-warning evaluate-btn">
                ⭐ 거래 평가하기
            </a>

        </div>

        <div class="chat-input">

            <input type="text"
                   id="msgInput"
                   placeholder="메시지를 입력하세요"
                   autocomplete="off"
                   required>

            <button type="button"
                    class="btn btn-primary"
                    id="sendBtn">
                전송
            </button>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script th:src="@{/js/used/used-chat.js}"></script>

</body>
</html>
