<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>petmilyday - 결제 확인</title>

    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/used/used-payment-confirm.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="pay-container">

    <div class="pay-hero">
        <h3>
            결제 확인
        </h3>

        <p>
            결제 정보를 확인하고 테스트 결제를 진행할 수 있습니다.
        </p>
    </div>

    <div class="pay-card">

        <div class="card-body p-5">

            <div class="pay-section">

                <div class="pay-label">
                    상품명
                </div>

                <div class="pay-value"
                     th:text="${post.title}">
                    상품명
                </div>

            </div>

            <div class="pay-section">

                <div class="pay-label">
                    결제금액
                </div>

                <div class="price-text">
                    <span th:text="${#numbers.formatInteger(post.price,0,'COMMA')}">
                        0
                    </span>원
                </div>

            </div>

            <div class="pay-section">

                <div class="pay-label">
                    결제수단
                </div>

                <div class="pay-value">
                    카카오페이 테스트 결제
                </div>

            </div>

            <div class="notice-box mb-4">
                현재 카카오페이는 개발용 Mockup 결제창으로 연동되어 있습니다.<br>
                실제 결제는 발생하지 않으며, 시연용으로 테스트 결제 완료 처리를 할 수 있습니다.
            </div>

            <form th:action="@{/payment/ready}"
                  method="post"
                  id="paymentReadyForm">

                <input type="hidden"
                       name="postId"
                       th:value="${post.id}">

                <button type="submit"
                        class="btn btn-warning w-100 py-3 fw-bold pay-btn"
                        id="paymentReadyBtn">
                    카카오페이 결제창 열기
                </button>

            </form>

            <a th:href="@{/payment/test-success(postId=${post.id})}"
               class="btn btn-success w-100 mt-2 py-3 fw-bold">
                테스트 결제 완료 처리
            </a>

            <a th:href="@{/used/detail/{id}(id=${post.id})}"
               class="btn btn-outline-secondary w-100 mt-2 py-3 fw-bold">
                취소
            </a>

        </div>

    </div>

</div>

<script th:src="@{/js/used/used-payment-confirm.js}"></script>

</body>
</html>
