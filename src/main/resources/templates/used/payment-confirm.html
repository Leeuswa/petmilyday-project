<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>결제 확인</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body style="background:#f4f6fa;">

<div class="container" style="max-width:650px; margin-top:80px;">

    <div class="card shadow-sm border-0 rounded-4">

        <div class="card-body p-5">

            <h3 class="fw-bold mb-4">
                결제 확인
            </h3>

            <div class="mb-3">
                <strong>상품명</strong>
                <div th:text="${post.title}"></div>
            </div>

            <div class="mb-3">
                <strong>결제금액</strong>
                <div class="text-primary fs-4 fw-bold">
                    <span th:text="${#numbers.formatInteger(post.price,0,'COMMA')}"></span>원
                </div>
            </div>

            <div class="mb-4">
                <strong>결제수단</strong>
                <div>카카오페이</div>
            </div>

            <form th:action="@{/payment/ready}" method="post">

                <input type="hidden"
                       name="postId"
                       th:value="${post.id}">

                <button type="submit"
                        class="btn btn-warning w-100 py-3 fw-bold">
                    카카오페이로 결제하기
                </button>

            </form>

            <a th:href="@{/used/detail/{id}(id=${post.id})}"
               class="btn btn-outline-secondary w-100 mt-2">
                취소
            </a>

        </div>

    </div>

</div>

</body>
</html>
