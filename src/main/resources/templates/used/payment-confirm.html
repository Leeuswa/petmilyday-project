<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>petmilyday - 결제 확인</title>

    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/used/used-payment-confirm.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="payment-page">

    <div class="payment-hero">

        <div class="hero-icon-left">
            🐾
        </div>

        <div class="hero-center">
            <h2>
                결제 확인
            </h2>

            <p>
                결제 정보를 확인하고 카카오페이 테스트 결제를 진행할 수 있습니다.<br>
                현재 결제는 시연용 Mockup 환경 기준으로 처리됩니다.
            </p>
        </div>

        <a th:href="@{/used/detail/{id}(id=${post.id})}"
           class="hero-back-btn">
            ← 상품으로 돌아가기
        </a>

        <div class="hero-icon-right">
            💳
        </div>

    </div>

    <div class="payment-layout">

        <div class="payment-card">

            <div class="card-title-area">

                <div class="title-icon">
                    💳
                </div>

                <div>
                    <h3>
                        결제 정보 확인
                    </h3>

                    <p>
                        상품명과 결제금액을 확인한 뒤 결제를 진행해주세요.
                    </p>
                </div>

            </div>

            <div class="pay-section">

                <div class="pay-label">
                    상품명
                </div>

                <div class="pay-value"
                     th:text="${post.title}">
                    상품명
                </div>

            </div>

            <div class="pay-section price-section">

                <div class="pay-label">
                    결제금액
                </div>

                <div class="price-text">
                    <span th:text="${#numbers.formatInteger(post.price,0,'COMMA')}">
                        0
                    </span>원
                </div>

            </div>

            <div class="pay-section">

                <div class="pay-label">
                    결제수단
                </div>

                <div class="pay-value">
                    카카오페이 테스트 결제
                </div>

            </div>

            <div class="notice-box">
                <strong>
                    결제 안내
                </strong>

                <span>
                    현재 카카오페이는 개발용 Mockup 결제창으로 연동되어 있습니다.
                    실제 결제는 발생하지 않으며, 시연용으로 테스트 결제 완료 처리를 할 수 있습니다.
                </span>
            </div>

            <form th:action="@{/payment/ready}"
                  method="post"
                  id="paymentReadyForm">

                <input type="hidden"
                       name="postId"
                       th:value="${post.id}">

                <button type="submit"
                        class="payment-btn primary-pay-btn"
                        id="paymentReadyBtn">
                    카카오페이 결제창 열기
                </button>

            </form>

            <a th:href="@{/used/detail/{id}(id=${post.id})}"
               class="payment-btn cancel-pay-btn">
                취소
            </a>

        </div>

    </div>

</div>

<script th:src="@{/js/used/used-payment-confirm.js}"></script>

</body>
</html>
