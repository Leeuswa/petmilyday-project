<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<nav class="gnb" th:fragment="header">
  <style>
    :root {
      --surface: #ffffff;
      --border: #d0d5e8;
      --border2: #b8bfdc;
      --text: #0d1433;
      --text2: #3d4670;
      --accent: #2b44cc;
      --accent-light: #eaedfa;
      --bg2: #f0f2f7;
      --r: 8px;
    }

    .gnb {
      display: flex;
      align-items: center;
      padding: 16px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-family: 'Sora', 'Noto Sans KR', sans-serif;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      margin-right: 30px;
    }
    .logo span { color: var(--accent); }

    .nav-link {
      margin: 0 15px;
      color: var(--text2);
      text-decoration: none;
      font-weight: 500;
      font-size: 15px;
      transition: color 0.2s;
    }
    .nav-link:hover { color: var(--accent); }

    .dropdown {
      position: relative;
      display: inline-block;
      padding: 10px 0;
    }
    .dropbtn {
      cursor: pointer;
    }
    .dropdown-content {
      display: none;
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      background-color: var(--surface);
      min-width: 140px;
      box-shadow: 0px 8px 24px rgba(0,0,0,0.12);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      z-index: 9999;
    }
    .dropdown:hover .dropdown-content {
      display: block;
    }
    .dropdown-content a {
      display: block;
      padding: 12px 16px;
      color: var(--text2);
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      text-decoration: none;
      border-bottom: 1px solid var(--bg2);
      transition: all 0.2s ease;
    }
    .dropdown-content a:last-child {
      border-bottom: none;
    }
    .dropdown-content a:hover {
      background-color: var(--accent-light);
      color: var(--accent);
      font-weight: 600;
    }

    .btn-outline {
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text2);
      border-radius: var(--r);
      text-decoration: none;
    }
    .btn-outline:hover { background: var(--bg2); }

    .btn-accent {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--r);
      text-decoration: none;
    }
    .btn-accent:hover { background: #3d58e0; }

    .btn-sm { padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; display: inline-block;}
    .fxa { display: flex; align-items: center; }
    .g12 { gap: 12px; }
  </style>

  <a th:href="@{/}" class="logo">petmily<span>day</span></a>
  <a th:href="@{/}" class="nav-link">홈</a>
  <a th:href="@{/hospital/list}" class="nav-link">동물병원 예약</a>
  <a th:href="@{/ai-diagnosis}" class="nav-link">AI 자가진단</a>
  <a th:href="@{/shop}" class="nav-link">동물용품샵</a>

  <div class="dropdown">
    <span class="nav-link dropbtn">게시판</span>
    <div class="dropdown-content">
      <a th:href="@{/community/list}">일반 게시판</a>
      <a th:href="@{/used}">중고거래</a>
      <a th:href="@{/report}">신고 게시판</a>
    </div>
  </div>

  <div style="flex:1"></div>

  <div class="fxa g12">
    <th:block sec:authorize="isAnonymous()">
      <a th:href="@{/member/login}" class="btn-outline btn-sm">로그인</a>
      <a th:href="@{/member/register}" class="btn-accent btn-sm">회원가입</a>
    </th:block>

    <th:block sec:authorize="isAuthenticated()">
      <span style="font-size: 14px; font-weight: 500; color: var(--text2);">
        <span sec:authentication="name"></span>님
      </span>

      <a th:href="@{/member/mypage}" class="btn-accent btn-sm" style="background-color: var(--surface); color: var(--accent); border: 1px solid var(--accent);">마이페이지</a>

      <a th:href="@{/member/logout}" class="btn-outline btn-sm">로그아웃</a>
    </th:block>
  </div>
</nav>
</body>
</html>
