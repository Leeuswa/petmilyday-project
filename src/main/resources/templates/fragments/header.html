<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<nav class="gnb" th:fragment="header">
  <style>
    :root {
      --surface: #ffffff;
      --border: #d0d5e8;
      --border2: #b8bfdc;
      --text: #0d1433;
      --text2: #3d4670;
      --accent: #2b44cc;
      --r: 8px;
    }
    .gnb {
      display: flex;
      align-items: center;
      padding: 16px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-family: 'Sora', sans-serif;
    }
    .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }
    .logo span { color: var(--accent); }
    .nav-link {
      margin-left: 24px;
      color: var(--text2);
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
    }
    .nav-link:hover { color: var(--accent); }
    .nav-link.active { color: var(--accent); font-weight: 600; }
    .btn {
      padding: 8px 16px;
      border-radius: var(--r);
      font-weight: 500;
      text-decoration: none;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-outline {
      border: 1px solid var(--border2);
      color: var(--text2);
      background: transparent;
    }
    .btn-accent {
      background: var(--accent);
      color: white;
      border: none;
    }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .fxa { display: flex; align-items: center; }
    .g12 { gap: 12px; }
  </style>

  <div class="logo">petmily<span>day</span></div>
  <a th:href="@{/}" class="nav-link" th:classappend="${activeTab == 'main' || activeTab == null} ? 'active' : ''" style="background: none !important; color: #3d4670;">홈</a>
  <a th:href="@{/hospital/list}" class="nav-link">동물병원 예약</a>
  <a th:href="@{/ai-diagnosis}" class="nav-link">AI 자가진단</a>
  <a th:href="@{/shop}" class="nav-link">동물용품샵</a>
  <a th:href="@{/used}" class="nav-link">중고거래</a>
  <a th:href="@{/community}" class="nav-link">커뮤니티</a>
  <div style="flex:1"></div>
  <div class="fxa g12">
    <th:block th:if="${loggedInUser == null}">
      <a th:href="@{/member/login}" class="btn btn-outline btn-sm">로그인</a>
      <a th:href="@{/member/register}" class="btn btn-accent btn-sm">회원가입</a>
    </th:block>

    <th:block th:if="${loggedInUser != null}">
            <span style="font-size: 14px; font-weight: 600; color: #111111; margin-right: 10px;">
                👤 <span th:text="${loggedInUser}">사용자</span>님 환영합니다!
            </span>
      <form th:action="@{/member/logout}" method="post" style="display: inline;">
        <button type="submit" class="btn btn-outline btn-sm">로그아웃</button>
      </form>
    </th:block>
  </div>
</nav>
</body>
</html>
