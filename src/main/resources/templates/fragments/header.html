<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ko">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<nav class="gnb" th:fragment="header">

  <style>
    :root {
      --surface: #ffffff;
      --border: #d0d5e8;
      --border2: #b8bfdc;
      --text: #0d1433;
      --text2: #3d4670;
      --accent: #2b44cc;
      --accent-light: #eaedfa;
      --bg2: #f0f2f7;
      --r: 8px;
    }

    /* === 링크 색상 변질 방지 리셋 === */
    a, a:visited, a:active {
      text-decoration: none;
      color: inherit;
    }

    .gnb {
      display: flex;
      align-items: center;
      padding: 16px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-family: 'Sora', 'Noto Sans KR', sans-serif;
      position: relative;
      z-index: 1000;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--text) !important;
      margin-right: 30px;
    }

    .logo span {
      color: var(--accent);
    }

    .nav-link {
      margin: 0 15px;
      color: var(--text2) !important;
      font-weight: 500;
      font-size: 15px;
      transition: color 0.2s;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--accent) !important;
    }

    .dropdown {
      position: relative;
      display: inline-block;
      padding: 10px 0;
    }

    .dropbtn {
      cursor: pointer;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      background-color: var(--surface);
      min-width: 140px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      z-index: 9999;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    .dropdown-content a {
      display: block;
      padding: 12px 16px;
      color: var(--text2) !important;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      border-bottom: 1px solid var(--bg2);
      transition: all 0.2s ease;
    }

    .dropdown-content a:last-child {
      border-bottom: none;
    }

    .dropdown-content a:hover {
      background-color: var(--accent-light);
      color: var(--accent) !important;
      font-weight: 600;
    }

    .btn {
      padding: 8px 16px;
      border-radius: var(--r);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      display: inline-block;
    }

    .btn-outline {
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text2) !important;
    }

    .btn-outline:hover {
      background: var(--bg2);
    }

    .btn-accent {
      background: var(--accent);
      color: white !important;
      border: none;
    }

    .btn-accent:hover {
      background: #3d58e0;
    }

    .btn-sm {
      padding: 8px 16px;
      font-size: 13px;
    }

    .fxa {
      display: flex;
      align-items: center;
    }

    .g12 {
      gap: 12px;
    }

    /* 마이페이지 및 아바타 공통 드롭다운 */
    .mypage-wrap {
      position: relative;
    }

    .mypage-dropdown, .avatar-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      padding-top: 8px;
      z-index: 9999;
    }

    .mypage-dropdown {
      right: 0;
    }

    .avatar-dropdown {
      left: 50%;
      transform: translateX(-50%);
    }

    .mypage-wrap:hover .mypage-dropdown,
    .avatar-wrap:hover .avatar-dropdown {
      display: block;
    }

    .mypage-dropdown-inner {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: 0 8px 24px rgba(13, 20, 51, 0.12);
      min-width: 190px;
      overflow: hidden;
    }

    .mypage-dropdown a {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      font-size: 13px;
      color: var(--text2) !important;
      transition: background 0.12s;
      text-align: left;
    }

    /* 진료기록/예방접종 줄바꿈 시 정렬을 위한 내부 텍스트 세팅 */
    .mypage-dropdown a .menu-text {
      line-height: 1.4;
    }

    .mypage-dropdown a:hover {
      background: #f1f3fe;
      color: var(--accent) !important;
    }

    .mypage-dropdown hr {
      margin: 4px 0;
      border: none;
      border-top: 1px solid var(--border);
    }

    .logout-btn {
      color: #b52844 !important;
      border-color: #b52844;
    }

    .logout-btn:hover {
      background: #fff1f4;
    }

    /* 동물 프로필 관련 */
    .avatar-wrap {
      position: relative;
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .profile-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background-color: var(--bg2);
      border: 2px solid var(--border);
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23b8bfdc"><path d="M12 2c-5.52 0-10 4.48-10 10s4.48 10 10 10 10-4.48 10-10-4.48-10-10-10zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>');
      background-size: cover;
      background-position: center;
      transition: all 0.2s ease;
    }

    .avatar-wrap:hover .profile-avatar {
      border-color: var(--accent);
      transform: scale(1.05);
    }
  </style>

  <a th:href="@{/}" class="logo">petmily<span>day</span></a>
  <a th:href="@{/hospital/list}" class="nav-link">동물병원 예약</a>
  <a th:href="@{/ai-diagnosis}" class="nav-link">AI 자가진단</a>
  <a th:href="@{/shop}" class="nav-link">동물용품샵</a>

  <a th:href="@{/used}" class="nav-link">중고거래</a>

  <div class="dropdown">
    <span class="nav-link dropbtn">게시판 ▾</span>
    <div class="dropdown-content">
      <a th:href="@{/community/list}">일반 게시판</a>
      <a th:href="@{/community/meetup/list}">모임 게시판</a>
    </div>
  </div>

  <div style="flex:1"></div>

  <div class="fxa g12">
    <th:block sec:authorize="isAnonymous()">
      <a th:href="@{/member/login}" class="btn btn-outline btn-sm">로그인</a>
      <a th:href="@{/member/register}" class="btn btn-accent btn-sm">회원가입</a>
    </th:block>

    <th:block sec:authorize="isAuthenticated()">

      <div class="avatar-wrap">
        <div class="profile-avatar"></div>
        <div class="avatar-dropdown">
          <div class="mypage-dropdown-inner">
            <a th:href="@{/reservation/medical-records}">
              <span>🩺</span>
              <span class="menu-text">내 동물<br>진료기록</span>
            </a>
            <a th:href="@{/vaccination/myVaccination}">
              <span>💉</span>
              <span class="menu-text">내 동물<br>예방접종</span>
            </a>
          </div>
        </div>
      </div>

      <span style="font-size: 14px; font-weight: 500; color: var(--text2);">
        <span sec:authentication="name"></span>님
      </span>

      <div class="mypage-wrap">
        <a th:href="@{/member/mypage}" class="btn btn-outline btn-sm">마이페이지 ▾</a>
        <div class="mypage-dropdown">
          <div class="mypage-dropdown-inner">
            <a th:href="@{/member/mypage}">👤 회원정보 수정</a>
            <hr>
            <a th:href="@{/review/myReview}">📝 내가 쓴 리뷰</a>
            <a th:href="@{/community/my_posts}">📋 내가 쓴 일반 게시판 글</a>
            <a th:href="@{/community/meetup/my_posts}">🤝 내가 쓴 모임 게시판 글</a>
          </div>
        </div>
      </div>

      <a th:href="@{/member/logout}" class="btn btn-outline btn-sm logout-btn">로그아웃</a>

    </th:block>
  </div>
</nav>
</body>
</html>
