<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>병원 예약 관리</title>
  <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">

  <style>
    body {
      background: #f4f6fb;
      color: #111827;
    }

    .reservation-wrap {
      max-width: 1180px;
      margin: 0 auto;
    }

    .page-header-box {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
      margin-bottom: 24px;
    }

    .page-header-box h2 {
      margin: 0;
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.8px;
      color: #111827;
    }

    .page-header-box p {
      margin: 8px 0 0;
      color: #6b7280;
      font-size: 14px;
    }

    .summary-card {
      min-width: 160px;
      padding: 16px 20px;
      border-radius: 18px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #ffffff;
      text-align: right;
      box-shadow: 0 14px 28px rgba(37, 99, 235, 0.25);
    }

    .summary-card span {
      display: block;
      font-size: 13px;
      opacity: 0.85;
      margin-bottom: 4px;
    }

    .summary-card strong {
      font-size: 26px;
      font-weight: 900;
    }

    .reservation-card {
      border: 0;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 12px 34px rgba(15, 23, 42, 0.09);
      background: #ffffff;
    }

    .reservation-card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 24px;
      border-bottom: 1px solid #eef2f7;
      background: #ffffff;
    }

    .reservation-card-head strong {
      display: block;
      font-size: 18px;
      font-weight: 900;
      color: #111827;
    }

    .reservation-card-head span {
      display: block;
      margin-top: 5px;
      color: #6b7280;
      font-size: 13px;
    }

    .table {
      margin-bottom: 0;
    }

    .table thead th {
      background: #f9fafb;
      color: #374151;
      font-size: 13px;
      font-weight: 900;
      border-bottom: 1px solid #e5e7eb;
      padding: 15px 14px;
      white-space: nowrap;
    }

    .table tbody td {
      padding: 16px 14px;
      vertical-align: middle;
      font-size: 14px;
      color: #111827;
      border-bottom: 1px solid #f1f5f9;
      white-space: nowrap;
    }

    .table tbody tr:hover {
      background: #f8fbff;
    }

    .row-number {
      color: #2563eb;
      font-weight: 900;
    }

    .date-text {
      font-weight: 800;
      color: #1f2937;
    }

    .time-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 10px;
      border-radius: 10px;
      background: #f3f4f6;
      color: #111827;
      font-weight: 900;
    }

    .hospital-name {
      font-weight: 900;
      color: #111827;
    }

    .pet-name {
      font-weight: 700;
      color: #374151;
    }

    .department-text {
      color: #4b5563;
      font-weight: 700;
    }

    .wait-number {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #eef2ff;
      color: #3730a3;
      font-weight: 900;
      border: 1px solid #c7d2fe;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
    }

    .status-pill::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-waiting {
      background: #fef3c7;
      color: #92400e;
    }

    .status-approved {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .status-done {
      background: #dcfce7;
      color: #15803d;
    }

    .status-cancel {
      background: #fee2e2;
      color: #dc2626;
    }

    .action-box {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn-action {
      border-radius: 10px;
      font-size: 13px;
      font-weight: 800;
      padding: 6px 11px;
    }

    .done-text,
    .cancel-text {
      font-size: 13px;
      font-weight: 800;
      color: #6b7280;
    }

    .empty-box {
      padding: 48px 16px !important;
      color: #6b7280 !important;
      font-weight: 800;
    }

    .pagination-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 7px;
      padding: 24px;
      background: #ffffff;
      border-top: 1px solid #eef2f7;
    }

    .page-btn {
      min-width: 38px;
      height: 38px;
      padding: 0 13px;
      border: 1px solid #d1d5db;
      border-radius: 11px;
      background: #ffffff;
      color: #374151;
      text-decoration: none;
      font-size: 14px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .page-btn:hover {
      background: #eff6ff;
      border-color: #2563eb;
      color: #2563eb;
      transform: translateY(-1px);
    }

    .page-btn.active {
      background: #2563eb;
      border-color: #2563eb;
      color: #ffffff;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
    }

    .page-btn.disabled {
      pointer-events: none;
      opacity: 0.4;
      background: #f9fafb;
    }

    @media (max-width: 768px) {
      .page-header-box {
        flex-direction: column;
        align-items: stretch;
      }

      .summary-card {
        text-align: left;
      }
    }
  </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">
  <div class="reservation-wrap">

    <div class="page-header-box">
      <div>
        <h2>병원 예약 관리</h2>
        <p>담당 병원에 접수된 예약을 승인, 거절하거나 진료기록을 작성합니다.</p>
      </div>

      <div class="summary-card">
        <span>전체 예약</span>
        <strong>
          <span th:text="${reservationPage.totalElements}">0</span>건
        </strong>
      </div>
    </div>

    <div class="reservation-card">

      <div class="reservation-card-head">
        <div>
          <strong>예약 목록</strong>
          <span>최근 예약일 기준으로 정렬됩니다.</span>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead>
          <tr>
            <th>번호</th>
            <th>예약일</th>
            <th>예약시간</th>
            <th>병원명</th>
            <th>반려동물</th>
            <th>진료과목</th>
            <th>상태</th>
            <th>대기번호</th>
            <th>관리</th>
          </tr>
          </thead>

          <tbody>
          <tr th:if="${#lists.isEmpty(reservationPage.content)}">
            <td colspan="9" class="text-center empty-box">
              예약 내역이 없습니다.
            </td>
          </tr>

          <tr th:each="reservation, stat : ${reservationPage.content}">
            <td class="row-number"
                th:text="${currentPage * reservationPage.size + stat.count}">
              1
            </td>

            <td class="date-text"
                th:text="${reservation.reserveDate}">
              2026-06-06
            </td>

            <td>
              <span class="time-badge"
                    th:text="${reservation.reserveTime}">
                10:00
              </span>
            </td>

            <td class="hospital-name"
                th:text="${reservation.hospitalName}">
              병원명
            </td>

            <td class="pet-name"
                th:text="${reservation.petName}">
              반려동물
            </td>

            <td class="department-text"
                th:text="${reservation.department}">
              진료과목
            </td>

            <td>
              <span th:if="${reservation.status == 'WAITING'}"
                    class="status-pill status-waiting">
                승인대기
              </span>

              <span th:if="${reservation.status == 'APPROVED'}"
                    class="status-pill status-approved">
                승인완료
              </span>

              <span th:if="${reservation.status == 'DONE'}"
                    class="status-pill status-done">
                진료완료
              </span>

              <span th:if="${reservation.status == 'CANCEL'}"
                    class="status-pill status-cancel">
                취소
              </span>
            </td>

            <td>
              <span class="wait-number"
                    th:text="${reservation.waitNumber}">
                1
              </span>
            </td>

            <td>
              <div th:if="${reservation.status == 'WAITING'}"
                   class="action-box">

                <form th:action="@{/hospitalAdmin/reservations/{id}/approve(id=${reservation.id})}"
                      method="post">
                  <button type="submit" class="btn btn-success btn-sm btn-action">
                    승인
                  </button>
                </form>

                <form th:action="@{/hospitalAdmin/reservations/{id}/reject(id=${reservation.id})}"
                      method="post">
                  <button type="submit"
                          class="btn btn-danger btn-sm btn-action"
                          onclick="return confirm('예약을 거절하시겠습니까?')">
                    거절
                  </button>
                </form>
              </div>

              <a th:if="${reservation.status == 'APPROVED'}"
                 th:href="@{/hospitalAdmin/medicalRecords/register/{reservationId}(reservationId=${reservation.id})}"
                 class="btn btn-primary btn-sm btn-action">
                진료기록 작성
              </a>

              <span th:if="${reservation.status == 'DONE'}"
                    class="done-text">
                진료완료
              </span>

              <span th:if="${reservation.status == 'CANCEL'}"
                    class="cancel-text">
                취소됨
              </span>
            </td>
          </tr>
          </tbody>
        </table>
      </div>

      <div class="pagination-wrap" th:if="${reservationPage.totalPages > 1}">

        <a class="page-btn"
           th:classappend="${reservationPage.first} ? ' disabled' : ''"
           th:href="${reservationPage.first} ? '#' : @{/hospitalAdmin/reservations(page=${currentPage - 1})}">
          이전
        </a>

        <a class="page-btn"
           th:each="pageNum : ${#numbers.sequence(0, reservationPage.totalPages - 1)}"
           th:href="@{/hospitalAdmin/reservations(page=${pageNum})}"
           th:classappend="${pageNum == currentPage} ? ' active' : ''"
           th:text="${pageNum + 1}">
          1
        </a>

        <a class="page-btn"
           th:classappend="${reservationPage.last} ? ' disabled' : ''"
           th:href="${reservationPage.last} ? '#' : @{/hospitalAdmin/reservations(page=${currentPage + 1})}">
          다음
        </a>

      </div>

    </div>
  </div>
</div>

<div class="modal fade" id="messageModal" tabindex="-1"
     th:if="${message != null}">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">알림</h5>
        <button type="button"
                class="btn-close"
                data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p th:text="${message}" class="mb-0"></p>
      </div>
      <div class="modal-footer">
        <button type="button"
                class="btn btn-primary"
                data-bs-dismiss="modal">
          확인
        </button>
      </div>
    </div>
  </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>

<script th:if="${message != null}">
  const messageModal = new bootstrap.Modal(document.getElementById('messageModal'));
  messageModal.show();
</script>

</body>
</html>
