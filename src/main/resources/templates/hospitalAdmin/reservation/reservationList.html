<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>병원 예약 관리</title>
  <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/admin/adminHospital.css}">
  <link rel="stylesheet" th:href="@{/css/admin/hospitalForms.css}">

  <style>
    .table thead th {
      background: #f9fafb;
      color: #374151;
      font-size: 13px;
      font-weight: 900;
      border-bottom: 1px solid #e5e7eb;
      padding: 15px 14px;
      white-space: nowrap;
    }

    .table tbody td {
      padding: 16px 14px;
      vertical-align: middle;
      font-size: 14px;
      color: #111827;
      border-bottom: 1px solid #f1f5f9;
      white-space: nowrap;
    }

    .table tbody tr:hover {
      background: #f8fbff;
    }

    .row-number {
      color: #2563eb;
      font-weight: 900;
    }

    .date-text {
      font-weight: 800;
      color: #1f2937;
    }

    .time-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 10px;
      border-radius: 10px;
      background: #f3f4f6;
      color: #111827;
      font-weight: 900;
    }

    .hospital-name {
      font-weight: 900;
      color: #111827;
    }

    .pet-name {
      font-weight: 700;
      color: #374151;
    }

    .department-text {
      color: #4b5563;
      font-weight: 700;
    }

    .wait-number {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #eef2ff;
      color: #3730a3;
      font-weight: 900;
      border: 1px solid #c7d2fe;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
    }

    .status-pill::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-waiting {
      background: #fef3c7;
      color: #92400e;
    }

    .status-approved {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .status-done {
      background: #dcfce7;
      color: #15803d;
    }

    .status-cancel {
      background: #fee2e2;
      color: #dc2626;
    }

    .action-box {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn-action {
      border-radius: 10px;
      font-size: 13px;
      font-weight: 800;
      padding: 6px 11px;
    }

    .done-text,
    .cancel-text {
      font-size: 13px;
      font-weight: 800;
      color: #6b7280;
    }

    .empty-box {
      padding: 48px 16px !important;
      color: #6b7280 !important;
      font-weight: 800;
    }

    .pagination-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 7px;
      padding: 24px;
      background: #ffffff;
      border-top: 1px solid #eef2f7;
    }

    .page-btn {
      min-width: 38px;
      height: 38px;
      padding: 0 13px;
      border: 1px solid #d1d5db;
      border-radius: 11px;
      background: #ffffff;
      color: #374151;
      text-decoration: none;
      font-size: 14px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .page-btn:hover {
      background: #eff6ff;
      border-color: #2563eb;
      color: #2563eb;
      transform: translateY(-1px);
    }

    .page-btn.active {
      background: #2563eb;
      border-color: #2563eb;
      color: #ffffff;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
    }

    .page-btn.disabled {
      pointer-events: none;
      opacity: 0.4;
      background: #f9fafb;
    }

    .topbar-count {
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
      white-space: nowrap;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      background: #e5e7eb;
      color: #374151;
    }
  </style>
</head>
<body>

<div class="admin-layout">
  <aside th:replace="~{fragments/hospitalAdminSidebar :: hospitalAdminSidebar('reservations')}"></aside>

  <main class="content">

    <div class="topbar">
      <div>
        <h2>병원 예약 관리</h2>
        <p>담당 병원에 접수된 예약을 승인, 거절하거나 진료기록을 작성합니다.</p>
      </div>

      <span class="topbar-count">전체 <span th:text="${reservationPage.totalElements}">0</span>건</span>
    </div>

    <div class="hf-card">

      <div class="hf-card-head">
        <span class="icon">🗓️</span>
        <div>
          <strong>예약 목록</strong>
          <span>최근 예약일 기준으로 정렬됩니다.</span>
        </div>
      </div>

      <div class="hf-card-body">

        <form th:action="@{/hospitalAdmin/reservations}"
              method="get"
              class="d-flex gap-2 flex-wrap align-items-center"
              style="margin-bottom: 18px;">

          <select class="form-select" style="max-width:160px;" name="status">
            <option value="" th:selected="${status == null}">전체 상태</option>
            <option value="WAITING" th:selected="${status != null and status.name() == 'WAITING'}">승인대기</option>
            <option value="APPROVED" th:selected="${status != null and status.name() == 'APPROVED'}">승인완료</option>
            <option value="DONE" th:selected="${status != null and status.name() == 'DONE'}">진료완료</option>
            <option value="CANCEL" th:selected="${status != null and status.name() == 'CANCEL'}">취소</option>
          </select>

          <input type="date" class="form-control" style="max-width:160px;" name="dateFrom" th:value="${dateFrom}">
          <span>~</span>
          <input type="date" class="form-control" style="max-width:160px;" name="dateTo" th:value="${dateTo}">

          <button type="submit" class="btn btn-primary btn-sm">검색</button>
          <a th:href="@{/hospitalAdmin/reservations}" class="btn btn-outline-secondary btn-sm">초기화</a>
        </form>

        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
            <tr>
              <th>번호</th>
              <th>예약일</th>
              <th>예약시간</th>
              <th>병원명</th>
              <th>반려동물</th>
              <th>진료과목</th>
              <th>상태</th>
              <th>대기번호</th>
              <th>관리</th>
            </tr>
            </thead>

            <tbody>
            <tr th:if="${#lists.isEmpty(reservationPage.content)}">
              <td colspan="9" class="text-center empty-box">
                예약 내역이 없습니다.
              </td>
            </tr>

            <tr th:each="reservation, stat : ${reservationPage.content}">
              <td class="row-number"
                  th:text="${currentPage * reservationPage.size + stat.count}">
                1
              </td>

              <td class="date-text"
                  th:text="${reservation.reserveDate}">
                2026-06-06
              </td>

              <td>
                <span class="time-badge"
                      th:text="${reservation.reserveTime}">
                  10:00
                </span>
              </td>

              <td class="hospital-name"
                  th:text="${reservation.hospitalName}">
                병원명
              </td>

              <td class="pet-name"
                  th:text="${reservation.petName}">
                반려동물
              </td>

              <td class="department-text"
                  th:text="${reservation.department}">
                진료과목
              </td>

              <td>
                <span th:if="${reservation.status == 'WAITING'}"
                      class="status-pill status-waiting">
                  승인대기
                </span>

                <span th:if="${reservation.status == 'APPROVED'}"
                      class="status-pill status-approved">
                  승인완료
                </span>

                <span th:if="${reservation.status == 'DONE'}"
                      class="status-pill status-done">
                  진료완료
                </span>

                <span th:if="${reservation.status == 'CANCEL'}"
                      class="status-pill status-cancel">
                  취소
                </span>
              </td>

              <td>
                <span class="wait-number"
                      th:text="${reservation.waitNumber}">
                  1
                </span>
              </td>

              <td>
                <div th:if="${reservation.status == 'WAITING'}"
                     class="action-box">

                  <form th:action="@{/hospitalAdmin/reservations/{id}/approve(id=${reservation.id})}"
                        method="post">
                    <button type="submit" class="btn btn-success btn-sm btn-action">
                      승인
                    </button>
                  </form>

                  <form th:action="@{/hospitalAdmin/reservations/{id}/reject(id=${reservation.id})}"
                        method="post">
                    <button type="submit"
                            class="btn btn-danger btn-sm btn-action"
                            onclick="return confirm('예약을 거절하시겠습니까?')">
                      거절
                    </button>
                  </form>
                </div>

                <a th:if="${reservation.status == 'APPROVED'}"
                   th:href="@{/hospitalAdmin/medicalRecords/register/{reservationId}(reservationId=${reservation.id})}"
                   class="btn btn-primary btn-sm btn-action">
                  진료기록 작성
                </a>

                <a th:if="${reservation.status == 'DONE'}"
                   th:href="@{/hospitalAdmin/medicalRecords/modify/{reservationId}(reservationId=${reservation.id})}"
                   class="btn btn-outline-primary btn-sm btn-action">
                  진료기록 수정
                </a>

                <span th:if="${reservation.status == 'CANCEL'}"
                      class="cancel-text">
                  취소됨
                </span>
              </td>
            </tr>
            </tbody>
          </table>
        </div>

        <div class="pagination-wrap" th:if="${reservationPage.totalPages > 1}">

          <a class="page-btn"
             th:classappend="${reservationPage.first} ? ' disabled' : ''"
             th:href="${reservationPage.first} ? '#' : @{/hospitalAdmin/reservations(page=${currentPage - 1}, status=${status}, dateFrom=${dateFrom}, dateTo=${dateTo})}">
            이전
          </a>

          <a class="page-btn"
             th:each="pageNum : ${#numbers.sequence(0, reservationPage.totalPages - 1)}"
             th:href="@{/hospitalAdmin/reservations(page=${pageNum}, status=${status}, dateFrom=${dateFrom}, dateTo=${dateTo})}"
             th:classappend="${pageNum == currentPage} ? ' active' : ''"
             th:text="${pageNum + 1}">
            1
          </a>

          <a class="page-btn"
             th:classappend="${reservationPage.last} ? ' disabled' : ''"
             th:href="${reservationPage.last} ? '#' : @{/hospitalAdmin/reservations(page=${currentPage + 1}, status=${status}, dateFrom=${dateFrom}, dateTo=${dateTo})}">
            다음
          </a>

        </div>

      </div>
    </div>

  </main>
</div>

<div class="modal fade" id="messageModal" tabindex="-1"
     th:if="${message != null}">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">알림</h5>
        <button type="button"
                class="btn-close"
                data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p th:text="${message}" class="mb-0"></p>
      </div>
      <div class="modal-footer">
        <button type="button"
                class="btn btn-primary"
                data-bs-dismiss="modal">
          확인
        </button>
      </div>
    </div>
  </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>

<script th:if="${message != null}">
  const messageModal = new bootstrap.Modal(document.getElementById('messageModal'));
  messageModal.show();
</script>

<div th:replace="~{fragments/sseNotification :: sseNotification}"></div>

</body>
</html>
