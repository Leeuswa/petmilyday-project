<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>병원 정보 관리</title>
  <link rel="stylesheet" th:href="@{/css/admin/adminHospital.css}">
  <link rel="stylesheet" th:href="@{/css/admin/hospitalForms.css}">
</head>
<body>

<div class="admin-layout">
  <aside th:replace="~{fragments/hospitalAdminSidebar :: hospitalAdminSidebar('hospital')}"></aside>

  <main class="content">
    <div class="topbar">
      <div>
        <h2>병원 정보 관리</h2>
        <p>담당 병원의 세부정보와 운영시간을 관리합니다.</p>
      </div>
      <a href="/hospitalAdmin/hospital/modify" class="btn btn-primary">수정</a>
    </div>

    <div th:if="${message}" class="alert">
      <p th:text="${message}"></p>
    </div>

    <div th:if="${globalError}" class="alert alert-danger">
      <p th:text="${globalError}"></p>
    </div>

    <div class="hf-page">

      <div class="hf-card">
        <div class="hf-card-head">
          <span class="icon">🏥</span>
          <div>
            <strong th:text="${hospitalDTO.name}">병원명</strong>
            <span>병원 기본정보</span>
          </div>
        </div>

        <div class="hf-card-body">
          <div class="hf-info-grid">

            <div class="hf-info-item">
              <span class="hf-info-label">전화번호</span>
              <span class="hf-info-value" th:text="${hospitalDTO.phone}">02-0000-0000</span>
            </div>

            <div class="hf-info-item">
              <span class="hf-info-label">응급진료 여부</span>
              <span>
                <span th:if="${hospitalDTO.isEmergency}" class="hf-pill hf-pill-on">🚨 응급진료 가능</span>
                <span th:unless="${hospitalDTO.isEmergency}" class="hf-pill hf-pill-off">응급진료 불가</span>
              </span>
            </div>

            <div class="hf-info-item full">
              <span class="hf-info-label">주소</span>
              <span class="hf-info-value" th:text="${hospitalDTO.address}">주소</span>
            </div>

            <div class="hf-info-item">
              <span class="hf-info-label">진료과목</span>
              <span class="hf-info-value" th:text="${hospitalDTO.department}">진료과목</span>
            </div>

            <div class="hf-info-item">
              <span class="hf-info-label">예약 간격</span>
              <span class="hf-info-value" th:text="${hospitalDTO.slotIntervalMin + '분'}">30분</span>
            </div>

            <div class="hf-info-item">
              <span class="hf-info-label">시간대별 최대 예약 수</span>
              <span class="hf-info-value" th:text="${hospitalDTO.maxPerSlot + '명'}">3명</span>
            </div>

          </div>
        </div>
      </div>

      <div class="hf-card">
        <div class="hf-card-head">
          <span class="icon">🕒</span>
          <div>
            <strong>운영시간</strong>
            <span>요일별 진료 시간을 확인합니다.</span>
          </div>
        </div>

        <div class="hf-card-body">
          <table class="hf-hours-table">
            <thead>
            <tr>
              <th>요일</th>
              <th>오픈 시간</th>
              <th>마감 시간</th>
              <th>휴무 여부</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="hour : ${hospitalDTO.hours}">
              <td>
                <span th:switch="${hour.dayOfWeek}">
                  <span th:case="0">월요일</span>
                  <span th:case="1">화요일</span>
                  <span th:case="2">수요일</span>
                  <span th:case="3">목요일</span>
                  <span th:case="4">금요일</span>
                  <span th:case="5">토요일</span>
                  <span th:case="6">일요일</span>
                </span>
              </td>
              <td th:text="${hour.openTime}">09:00</td>
              <td th:text="${hour.closeTime}">18:00</td>
              <td>
                <span th:if="${hour.isClosed}" class="hf-day-closed">휴무</span>
                <span th:unless="${hour.isClosed}" class="hf-day-open">운영</span>
              </td>
            </tr>

            <tr th:if="${hospitalDTO.hours == null or hospitalDTO.hours.isEmpty()}">
              <td colspan="4">등록된 운영시간이 없습니다.</td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>
</div>

<div th:replace="~{fragments/sseNotification :: sseNotification}"></div>

</body>
</html>
