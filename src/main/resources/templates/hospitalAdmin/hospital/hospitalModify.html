<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>병원 세부정보 수정</title>
  <link rel="stylesheet" th:href="@{/css/admin/adminHospital.css}">
</head>
<body>

<div class="admin-layout">
  <aside class="sidebar">
    <div class="logo">Hospital Admin</div>
    <nav class="menu">
      <a href="/hospitalAdmin/hospital" class="active">병원 정보 관리</a>
      <a href="/hospitalAdmin/reservations">예약 관리</a>
    </nav>
  </aside>

  <main class="content">
    <div class="topbar">
      <div>
        <h2>병원 세부정보 수정</h2>
        <p>병원관리자는 세부정보와 운영시간을 수정할 수 있습니다.</p>
      </div>
      <a href="/hospitalAdmin/hospital" class="btn btn-outline">목록</a>
    </div>

    <div class="card">
      <form th:action="@{/hospitalAdmin/hospital/modify}"
            th:object="${hospitalDTO}"
            method="post">

        <div class="form-grid">

          <div class="form-group">
            <label class="form-label">병원명</label>
            <input type="text" class="form-control" th:value="${hospitalDTO.name}" readonly>
          </div>

          <div class="form-group">
            <label class="form-label">전화번호</label>
            <input type="text" class="form-control" th:value="${hospitalDTO.phone}" readonly>
          </div>

          <div class="form-group full">
            <label class="form-label">주소</label>
            <input type="text" class="form-control" th:value="${hospitalDTO.address}" readonly>
          </div>

          <div class="form-group">
            <label class="form-label">응급진료 여부</label>
            <select class="form-control" th:field="*{isEmergency}">
              <option value="">선택하세요</option>
              <option value="true">응급진료 가능</option>
              <option value="false">응급진료 불가</option>
            </select>
            <div class="error" th:if="${#fields.hasErrors('isEmergency')}" th:errors="*{isEmergency}"></div>
          </div>

          <div class="form-group">
            <label class="form-label">진료과목</label>
            <input type="text"
                   class="form-control"
                   th:field="*{department}"
                   placeholder="예: 내과, 외과, 피부과">
            <div class="error" th:if="${#fields.hasErrors('department')}" th:errors="*{department}"></div>
          </div>

          <div class="form-group">
            <label class="form-label">예약 간격</label>
            <input type="number"
                   class="form-control"
                   th:field="*{slotIntervalMin}"
                   placeholder="예: 30">
            <div class="error" th:if="${#fields.hasErrors('slotIntervalMin')}" th:errors="*{slotIntervalMin}"></div>
          </div>

          <div class="form-group">
            <label class="form-label">시간대별 최대 예약 수</label>
            <input type="number"
                   class="form-control"
                   th:field="*{maxPerSlot}"
                   placeholder="예: 3">
            <div class="error" th:if="${#fields.hasErrors('maxPerSlot')}" th:errors="*{maxPerSlot}"></div>
          </div>

        </div>

        <div class="form-group full" style="margin-top: 30px;">
          <h3 style="margin-bottom: 16px;">운영시간 수정</h3>

          <table class="table">
            <thead>
            <tr>
              <th>요일</th>
              <th>오픈 시간</th>
              <th>마감 시간</th>
              <th>휴무 여부</th>
            </tr>
            </thead>

            <tbody>

            <tr>
              <td>월요일</td>
              <td>
                <input type="hidden" name="hours[0].dayOfWeek" value="0">
                <input type="text" class="form-control" name="hours[0].openTime"
                       th:value="${hospitalDTO.hours != null and hospitalDTO.hours.size() > 0 ? hospitalDTO.hours[0].openTime : '09:00'}">
              </td>
              <td>
                <input type="text" class="form-control" name="hours[0].closeTime"
                       th:value="${hospitalDTO.hours != null and hospitalDTO.hours.size() > 0 ? hospitalDTO.hours[0].closeTime : '18:00'}">
              </td>
              <td>
                <select class="form-control" name="hours[0].isClosed">
                  <option value="false" th:selected="${hospitalDTO.hours == null or hospitalDTO.hours.size() <= 0 or hospitalDTO.hours[0].isClosed == false}">운영</option>
                  <option value="true" th:selected="${hospitalDTO.hours != null and hospitalDTO.hours.size() > 0 and hospitalDTO.hours[0].isClosed == true}">휴무</option>
                </select>
              </td>
            </tr>

            <tr>
              <td>화요일</td>
              <td>
                <input type="hidden" name="hours[1].dayOfWeek" value="1">
                <input type="text" class="form-control" name="hours[1].openTime"
                       th:value="${hospitalDTO.hours != null and hospitalDTO.hours.size() > 1 ? hospitalDTO.hours[1].openTime : '09:00'}">
              </td>
              <td>
                <input type="text" class="form-control" name="hours[1].closeTime"
                       th:value="${hospitalDTO.hours != null and hospitalDTO.hours.size() > 1 ? hospitalDTO.hours[1].closeTime : '18:00'}">
              </td>
              <td>
                <select class="form-control" name="hours[1].isClosed">
                  <option value="false" th:selected="${hospitalDTO.hours == null or hospitalDTO.hours.size() <= 1 or hospitalDTO.hours[1].isClosed == false}">운영</option>
                  <option value="true" th:selected="${hospitalDTO.hours != null and hospitalDTO.hours.size() > 1 and hospitalDTO.hours[1].isClosed == true}">휴무</option>
                </select>
              </td>
            </tr>

            <tr>
              <td>수요일</td>
              <td>
                <input type="hidden" name="hours[2].dayOfWeek" value="2">
                <input type="text" class="form-control" name="hours[2].openTime"
                       th:value="${hospitalDTO.hours != null and hospitalDTO.hours.size() > 2 ? hospitalDTO.hours[2].openTime : '09:00'}">
              </td>
              <td>
                <input type="text" class="form-control" name="hours[2].closeTime"
                       th:value="${hospitalDTO.hours != null and hospitalDTO.hours.size() > 2 ? hospitalDTO.hours[2].closeTime : '18:00'}">
              </td>
              <td>
                <select class="form-control" name="hours[2].isClosed">
                  <option value="false" th:selected="${hospitalDTO.hours == null or hospitalDTO.hours.size() <= 2 or hospitalDTO.hours[2].isClosed == false}">운영</option>
                  <option value="true" th:selected="${hospitalDTO.hours != null and hospitalDTO.hours.size() > 2 and hospitalDTO.hours[2].isClosed == true}">휴무</option>
                </select>
              </td>
            </tr>

            <tr>
              <td>목요일</td>
              <td>
                <input type="hidden" name="hours[3].dayOfWeek" value="3">
                <input type="text" class="form-control" name="hours[3].openTime"
                       th:value="${hospitalDTO.hours != null and hospitalDTO.hours.size() > 3 ? hospitalDTO.hours[3].openTime : '09:00'}">
              </td>
              <td>
                <input type="text" class="form-control" name="hours[3].closeTime"
                       th:value="${hospitalDTO.hours != null and hospitalDTO.hours.size() > 3 ? hospitalDTO.hours[3].closeTime : '18:00'}">
              </td>
              <td>
                <select class="form-control" name="hours[3].isClosed">
                  <option value="false" th:selected="${hospitalDTO.hours == null or hospitalDTO.hours.size() <= 3 or hospitalDTO.hours[3].isClosed == false}">운영</option>
                  <option value="true" th:selected="${hospitalDTO.hours != null and hospitalDTO.hours.size() > 3 and hospitalDTO.hours[3].isClosed == true}">휴무</option>
                </select>
              </td>
            </tr>

            <tr>
              <td>금요일</td>
              <td>
                <input type="hidden" name="hours[4].dayOfWeek" value="4">
                <input type="text" class="form-control" name="hours[4].openTime"
                       th:value="${hospitalDTO.hours != null and hospitalDTO.hours.size() > 4 ? hospitalDTO.hours[4].openTime : '09:00'}">
              </td>
              <td>
                <input type="text" class="form-control" name="hours[4].closeTime"
                       th:value="${hospitalDTO.hours != null and hospitalDTO.hours.size() > 4 ? hospitalDTO.hours[4].closeTime : '18:00'}">
              </td>
              <td>
                <select class="form-control" name="hours[4].isClosed">
                  <option value="false" th:selected="${hospitalDTO.hours == null or hospitalDTO.hours.size() <= 4 or hospitalDTO.hours[4].isClosed == false}">운영</option>
                  <option value="true" th:selected="${hospitalDTO.hours != null and hospitalDTO.hours.size() > 4 and hospitalDTO.hours[4].isClosed == true}">휴무</option>
                </select>
              </td>
            </tr>

            <tr>
              <td>토요일</td>
              <td>
                <input type="hidden" name="hours[5].dayOfWeek" value="5">
                <input type="text" class="form-control" name="hours[5].openTime"
                       th:value="${hospitalDTO.hours != null and hospitalDTO.hours.size() > 5 ? hospitalDTO.hours[5].openTime : '10:00'}">
              </td>
              <td>
                <input type="text" class="form-control" name="hours[5].closeTime"
                       th:value="${hospitalDTO.hours != null and hospitalDTO.hours.size() > 5 ? hospitalDTO.hours[5].closeTime : '15:00'}">
              </td>
              <td>
                <select class="form-control" name="hours[5].isClosed">
                  <option value="false" th:selected="${hospitalDTO.hours == null or hospitalDTO.hours.size() <= 5 or hospitalDTO.hours[5].isClosed == false}">운영</option>
                  <option value="true" th:selected="${hospitalDTO.hours != null and hospitalDTO.hours.size() > 5 and hospitalDTO.hours[5].isClosed == true}">휴무</option>
                </select>
              </td>
            </tr>

            <tr>
              <td>일요일</td>
              <td>
                <input type="hidden" name="hours[6].dayOfWeek" value="6">
                <input type="text" class="form-control" name="hours[6].openTime"
                       th:value="${hospitalDTO.hours != null and hospitalDTO.hours.size() > 6 ? hospitalDTO.hours[6].openTime : '10:00'}">
              </td>
              <td>
                <input type="text" class="form-control" name="hours[6].closeTime"
                       th:value="${hospitalDTO.hours != null and hospitalDTO.hours.size() > 6 ? hospitalDTO.hours[6].closeTime : '15:00'}">
              </td>
              <td>
                <select class="form-control" name="hours[6].isClosed">
                  <option value="true" th:selected="${hospitalDTO.hours == null or hospitalDTO.hours.size() <= 6 or hospitalDTO.hours[6].isClosed == true}">휴무</option>
                  <option value="false" th:selected="${hospitalDTO.hours != null and hospitalDTO.hours.size() > 6 and hospitalDTO.hours[6].isClosed == false}">운영</option>
                </select>
              </td>
            </tr>

            </tbody>
          </table>
        </div>

        <div class="actions">
          <a href="/hospitalAdmin/hospital" class="btn btn-gray">취소</a>
          <button type="submit" class="btn btn-primary">수정</button>
        </div>

      </form>
    </div>
  </main>
</div>

</body>
</html>
