<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>진료기록 작성</title>
    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">

    <h2 class="fw-bold mb-4">진료기록 작성</h2>

    <div class="card p-4">
        <form th:action="@{/hospitalAdmin/medicalRecords/register}"
              th:object="${medicalRecordDTO}"
              method="post">

            <input type="hidden" th:field="*{reservationId}">

            <div class="mb-3">
                <label class="form-label">진료일</label>
                <input type="date"
                       class="form-control"
                       th:field="*{visitDate}"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">진단 내용</label>
                <textarea class="form-control"
                          th:field="*{diagnosis}"
                          rows="3"
                          required></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">치료 내용</label>
                <textarea class="form-control"
                          th:field="*{treatment}"
                          rows="3"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">처방 내용</label>
                <textarea class="form-control"
                          th:field="*{prescription}"
                          rows="3"></textarea>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input"
                       type="checkbox"
                       th:field="*{vaccinated}">
                <label class="form-check-label">
                    예방접종 완료
                </label>
            </div>

            <div class="mb-3">
                <label class="form-label">백신명</label>
                <input type="text"
                       class="form-control"
                       th:field="*{vaccineName}"
                       placeholder="예: 광견병, 종합백신">
            </div>

            <div class="mb-3">
                <label class="form-label">특이사항</label>
                <textarea class="form-control"
                          th:field="*{memo}"
                          rows="3"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">PDF URL</label>
                <input type="text"
                       class="form-control"
                       th:field="*{pdfUrl}"
                       placeholder="진단서 PDF URL">
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    저장
                </button>

                <a th:href="@{/hospitalAdmin/reservations}"
                   class="btn btn-outline-secondary">
                    취소
                </a>
            </div>

        </form>
    </div>

</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
