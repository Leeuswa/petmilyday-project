<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>진료기록 작성</title>
    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">

    <style>
        body {
            background: #f4f6fb;
            color: #111827;
        }

        .mr-wrap {
            max-width: 760px;
            margin: 0 auto;
        }

        .page-header-box {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 24px;
        }

        .page-header-box h2 {
            margin: 0;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -0.8px;
            color: #111827;
        }

        .page-header-box p {
            margin: 8px 0 0;
            color: #6b7280;
            font-size: 14px;
        }

        .mr-card {
            border: 0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 12px 34px rgba(15, 23, 42, 0.09);
            background: #ffffff;
        }

        .mr-card-head {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 22px 26px;
            border-bottom: 1px solid #eef2f7;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #ffffff;
        }

        .mr-card-head .icon {
            font-size: 26px;
        }

        .mr-card-head strong {
            display: block;
            font-size: 18px;
            font-weight: 900;
        }

        .mr-card-head span {
            display: block;
            margin-top: 4px;
            font-size: 13px;
            opacity: 0.85;
        }

        .mr-card-body {
            padding: 26px;
        }

        .mr-section-title {
            font-size: 13px;
            font-weight: 900;
            color: #2563eb;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin: 0 0 14px;
        }

        .mr-section + .mr-section {
            margin-top: 30px;
            padding-top: 24px;
            border-top: 1px solid #eef2f7;
        }

        .mr-field {
            margin-bottom: 16px;
        }

        .mr-field label {
            display: block;
            margin-bottom: 7px;
            font-weight: 800;
            font-size: 13.5px;
            color: #374151;
        }

        .form-control {
            border-radius: 10px;
            border: 1px solid #d1d5db;
            padding: 11px 13px;
        }

        .form-control:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .mr-vaccine-box {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid #eef2f7;
            margin-bottom: 16px;
        }

        .mr-vaccine-box .form-check {
            margin: 0;
        }

        .mr-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 6px;
        }

        .btn-action {
            border-radius: 10px;
            font-weight: 800;
            padding: 10px 20px;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">
    <div class="mr-wrap">

        <div class="page-header-box">
            <div>
                <h2 th:text="${mode == 'modify'} ? '진료기록 수정' : '진료기록 작성'">진료기록 작성</h2>
                <p>진료일은 예약 날짜 이후 오늘까지만 입력할 수 있습니다.</p>
            </div>
            <a th:href="@{/hospitalAdmin/reservations}" class="btn btn-outline-secondary btn-action">
                예약 목록으로
            </a>
        </div>

        <div th:if="${error != null}" class="alert alert-danger" th:text="${error}"></div>

        <div class="mr-card">
            <div class="mr-card-head">
                <span class="icon">📋</span>
                <div>
                    <strong th:text="${mode == 'modify'} ? '진료기록 수정' : '진료기록 작성'">진료기록 작성</strong>
                    <span>반려동물의 진단·치료·처방 내용을 입력하세요.</span>
                </div>
            </div>

            <form th:action="${mode == 'modify'} ? @{/hospitalAdmin/medicalRecords/modify} : @{/hospitalAdmin/medicalRecords/register}"
                  th:object="${medicalRecordDTO}"
                  method="post"
                  id="medicalRecordForm"
                  class="mr-card-body">

                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{reservationId}">

                <div class="mr-section">
                    <p class="mr-section-title">진료 정보</p>

                    <div class="mr-field">
                        <label>진료일</label>
                        <input type="date"
                               class="form-control"
                               th:field="*{visitDate}"
                               th:attr="max=${#temporals.format(today, 'yyyy-MM-dd')}"
                               id="visitDateInput"
                               required>
                        <div class="text-danger small" th:if="${#fields.hasErrors('visitDate')}" th:errors="*{visitDate}"></div>
                    </div>

                    <div class="mr-field">
                        <label>진단 내용</label>
                        <textarea class="form-control"
                                  th:field="*{diagnosis}"
                                  rows="3"
                                  required></textarea>
                    </div>

                    <div class="mr-field">
                        <label>치료 내용</label>
                        <textarea class="form-control"
                                  th:field="*{treatment}"
                                  rows="3"></textarea>
                    </div>

                    <div class="mr-field">
                        <label>처방 내용</label>
                        <textarea class="form-control"
                                  th:field="*{prescription}"
                                  rows="3"></textarea>
                    </div>
                </div>

                <div class="mr-section">
                    <p class="mr-section-title">예방접종</p>

                    <div class="mr-vaccine-box">
                        <div class="form-check">
                            <input class="form-check-input"
                                   type="checkbox"
                                   th:field="*{vaccinated}">
                            <label class="form-check-label">
                                예방접종 완료
                            </label>
                        </div>
                    </div>

                    <div class="mr-field">
                        <label>백신명</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{vaccineName}"
                               placeholder="예: 광견병, 종합백신">
                    </div>

                    <div class="mr-field">
                        <label>다음 접종 예정일</label>
                        <input type="date"
                               class="form-control"
                               th:field="*{nextVaccinationDate}">
                    </div>
                </div>

                <div class="mr-section">
                    <p class="mr-section-title">기타</p>

                    <div class="mr-field">
                        <label>특이사항</label>
                        <textarea class="form-control"
                                  th:field="*{memo}"
                                  rows="3"></textarea>
                    </div>

                    <div class="mr-field">
                        <label>PDF URL</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{pdfUrl}"
                               placeholder="진단서 PDF URL">
                    </div>
                </div>

                <div class="mr-actions">
                    <a th:href="@{/hospitalAdmin/reservations}"
                       class="btn btn-outline-secondary btn-action">
                        취소
                    </a>
                    <button type="submit" class="btn btn-primary btn-action">
                        저장
                    </button>
                </div>

            </form>
        </div>

    </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>
<script th:inline="javascript">
    document.getElementById('medicalRecordForm').addEventListener('submit', function (e) {
        var visitDateInput = document.getElementById('visitDateInput');
        var todayStr = /*[[${#temporals.format(today, 'yyyy-MM-dd')}]]*/ '';

        if (visitDateInput.value && visitDateInput.value > todayStr) {
            e.preventDefault();
            alert('미래 날짜로는 진료기록을 작성하실 수 없습니다.');
        }
    });
</script>
</body>
</html>
