<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>QnA 관리</title>
  <link rel="stylesheet" th:href="@{/css/admin/adminHospital.css}">

  <style>
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 22px;
    }

    .page-title-box h2 {
      margin: 0 0 8px;
      font-size: 26px;
      font-weight: 800;
      color: #1f2937;
    }

    .page-title-box p {
      margin: 0;
      color: #6b7280;
      font-size: 14px;
    }

    .summary-box {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
    }

    .summary-item {
      min-width: 150px;
      padding: 16px 18px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.06);
    }

    .summary-label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #6b7280;
    }

    .summary-value {
      font-size: 22px;
      font-weight: 800;
      color: #111827;
    }

    .qna-card {
      padding: 22px;
      border-radius: 14px;
      border: 1px solid #e5e7eb;
      background: #ffffff;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .table thead th {
      padding: 14px 12px;
      border-bottom: 1px solid #e5e7eb;
      background: #f9fafb;
      color: #374151;
      font-weight: 700;
      text-align: center;
      white-space: nowrap;
    }

    .table tbody td {
      padding: 14px 12px;
      border-bottom: 1px solid #f1f5f9;
      color: #374151;
      text-align: center;
      vertical-align: middle;
    }

    .table tbody tr:hover {
      background: #f9fafb;
    }

    .product-name {
      max-width: 170px;
      font-weight: 700;
      color: #111827;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .qna-content {
      max-width: 260px;
      color: #4b5563;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .answer-cell {
      min-width: 300px;
      max-width: 360px;
      text-align: left;
    }

    .answer-preview {
      padding: 11px 12px;
      border-radius: 10px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      color: #374151;
      font-size: 13px;
      line-height: 1.5;
      max-height: 60px;
      overflow: hidden;
      word-break: break-all;
    }

    .answer-preview.empty {
      background: #f8fafc;
      color: #9ca3af;
      font-style: italic;
    }

    .answer-toggle {
      margin-top: 8px;
    }

    .answer-toggle summary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 11px;
      border-radius: 8px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      list-style: none;
      user-select: none;
    }

    .answer-toggle summary::-webkit-details-marker {
      display: none;
    }

    .answer-toggle summary:hover {
      background: #dbeafe;
    }

    .answer-form {
      margin-top: 10px;
      padding: 12px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
    }

    .answer-textarea {
      width: 100%;
      min-height: 90px;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      resize: vertical;
      font-family: inherit;
      font-size: 13px;
      color: #374151;
      outline: none;
      box-sizing: border-box;
    }

    .answer-textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .answer-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge-gray {
      background: #e5e7eb;
      color: #374151;
    }

    .badge-primary {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .btn-sm {
      padding: 7px 12px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-primary {
      background: #2563eb;
      color: #ffffff;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-danger {
      background: #ef4444;
      color: #ffffff;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .date-cell {
      white-space: nowrap;
      color: #4b5563;
      font-weight: 600;
    }

    .alert {
      margin-bottom: 16px;
      padding: 13px 16px;
      border-radius: 10px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      font-weight: 700;
    }

    .alert p {
      margin: 0;
    }

    .empty-row {
      padding: 50px 0 !important;
      color: #6b7280;
      font-weight: 700;
      background: #ffffff;
    }

    .pagination-area {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin-top: 24px;
    }

    .page-link {
      min-width: 38px;
      height: 38px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #d1d5db;
      border-radius: 9px;
      background: #ffffff;
      color: #374151;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }

    .page-link:hover {
      background: #f3f4f6;
    }

    .page-link.active {
      border-color: #2563eb;
      background: #2563eb;
      color: #ffffff;
    }

    .page-link.disabled {
      background: #f3f4f6;
      color: #9ca3af;
      cursor: default;
    }

    .page-info {
      margin-top: 12px;
      text-align: center;
      color: #6b7280;
      font-size: 13px;
    }
  </style>
</head>

<body>

<div class="admin-layout">

  <aside th:replace="~{fragments/adminSidebar :: adminSidebar('qna')}"></aside>

  <main class="content">

    <div class="page-header">
      <div class="page-title-box">
        <h2>QnA 관리</h2>
        <p>상품 문의를 확인하고 관리자 답변을 등록할 수 있습니다.</p>
      </div>
    </div>

    <div class="summary-box">
      <div class="summary-item">
        <span class="summary-label">전체 QnA</span>
        <strong class="summary-value"
                th:text="${qnaPage != null ? qnaPage.totalElements : 0}">
          0
        </strong>
      </div>

      <div class="summary-item">
        <span class="summary-label">현재 페이지</span>
        <strong class="summary-value"
                th:text="${totalPages == 0 ? 0 : currentPage + 1}">
          1
        </strong>
      </div>

      <div class="summary-item">
        <span class="summary-label">전체 페이지</span>
        <strong class="summary-value"
                th:text="${totalPages}">
          1
        </strong>
      </div>
    </div>

    <div class="qna-card">

      <div th:if="${message}" class="alert">
        <p th:text="${message}"></p>
      </div>

      <form th:action="@{/admin/qna}"
            method="get"
            style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:18px;">

        <select name="status" class="page-link" style="font-weight:400;">
          <option value="" th:selected="${status == null or status == ''}">전체 상태</option>
          <option value="PENDING" th:selected="${status == 'PENDING'}">답변대기</option>
          <option value="ANSWERED" th:selected="${status == 'ANSWERED'}">답변완료</option>
        </select>

        <input type="text"
               name="keyword"
               placeholder="상품명/작성자/문의내용 검색"
               th:value="${keyword}"
               style="min-width:240px; padding:0 12px; height:38px; border:1px solid #d1d5db; border-radius:9px; font-size:14px;">

        <button type="submit" class="btn-sm btn-primary">검색</button>
        <a th:href="@{/admin/qna}" class="page-link">초기화</a>
      </form>

      <div class="table-wrap">
        <table class="table">
          <thead>
          <tr>
            <th>문의번호</th>
            <th>상품명</th>
            <th>작성자</th>
            <th>문의내용</th>
            <th>답변</th>
            <th>상태</th>
            <th>작성일</th>
            <th>관리</th>
          </tr>
          </thead>

          <tbody>
          <tr th:if="${qnaList == null or qnaList.isEmpty()}">
            <td colspan="8" class="empty-row">
              등록된 QnA가 없습니다.
            </td>
          </tr>

          <tr th:each="qna : ${qnaList}">
            <td th:text="${qna.id}">1</td>

            <td class="product-name"
                th:text="${qna.product.name}">
              상품명
            </td>

            <td th:text="${qna.member != null ? qna.member.displayName : '알 수 없음'}">
              작성자
            </td>

            <td class="qna-content"
                th:text="${qna.content}">
              문의 내용
            </td>

            <td class="answer-cell">

              <div th:if="${qna.answer == null or qna.answer == ''}"
                   class="answer-preview empty">
                아직 등록된 답변이 없습니다.
              </div>

              <div th:if="${qna.answer != null and qna.answer != ''}"
                   class="answer-preview"
                   th:text="${qna.answer}">
                답변 내용
              </div>

              <details class="answer-toggle">
                <summary th:text="${qna.answer == null or qna.answer == '' ? '답변 작성' : '답변 수정'}">
                  답변 작성
                </summary>

                <form class="answer-form"
                      th:action="@{/admin/qna/{qnaId}/answer(qnaId=${qna.id})}"
                      method="post">

                  <textarea name="answer"
                            class="answer-textarea"
                            placeholder="관리자 답변을 입력하세요."
                            th:text="${qna.answer}"></textarea>

                  <div class="answer-actions">
                    <button type="submit"
                            class="btn-sm btn-primary">
                      저장
                    </button>
                  </div>
                </form>
              </details>

            </td>

            <td>
              <span th:if="${qna.status == 'PENDING'}"
                    class="badge badge-gray">
                답변대기
              </span>

              <span th:if="${qna.status == 'ANSWERED'}"
                    class="badge badge-primary">
                답변완료
              </span>
            </td>

            <td class="date-cell"
                th:text="${qna.createdAt != null ? #temporals.format(qna.createdAt, 'yyyy-MM-dd') : '-'}">
              2026-06-16
            </td>

            <td>
              <form th:action="@{/admin/qna/{qnaId}/delete(qnaId=${qna.id})}"
                    method="post"
                    onsubmit="return confirm('정말 이 QnA를 삭제하시겠습니까?');">
                <button type="submit" class="btn-sm btn-danger">
                  삭제
                </button>
              </form>
            </td>
          </tr>
          </tbody>
        </table>
      </div>

      <div class="pagination-area" th:if="${totalPages > 1}">

        <a th:if="${currentPage > 0}"
           class="page-link"
           th:href="@{/admin/qna(page=${currentPage - 1}, status=${status}, keyword=${keyword})}">
          이전
        </a>

        <span th:if="${currentPage == 0}"
              class="page-link disabled">
          이전
        </span>

        <a th:each="pageNum : ${#numbers.sequence(0, totalPages - 1)}"
           th:if="${pageNum >= currentPage - 2 and pageNum <= currentPage + 2}"
           th:href="@{/admin/qna(page=${pageNum}, status=${status}, keyword=${keyword})}"
           th:text="${pageNum + 1}"
           th:class="${pageNum == currentPage ? 'page-link active' : 'page-link'}">
          1
        </a>

        <a th:if="${currentPage < totalPages - 1}"
           class="page-link"
           th:href="@{/admin/qna(page=${currentPage + 1}, status=${status}, keyword=${keyword})}">
          다음
        </a>

        <span th:if="${currentPage >= totalPages - 1}"
              class="page-link disabled">
          다음
        </span>

      </div>

      <div class="page-info" th:if="${qnaPage != null}">
        <span th:text="${qnaPage.totalElements}">0</span>건 중
        <span th:text="${qnaPage.numberOfElements}">0</span>건 표시
      </div>

    </div>
  </main>
</div>

</body>
</html>
