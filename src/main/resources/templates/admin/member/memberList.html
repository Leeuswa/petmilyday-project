<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원 관리</title>
  <link rel="stylesheet" th:href="@{/css/admin/adminHospital.css}">

  <style>
    .page-desc {
      color: #5f6b85;
      margin-top: 6px;
      font-size: 14px;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      font-weight: 600;
    }

    .alert-success {
      background: #eefaf2;
      color: #177245;
      border: 1px solid #bce7c9;
    }

    .alert-danger {
      background: #fff0f0;
      color: #c62828;
      border: 1px solid #ffc8c8;
    }

    .member-card {
      padding: 0;
      overflow: hidden;
    }

    .table-header {
      padding: 20px 24px;
      border-bottom: 1px solid #e1e5f2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #ffffff;
    }

    .table-header h3 {
      margin: 0;
      font-size: 18px;
      color: #0d1433;
    }

    .table-header p {
      margin: 6px 0 0;
      font-size: 13px;
      color: #6b7280;
    }

    .table-count {
      padding: 8px 12px;
      border-radius: 999px;
      background: #eaedfa;
      color: #2b44cc;
      font-size: 13px;
      font-weight: 700;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    .member-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      min-width: 1250px;
    }

    .member-table th {
      background: #f7f8fc;
      color: #3d4670;
      font-size: 13px;
      font-weight: 700;
      padding: 14px 12px;
      border-bottom: 1px solid #e1e5f2;
      text-align: left;
      white-space: nowrap;
    }

    .member-table td {
      padding: 14px 12px;
      border-bottom: 1px solid #edf0f7;
      font-size: 14px;
      color: #1f2937;
      vertical-align: middle;
      white-space: nowrap;
    }

    .member-table tr:hover td {
      background: #fafbff;
    }

    .col-no { width: 70px; }
    .col-username { width: 170px; }
    .col-nickname { width: 110px; }
    .col-name { width: 90px; }
    .col-email { width: 230px; }
    .col-role { width: 130px; }
    .col-status { width: 120px; }
    .col-date { width: 160px; }
    .col-action { width: 260px; }

    .text-muted {
      color: #8b95a7;
    }

    .custom-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 72px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .badge-user {
      background: #eef2ff;
      color: #2b44cc;
    }

    .badge-admin {
      background: #ffe8e8;
      color: #d62828;
    }

    .badge-hospital {
      background: #eaf7ef;
      color: #16834a;
    }

    .badge-active {
      background: #eaf7ef;
      color: #16834a;
    }

    .badge-banned {
      background: #ffe8e8;
      color: #d62828;
    }

    .badge-withdrawn {
      background: #eef0f4;
      color: #6b7280;
    }

    .action-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
    }

    .status-form,
    .role-form {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 0;
    }

    .role-select {
      height: 34px;
      min-width: 115px;
      border: 1px solid #d0d5e8;
      border-radius: 8px;
      padding: 0 8px;
      font-size: 13px;
      background: #ffffff;
      color: #0d1433;
    }

    .btn-mini {
      height: 34px;
      padding: 0 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      border: 1px solid transparent;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-ban {
      background: #e03131;
      color: white;
    }

    .btn-activate {
      background: #2b63e5;
      color: white;
    }

    .btn-change {
      background: #ffffff;
      color: #2b44cc;
      border-color: #c9d2f0;
    }

    .btn-change:hover {
      background: #f1f4ff;
      border-color: #2b44cc;
    }

    .empty-row {
      text-align: center;
      color: #777;
      padding: 40px 0;
    }

    .pagination-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      padding: 22px 0;
      border-top: 1px solid #edf0f7;
      background: #ffffff;
    }

    .page-btn {
      min-width: 36px;
      height: 36px;
      padding: 0 12px;
      border: 1px solid #d0d5e8;
      border-radius: 8px;
      background: #ffffff;
      color: #0d1433;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .page-btn:hover {
      background: #f1f4ff;
      border-color: #2b44cc;
      color: #2b44cc;
    }

    .page-btn.active {
      background: #2b44cc;
      border-color: #2b44cc;
      color: #ffffff;
    }

    .page-btn.disabled {
      pointer-events: none;
      opacity: 0.4;
    }
  </style>
</head>
<body>

<div class="admin-layout">

  <div th:replace="~{fragments/adminSidebar :: adminSidebar('members')}"></div>

  <main class="content">

    <div class="topbar">
      <div>
        <h2>회원 관리</h2>
        <p class="page-desc">
          가입한 회원의 기본 정보, 권한, 계정 상태를 확인하고 관리합니다.
        </p>
      </div>
    </div>

    <div th:if="${message}" class="alert alert-success">
      <span th:text="${message}"></span>
    </div>

    <div th:if="${error}" class="alert alert-danger">
      <span th:text="${error}"></span>
    </div>

    <div class="card member-card">

      <div class="table-header">
        <div>
          <h3>회원 목록</h3>
          <p>회원 정지, 정지 해제, 권한 변경을 처리할 수 있습니다.</p>
        </div>

        <div class="table-count">
          총 <span th:text="${memberPage.totalElements}">0</span>명
        </div>
      </div>

      <form th:action="@{/admin/members}"
            method="get"
            style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; padding:0 24px 18px;">

        <input type="text"
               class="form-control"
               style="max-width:240px;"
               name="keyword"
               placeholder="아이디/닉네임/이메일 검색"
               th:value="${searchDTO.keyword}">

        <select class="form-control" style="max-width:150px;" name="role">
          <option value="" th:selected="${searchDTO.role == null}">전체 권한</option>
          <option value="USER" th:selected="${searchDTO.role != null and searchDTO.role.name() == 'USER'}">USER</option>
          <option value="HOSPITAL_ADMIN" th:selected="${searchDTO.role != null and searchDTO.role.name() == 'HOSPITAL_ADMIN'}">HOSPITAL_ADMIN</option>
          <option value="ADMIN" th:selected="${searchDTO.role != null and searchDTO.role.name() == 'ADMIN'}">ADMIN</option>
        </select>

        <select class="form-control" style="max-width:150px;" name="status">
          <option value="" th:selected="${searchDTO.status == null}">전체 상태</option>
          <option value="ACTIVE" th:selected="${searchDTO.status != null and searchDTO.status.name() == 'ACTIVE'}">정상</option>
          <option value="BANNED" th:selected="${searchDTO.status != null and searchDTO.status.name() == 'BANNED'}">정지</option>
          <option value="WITHDRAWN" th:selected="${searchDTO.status != null and searchDTO.status.name() == 'WITHDRAWN'}">탈퇴</option>
        </select>

        <button type="submit" class="btn btn-primary btn-sm">검색</button>
        <a th:href="@{/admin/members}" class="btn btn-outline btn-sm">초기화</a>
      </form>

      <div class="table-wrap">
        <table class="member-table">
          <thead>
          <tr>
            <th class="col-no">번호</th>
            <th class="col-username">아이디</th>
            <th class="col-nickname">닉네임</th>
            <th class="col-name">이름</th>
            <th class="col-email">이메일</th>
            <th class="col-role">권한</th>
            <th class="col-status">상태</th>
            <th class="col-date">가입일</th>
            <th class="col-action">관리</th>
          </tr>
          </thead>

          <tbody>
          <tr th:if="${#lists.isEmpty(memberPage.content)}">
            <td colspan="9" class="empty-row">
              등록된 회원이 없습니다.
            </td>
          </tr>

          <tr th:each="member, stat : ${memberPage.content}">
            <td th:text="${currentPage * memberPage.size + stat.count}">1</td>

            <td>
              <strong th:text="${member.username}">user1</strong>
            </td>

            <td>
              <span th:if="${member.nickname != null and !#strings.isEmpty(member.nickname)}"
                    th:text="${member.nickname}">
                닉네임
              </span>
              <span th:if="${member.nickname == null or #strings.isEmpty(member.nickname)}"
                    class="text-muted">
                -
              </span>
            </td>

            <td th:text="${member.name}">이름</td>

            <td th:text="${member.email}">email@test.com</td>

            <td>
              <span class="custom-badge"
                    th:classappend="${member.role.name() == 'ADMIN'} ? ' badge-admin' :
                                    (${member.role.name() == 'HOSPITAL_ADMIN'} ? ' badge-hospital' : ' badge-user')"
                    th:text="${member.role}">
                USER
              </span>
            </td>

            <td>
              <span class="custom-badge"
                    th:classappend="${member.status.name() == 'ACTIVE'} ? ' badge-active' :
                                    (${member.status.name() == 'BANNED'} ? ' badge-banned' : ' badge-withdrawn')"
                    th:text="${member.status}">
                ACTIVE
              </span>
            </td>

            <td th:text="${#temporals.format(member.createdAt, 'yyyy-MM-dd HH:mm')}">
              2026-06-17 10:00
            </td>

            <td>
              <div class="action-wrap">

                <form th:if="${member.status.name() == 'ACTIVE'}"
                      th:action="@{/admin/members/ban}"
                      method="post"
                      class="status-form">
                  <input type="hidden" name="memberId" th:value="${member.id}">

                  <button type="submit"
                          class="btn-mini btn-ban"
                          onclick="return confirm('이 회원을 정지하시겠습니까?');">
                    정지
                  </button>
                </form>

                <form th:if="${member.status.name() == 'BANNED'}"
                      th:action="@{/admin/members/activate}"
                      method="post"
                      class="status-form">
                  <input type="hidden" name="memberId" th:value="${member.id}">

                  <button type="submit"
                          class="btn-mini btn-activate"
                          onclick="return confirm('이 회원의 정지를 해제하시겠습니까?');">
                    해제
                  </button>
                </form>

                <span th:if="${member.status.name() == 'WITHDRAWN'}"
                      class="custom-badge badge-withdrawn">
                  탈퇴
                </span>

                <form th:if="${member.status.name() != 'WITHDRAWN'}"
                      th:action="@{/admin/members/role}"
                      method="post"
                      class="role-form">
                  <input type="hidden" name="memberId" th:value="${member.id}">

                  <select name="role" class="role-select">
                    <option value="USER"
                            th:selected="${member.role.name() == 'USER'}">
                      USER
                    </option>

                    <option value="HOSPITAL_ADMIN"
                            th:selected="${member.role.name() == 'HOSPITAL_ADMIN'}">
                      HOSPITAL_ADMIN
                    </option>

                    <option value="ADMIN"
                            th:selected="${member.role.name() == 'ADMIN'}">
                      ADMIN
                    </option>
                  </select>

                  <button type="submit"
                          class="btn-mini btn-change"
                          onclick="return confirm('이 회원의 권한을 변경하시겠습니까?');">
                    변경
                  </button>
                </form>

              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>

      <!-- 페이징 -->
      <div class="pagination-wrap" th:if="${memberPage.totalPages > 1}">

        <a class="page-btn"
           th:classappend="${memberPage.first} ? ' disabled' : ''"
           th:href="${memberPage.first} ? '#' : @{/admin/members(page=${currentPage - 1}, keyword=${searchDTO.keyword}, role=${searchDTO.role}, status=${searchDTO.status})}">
          이전
        </a>

        <a class="page-btn"
           th:each="pageNum : ${#numbers.sequence(0, memberPage.totalPages - 1)}"
           th:href="@{/admin/members(page=${pageNum}, keyword=${searchDTO.keyword}, role=${searchDTO.role}, status=${searchDTO.status})}"
           th:classappend="${pageNum == currentPage} ? ' active' : ''"
           th:text="${pageNum + 1}">
          1
        </a>

        <a class="page-btn"
           th:classappend="${memberPage.last} ? ' disabled' : ''"
           th:href="${memberPage.last} ? '#' : @{/admin/members(page=${currentPage + 1}, keyword=${searchDTO.keyword}, role=${searchDTO.role}, status=${searchDTO.status})}">
          다음
        </a>

      </div>

    </div>

  </main>
</div>

</body>
</html>
