<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>병원 관리자 신청 목록</title>
  <link rel="stylesheet" th:href="@{/css/admin/adminHospital.css}">
</head>
<body>

<div class="admin-layout">

  <aside th:replace="~{fragments/adminSidebar :: adminSidebar('hospitalManagers')}"></aside>

  <main class="content">
    <div class="topbar">
      <div>
        <h2>병원 관리자 신청 목록</h2>
        <p>일반 회원이 신청한 병원 관리자 권한을 승인하거나 거절합니다.</p>
      </div>
    </div>

    <div class="card">

      <div th:if="${message}" class="alert">
        <p th:text="${message}"></p>
      </div>

      <table class="table">
        <thead>
        <tr>
          <th>번호</th>
          <th>병원명</th>
          <th>신청자</th>
          <th>담당자명</th>
          <th>연락처</th>
          <th>사업자번호</th>
          <th>상태</th>
          <th>관리</th>
        </tr>
        </thead>

        <tbody>
        <tr th:if="${managerList == null or managerList.isEmpty()}">
          <td colspan="8" style="text-align: center;">
            대기 중인 병원 관리자 신청이 없습니다.
          </td>
        </tr>

        <tr th:each="manager, stat : ${managerList}">
          <td th:text="${stat.count}">1</td>
          <td th:text="${manager.hospital.name}">병원명</td>
          <td th:text="${manager.member.username}">신청자</td>
          <td th:text="${manager.managerName}">담당자명</td>
          <td th:text="${manager.managerPhone}">연락처</td>
          <td th:text="${manager.businessNumber}">사업자번호</td>
          <td>
            <span class="badge badge-gray"
                  th:text="${manager.status}">
              WAITING
            </span>
          </td>
          <td>
            <form th:action="@{/admin/hospital-managers/{id}/approve(id=${manager.id})}"
                  method="post"
                  style="display:inline;">
              <button type="submit" class="btn btn-primary">
                승인
              </button>
            </form>

            <form th:action="@{/admin/hospital-managers/{id}/reject(id=${manager.id})}"
                  method="post"
                  style="display:inline;">
              <button type="submit"
                      class="btn btn-danger"
                      onclick="return confirm('병원 관리자 신청을 거절하시겠습니까?')">
                거절
              </button>
            </form>
          </td>
        </tr>
        </tbody>
      </table>

    </div>
  </main>
</div>

</body>
</html>
