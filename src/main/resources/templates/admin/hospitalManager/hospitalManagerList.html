<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>병원 관리자 신청 목록</title>
  <link rel="stylesheet" th:href="@{/css/admin/adminHospital.css}">

  <style>
    .manager-page {
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .manager-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
    }

    .manager-header h2 {
      margin: 0;
      font-size: 28px;
      font-weight: 900;
      color: #111827;
      letter-spacing: -0.6px;
    }

    .manager-header p {
      margin: 8px 0 0;
      font-size: 14px;
      color: #6b7280;
      line-height: 1.5;
    }

    .summary-card {
      min-width: 170px;
      padding: 16px 20px;
      border-radius: 18px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #ffffff;
      text-align: right;
      box-shadow: 0 14px 28px rgba(37, 99, 235, 0.25);
    }

    .summary-card span {
      display: block;
      font-size: 13px;
      opacity: 0.85;
      margin-bottom: 4px;
    }

    .summary-card strong {
      font-size: 26px;
      font-weight: 900;
    }

    .manager-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    .manager-card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 24px;
      background: #f8fafc;
      border-bottom: 1px solid #eef2f7;
    }

    .manager-card-head strong {
      display: block;
      font-size: 18px;
      font-weight: 900;
      color: #111827;
    }

    .manager-card-head span {
      display: block;
      margin-top: 5px;
      font-size: 13px;
      color: #6b7280;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    .manager-table {
      width: 100%;
      min-width: 1050px;
      border-collapse: collapse;
    }

    .manager-table thead {
      background: #f9fafb;
    }

    .manager-table th {
      padding: 15px 14px;
      border-bottom: 1px solid #e5e7eb;
      color: #374151;
      font-size: 13px;
      font-weight: 900;
      text-align: left;
      white-space: nowrap;
    }

    .manager-table td {
      padding: 16px 14px;
      border-bottom: 1px solid #f1f5f9;
      color: #111827;
      font-size: 14px;
      vertical-align: middle;
      white-space: nowrap;
    }

    .manager-table tbody tr:hover {
      background: #f8fbff;
    }

    .manager-table tbody tr:last-child td {
      border-bottom: none;
    }

    .row-number {
      color: #2563eb;
      font-weight: 900;
    }

    .hospital-name {
      color: #111827;
      font-weight: 900;
    }

    .applicant-name {
      color: #374151;
      font-weight: 800;
    }

    .manager-name {
      color: #111827;
      font-weight: 800;
    }

    .phone-badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #374151;
      font-size: 13px;
      font-weight: 800;
    }

    .business-number {
      color: #6b7280;
      font-size: 13px;
      font-weight: 800;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 11px;
      border-radius: 999px;
      background: #fef3c7;
      color: #92400e;
      font-size: 13px;
      font-weight: 900;
    }

    .status-pill::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .action-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .action-group form {
      display: inline;
    }

    .btn-small {
      padding: 7px 12px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 900;
    }

    .empty-row {
      padding: 48px 20px !important;
      text-align: center;
      color: #6b7280 !important;
      font-weight: 800;
    }

    .alert {
      margin: 0;
      padding: 13px 15px;
      border-radius: 12px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      font-weight: 800;
    }

    .alert p {
      margin: 0;
    }

    .pagination-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 7px;
      padding: 24px;
      border-top: 1px solid #eef2f7;
      background: #ffffff;
    }

    .page-btn {
      min-width: 38px;
      height: 38px;
      padding: 0 13px;
      border: 1px solid #d1d5db;
      border-radius: 11px;
      background: #ffffff;
      color: #374151;
      text-decoration: none;
      font-size: 14px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .page-btn:hover {
      background: #eff6ff;
      border-color: #2563eb;
      color: #2563eb;
      transform: translateY(-1px);
    }

    .page-btn.active {
      background: #2563eb;
      border-color: #2563eb;
      color: #ffffff;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
    }

    .page-btn.disabled {
      pointer-events: none;
      opacity: 0.4;
      background: #f9fafb;
    }

    @media (max-width: 900px) {
      .manager-header {
        flex-direction: column;
        align-items: stretch;
      }

      .summary-card {
        text-align: left;
      }
    }
  </style>
</head>
<body>

<div class="admin-layout">

  <aside th:replace="~{fragments/adminSidebar :: adminSidebar('hospitalManagers')}"></aside>

  <main class="content">
    <div class="manager-page">

      <div class="manager-header">
        <div>
          <h2>병원 관리자 신청 목록</h2>
          <p>일반 회원이 신청한 병원 관리자 권한을 승인하거나 거절합니다.</p>
        </div>

        <div class="summary-card">
          <span>대기 중 신청</span>
          <strong>
            <span th:text="${managerPage.totalElements}">0</span>건
          </strong>
        </div>
      </div>

      <div th:if="${message}" class="alert">
        <p th:text="${message}"></p>
      </div>

      <div class="manager-card">

        <div class="manager-card-head">
          <div>
            <strong>신청 목록</strong>
            <span>최근 신청 순으로 표시됩니다.</span>
          </div>
        </div>

        <form th:action="@{/admin/hospital-managers}"
              method="get"
              style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; padding:0 24px 18px;">

          <input type="text"
                 class="form-control"
                 style="max-width:240px;"
                 name="keyword"
                 placeholder="병원명/담당자명 검색"
                 th:value="${keyword}">

          <button type="submit" class="btn btn-primary btn-sm">검색</button>
          <a th:href="@{/admin/hospital-managers}" class="btn btn-outline btn-sm">초기화</a>
        </form>

        <div class="table-wrap">
          <table class="manager-table">
            <thead>
            <tr>
              <th>번호</th>
              <th>병원명</th>
              <th>신청자</th>
              <th>담당자명</th>
              <th>연락처</th>
              <th>사업자번호</th>
              <th>상태</th>
              <th>관리</th>
            </tr>
            </thead>

            <tbody>
            <tr th:if="${#lists.isEmpty(managerPage.content)}">
              <td colspan="8" class="empty-row">
                대기 중인 병원 관리자 신청이 없습니다.
              </td>
            </tr>

            <tr th:each="manager, stat : ${managerPage.content}">
              <td class="row-number"
                  th:text="${currentPage * managerPage.size + stat.count}">
                1
              </td>

              <td class="hospital-name"
                  th:text="${manager.hospital.name}">
                병원명
              </td>

              <td class="applicant-name"
                  th:text="${manager.member.username}">
                신청자
              </td>

              <td class="manager-name"
                  th:text="${manager.managerName}">
                담당자명
              </td>

              <td>
                <span class="phone-badge"
                      th:text="${manager.managerPhone}">
                  연락처
                </span>
              </td>

              <td class="business-number"
                  th:text="${manager.businessNumber}">
                사업자번호
              </td>

              <td>
                <span class="status-pill"
                      th:text="${manager.status}">
                  WAITING
                </span>
              </td>

              <td>
                <div class="action-group">
                  <form th:action="@{/admin/hospital-managers/{id}/approve(id=${manager.id})}"
                        method="post">
                    <button type="submit" class="btn btn-primary btn-small">
                      승인
                    </button>
                  </form>

                  <form th:action="@{/admin/hospital-managers/{id}/reject(id=${manager.id})}"
                        method="post">
                    <button type="submit"
                            class="btn btn-danger btn-small"
                            onclick="return confirm('병원 관리자 신청을 거절하시겠습니까?')">
                      거절
                    </button>
                  </form>
                </div>
              </td>
            </tr>
            </tbody>
          </table>
        </div>

        <div class="pagination-wrap" th:if="${managerPage.totalPages > 1}">

          <a class="page-btn"
             th:classappend="${managerPage.first} ? ' disabled' : ''"
             th:href="${managerPage.first} ? '#' : @{/admin/hospital-managers(page=${currentPage - 1}, keyword=${keyword})}">
            이전
          </a>

          <a class="page-btn"
             th:each="pageNum : ${#numbers.sequence(0, managerPage.totalPages - 1)}"
             th:href="@{/admin/hospital-managers(page=${pageNum}, keyword=${keyword})}"
             th:classappend="${pageNum == currentPage} ? ' active' : ''"
             th:text="${pageNum + 1}">
            1
          </a>

          <a class="page-btn"
             th:classappend="${managerPage.last} ? ' disabled' : ''"
             th:href="${managerPage.last} ? '#' : @{/admin/hospital-managers(page=${currentPage + 1}, keyword=${keyword})}">
            다음
          </a>

        </div>

      </div>
    </div>
  </main>
</div>

</body>
</html>
