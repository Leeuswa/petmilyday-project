<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>병원 관리</title>
  <link rel="stylesheet" th:href="@{/css/admin/adminHospital.css}">

  <style>
    .hospital-page {
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .hospital-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
    }

    .hospital-header h2 {
      margin: 0;
      font-size: 28px;
      font-weight: 900;
      color: #111827;
      letter-spacing: -0.6px;
    }

    .hospital-header p {
      margin: 8px 0 0;
      font-size: 14px;
      color: #6b7280;
      line-height: 1.5;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .summary-card {
      min-width: 150px;
      padding: 15px 18px;
      border-radius: 16px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #ffffff;
      text-align: right;
      box-shadow: 0 12px 26px rgba(37, 99, 235, 0.24);
    }

    .summary-card span {
      display: block;
      font-size: 13px;
      opacity: 0.85;
      margin-bottom: 4px;
    }

    .summary-card strong {
      font-size: 25px;
      font-weight: 900;
    }

    .hospital-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    .hospital-card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 24px;
      background: #f8fafc;
      border-bottom: 1px solid #eef2f7;
    }

    .hospital-card-head strong {
      display: block;
      font-size: 18px;
      font-weight: 900;
      color: #111827;
    }

    .hospital-card-head span {
      display: block;
      margin-top: 5px;
      font-size: 13px;
      color: #6b7280;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    .hospital-table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
    }

    .hospital-table thead {
      background: #f9fafb;
    }

    .hospital-table th {
      padding: 15px 14px;
      border-bottom: 1px solid #e5e7eb;
      color: #374151;
      font-size: 13px;
      font-weight: 900;
      text-align: left;
      white-space: nowrap;
    }

    .hospital-table td {
      padding: 16px 14px;
      border-bottom: 1px solid #f1f5f9;
      color: #111827;
      font-size: 14px;
      vertical-align: middle;
      white-space: nowrap;
    }

    .hospital-table tbody tr:hover {
      background: #f8fbff;
    }

    .hospital-table tbody tr:last-child td {
      border-bottom: none;
    }

    .row-number {
      color: #2563eb;
      font-weight: 900;
    }

    .hospital-name {
      font-weight: 900;
      color: #111827;
    }

    .hospital-address {
      max-width: 320px;
      color: #374151;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .phone-badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #374151;
      font-size: 13px;
      font-weight: 800;
    }

    .location-text {
      color: #6b7280;
      font-size: 13px;
      font-weight: 700;
    }

    .action-group {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .action-group form {
      display: inline;
    }

    .btn-small {
      padding: 7px 11px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 800;
    }

    .empty-row {
      padding: 46px 20px !important;
      text-align: center;
      color: #6b7280 !important;
      font-weight: 800;
    }

    .pagination-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 7px;
      padding: 24px;
      border-top: 1px solid #eef2f7;
      background: #ffffff;
    }

    .page-btn {
      min-width: 38px;
      height: 38px;
      padding: 0 13px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #ffffff;
      color: #374151;
      text-decoration: none;
      font-size: 14px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .page-btn:hover {
      background: #eff6ff;
      border-color: #2563eb;
      color: #2563eb;
      transform: translateY(-1px);
    }

    .page-btn.active {
      background: #2563eb;
      border-color: #2563eb;
      color: #ffffff;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
    }

    .page-btn.disabled {
      pointer-events: none;
      opacity: 0.4;
      background: #f9fafb;
    }

    .alert {
      margin: 0;
      padding: 13px 15px;
      border-radius: 12px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      font-weight: 800;
    }

    .alert p {
      margin: 0;
    }

    @media (max-width: 900px) {
      .hospital-header {
        flex-direction: column;
        align-items: stretch;
      }

      .header-actions {
        justify-content: space-between;
      }

      .summary-card {
        text-align: left;
      }
    }
  </style>
</head>
<body>

<div class="admin-layout">

  <aside th:replace="~{fragments/adminSidebar :: adminSidebar('hospitals')}"></aside>

  <main class="content">
    <div class="hospital-page">

      <div class="hospital-header">
        <div>
          <h2>병원 관리</h2>
          <p>메인 관리자는 병원의 기본정보만 등록하고 관리합니다.</p>
        </div>

        <div class="header-actions">
          <div class="summary-card">
            <span>전체 병원</span>
            <strong>
              <span th:text="${hospitalPage.totalElements}">0</span>개
            </strong>
          </div>

          <a th:href="@{/admin/hospitals/register}" class="btn btn-primary">
            병원 등록
          </a>
        </div>
      </div>

      <div th:if="${message}" class="alert">
        <p th:text="${message}"></p>
      </div>

      <div class="hospital-card">

        <div class="hospital-card-head">
          <div>
            <strong>병원 목록</strong>
            <span>최근 등록된 병원부터 표시됩니다.</span>
          </div>
        </div>

        <form th:action="@{/admin/hospitals/}"
              method="get"
              style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; padding:0 24px 18px;">

          <input type="text"
                 class="form-control"
                 style="max-width:220px;"
                 name="keyword"
                 placeholder="병원명 검색"
                 th:value="${searchDTO.keyword}">

          <select class="form-control" style="max-width:160px;" name="department">
            <option value="" th:selected="${searchDTO.department == null or searchDTO.department == ''}">전체 진료과</option>
            <option value="내과" th:selected="${searchDTO.department == '내과'}">내과</option>
            <option value="외과" th:selected="${searchDTO.department == '외과'}">외과</option>
            <option value="피부과" th:selected="${searchDTO.department == '피부과'}">피부과</option>
            <option value="치과" th:selected="${searchDTO.department == '치과'}">치과</option>
            <option value="안과" th:selected="${searchDTO.department == '안과'}">안과</option>
          </select>

          <label style="display:flex; align-items:center; gap:6px; font-size:14px; font-weight:600; color:#374151;">
            <input type="checkbox" name="isEmergency" value="true" th:checked="${searchDTO.isEmergency == true}">
            응급진료만
          </label>

          <button type="submit" class="btn btn-primary btn-sm">검색</button>
          <a th:href="@{/admin/hospitals/}" class="btn btn-outline btn-sm">초기화</a>
        </form>

        <div class="table-wrap">
          <table class="hospital-table">
            <thead>
            <tr>
              <th>번호</th>
              <th>병원명</th>
              <th>주소</th>
              <th>전화번호</th>
              <th>위도</th>
              <th>경도</th>
              <th>관리</th>
            </tr>
            </thead>

            <tbody>
            <tr th:if="${#lists.isEmpty(hospitalPage.content)}">
              <td colspan="7" class="empty-row">
                등록된 병원이 없습니다.
              </td>
            </tr>

            <tr th:each="hospital, stat : ${hospitalPage.content}">
              <td class="row-number"
                  th:text="${currentPage * hospitalPage.size + stat.count}">
                1
              </td>

              <td class="hospital-name"
                  th:text="${hospital.name}">
                병원명
              </td>

              <td class="hospital-address"
                  th:text="${hospital.address}">
                주소
              </td>

              <td>
                <span class="phone-badge"
                      th:text="${hospital.phone}">
                  전화번호
                </span>
              </td>

              <td class="location-text"
                  th:text="${hospital.latitude}">
                37.0000000
              </td>

              <td class="location-text"
                  th:text="${hospital.longitude}">
                127.0000000
              </td>

              <td>
                <div class="action-group">
                  <a th:href="@{/admin/hospitals/{id}(id=${hospital.id})}"
                     class="btn btn-outline btn-small">
                    상세
                  </a>

                  <a th:href="@{/admin/hospitals/{id}/modify(id=${hospital.id})}"
                     class="btn btn-primary btn-small">
                    수정
                  </a>

                  <form th:action="@{/admin/hospitals/{id}/remove(id=${hospital.id})}"
                        method="post"
                        onsubmit="return confirm('병원을 삭제하시겠습니까?')">
                    <button type="submit" class="btn btn-gray btn-small">
                      삭제
                    </button>
                  </form>
                </div>
              </td>
            </tr>
            </tbody>
          </table>
        </div>

        <div class="pagination-wrap" th:if="${hospitalPage.totalPages > 1}">

          <a class="page-btn"
             th:classappend="${hospitalPage.first} ? ' disabled' : ''"
             th:href="${hospitalPage.first} ? '#' : @{/admin/hospitals/(page=${currentPage - 1}, keyword=${searchDTO.keyword}, department=${searchDTO.department}, isEmergency=${searchDTO.isEmergency})}">
            이전
          </a>

          <a class="page-btn"
             th:each="pageNum : ${#numbers.sequence(0, hospitalPage.totalPages - 1)}"
             th:href="@{/admin/hospitals/(page=${pageNum}, keyword=${searchDTO.keyword}, department=${searchDTO.department}, isEmergency=${searchDTO.isEmergency})}"
             th:classappend="${pageNum == currentPage} ? ' active' : ''"
             th:text="${pageNum + 1}">
            1
          </a>

          <a class="page-btn"
             th:classappend="${hospitalPage.last} ? ' disabled' : ''"
             th:href="${hospitalPage.last} ? '#' : @{/admin/hospitals/(page=${currentPage + 1}, keyword=${searchDTO.keyword}, department=${searchDTO.department}, isEmergency=${searchDTO.isEmergency})}">
            다음
          </a>

        </div>

      </div>
    </div>
  </main>
</div>

</body>
</html>
