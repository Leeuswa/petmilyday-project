<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>병원 관리</title>
  <link rel="stylesheet" th:href="@{/css/admin/adminHospital.css}">
</head>
<body>

<div class="admin-layout">

  <aside th:replace="~{fragments/adminSidebar :: adminSidebar('hospitals')}"></aside>

  <main class="content">
    <div class="topbar">
      <div>
        <h2>병원 관리</h2>
        <p>메인 관리자는 병원의 기본정보만 등록하고 관리합니다.</p>
      </div>
      <a th:href="@{/admin/hospitals/register}" class="btn btn-primary">병원 등록</a>
    </div>

    <div class="card">

      <div th:if="${message}" class="alert">
        <p th:text="${message}"></p>
      </div>

      <table class="table">
        <thead>
        <tr>
          <th>번호</th>
          <th>병원명</th>
          <th>주소</th>
          <th>전화번호</th>
          <th>위도</th>
          <th>경도</th>
          <th>관리</th>
        </tr>
        </thead>

        <tbody>
        <tr th:if="${hospitalList == null or hospitalList.isEmpty()}">
          <td colspan="7" style="text-align: center;">
            등록된 병원이 없습니다.
          </td>
        </tr>

        <tr th:each="hospital, stat : ${hospitalList}">
          <td th:text="${stat.count}">1</td>
          <td th:text="${hospital.name}">병원명</td>
          <td th:text="${hospital.address}">주소</td>
          <td th:text="${hospital.phone}">전화번호</td>
          <td th:text="${hospital.latitude}">37.0000000</td>
          <td th:text="${hospital.longitude}">127.0000000</td>
          <td>
            <a th:href="@{/admin/hospitals/{id}(id=${hospital.id})}"
               class="btn btn-outline">
              상세
            </a>

            <a th:href="@{/admin/hospitals/{id}/modify(id=${hospital.id})}"
               class="btn btn-primary">
              수정
            </a>

            <form th:action="@{/admin/hospitals/{id}/remove(id=${hospital.id})}"
                  method="post"
                  style="display:inline;"
                  onsubmit="return confirm('병원을 삭제하시겠습니까?')">
              <button type="submit" class="btn btn-gray">
                삭제
              </button>
            </form>
          </td>
        </tr>
        </tbody>
      </table>

    </div>
  </main>
</div>

</body>
</html>
