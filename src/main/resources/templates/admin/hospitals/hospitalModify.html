<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>병원 수정</title>
  <link rel="stylesheet" th:href="@{/css/admin/adminHospital.css}">
</head>
<body>

<div class="admin-layout">

  <aside th:replace="~{fragments/adminSidebar :: adminSidebar('hospitals')}"></aside>

  <main class="content">
    <div class="topbar">
      <div>
        <h2>병원 수정</h2>
        <p>관리자는 병원의 기본정보만 수정합니다. 세부정보와 운영시간은 병원관리자가 수정합니다.</p>
      </div>
      <a th:href="@{/admin/hospitals/}" class="btn btn-outline">목록</a>
    </div>

    <div class="card">
      <form th:action="@{/admin/hospitals/{id}/modify(id=${hospitalDTO.id})}"
            th:object="${hospitalDTO}"
            method="post">

        <div class="form-grid">

          <div class="form-group">
            <label class="form-label">병원명</label>
            <input type="text"
                   class="form-control"
                   th:field="*{name}">
            <div class="error"
                 th:if="${#fields.hasErrors('name')}"
                 th:errors="*{name}"></div>
          </div>

          <div class="form-group">
            <label class="form-label">전화번호</label>
            <input type="text"
                   class="form-control"
                   th:field="*{phone}">
            <div class="error"
                 th:if="${#fields.hasErrors('phone')}"
                 th:errors="*{phone}"></div>
          </div>

          <div class="form-group full">
            <label class="form-label">주소</label>
            <input type="text"
                   class="form-control"
                   th:field="*{address}">
            <div class="error"
                 th:if="${#fields.hasErrors('address')}"
                 th:errors="*{address}"></div>
          </div>

          <div class="form-group">
            <label class="form-label">위도</label>
            <input type="number"
                   step="0.0000001"
                   class="form-control"
                   th:field="*{latitude}">
            <div class="error"
                 th:if="${#fields.hasErrors('latitude')}"
                 th:errors="*{latitude}"></div>
          </div>

          <div class="form-group">
            <label class="form-label">경도</label>
            <input type="number"
                   step="0.0000001"
                   class="form-control"
                   th:field="*{longitude}">
            <div class="error"
                 th:if="${#fields.hasErrors('longitude')}"
                 th:errors="*{longitude}"></div>
          </div>

        </div>

        <div class="actions">
          <a th:href="@{/admin/hospitals/{id}(id=${hospitalDTO.id})}"
             class="btn btn-gray">
            취소
          </a>
          <button type="submit" class="btn btn-primary">수정</button>
        </div>

      </form>
    </div>
  </main>
</div>

</body>
</html>
