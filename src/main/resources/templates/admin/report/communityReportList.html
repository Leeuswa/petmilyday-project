<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>커뮤니티 신고 관리</title>
  <link rel="stylesheet" th:href="@{/css/admin/adminHospital.css}">
  <link rel="stylesheet" th:href="@{/css/admin/communityReport.css}">
</head>
<body>

<div class="admin-layout">

  <aside th:replace="~{fragments/adminSidebar :: adminSidebar('communityReports')}"></aside>

  <main class="content">

    <div class="page-header">
      <div class="page-title-box">
        <h2>커뮤니티 신고 관리</h2>
        <p>신고된 게시글/댓글을 확인하고 삭제 또는 게시 유지 처리를 할 수 있습니다.</p>
      </div>
    </div>

    <div class="summary-box">
      <div class="summary-item">
        <span class="summary-label">전체 신고 수</span>
        <strong class="summary-value" th:text="${#lists.size(reports)}">0</strong>
      </div>

      <div class="summary-item">
        <span class="summary-label">접수 대기</span>
        <strong class="summary-value"
                th:text="${#lists.size(reports.?[status == 'PENDING'])}">0</strong>
      </div>

      <div class="summary-item">
        <span class="summary-label">처리 완료</span>
        <strong class="summary-value"
                th:text="${#lists.size(reports.?[status != 'PENDING'])}">0</strong>
      </div>
    </div>

    <div class="report-card">

      <div th:if="${message}" class="alert">
        <p th:text="${message}"></p>
      </div>

      <div class="table-wrap">
        <table class="table">
          <thead>
          <tr>
            <th>신고번호</th>
            <th>신고자</th>
            <th>구분</th>
            <th>내용 요약</th>
            <th>신고 사유</th>
            <th>신고일</th>
            <th>상태</th>
            <th>관리</th>
          </tr>
          </thead>

          <tbody>
          <tr th:if="${#lists.isEmpty(reports)}">
            <td colspan="8" class="empty-row">
              신고된 게시글/댓글이 없습니다.
            </td>
          </tr>

          <tr th:each="report : ${reports}">
            <td th:text="${report.id}">1</td>

            <td class="reporter-name" th:text="${report.reporterUsername}">user1</td>

            <td>
              <span th:if="${report.targetType == 'POST'}" class="target-type-post">게시글</span>
              <span th:if="${report.targetType == 'COMMENT'}" class="target-type-comment">댓글</span>
            </td>

            <td class="report-content">
              <a th:if="${report.targetType == 'POST'}"
                 th:href="@{/community/read(id=${report.targetId})}"
                 th:text="${report.targetContentSummary}"
                 target="_blank">내용 요약</a>
              <span th:if="${report.targetType == 'COMMENT'}"
                    th:text="${report.targetContentSummary}">내용 요약</span>
            </td>

            <td th:text="${report.reason}">사유</td>

            <td th:text="${#temporals.format(report.createdAt, 'yyyy-MM-dd HH:mm')}">
              2026-06-16 12:00
            </td>

            <td>
              <span th:if="${report.status == 'PENDING'}" class="badge badge-danger">접수 대기</span>
              <span th:if="${report.status == 'DELETED'}" class="badge badge-gray">삭제 처리됨</span>
              <span th:if="${report.status == 'MAINTAINED'}" class="badge badge-success">게시 유지</span>
            </td>

            <td>
              <div th:if="${report.status == 'PENDING'}" class="action-area">
                <form th:action="@{/admin/community/reports/{id}/delete(id=${report.id})}" method="post" style="display:inline;">
                  <button type="submit" class="btn-sm btn-danger"
                          onclick="return confirm('해당 글을 삭제하고 작성자에게 알림을 보냅니까?')">
                    삭제 처리
                  </button>
                </form>
                <form th:action="@{/admin/community/reports/{id}/maintain(id=${report.id})}" method="post" style="display:inline;">
                  <button type="submit" class="btn-sm btn-primary"
                          onclick="return confirm('게시물을 유지 처리하시겠습니까?')">
                    유지 처리
                  </button>
                </form>
              </div>
              <span th:if="${report.status != 'PENDING'}" style="color:#9ca3af;">조치 완료</span>
            </td>
          </tr>
          </tbody>
        </table>
      </div>

    </div>
  </main>
</div>

</body>
</html>
