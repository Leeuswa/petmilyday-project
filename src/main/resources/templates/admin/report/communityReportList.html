<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>커뮤니티 신고 관리</title>
  <link rel="stylesheet" th:href="@{/css/admin/adminHospital.css}">
  <link rel="stylesheet" th:href="@{/css/admin/communityReport.css}">

  <style>
    .pagination-area {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin-top: 24px;
    }

    .page-link {
      min-width: 38px;
      height: 38px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #d1d5db;
      border-radius: 9px;
      background: #ffffff;
      color: #374151;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }

    .page-link:hover {
      background: #f3f4f6;
    }

    .page-link.active {
      border-color: #2563eb;
      background: #2563eb;
      color: #ffffff;
    }

    .page-link.disabled {
      background: #f3f4f6;
      color: #9ca3af;
      cursor: default;
    }

    .page-info {
      margin-top: 12px;
      text-align: center;
      color: #6b7280;
      font-size: 13px;
    }
  </style>
</head>
<body>

<div class="admin-layout">

  <aside th:replace="~{fragments/adminSidebar :: adminSidebar('communityReports')}"></aside>

  <main class="content">

    <div class="page-header">
      <div class="page-title-box">
        <h2>커뮤니티 신고 관리</h2>
        <p>신고된 게시글/댓글을 확인하고 삭제 또는 게시 유지 처리를 할 수 있습니다.</p>
      </div>
    </div>

    <div class="summary-box">
      <div class="summary-item">
        <span class="summary-label">전체 신고 수</span>
        <strong class="summary-value"
                th:text="${reportPage != null ? reportPage.totalElements : 0}">0</strong>
      </div>

      <div class="summary-item">
        <span class="summary-label">현재 페이지</span>
        <strong class="summary-value"
                th:text="${totalPages == 0 ? 0 : currentPage + 1}">1</strong>
      </div>

      <div class="summary-item">
        <span class="summary-label">전체 페이지</span>
        <strong class="summary-value" th:text="${totalPages}">1</strong>
      </div>
    </div>

    <div class="report-card">

      <div th:if="${message}" class="alert">
        <p th:text="${message}"></p>
      </div>

      <form th:action="@{/admin/community/reports}"
            method="get"
            style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:18px;">

        <select name="status" class="page-link" style="font-weight:400;">
          <option value="" th:selected="${status == null or status == ''}">전체 상태</option>
          <option value="PENDING" th:selected="${status == 'PENDING'}">접수 대기</option>
          <option value="DELETED" th:selected="${status == 'DELETED'}">삭제 처리됨</option>
          <option value="MAINTAINED" th:selected="${status == 'MAINTAINED'}">게시 유지</option>
        </select>

        <select name="targetType" class="page-link" style="font-weight:400;">
          <option value="" th:selected="${targetType == null or targetType == ''}">전체 구분</option>
          <option value="POST" th:selected="${targetType == 'POST'}">일반 게시글</option>
          <option value="COMMENT" th:selected="${targetType == 'COMMENT'}">일반 댓글</option>
          <option value="MEETUP_POST" th:selected="${targetType == 'MEETUP_POST'}">모임 게시글</option>
          <option value="MEETUP_COMMENT" th:selected="${targetType == 'MEETUP_COMMENT'}">모임 댓글</option>
        </select>

        <input type="text"
               name="keyword"
               placeholder="신고자/사유 검색"
               th:value="${keyword}"
               style="min-width:220px; padding:0 12px; height:38px; border:1px solid #d1d5db; border-radius:9px; font-size:14px;">

        <button type="submit" class="btn-sm btn-primary">검색</button>
        <a th:href="@{/admin/community/reports}" class="page-link">초기화</a>
      </form>

      <div class="table-wrap">
        <table class="table">
          <thead>
          <tr>
            <th>신고번호</th>
            <th>신고자</th>
            <th>구분</th>
            <th>내용 요약</th>
            <th>신고 사유</th>
            <th>신고일</th>
            <th>상태</th>
            <th>관리</th>
          </tr>
          </thead>

          <tbody>
          <tr th:if="${#lists.isEmpty(reports)}">
            <td colspan="8" class="empty-row">
              신고된 게시글/댓글이 없습니다.
            </td>
          </tr>

          <tr th:each="report : ${reports}">
            <td th:text="${report.id}">1</td>

            <td class="reporter-name" th:text="${report.reporterUsername}">user1</td>

            <td>
              <span th:if="${report.targetType == 'POST'}" class="target-type-post">일반 게시글</span>
              <span th:if="${report.targetType == 'COMMENT'}" class="target-type-comment">일반 댓글</span>
              <span th:if="${report.targetType == 'MEETUP_POST'}" class="target-type-meetupPost">모임 게시글</span>
              <span th:if="${report.targetType == 'MEETUP_COMMENT'}" class="target-type-meetupComment">모임 댓글</span>
            </td>

            <td class="report-content" th:text="${report.targetContentSummary}">[일반글] 제목</td>

            <td th:text="${report.reason}">사유</td>

            <td th:text="${#temporals.format(report.createdAt, 'yyyy-MM-dd HH:mm')}">
              2026-06-16 12:00
            </td>

            <td>
              <span th:if="${report.status == 'PENDING'}" class="badge badge-danger">접수 대기</span>
              <span th:if="${report.status == 'DELETED'}" class="badge badge-gray">삭제 처리됨</span>
              <span th:if="${report.status == 'MAINTAINED'}" class="badge badge-success">게시 유지</span>
            </td>

            <td>
              <div th:if="${report.status == 'PENDING'}" class="action-area">
                <form th:action="@{/admin/community/reports/{id}/delete(id=${report.id})}" method="post" style="display:inline;">
                  <button type="submit" class="btn-sm btn-danger"
                          onclick="return confirm('해당 글을 삭제하고 작성자에게 알림을 보냅니까?')">
                    삭제 처리
                  </button>
                </form>
                <form th:action="@{/admin/community/reports/{id}/maintain(id=${report.id})}" method="post" style="display:inline;">
                  <button type="submit" class="btn-sm btn-primary"
                          onclick="return confirm('게시물을 유지 처리하시겠습니까?')">
                    유지 처리
                  </button>
                </form>
              </div>
              <span th:if="${report.status != 'PENDING'}" style="color:#9ca3af;">조치 완료</span>
            </td>
          </tr>
          </tbody>
        </table>
      </div>

      <div class="pagination-area" th:if="${totalPages > 1}">

        <a th:if="${currentPage > 0}"
           class="page-link"
           th:href="@{/admin/community/reports(page=${currentPage - 1}, status=${status}, targetType=${targetType}, keyword=${keyword})}">
          이전
        </a>

        <span th:if="${currentPage == 0}"
              class="page-link disabled">
          이전
        </span>

        <a th:each="pageNum : ${#numbers.sequence(0, totalPages - 1)}"
           th:if="${pageNum >= currentPage - 2 and pageNum <= currentPage + 2}"
           th:href="@{/admin/community/reports(page=${pageNum}, status=${status}, targetType=${targetType}, keyword=${keyword})}"
           th:text="${pageNum + 1}"
           th:class="${pageNum == currentPage ? 'page-link active' : 'page-link'}">
          1
        </a>

        <a th:if="${currentPage < totalPages - 1}"
           class="page-link"
           th:href="@{/admin/community/reports(page=${currentPage + 1}, status=${status}, targetType=${targetType}, keyword=${keyword})}">
          다음
        </a>

        <span th:if="${currentPage >= totalPages - 1}"
              class="page-link disabled">
          다음
        </span>

      </div>

      <div class="page-info" th:if="${reportPage != null}">
        <span th:text="${reportPage.totalElements}">0</span>건 중
        <span th:text="${reportPage.numberOfElements}">0</span>건 표시
      </div>

    </div>
  </main>
</div>

</body>
</html>
