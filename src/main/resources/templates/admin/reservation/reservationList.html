<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>전체 예약 현황</title>
  <link rel="stylesheet" th:href="@{/css/admin/adminHospital.css}">

  <style>
    .pagination-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 7px;
      padding: 20px 0 4px;
    }

    .page-btn {
      min-width: 36px;
      height: 36px;
      padding: 0 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #ffffff;
      color: #374151;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .page-btn:hover {
      background: #eff6ff;
      border-color: #2563eb;
      color: #2563eb;
    }

    .page-btn.active {
      background: #2563eb;
      border-color: #2563eb;
      color: #ffffff;
    }

    .page-btn.disabled {
      pointer-events: none;
      opacity: 0.4;
      background: #f9fafb;
    }
  </style>
</head>
<body>

<div class="admin-layout">

  <aside th:replace="~{fragments/adminSidebar :: adminSidebar('reservations')}"></aside>

  <main class="content">
    <div class="topbar">
      <div>
        <h2>전체 예약 현황</h2>
        <p>전체 병원의 예약 현황을 확인합니다. 예약 승인과 거절은 병원 관리자가 처리합니다.</p>
      </div>
    </div>

    <div class="card">

      <div th:if="${message}" class="alert">
        <p th:text="${message}"></p>
      </div>

      <form th:action="@{/admin/reservations/}"
            method="get"
            style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:18px;">

        <input type="text"
               class="form-control"
               style="max-width:200px;"
               name="hospitalName"
               placeholder="병원명 검색"
               th:value="${searchDTO.hospitalName}">

        <select class="form-control" style="max-width:150px;" name="status">
          <option value="" th:selected="${searchDTO.status == null}">전체 상태</option>
          <option value="WAITING" th:selected="${searchDTO.status != null and searchDTO.status.name() == 'WAITING'}">승인대기</option>
          <option value="APPROVED" th:selected="${searchDTO.status != null and searchDTO.status.name() == 'APPROVED'}">승인완료</option>
          <option value="DONE" th:selected="${searchDTO.status != null and searchDTO.status.name() == 'DONE'}">진료완료</option>
          <option value="CANCEL" th:selected="${searchDTO.status != null and searchDTO.status.name() == 'CANCEL'}">취소</option>
        </select>

        <input type="date" class="form-control" style="max-width:160px;" name="dateFrom" th:value="${searchDTO.dateFrom}">
        <span>~</span>
        <input type="date" class="form-control" style="max-width:160px;" name="dateTo" th:value="${searchDTO.dateTo}">

        <button type="submit" class="btn btn-primary btn-sm">검색</button>
        <a th:href="@{/admin/reservations/}" class="btn btn-outline btn-sm">초기화</a>
      </form>

      <table class="table">
        <thead>
        <tr>
          <th>예약번호</th>
          <th>병원명</th>
          <th>예약자</th>
          <th>예약일</th>
          <th>예약시간</th>
          <th>상태</th>
          <th>비고</th>
        </tr>
        </thead>

        <tbody>
        <tr th:if="${reservationPage.content.isEmpty()}">
          <td colspan="7" style="text-align:center;">
            예약 내역이 없습니다.
          </td>
        </tr>

        <tr th:each="reservation : ${reservationPage.content}">
          <td th:text="${reservation.id}">1</td>
          <td th:text="${reservation.hospitalName}">펫밀리 동물병원</td>
          <td th:text="${reservation.memberName}">홍길동</td>
          <td th:text="${reservation.reservationDate}">2026-06-05</td>
          <td th:text="${reservation.reservationTime}">14:00</td>

          <td>
            <span th:if="${reservation.status.name() == 'WAITING'}"
                  class="badge badge-gray">
              승인대기
            </span>

            <span th:if="${reservation.status.name() == 'APPROVED'}"
                  class="badge badge-primary">
              승인완료
            </span>

            <span th:if="${reservation.status.name() == 'DONE'}"
                  class="badge badge-primary">
              진료완료
            </span>

            <span th:if="${reservation.status.name() == 'CANCEL'}"
                  class="badge badge-danger">
              취소
            </span>
          </td>

          <td>
            <span>조회 전용</span>
          </td>
        </tr>
        </tbody>
      </table>

      <div class="pagination-wrap" th:if="${reservationPage.totalPages > 1}">

        <a class="page-btn"
           th:classappend="${reservationPage.first} ? ' disabled' : ''"
           th:href="${reservationPage.first} ? '#' : @{/admin/reservations/(page=${currentPage - 1}, hospitalName=${searchDTO.hospitalName}, status=${searchDTO.status}, dateFrom=${searchDTO.dateFrom}, dateTo=${searchDTO.dateTo})}">
          이전
        </a>

        <a class="page-btn"
           th:each="pageNum : ${#numbers.sequence(0, reservationPage.totalPages - 1)}"
           th:href="@{/admin/reservations/(page=${pageNum}, hospitalName=${searchDTO.hospitalName}, status=${searchDTO.status}, dateFrom=${searchDTO.dateFrom}, dateTo=${searchDTO.dateTo})}"
           th:classappend="${pageNum == currentPage} ? ' active' : ''"
           th:text="${pageNum + 1}">
          1
        </a>

        <a class="page-btn"
           th:classappend="${reservationPage.last} ? ' disabled' : ''"
           th:href="${reservationPage.last} ? '#' : @{/admin/reservations/(page=${currentPage + 1}, hospitalName=${searchDTO.hospitalName}, status=${searchDTO.status}, dateFrom=${searchDTO.dateFrom}, dateTo=${searchDTO.dateTo})}">
          다음
        </a>

      </div>
    </div>
  </main>
</div>

<script th:src="@{/js/admin/adminHospital.js}"></script>
</body>
</html>
