<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${hospital.name}">병원 상세</title>
    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .detail-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .department-tag {
            background-color: #e8f4fd;
            color: #2980b9;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.85rem;
            margin-right: 6px;
        }
        .hours-table th {
            width: 80px;
            color: #636e72;
        }
        .reservation-side {
            position: sticky;
            top: 90px;
        }
        .emergency-badge { background-color: #ff4757; }
        .rating-badge { background-color: #ffa502; }
        .info-label { color: #636e72; font-size: 0.85rem; }
        .star-rating { color: #ffa502; }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">

    <!-- 뒤로가기 -->
    <div class="mb-4">
        <a th:href="@{/hospital/list}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> 목록으로
        </a>
    </div>

    <div class="row g-4">

        <!-- 왼쪽: 병원 기본 정보 -->
        <div class="col-md-8">
            <div class="card detail-card p-4 mb-4">

                <!-- 병원명 + 응급 뱃지 -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3 class="fw-bold mb-0" th:text="${hospital.name}"></h3>
                    <span class="badge emergency-badge text-white fs-6"
                          th:if="${hospital.isEmergency}">
                        <i class="bi bi-alarm"></i> 24시 응급
                    </span>
                </div>

                <!-- 평점 -->
                <div class="mb-3">
                    <span class="badge rating-badge text-white">
                        <i class="bi bi-star-fill"></i>
                        <span th:text="${hospital.rating}"></span>
                    </span>
                </div>

                <hr>

                <!-- 주소 -->
                <div class="mb-3">
                    <p class="info-label mb-1"><i class="bi bi-geo-alt"></i> 주소</p>
                    <p class="fw-bold" th:text="${hospital.address}"></p>
                </div>

                <!-- 전화번호 -->
                <div class="mb-3">
                    <p class="info-label mb-1"><i class="bi bi-telephone"></i> 전화번호</p>
                    <p class="fw-bold" th:text="${hospital.phone}"></p>
                </div>

                <!-- 진료과 -->
                <div class="mb-3">
                    <p class="info-label mb-2"><i class="bi bi-clipboard2-pulse"></i> 진료과목</p>
                    <div>
                        <span class="department-tag"
                              th:each="dept : ${#strings.arraySplit(hospital.department, ',')}"
                              th:text="${dept}">
                        </span>
                    </div>
                </div>

                <!-- 예약 슬롯 정보 -->
                <div class="mb-3">
                    <p class="info-label mb-1"><i class="bi bi-clock"></i> 예약 정보</p>
                    <p class="fw-bold">
                        슬롯 간격: <span th:text="${hospital.slotIntervalMin}"></span>분 /
                        슬롯당 최대: <span th:text="${hospital.maxPerSlot}"></span>명
                    </p>
                </div>
            </div>

            <!-- 운영시간 -->
            <div class="card detail-card p-4 mb-4">
                <h5 class="fw-bold mb-3"><i class="bi bi-calendar-week"></i> 운영시간</h5>
                <table class="table hours-table">
                    <tbody>
                    <tr th:each="hour : ${hospital.hours}">
                        <th>
                            <span th:switch="${hour.dayOfWeek}">
                                <span th:case="0">월요일</span>
                                <span th:case="1">화요일</span>
                                <span th:case="2">수요일</span>
                                <span th:case="3">목요일</span>
                                <span th:case="4">금요일</span>
                                <span th:case="5">토요일</span>
                                <span th:case="6">일요일</span>
                            </span>
                        </th>
                        <td>
                            <span th:if="${hour.isClosed}" class="text-danger fw-bold">휴무</span>
                            <span th:unless="${hour.isClosed}">
                                <span th:text="${hour.openTime}"></span>
                                ~
                                <span th:text="${hour.closeTime}"></span>
                            </span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(hospital.hours)}">
                        <td colspan="2" class="text-muted">운영시간 정보가 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- 리뷰 목록 -->
            <div class="card detail-card p-4 mb-4">
                <h5 class="fw-bold mb-3"><i class="bi bi-star"></i> 리뷰</h5>
                <div th:if="${#lists.isEmpty(reviewList)}" class="text-muted">
                    아직 리뷰가 없습니다.
                </div>
                <div th:each="review : ${reviewList}" class="mb-3 border-bottom pb-3">
                    <div class="d-flex justify-content-between mb-1">
                        <span class="fw-bold" th:text="${review.memberNickname}"></span>
                        <span class="text-muted small"
                              th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd')}"></span>
                    </div>
                    <div class="star-rating mb-1">
                        <span th:each="i : ${#numbers.sequence(1, review.rating)}">
                            <i class="bi bi-star-fill"></i>
                        </span>
                        <span th:each="i : ${#numbers.sequence(review.rating + 1, 5)}">
                            <i class="bi bi-star"></i>
                        </span>
                    </div>
                    <p class="mb-0" th:text="${review.content}"></p>
                </div>
            </div>

            <!-- 리뷰 작성 메시지 -->
            <div th:if="${error}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>

            <!-- 리뷰 작성 폼 -->
            <div class="card detail-card p-4"
                 th:if="${reviewableReservationId != null}">

                <h5 class="fw-bold mb-3">
                    <i class="bi bi-pencil"></i> 리뷰 작성
                </h5>

                <form th:action="@{/review/register}" method="post">

                    <input type="hidden"
                           name="hospitalId"
                           th:value="${hospital.id}"/>

                    <input type="hidden"
                           name="reservationId"
                           th:value="${reviewableReservationId}"/>

                    <div class="mb-3">
                        <label class="form-label fw-bold">별점</label>

                        <select class="form-select"
                                name="rating"
                                required>

                            <option value="5">⭐⭐⭐⭐⭐ 5점</option>
                            <option value="4">⭐⭐⭐⭐ 4점</option>
                            <option value="3">⭐⭐⭐ 3점</option>
                            <option value="2">⭐⭐ 2점</option>
                            <option value="1">⭐ 1점</option>

                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">리뷰 내용</label>

                        <textarea class="form-control"
                                  name="content"
                                  rows="3"
                                  placeholder="진료 경험을 공유해주세요"
                                  required></textarea>
                    </div>

                    <button type="submit"
                            class="btn btn-primary w-100">

                        <i class="bi bi-send"></i>
                        리뷰 등록

                    </button>
                </form>
            </div>

            <!-- 리뷰 작성 불가 안내 -->
            <div class="card detail-card p-4"
                 th:if="${reviewableReservationId == null}">

                <h5 class="fw-bold mb-3">
                    <i class="bi bi-pencil"></i> 리뷰 작성
                </h5>

                <p class="text-muted mb-0">
                    진료 완료된 예약이 있을 때만 리뷰를 작성할 수 있습니다.
                </p>
            </div>

        </div>

        <!-- 오른쪽: 예약 버튼 + 병원 관리자 신청 -->
        <div class="col-md-4">
            <div class="card detail-card p-4 text-center reservation-side">
                <h5 class="fw-bold mb-3">예약하기</h5>

                <p class="text-muted small mb-4">
                    원하는 날짜와 시간을 선택해 예약하세요
                </p>

                <a th:href="@{/reservation/register(hospitalId=${hospital.id})}"
                   class="btn btn-primary w-100 py-3 mb-3">
                    <i class="bi bi-calendar-check"></i>
                    예약하기
                </a>

                <hr>

                <h6 class="fw-bold mb-2">병원 관계자이신가요?</h6>

                <p class="text-muted small mb-3">
                    해당 병원의 관리자 권한을 신청할 수 있습니다.
                </p>

                <a th:href="@{/hospital-manager/request/{hospitalId}(hospitalId=${hospital.id})}"
                   sec:authorize="hasRole('USER')"
                   class="btn btn-outline-secondary w-100">
                    <i class="bi bi-person-badge"></i>
                    병원 관리자 신청
                </a>
            </div>
        </div>

    </div>

</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
