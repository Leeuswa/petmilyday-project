<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>병원 관리자 신청</title>
  <link rel="stylesheet" th:href="@{/css/hospital/managerRequest.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="request-wrap">

  <div th:if="${globalError}" class="request-notice" style="background:#fee2e2; color:#b91c1c;">
    ⚠️ <span th:text="${globalError}"></span>
  </div>

  <div class="request-card">

    <div class="request-head">
      <span class="icon">🏥</span>
      <h3>병원 관리자 신청</h3>
      <span class="hospital-chip">📍 <span th:text="${hospital.name}">병원명</span></span>
    </div>

    <div class="request-body">

      <div class="request-notice">
        ℹ️ 신청 정보는 관리자 확인 후 승인되며, 승인되면 알림으로 안내드립니다.
      </div>

      <form th:action="@{/hospital-manager/request}"
            th:object="${hospitalManagerDTO}"
            method="post">

        <input type="hidden" name="hospitalId" th:value="${hospital.id}">

        <div class="request-field">
          <label>담당자 이름</label>
          <input type="text"
                 class="form-control"
                 th:field="*{managerName}"
                 required>
        </div>

        <div class="request-field">
          <label>담당자 연락처</label>
          <input type="text"
                 class="form-control"
                 th:field="*{managerPhone}"
                 placeholder="010-1234-5678"
                 required>
        </div>

        <div class="request-field">
          <label>사업자번호</label>
          <input type="text"
                 class="form-control"
                 th:field="*{businessNumber}"
                 placeholder="123-45-67890"
                 required>
        </div>

        <button type="submit" class="request-submit">
          신청하기
        </button>
      </form>

      <a th:href="@{/hospital/detail/{id}(id=${hospital.id})}"
         class="request-back">
        돌아가기
      </a>
    </div>
  </div>

</div>

</body>
</html>
