<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>병원 관리자 신청</title>
  <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">

  <div class="card p-4 mx-auto" style="max-width: 600px;">
    <h3 class="fw-bold mb-3">병원 관리자 신청</h3>

    <p class="text-muted">
      신청 병원:
      <strong th:text="${hospital.name}">병원명</strong>
    </p>

    <form th:action="@{/hospital-manager/request}"
          th:object="${hospitalManagerDTO}"
          method="post">

      <input type="hidden" name="hospitalId" th:value="${hospital.id}">

      <div class="mb-3">
        <label class="form-label">담당자 이름</label>
        <input type="text"
               class="form-control"
               th:field="*{managerName}"
               required>
      </div>

      <div class="mb-3">
        <label class="form-label">담당자 연락처</label>
        <input type="text"
               class="form-control"
               th:field="*{managerPhone}"
               placeholder="010-1234-5678"
               required>
      </div>

      <div class="mb-3">
        <label class="form-label">사업자번호</label>
        <input type="text"
               class="form-control"
               th:field="*{businessNumber}"
               placeholder="123-45-67890"
               required>
      </div>

      <button type="submit" class="btn btn-primary w-100">
        신청하기
      </button>
    </form>

    <a th:href="@{/hospital/detail/{id}(id=${hospital.id})}"
       class="btn btn-outline-secondary w-100 mt-2">
      돌아가기
    </a>
  </div>

</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
