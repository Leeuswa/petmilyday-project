<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>동물병원 목록</title>

    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/common/petmilyTheme.css}">
    <link rel="stylesheet" th:href="@{/css/hospital/hospitalList.css}">
</head>
<body class="pm-page">

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">
    <div class="hospital-wrap">

        <div class="page-hero">
            <div>
                <h2 class="page-title">
                    <i class="bi bi-hospital"></i>
                    동물병원 찾기
                </h2>

                <p class="page-desc">
                    내 반려동물에게 맞는 병원을 검색하고 예약할 수 있습니다.
                </p>
            </div>

            <div class="summary-card">
                <span>검색 결과</span>
                <strong>
                    <span th:text="${hospitalPage.totalElements}">0</span>개
                </strong>
            </div>
        </div>

        <div class="search-box">
            <form th:action="@{/hospital/list}" method="get">
                <div class="row g-3 align-items-end">

                    <div class="col-md-3">
                        <label class="form-label fw-bold">
                            병원명 검색
                        </label>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-search"></i>
                            </span>

                            <input type="text"
                                   class="form-control"
                                   name="keyword"
                                   placeholder="병원명을 입력하세요"
                                   th:value="${searchDTO.keyword}">
                        </div>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label fw-bold">
                            지역/주소로 근처 병원 찾기
                        </label>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-geo-alt"></i>
                            </span>

                            <input type="text"
                                   class="form-control"
                                   name="region"
                                   placeholder="예: 노원구 (비워두면 내 주소 기준)"
                                   th:value="${searchDTO.region}">
                        </div>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label fw-bold">
                            진료과
                        </label>

                        <select class="form-select" name="department">
                            <option value=""
                                    th:selected="${searchDTO.department == null || searchDTO.department == ''}">
                                전체
                            </option>
                            <option value="내과"
                                    th:selected="${searchDTO.department == '내과'}">
                                내과
                            </option>
                            <option value="외과"
                                    th:selected="${searchDTO.department == '외과'}">
                                외과
                            </option>
                            <option value="피부과"
                                    th:selected="${searchDTO.department == '피부과'}">
                                피부과
                            </option>
                            <option value="치과"
                                    th:selected="${searchDTO.department == '치과'}">
                                치과
                            </option>
                            <option value="안과"
                                    th:selected="${searchDTO.department == '안과'}">
                                안과
                            </option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <div class="form-check form-switch mt-4">
                            <input class="form-check-input"
                                   type="checkbox"
                                   name="isEmergency"
                                   value="true"
                                   id="emergencySwitch"
                                   th:checked="${searchDTO.isEmergency == true}">

                            <label class="form-check-label fw-bold"
                                   for="emergencySwitch">
                                <i class="bi bi-alarm text-danger"></i>
                                24시 응급만 보기
                            </label>
                        </div>
                    </div>

                    <div class="col-md-2">
                        <button type="submit"
                                class="btn btn-primary w-100 fw-bold">
                            <i class="bi bi-search"></i>
                            검색
                        </button>
                    </div>

                </div>
            </form>
        </div>

        <div class="card map-card">
            <div class="card-body p-0">
                <div id="map"></div>
            </div>
        </div>

        <div class="list-head">
            <div>
                <h4>병원 목록</h4>
            </div>

            <span>
                페이지 <strong th:text="${currentPage + 1}">1</strong>
                /
                <strong th:text="${hospitalPage.totalPages == 0 ? 1 : hospitalPage.totalPages}">1</strong>
            </span>
        </div>

        <div class="row g-4">

            <div class="col-12 text-center"
                 th:if="${#lists.isEmpty(hospitalPage.content)}">
                <div class="empty-box">
                    <i class="bi bi-emoji-frown"></i>
                    <p class="mt-3 mb-0 fw-bold">
                        검색 결과가 없습니다.
                    </p>
                </div>
            </div>

            <div class="col-md-4"
                 th:each="hospital : ${hospitalPage.content}">

                <div class="card hospital-card">

                    <div class="card-body">

                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <h5 class="hospital-name mb-0"
                                th:text="${hospital.name}">
                                병원명
                            </h5>

                            <span class="badge emergency-badge text-white"
                                  th:if="${hospital.isEmergency}">
                                <i class="bi bi-alarm"></i>
                                24시
                            </span>
                        </div>

                        <p class="info-line mb-2">
                            <i class="bi bi-geo-alt"></i>
                            <span th:text="${hospital.address}">주소</span>
                        </p>

                        <p class="info-line mb-3">
                            <i class="bi bi-telephone"></i>
                            <span th:text="${hospital.phone}">전화번호</span>
                        </p>

                        <div class="department-area mb-3">
                            <span class="department-tag"
                                  th:each="dept : ${#strings.arraySplit(hospital.department, ',')}"
                                  th:text="${dept}">
                                진료과
                            </span>
                        </div>

                        <div class="card-actions">

                            <span class="badge rating-badge text-white">
                                <i class="bi bi-star-fill"></i>
                                <span th:text="${hospital.rating}">0.0</span>
                            </span>

                            <div class="d-flex gap-2">
                                <a th:href="@{/reservation/register(hospitalId=${hospital.id})}"
                                   class="btn btn-primary btn-sm">
                                    <i class="bi bi-calendar-check"></i>
                                    예약하기
                                </a>

                                <a th:href="@{/hospital/{id}(id=${hospital.id})}"
                                   class="btn btn-outline-primary btn-sm">
                                    상세보기
                                    <i class="bi bi-arrow-right"></i>
                                </a>
                            </div>

                        </div>

                    </div>
                </div>
            </div>
        </div>

        <div class="pagination-wrap" th:if="${hospitalPage.totalPages > 1}">

            <a class="page-btn"
               th:classappend="${hospitalPage.first} ? ' disabled' : ''"
               th:href="${hospitalPage.first} ? '#' : @{/hospital/list(
                    page=${currentPage - 1},
                    keyword=${searchDTO.keyword},
                    department=${searchDTO.department},
                    isEmergency=${searchDTO.isEmergency},
                    region=${searchDTO.region}
               )}">
                이전
            </a>

            <a class="page-btn"
               th:each="pageNum : ${#numbers.sequence(0, hospitalPage.totalPages - 1)}"
               th:href="@{/hospital/list(
                    page=${pageNum},
                    keyword=${searchDTO.keyword},
                    department=${searchDTO.department},
                    isEmergency=${searchDTO.isEmergency},
                    region=${searchDTO.region}
               )}"
               th:classappend="${pageNum == currentPage} ? ' active' : ''"
               th:text="${pageNum + 1}">
                1
            </a>

            <a class="page-btn"
               th:classappend="${hospitalPage.last} ? ' disabled' : ''"
               th:href="${hospitalPage.last} ? '#' : @{/hospital/list(
                    page=${currentPage + 1},
                    keyword=${searchDTO.keyword},
                    department=${searchDTO.department},
                    isEmergency=${searchDTO.isEmergency},
                    region=${searchDTO.region}
               )}">
                다음
            </a>

        </div>

    </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>

<script
        type="text/javascript"
        src="//dapi.kakao.com/v2/maps/sdk.js?appkey=0931a58c3dfb72aa9861cc8290a86acd">
</script>

<script th:inline="javascript">
    window.__PM_HOSPITAL_LIST__ = /*[[${hospitalPage.content}]]*/ [];
</script>

<script th:src="@{/js/hospital/hospitalList.js}"></script>

</body>
</html>
