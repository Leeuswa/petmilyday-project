<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>동물병원 목록</title>
    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .hospital-card {
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            border-radius: 12px;
        }
        .hospital-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .emergency-badge {
            background-color: #ff4757;
        }
        .rating-badge {
            background-color: #ffa502;
        }
        .search-box {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }
        .page-title {
            color: #2d3436;
            font-weight: 700;
        }
        .department-tag {
            background-color: #e8f4fd;
            color: #2980b9;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 0.8rem;
            margin-right: 4px;
        }
    </style>
</head>
<body>

<div class="container py-5">

    <!-- 타이틀 -->
    <div class="mb-4">
        <h2 class="page-title">
            <i class="bi bi-hospital"></i> 동물병원 찾기
        </h2>
        <p class="text-muted">내 반려동물에게 맞는 병원을 찾아보세요</p>
    </div>

    <!-- 검색 필터 -->
    <div class="search-box">
        <form th:action="@{/hospital/list}" method="get">
            <div class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label fw-bold">병원명 검색</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control" name="keyword"
                               placeholder="병원명을 입력하세요"
                               th:value="${param.keyword}"/>
                    </div>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">진료과</label>
                    <select class="form-select" name="department">
                        <option value="">전체</option>
                        <option value="내과">내과</option>
                        <option value="외과">외과</option>
                        <option value="피부과">피부과</option>
                        <option value="치과">치과</option>
                        <option value="안과">안과</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <div class="form-check form-switch mt-4">
                        <input class="form-check-input" type="checkbox"
                               name="isEmergency" value="true" id="emergencySwitch"/>
                        <label class="form-check-label fw-bold" for="emergencySwitch">
                            <i class="bi bi-alarm text-danger"></i> 24시 응급만 보기
                        </label>
                    </div>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-search"></i> 검색
                    </button>
                </div>
            </div>
        </form>
    </div>

    <!-- 병원 목록 -->
    <div class="row g-4">

        <!-- 데이터 없을 때 -->
        <div class="col-12 text-center py-5" th:if="${#lists.isEmpty(hospitalList)}">
            <i class="bi bi-emoji-frown" style="font-size: 3rem; color: #b2bec3;"></i>
            <p class="mt-3 text-muted">검색 결과가 없습니다.</p>
        </div>

        <!-- 병원 카드 -->
        <div class="col-md-4" th:each="hospital : ${hospitalList}">
            <div class="card hospital-card h-100 shadow-sm">
                <div class="card-body p-4">
                    <!-- 병원명 + 응급 뱃지 -->
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title fw-bold mb-0" th:text="${hospital.name}"></h5>
                        <span class="badge emergency-badge text-white"
                              th:if="${hospital.isEmergency}">
                            <i class="bi bi-alarm"></i> 24시
                        </span>
                    </div>

                    <!-- 주소 -->
                    <p class="text-muted small mb-2">
                        <i class="bi bi-geo-alt"></i>
                        <span th:text="${hospital.address}"></span>
                    </p>

                    <!-- 전화번호 -->
                    <p class="text-muted small mb-3">
                        <i class="bi bi-telephone"></i>
                        <span th:text="${hospital.phone}"></span>
                    </p>

                    <!-- 진료과 태그 -->
                    <div class="mb-3">
                        <span class="department-tag"
                              th:each="dept : ${#strings.arraySplit(hospital.department, ',')}"
                              th:text="${dept}">
                        </span>
                    </div>

                    <!-- 평점 + 상세보기 -->
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="badge rating-badge text-white">
                            <i class="bi bi-star-fill"></i>
                            <span th:text="${hospital.rating}"></span>
                        </span>
                        <a th:href="@{/hospital/{id}(id=${hospital.id})}"
                           class="btn btn-outline-primary btn-sm">
                            상세보기 <i class="bi bi-arrow-right"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
