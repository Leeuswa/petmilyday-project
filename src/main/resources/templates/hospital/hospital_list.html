<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>동물병원 목록</title>

    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6fb;
            color: #111827;
        }

        .hospital-wrap {
            max-width: 1180px;
            margin: 0 auto;
        }

        .page-hero {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 24px;
        }

        .page-title {
            margin: 0;
            color: #111827;
            font-weight: 900;
            font-size: 30px;
            letter-spacing: -0.7px;
        }

        .page-desc {
            margin-top: 8px;
            color: #6b7280;
            font-size: 14px;
        }

        .summary-card {
            min-width: 160px;
            padding: 16px 20px;
            border-radius: 18px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #ffffff;
            text-align: right;
            box-shadow: 0 14px 28px rgba(37, 99, 235, 0.25);
        }

        .summary-card span {
            display: block;
            font-size: 13px;
            opacity: 0.85;
            margin-bottom: 4px;
        }

        .summary-card strong {
            font-size: 26px;
            font-weight: 900;
        }

        .search-box {
            background: #ffffff;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            margin-bottom: 24px;
            border: 1px solid #e5e7eb;
        }

        .search-box label {
            color: #374151;
            font-size: 14px;
        }

        .form-control,
        .form-select,
        .input-group-text {
            border-radius: 11px;
        }

        .input-group .input-group-text {
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
            background: #f9fafb;
        }

        .input-group .form-control {
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }

        .map-card {
            border: 0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            margin-bottom: 28px;
        }

        #map {
            width: 100%;
            height: 460px;
        }

        .list-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .list-head h4 {
            margin: 0;
            font-weight: 900;
            color: #111827;
        }

        .list-head span {
            color: #6b7280;
            font-size: 14px;
            font-weight: 700;
        }

        .hospital-card {
            height: 100%;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        }

        .hospital-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 14px 34px rgba(15, 23, 42, 0.12);
        }

        .hospital-card .card-body {
            padding: 24px;
        }

        .hospital-name {
            font-size: 18px;
            font-weight: 900;
            color: #111827;
            line-height: 1.35;
        }

        .emergency-badge {
            background: #ef4444;
            border-radius: 999px;
            padding: 6px 9px;
            font-weight: 800;
        }

        .rating-badge {
            background: #f59e0b;
            border-radius: 999px;
            padding: 6px 10px;
            font-weight: 900;
        }

        .info-line {
            color: #6b7280;
            font-size: 13px;
            line-height: 1.45;
            min-height: 20px;
        }

        .info-line i {
            color: #2563eb;
            margin-right: 4px;
        }

        .department-area {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            min-height: 32px;
        }

        .department-tag {
            background: #eff6ff;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
            border-radius: 999px;
            padding: 5px 10px;
            font-size: 12px;
            font-weight: 800;
        }

        .card-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-top: 18px;
        }

        .card-actions .btn {
            border-radius: 10px;
            font-weight: 800;
            font-size: 13px;
        }

        .empty-box {
            background: #ffffff;
            border: 1px dashed #cbd5e1;
            border-radius: 20px;
            padding: 54px 20px;
            color: #6b7280;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
        }

        .empty-box i {
            font-size: 3rem;
            color: #9ca3af;
        }

        .pagination-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 7px;
            margin-top: 30px;
        }

        .page-btn {
            min-width: 40px;
            height: 40px;
            padding: 0 14px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            background: #ffffff;
            color: #374151;
            text-decoration: none;
            font-size: 14px;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .page-btn:hover {
            background: #eff6ff;
            border-color: #2563eb;
            color: #2563eb;
            transform: translateY(-1px);
        }

        .page-btn.active {
            background: #2563eb;
            border-color: #2563eb;
            color: #ffffff;
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
        }

        .page-btn.disabled {
            pointer-events: none;
            opacity: 0.4;
            background: #f9fafb;
        }

        @media (max-width: 768px) {
            .page-hero {
                flex-direction: column;
                align-items: stretch;
            }

            .summary-card {
                text-align: left;
            }

            #map {
                height: 360px;
            }

            .card-actions {
                flex-direction: column;
                align-items: stretch;
            }

            .card-actions .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">
    <div class="hospital-wrap">

        <div class="page-hero">
            <div>
                <h2 class="page-title">
                    <i class="bi bi-hospital"></i>
                    동물병원 찾기
                </h2>

                <p class="page-desc">
                    내 반려동물에게 맞는 병원을 검색하고 예약할 수 있습니다.
                </p>
            </div>

            <div class="summary-card">
                <span>검색 결과</span>
                <strong>
                    <span th:text="${hospitalPage.totalElements}">0</span>개
                </strong>
            </div>
        </div>

        <div class="search-box">
            <form th:action="@{/hospital/list}" method="get">
                <div class="row g-3 align-items-end">

                    <div class="col-md-4">
                        <label class="form-label fw-bold">
                            병원명 검색
                        </label>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-search"></i>
                            </span>

                            <input type="text"
                                   class="form-control"
                                   name="keyword"
                                   placeholder="병원명을 입력하세요"
                                   th:value="${searchDTO.keyword}">
                        </div>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label fw-bold">
                            진료과
                        </label>

                        <select class="form-select" name="department">
                            <option value=""
                                    th:selected="${searchDTO.department == null || searchDTO.department == ''}">
                                전체
                            </option>
                            <option value="내과"
                                    th:selected="${searchDTO.department == '내과'}">
                                내과
                            </option>
                            <option value="외과"
                                    th:selected="${searchDTO.department == '외과'}">
                                외과
                            </option>
                            <option value="피부과"
                                    th:selected="${searchDTO.department == '피부과'}">
                                피부과
                            </option>
                            <option value="치과"
                                    th:selected="${searchDTO.department == '치과'}">
                                치과
                            </option>
                            <option value="안과"
                                    th:selected="${searchDTO.department == '안과'}">
                                안과
                            </option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <div class="form-check form-switch mt-4">
                            <input class="form-check-input"
                                   type="checkbox"
                                   name="isEmergency"
                                   value="true"
                                   id="emergencySwitch"
                                   th:checked="${searchDTO.isEmergency == true}">

                            <label class="form-check-label fw-bold"
                                   for="emergencySwitch">
                                <i class="bi bi-alarm text-danger"></i>
                                24시 응급만 보기
                            </label>
                        </div>
                    </div>

                    <div class="col-md-2">
                        <button type="submit"
                                class="btn btn-primary w-100 fw-bold">
                            <i class="bi bi-search"></i>
                            검색
                        </button>
                    </div>

                </div>
            </form>
        </div>

        <div class="card map-card">
            <div class="card-body p-0">
                <div id="map"></div>
            </div>
        </div>

        <div class="list-head">
            <div>
                <h4>병원 목록</h4>
            </div>

            <span>
                페이지 <strong th:text="${currentPage + 1}">1</strong>
                /
                <strong th:text="${hospitalPage.totalPages == 0 ? 1 : hospitalPage.totalPages}">1</strong>
            </span>
        </div>

        <div class="row g-4">

            <div class="col-12 text-center"
                 th:if="${#lists.isEmpty(hospitalPage.content)}">
                <div class="empty-box">
                    <i class="bi bi-emoji-frown"></i>
                    <p class="mt-3 mb-0 fw-bold">
                        검색 결과가 없습니다.
                    </p>
                </div>
            </div>

            <div class="col-md-4"
                 th:each="hospital : ${hospitalPage.content}">

                <div class="card hospital-card">

                    <div class="card-body">

                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <h5 class="hospital-name mb-0"
                                th:text="${hospital.name}">
                                병원명
                            </h5>

                            <span class="badge emergency-badge text-white"
                                  th:if="${hospital.isEmergency}">
                                <i class="bi bi-alarm"></i>
                                24시
                            </span>
                        </div>

                        <p class="info-line mb-2">
                            <i class="bi bi-geo-alt"></i>
                            <span th:text="${hospital.address}">주소</span>
                        </p>

                        <p class="info-line mb-3">
                            <i class="bi bi-telephone"></i>
                            <span th:text="${hospital.phone}">전화번호</span>
                        </p>

                        <div class="department-area mb-3">
                            <span class="department-tag"
                                  th:each="dept : ${#strings.arraySplit(hospital.department, ',')}"
                                  th:text="${dept}">
                                진료과
                            </span>
                        </div>

                        <div class="card-actions">

                            <span class="badge rating-badge text-white">
                                <i class="bi bi-star-fill"></i>
                                <span th:text="${hospital.rating}">0.0</span>
                            </span>

                            <div class="d-flex gap-2">
                                <a th:href="@{/reservation/register(hospitalId=${hospital.id})}"
                                   class="btn btn-primary btn-sm">
                                    <i class="bi bi-calendar-check"></i>
                                    예약하기
                                </a>

                                <a th:href="@{/hospital/{id}(id=${hospital.id})}"
                                   class="btn btn-outline-primary btn-sm">
                                    상세보기
                                    <i class="bi bi-arrow-right"></i>
                                </a>
                            </div>

                        </div>

                    </div>
                </div>
            </div>
        </div>

        <div class="pagination-wrap" th:if="${hospitalPage.totalPages > 1}">

            <a class="page-btn"
               th:classappend="${hospitalPage.first} ? ' disabled' : ''"
               th:href="${hospitalPage.first} ? '#' : @{/hospital/list(
                    page=${currentPage - 1},
                    keyword=${searchDTO.keyword},
                    department=${searchDTO.department},
                    isEmergency=${searchDTO.isEmergency}
               )}">
                이전
            </a>

            <a class="page-btn"
               th:each="pageNum : ${#numbers.sequence(0, hospitalPage.totalPages - 1)}"
               th:href="@{/hospital/list(
                    page=${pageNum},
                    keyword=${searchDTO.keyword},
                    department=${searchDTO.department},
                    isEmergency=${searchDTO.isEmergency}
               )}"
               th:classappend="${pageNum == currentPage} ? ' active' : ''"
               th:text="${pageNum + 1}">
                1
            </a>

            <a class="page-btn"
               th:classappend="${hospitalPage.last} ? ' disabled' : ''"
               th:href="${hospitalPage.last} ? '#' : @{/hospital/list(
                    page=${currentPage + 1},
                    keyword=${searchDTO.keyword},
                    department=${searchDTO.department},
                    isEmergency=${searchDTO.isEmergency}
               )}">
                다음
            </a>

        </div>

    </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>

<script
        type="text/javascript"
        src="//dapi.kakao.com/v2/maps/sdk.js?appkey=0931a58c3dfb72aa9861cc8290a86acd">
</script>

<script th:inline="javascript">

    const hospitalList = [[${hospitalPage.content}]];

    const mapContainer = document.getElementById('map');

    const mapOption = {
        center: new kakao.maps.LatLng(
            37.5665,
            126.9780
        ),
        level: 5
    };

    const map = new kakao.maps.Map(
        mapContainer,
        mapOption
    );

    const bounds = new kakao.maps.LatLngBounds();

    hospitalList.forEach(hospital => {

        const position = new kakao.maps.LatLng(
            hospital.latitude,
            hospital.longitude
        );

        const marker = new kakao.maps.Marker({
            map: map,
            position: position
        });

        bounds.extend(position);

        const infowindow = new kakao.maps.InfoWindow({
            content:
                `
                <div style="
                    padding:10px;
                    font-size:13px;
                    width:190px;
                ">
                    <strong>${hospital.name}</strong><br>
                    ${hospital.address}
                </div>
                `
        });

        kakao.maps.event.addListener(
            marker,
            'mouseover',
            function () {
                infowindow.open(map, marker);
            }
        );

        kakao.maps.event.addListener(
            marker,
            'mouseout',
            function () {
                infowindow.close();
            }
        );

        kakao.maps.event.addListener(
            marker,
            'click',
            function () {
                location.href = `/hospital/${hospital.id}`;
            }
        );
    });

    if (hospitalList.length > 0) {
        map.setBounds(bounds);
    }

</script>

</body>
</html>
