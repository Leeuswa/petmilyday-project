<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>진료기록</title>
    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .record-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }
        .record-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>


<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">
            <i class="bi bi-clipboard2-pulse"></i> 진료기록
        </h4>
        <a th:href="@{/reservation/list}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> 예약 목록
        </a>
    </div>

    <!-- 데이터 없을 때 -->
    <div class="text-center py-5" th:if="${#lists.isEmpty(medicalRecordList)}">
        <i class="bi bi-clipboard-x" style="font-size: 3rem; color: #b2bec3;"></i>
        <p class="mt-3 text-muted">진료기록이 없습니다.</p>
    </div>

    <!-- 진료기록 목록 -->
    <div class="row g-3">
        <div class="col-12" th:each="record : ${medicalRecordList}">
            <div class="card record-card p-4">

                <!-- 병원명 + 날짜 -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="fw-bold mb-0" th:text="${record.hospitalName}"></h5>
                    <span class="text-muted small">
                        <i class="bi bi-calendar3"></i>
                        <span th:text="${record.visitDate}"></span>
                    </span>
                </div>

                <hr class="my-2">

                <!-- 진단 내용 -->
                <div class="mb-2">
                    <p class="text-muted small mb-1">
                        <i class="bi bi-clipboard2-pulse"></i> 진단 내용
                    </p>
                    <p class="fw-bold" th:text="${record.diagnosis}"></p>
                </div>

                <!-- 처방 내용 -->
                <div class="mb-2" th:if="${record.prescription != null}">
                    <p class="text-muted small mb-1">
                        <i class="bi bi-capsule"></i> 처방 내용
                    </p>
                    <p th:text="${record.prescription}"></p>
                </div>

                <!-- PDF 다운로드 -->
                <div th:if="${record.pdfUrl != null}">
                    <a th:href="${record.pdfUrl}" class="btn btn-outline-primary btn-sm" target="_blank">
                        <i class="bi bi-file-earmark-pdf"></i> 처방전 PDF 다운로드
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
