<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>petmilyday - AI 자가진단</title>

    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sora', sans-serif;
        }

        body {
            background: #f0f2f7;
            color: #0d1433;
            font-size: 14px;
        }

        .main-container {
            max-width: 1000px;
            margin: 40px auto;
        }

        .page-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .page-desc {
            color: #64748b;
            margin-bottom: 22px;
        }

        .diagnosis-card {
            background: #ffffff;
            border: 1px solid #d0d5e8;
            border-radius: 14px;
            padding: 28px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .form-select,
        .form-control {
            width: 100%;
            border: 1px solid #d0d5e8;
            border-radius: 10px;
            padding: 13px;
            font-size: 14px;
            background: white;
        }

        textarea.form-control {
            min-height: 150px;
            resize: none;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .btn-submit {
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 14px;
            background: #3d58e0;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-submit:hover {
            background: #2b44cc;
        }

        .sub-box {
            margin-top: 22px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 18px;
            color: #64748b;
            line-height: 1.7;
        }
    </style>
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="main-container">

    <h2 class="page-title">AI 자가진단</h2>
    <p class="page-desc">반려동물의 증상을 입력하면 Ollama 기반 AI가 참고용 진단 결과를 제공합니다.</p>

    <div class="diagnosis-card">

        <form th:action="@{/diagnosis}"
              method="post"
              enctype="multipart/form-data">

            <div class="form-group">
                <label class="form-label">반려동물 선택</label>

                <select class="form-select"
                        name="petId"
                        required>
                    <option value="">선택하세요</option>

                    <option th:each="pet : ${pets}"
                            th:value="${pet.id}"
                            th:text="${pet.name}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">증상 입력</label>

                <textarea class="form-control"
                          name="symptomText"
                          placeholder="예: 피부가 빨갛고 계속 긁어요. 밥을 잘 안 먹고 기운이 없어요."></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">증상 사진 업로드</label>

                <input type="file"
                       class="form-control"
                       name="image"
                       accept="image/*">
            </div>

            <button type="submit"
                    class="btn-submit">
                AI 진단 요청
            </button>

        </form>

        <div class="sub-box">
            AI 진단 결과는 참고용이며 실제 진단을 대체하지 않습니다.
            증상이 심하거나 지속될 경우 반드시 동물병원 진료를 권장합니다.
        </div>

    </div>

</div>

</body>
</html>
