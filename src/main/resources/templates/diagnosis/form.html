<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>petmilyday - AI 자가진단</title>

    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/diagnosis/diagnosis-form.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="main-container">

    <div class="ai-hero">
        <h2>AI 자가진단</h2>
        <p>반려동물의 증상을 입력하면 Ollama 기반 AI가 참고용 진단 결과를 제공합니다.</p>
    </div>

    <div class="feature-grid">

        <div class="feature-card">
            <div class="feature-icon">🩺</div>
            <div class="feature-title">빠른 증상 분석</div>
            <div class="feature-desc">
                입력한 증상을 바탕으로 참고용 진단 결과를 제공합니다.
            </div>
        </div>

        <div class="feature-card">
            <div class="feature-icon">🐾</div>
            <div class="feature-title">반려동물 정보 반영</div>
            <div class="feature-desc">
                선택한 반려동물 정보를 기준으로 증상을 분석합니다.
            </div>
        </div>

        <div class="feature-card">
            <div class="feature-icon">📋</div>
            <div class="feature-title">진단 이력 저장</div>
            <div class="feature-desc">
                진단 결과를 저장하고 나중에 다시 확인할 수 있습니다.
            </div>
        </div>

    </div>

    <div class="diagnosis-card">

        <form th:action="@{/diagnosis}"
              method="post"
              enctype="multipart/form-data"
              id="diagnosisForm">

            <div th:if="${error != null}"
                 class="error-box"
                 th:text="${error}">
            </div>

            <div class="form-group">
                <label class="form-label">
                    반려동물 선택
                </label>

                <select class="form-select"
                        name="petId"
                        required>
                    <option value="">
                        선택하세요
                    </option>

                    <option th:each="pet : ${pets}"
                            th:value="${pet.id}"
                            th:text="${pet.name}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">
                    증상 입력
                </label>

                <textarea class="form-control"
                          name="symptomText"
                          maxlength="500"
                          required
                          placeholder="예: 피부가 빨갛고 계속 긁어요. 밥을 잘 안 먹고 기운이 없어요."></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">
                    증상 사진 업로드
                </label>

                <input type="file"
                       class="form-control"
                       name="image"
                       id="imageInput"
                       accept="image/*">

                <div class="file-help"
                     id="imageHelp">
                    증상 부위 사진이 있으면 함께 업로드할 수 있습니다.
                </div>
            </div>

            <button type="submit"
                    class="btn-submit"
                    id="diagnosisSubmitBtn">
                AI 진단 요청
            </button>

        </form>

        <div class="sub-box">
            AI 진단 결과는 참고용이며 실제 진단을 대체하지 않습니다.
            증상이 심하거나 지속될 경우 반드시 동물병원 진료를 권장합니다.
        </div>

    </div>

</div>

<script th:src="@{/js/diagnosis/diagnosis-form.js}"></script>

</body>
</html>
