<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>petmilyday - AI 진단 결과</title>

    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/diagnosis/diagnosis-result.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="main-container">

    <div class="result-hero">
        <h2>AI 진단 결과</h2>
        <p>입력한 증상을 바탕으로 참고용 진단 결과를 정리했습니다.</p>
    </div>

    <div class="result-card">

        <div class="pet-box">
            <div class="section-title">
                반려동물 정보
            </div>

            <div class="pet-info">
                <strong th:text="${result.pet.name}">
                    이름
                </strong>

                <span th:text="${' / ' + result.pet.species}">
                    / 종류
                </span>

                <span th:text="${' / ' + result.pet.breed}">
                    / 품종
                </span>
            </div>
        </div>

        <div class="result-summary">

            <div class="result-item">
                <span class="result-label">의심 질환</span>

                <span class="result-value"
                      th:text="${result.resultDisease}">
                    질환명
                </span>
            </div>

            <div class="result-item">
                <span class="result-label">심각도</span>

                <span class="severity-pill"
                      th:classappend="${result.resultSeverity == 'LOW'} ? ' severity-low' : (${result.resultSeverity == 'MEDIUM'} ? ' severity-medium' : ' severity-high')"
                      th:text="${result.resultSeverity == 'LOW'} ? '낮음' : (${result.resultSeverity == 'MEDIUM'} ? '보통' : '높음')">
                    보통
                </span>
            </div>

            <div class="result-item">
                <span class="result-label">진단일</span>

                <span class="result-value"
                      th:text="${#temporals.format(result.createdAt, 'yyyy-MM-dd HH:mm')}">
                    날짜
                </span>
            </div>

            <div class="result-item">
                <span class="result-label">입력 증상</span>

                <span class="symptom-text"
                      th:text="${result.symptomText}">
                    입력 증상
                </span>
            </div>

        </div>

        <div class="image-box"
             th:if="${result.imageUrl != null}">

            <div class="section-title">
                업로드 사진
            </div>

            <img th:src="${result.imageUrl}"
                 class="result-image"
                 alt="진단 이미지">

        </div>

        <div class="recommend-box">
            <strong>권고사항</strong>

            <div th:text="${result.resultRecommend}">
                권고사항
            </div>
        </div>

        <div class="warning-box">
            ※ 본 결과는 AI 기반 참고용 정보이며 실제 수의사의 진료를 대체할 수 없습니다.
            증상이 지속되거나 심각도가 높을 경우 동물병원 방문을 권장합니다.
        </div>

        <div class="btn-group">

            <a href="/diagnosis/history"
               class="btn btn-primary result-move-btn">
                진단 이력 보기
            </a>

            <a th:if="${result.resultSeverity == 'HIGH' || result.resultSeverity == 'MEDIUM'}"
               href="/hospital/list"
               class="btn btn-success result-move-btn">
                병원 예약
            </a>

            <a href="/diagnosis"
               class="btn btn-secondary result-move-btn">
                다시 진단하기
            </a>

        </div>

    </div>

</div>

<script th:src="@{/js/diagnosis/diagnosis-result.js}"></script>

</body>
</html>
