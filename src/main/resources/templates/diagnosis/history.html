<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>petmilyday - AI 진단 이력</title>

    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/diagnosis/diagnosis-history.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="main-container">

    <div class="history-hero">
        <h2>AI 진단 이력</h2>
        <p>이전에 진행한 반려동물 자가진단 결과를 확인할 수 있습니다.</p>
    </div>

    <div class="top-area">
        <div></div>

        <a href="/diagnosis"
           class="btn-diagnosis">
            다시 진단
        </a>
    </div>

    <div th:if="${histories == null or histories.content.isEmpty()}"
         class="empty-box">

        <div class="empty-icon">
            📋
        </div>

        <h3>
            진단 이력이 없습니다.
        </h3>

        <p class="empty-desc">
            반려동물 증상을 입력하고 AI 자가진단을 진행해보세요.
        </p>

    </div>

    <div th:if="${histories != null and not histories.content.isEmpty()}">

        <div th:each="history : ${histories.content}"
             class="history-card">

            <div class="history-top">

                <div>
                    <div class="pet-name">
                        <span th:text="${history.pet.name + ' (' + history.pet.species + ')'}">
                            반려동물
                        </span>
                    </div>

                    <div class="date"
                         th:text="${#temporals.format(history.createdAt,'yyyy-MM-dd HH:mm')}">
                        날짜
                    </div>
                </div>

                <span class="severity-badge"
                      th:classappend="${history.resultSeverity == 'LOW'} ? ' severity-low' : (${history.resultSeverity == 'MEDIUM'} ? ' severity-medium' : ' severity-high')"
                      th:text="${history.resultSeverity == 'LOW'} ? '낮음' : (${history.resultSeverity == 'MEDIUM'} ? '보통' : '높음')">
                    심각도
                </span>

            </div>

            <div class="symptom">
                <strong>입력 증상</strong>

                <div th:text="${history.symptomText}">
                    입력 증상
                </div>
            </div>

            <img th:if="${history.imageUrl != null}"
                 th:src="${history.imageUrl}"
                 class="history-img">

            <div class="result-summary">

                <span class="disease-label">
                    의심 질환
                </span>

                <span class="disease-value"
                      th:text="${history.resultDisease}">
                    질환
                </span>

            </div>

            <div class="recommend"
                 th:text="${history.resultRecommend}">
                권고사항
            </div>

        </div>

        <nav th:if="${histories.totalPages > 0}">
            <ul class="pagination">

                <li class="page-item"
                    th:classappend="${histories.first} ? 'disabled'">

                    <a th:href="@{/diagnosis/history(page=${histories.number - 1})}">
                        이전
                    </a>

                </li>

                <li class="page-item"
                    th:each="i : ${#numbers.sequence(startPage, endPage)}"
                    th:classappend="${i == currentPage} ? 'active'">

                    <a th:href="@{/diagnosis/history(page=${i})}"
                       th:text="${i + 1}">
                    </a>

                </li>

                <li class="page-item"
                    th:classappend="${histories.last} ? 'disabled'">

                    <a th:href="@{/diagnosis/history(page=${histories.number + 1})}">
                        다음
                    </a>

                </li>

            </ul>
        </nav>

    </div>

</div>

<script th:src="@{/js/diagnosis/diagnosis-history.js}"></script>

</body>
</html>
