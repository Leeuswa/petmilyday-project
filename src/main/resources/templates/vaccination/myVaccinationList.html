<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>내 동물 예방접종</title>

    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6fb;
            color: #111827;
        }

        .page-wrap {
            max-width: 1040px;
            margin: 0 auto;
        }

        .title-card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 22px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            padding: 28px;
            margin-bottom: 24px;
        }

        .title-card h3 {
            margin: 0;
            font-size: 30px;
            font-weight: 900;
            letter-spacing: -0.7px;
            color: #111827;
        }

        .title-card p {
            margin: 8px 0 0;
            color: #6b7280;
            font-size: 14px;
            font-weight: 600;
        }

        .summary-card {
            min-width: 160px;
            padding: 16px 20px;
            border-radius: 18px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #ffffff;
            text-align: right;
            box-shadow: 0 14px 28px rgba(37, 99, 235, 0.25);
        }

        .summary-card span {
            display: block;
            font-size: 13px;
            opacity: 0.85;
            margin-bottom: 4px;
        }

        .summary-card strong {
            font-size: 26px;
            font-weight: 900;
        }

        .vaccination-card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 22px;
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.07);
            padding: 24px;
            transition: transform 0.16s ease, box-shadow 0.16s ease;
        }

        .vaccination-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 36px rgba(15, 23, 42, 0.12);
        }

        .vaccine-title {
            margin: 0;
            color: #111827;
            font-size: 20px;
            font-weight: 900;
        }

        .pet-name {
            color: #2563eb;
            font-weight: 900;
        }

        .species-text {
            color: #6b7280;
            font-weight: 700;
        }

        .badge-vaccine {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 12px;
            border-radius: 999px;
            background: #dcfce7;
            color: #15803d;
            font-size: 13px;
            font-weight: 900;
        }

        .badge-vaccine::before {
            content: "";
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: currentColor;
        }

        .info-box {
            margin-top: 18px;
            padding: 16px;
            border-radius: 16px;
            background: #f8fafc;
            border: 1px solid #e5e7eb;
        }

        .info-label {
            color: #6b7280;
            font-size: 13px;
            margin-bottom: 5px;
            font-weight: 800;
        }

        .info-value {
            color: #111827;
            font-weight: 900;
        }

        .record-number {
            color: #6b7280;
            font-size: 13px;
            font-weight: 800;
        }

        .btn-detail {
            border-radius: 12px;
            font-weight: 800;
            padding: 8px 13px;
        }

        .empty-card {
            background: #ffffff;
            border: 1px dashed #cbd5e1;
            border-radius: 22px;
            box-shadow: 0 10px 26px rgba(15, 23, 42, 0.05);
            padding: 58px 20px;
            text-align: center;
            color: #6b7280;
        }

        .empty-icon {
            font-size: 48px;
            color: #9ca3af;
            margin-bottom: 12px;
        }

        .pagination-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 7px;
            margin-top: 30px;
        }

        .page-btn {
            min-width: 40px;
            height: 40px;
            padding: 0 14px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            background: #ffffff;
            color: #374151;
            text-decoration: none;
            font-size: 14px;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .page-btn:hover {
            background: #eff6ff;
            border-color: #2563eb;
            color: #2563eb;
            transform: translateY(-1px);
        }

        .page-btn.active {
            background: #2563eb;
            border-color: #2563eb;
            color: #ffffff;
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
        }

        .page-btn.disabled {
            pointer-events: none;
            opacity: 0.4;
            background: #f9fafb;
        }

        @media (max-width: 768px) {
            .title-card > div {
                flex-direction: column;
                align-items: stretch !important;
            }

            .summary-card {
                text-align: left;
            }
        }
    </style>
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">
    <div class="page-wrap">

        <!-- 상단 제목 -->
        <div class="title-card">
            <div class="d-flex justify-content-between align-items-center gap-3">
                <div>
                    <h3>
                        <i class="bi bi-shield-plus"></i>
                        내 동물 예방접종
                    </h3>

                    <p>
                        등록된 반려동물의 예방접종 기록과 다음 접종 예정일을 확인할 수 있습니다.
                    </p>
                </div>

                <div class="summary-card">
                    <span>전체 접종 기록</span>
                    <strong>
                        <span th:text="${vaccinationPage.totalElements}">0</span>건
                    </strong>
                </div>
            </div>
        </div>

        <!-- 예방접종 기록이 없을 때 -->
        <div th:if="${#lists.isEmpty(vaccinationPage.content)}"
             class="empty-card">

            <div class="empty-icon">
                <i class="bi bi-shield-x"></i>
            </div>

            <h5 class="fw-bold mb-2">
                예방접종 기록이 없습니다.
            </h5>

            <p class="mb-3">
                등록된 예방접종 기록이 생기면 이곳에서 확인할 수 있습니다.
            </p>

            <a th:href="@{/member/mypage}"
               class="btn btn-primary btn-detail">
                마이페이지로 돌아가기
            </a>
        </div>

        <!-- 예방접종 목록 -->
        <div th:each="vaccination : ${vaccinationPage.content}"
             class="vaccination-card mb-3">

            <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                <div>
                    <h5 class="vaccine-title">
                        <i class="bi bi-shield-check"></i>
                        <span th:text="${vaccination.vaccineName}">
                            종합백신
                        </span>
                    </h5>

                    <div class="mt-2">
                        반려동물:
                        <span class="pet-name"
                              th:text="${vaccination.petName}">
                            초코
                        </span>

                        <span class="species-text"
                              th:if="${vaccination.species != null}">
                            (<span th:text="${vaccination.species}">강아지</span>)
                        </span>
                    </div>
                </div>

                <span class="badge-vaccine">
                    접종 완료
                </span>
            </div>

            <div class="info-box">
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="info-label">
                            <i class="bi bi-calendar-check"></i>
                            접종일
                        </div>

                        <div class="info-value"
                             th:text="${#temporals.format(vaccination.vaccinatedDate, 'yyyy-MM-dd')}">
                            2026-05-10
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="info-label">
                            <i class="bi bi-calendar-plus"></i>
                            다음 접종 예정일
                        </div>

                        <div class="info-value"
                             th:text="${#temporals.format(vaccination.nextDate, 'yyyy-MM-dd')}">
                            2027-05-10
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mt-3">
                <span class="record-number">
                    접종 기록 번호:
                    <span th:text="${vaccination.id}">1</span>
                </span>

                <a th:href="@{/member/mypage}"
                   class="btn btn-outline-primary btn-sm btn-detail">
                    <i class="bi bi-person"></i>
                    마이페이지
                </a>
            </div>
        </div>

        <!-- 페이징 -->
        <div class="pagination-wrap" th:if="${vaccinationPage.totalPages > 1}">

            <a class="page-btn"
               th:classappend="${vaccinationPage.first} ? ' disabled' : ''"
               th:href="${vaccinationPage.first} ? '#' : @{/vaccination/myVaccination(page=${currentPage - 1})}">
                이전
            </a>

            <a class="page-btn"
               th:each="pageNum : ${#numbers.sequence(0, vaccinationPage.totalPages - 1)}"
               th:href="@{/vaccination/myVaccination(page=${pageNum})}"
               th:classappend="${pageNum == currentPage} ? ' active' : ''"
               th:text="${pageNum + 1}">
                1
            </a>

            <a class="page-btn"
               th:classappend="${vaccinationPage.last} ? ' disabled' : ''"
               th:href="${vaccinationPage.last} ? '#' : @{/vaccination/myVaccination(page=${currentPage + 1})}">
                다음
            </a>

        </div>

        <!-- 하단 버튼 -->
        <div class="mt-4 d-flex gap-2">
            <a th:href="@{/reservation/medical-records}"
               class="btn btn-outline-secondary btn-detail">
                <i class="bi bi-clipboard2-pulse"></i>
                내 동물 진료기록
            </a>

            <a th:href="@{/hospital/list}"
               class="btn btn-primary btn-detail">
                <i class="bi bi-hospital"></i>
                병원 예약하기
            </a>
        </div>

    </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
