<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>내 동물 예방접종</title>

    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/common/petmilyTheme.css}">
    <link rel="stylesheet" th:href="@{/css/vaccination/myVaccinationList.css}">
</head>

<body class="pm-page">

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">
    <div class="page-wrap">

        <!-- 상단 제목 -->
        <div class="pm-list-page-header">
            <div>
                <h3>
                    <i class="bi bi-shield-plus"></i>
                    내 동물 예방접종
                </h3>

                <p>
                    등록된 반려동물의 예방접종 기록과 다음 접종 예정일을 확인할 수 있습니다.
                </p>
            </div>

            <div class="pm-list-summary pm-list-summary--sky">
                <span>전체 접종 기록</span>
                <strong>
                    <span th:text="${vaccinationPage.totalElements}">0</span>건
                </strong>
            </div>
        </div>

        <!-- 예방접종 기록이 없을 때 -->
        <div th:if="${#lists.isEmpty(vaccinationPage.content)}"
             class="pm-list-empty">

            <i class="bi bi-shield-x pm-list-empty-icon"></i>

            <h5 class="fw-bold mb-2">
                예방접종 기록이 없습니다.
            </h5>

            <p class="mb-3">
                등록된 예방접종 기록이 생기면 이곳에서 확인할 수 있습니다.
            </p>

            <a th:href="@{/member/mypage}"
               class="btn btn-primary btn-detail">
                마이페이지로 돌아가기
            </a>
        </div>

        <!-- 예방접종 목록 -->
        <div th:each="vaccination : ${vaccinationPage.content}"
             class="pm-list-card mb-3">

            <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                <div>
                    <h5 class="vaccine-title">
                        <i class="bi bi-shield-check"></i>
                        <span th:text="${vaccination.vaccineName}">
                            종합백신
                        </span>
                    </h5>

                    <div class="mt-2">
                        반려동물:
                        <span class="pet-name"
                              th:text="${vaccination.petName}">
                            초코
                        </span>

                        <span class="species-text"
                              th:if="${vaccination.species != null}">
                            (<span th:text="${vaccination.species}">강아지</span>)
                        </span>
                    </div>
                </div>

                <span class="badge-vaccine">
                    접종 완료
                </span>
            </div>

            <div class="info-box">
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="info-label">
                            <i class="bi bi-calendar-check"></i>
                            접종일
                        </div>

                        <div class="info-value"
                             th:text="${#temporals.format(vaccination.vaccinatedDate, 'yyyy-MM-dd')}">
                            2026-05-10
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="info-label">
                            <i class="bi bi-calendar-plus"></i>
                            다음 접종 예정일
                        </div>

                        <div class="info-value"
                             th:text="${#temporals.format(vaccination.nextDate, 'yyyy-MM-dd')}">
                            2027-05-10
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mt-3">
                <span class="record-number">
                    접종 기록 번호:
                    <span th:text="${vaccination.id}">1</span>
                </span>

                <a th:href="@{/member/mypage}"
                   class="btn btn-outline-primary btn-sm btn-detail">
                    <i class="bi bi-person"></i>
                    마이페이지
                </a>
            </div>
        </div>

        <!-- 페이징 -->
        <div class="pm-pagination" th:if="${vaccinationPage.totalPages > 1}">

            <a class="pm-page-btn"
               th:classappend="${vaccinationPage.first} ? ' disabled' : ''"
               th:href="${vaccinationPage.first} ? '#' : @{/vaccination/myVaccination(page=${currentPage - 1})}">
                이전
            </a>

            <a class="pm-page-btn"
               th:each="pageNum : ${#numbers.sequence(0, vaccinationPage.totalPages - 1)}"
               th:href="@{/vaccination/myVaccination(page=${pageNum})}"
               th:classappend="${pageNum == currentPage} ? ' active' : ''"
               th:text="${pageNum + 1}">
                1
            </a>

            <a class="pm-page-btn"
               th:classappend="${vaccinationPage.last} ? ' disabled' : ''"
               th:href="${vaccinationPage.last} ? '#' : @{/vaccination/myVaccination(page=${currentPage + 1})}">
                다음
            </a>

        </div>

        <!-- 하단 버튼 -->
        <div class="mt-4 d-flex gap-2">
            <a th:href="@{/reservation/medical-records}"
               class="btn btn-outline-secondary btn-detail">
                <i class="bi bi-clipboard2-pulse"></i>
                내 동물 진료기록
            </a>

            <a th:href="@{/hospital/list}"
               class="btn btn-primary btn-detail">
                <i class="bi bi-hospital"></i>
                병원 예약하기
            </a>
        </div>

    </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
