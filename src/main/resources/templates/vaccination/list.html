<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>예방접종 기록</title>
    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .vaccine-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }
        .vaccine-card:hover { transform: translateY(-2px); }
        .dday-badge {
            background-color: #ff4757;
            color: white;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.8rem;
        }
        .dday-safe {
            background-color: #2ed573;
            color: white;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">
            <i class="bi bi-shield-plus"></i> 예방접종 기록
        </h4>
        <a th:href="@{/reservation/list}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> 예약 목록
        </a>
    </div>

    <!-- 데이터 없을 때 -->
    <div class="text-center py-5" th:if="${#lists.isEmpty(dtoList)}">
        <i class="bi bi-shield-x" style="font-size: 3rem; color: #b2bec3;"></i>
        <p class="mt-3 text-muted">예방접종 기록이 없습니다.</p>
    </div>

    <!-- 예방접종 목록 -->
    <div class="row g-3">
        <div class="col-md-6" th:each="vaccine : ${dtoList}">
            <div class="card vaccine-card p-4">

                <!-- 백신명 + D-day -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="fw-bold mb-0" th:text="${vaccine.vaccineName}"></h5>
                    <!-- D-7 이내면 빨간 뱃지 -->
                    <span class="dday-badge"
                          th:if="${vaccine.nextDate != null and #temporals.createNow().toLocalDate().until(vaccine.nextDate).days <= 7}">
                        D-<span th:text="${#temporals.createNow().toLocalDate().until(vaccine.nextDate).days}"></span>
                    </span>
                    <span class="dday-safe"
                          th:if="${vaccine.nextDate != null and #temporals.createNow().toLocalDate().until(vaccine.nextDate).days > 7}">
                        여유있음
                    </span>
                </div>

                <hr class="my-2">

                <!-- 반려동물 -->
                <p class="text-muted small mb-1">
                    <i class="bi bi-heart"></i>
                    반려동물: <span class="fw-bold" th:text="${vaccine.petName}"></span>
                </p>

                <!-- 접종일 -->
                <p class="text-muted small mb-1">
                    <i class="bi bi-calendar-check"></i>
                    접종일: <span class="fw-bold" th:text="${vaccine.vaccinatedDate}"></span>
                </p>

                <!-- 다음 접종일 -->
                <p class="text-muted small mb-0">
                    <i class="bi bi-calendar-plus"></i>
                    다음 접종일: <span class="fw-bold" th:text="${vaccine.nextDate}"></span>
                </p>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
