<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>내가 작성한 리뷰</title>

  <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
    }

    .page-wrap {
      max-width: 1000px;
      margin: 0 auto;
    }

    .page-title-card {
      background: #ffffff;
      border: none;
      border-radius: 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 28px;
    }

    .review-card {
      background: #ffffff;
      border: none;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.07);
      padding: 24px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .review-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 26px rgba(0,0,0,0.11);
    }

    .review-top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
    }

    .hospital-name {
      font-weight: 700;
      color: #212529;
      font-size: 1.1rem;
    }

    .review-writer-small {
      color: #868e96;
      font-size: 0.85rem;
      margin-top: 4px;
    }

    .review-date {
      font-size: 0.9rem;
      color: #868e96;
      white-space: nowrap;
    }

    .star-rating {
      color: #ffa502;
      font-size: 1.1rem;
      margin: 10px 0 12px;
    }

    .review-content {
      color: #343a40;
      line-height: 1.6;
      margin-bottom: 18px;
      white-space: pre-line;
    }

    .empty-card {
      background: #ffffff;
      border: none;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.07);
      padding: 50px 20px;
      text-align: center;
      color: #868e96;
    }

    .empty-icon {
      font-size: 42px;
      color: #adb5bd;
      margin-bottom: 12px;
    }

    .badge-review {
      background-color: #eef3ff;
      color: #2b44cc;
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .btn-detail {
      border-radius: 10px;
      font-weight: 600;
    }

    .review-meta {
      color: #868e96;
      font-size: 0.85rem;
    }
  </style>
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">
  <div class="page-wrap">

    <!-- 상단 제목 -->
    <div class="page-title-card mb-4">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h3 class="fw-bold mb-2">
            <i class="bi bi-chat-square-heart"></i>
            내가 작성한 병원 리뷰
          </h3>
          <p class="text-muted mb-0">
            동물병원 진료 후 작성한 리뷰를 한눈에 확인할 수 있습니다.
          </p>
        </div>

        <span class="badge-review">
          총 <span th:text="${#lists.size(reviewList)}">0</span>개
        </span>
      </div>
    </div>

    <!-- 작성한 리뷰가 없을 때 -->
    <div th:if="${#lists.isEmpty(reviewList)}"
         class="empty-card">

      <div class="empty-icon">
        <i class="bi bi-chat-left-text"></i>
      </div>

      <h5 class="fw-bold mb-2">
        작성한 리뷰가 없습니다.
      </h5>

      <p class="mb-3">
        진료가 완료된 예약이 있으면 병원 상세 페이지에서 리뷰를 작성할 수 있습니다.
      </p>

      <a th:href="@{/hospital/list}"
         class="btn btn-primary btn-detail">
        병원 보러가기
      </a>
    </div>

    <!-- 리뷰 목록 -->
    <div th:each="review : ${reviewList}"
         class="review-card mb-3">

      <div class="review-top">
        <div>
          <!-- 병원명 -->
          <div class="hospital-name">
            <i class="bi bi-hospital"></i>
            <span th:text="${review.hospitalName}">병원명</span>
          </div>

          <!-- 작성자 -->
          <div class="review-writer-small">
            작성자:
            <span th:text="${review.memberNickname}">닉네임</span>
          </div>
        </div>

        <!-- 작성일 -->
        <div class="review-date"
             th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd')}">
          2026-06-02
        </div>
      </div>

      <!-- 별점 -->
      <div class="star-rating">
        <i th:each="i : ${#numbers.sequence(1, 5)}"
           th:class="${i <= review.rating} ? 'bi bi-star-fill' : 'bi bi-star'">
        </i>

        <span class="text-muted ms-2"
              th:text="${review.rating + '점'}">
          5점
        </span>
      </div>

      <!-- 리뷰 내용 -->
      <p class="review-content"
         th:text="${review.content}">
        리뷰 내용
      </p>

      <div class="d-flex justify-content-between align-items-center">
        <span class="review-meta">
          리뷰 번호:
          <span th:text="${review.id}">1</span>
        </span>

        <a th:href="@{/hospital/{id}(id=${review.hospitalId})}"
           class="btn btn-outline-primary btn-sm btn-detail">
          <i class="bi bi-hospital"></i>
          병원 상세 보기
        </a>
      </div>
    </div>

  </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
