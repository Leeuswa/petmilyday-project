<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ko">
<head>
    <meta charset="UTF-8">
    <title>병원 리뷰 목록</title>

    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6fb;
            color: #111827;
        }

        .review-wrap {
            max-width: 1040px;
            margin: 0 auto;
        }

        .page-title-card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 22px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            padding: 28px;
            margin-bottom: 24px;
        }

        .page-title-card h3 {
            margin: 0;
            font-size: 30px;
            font-weight: 900;
            letter-spacing: -0.7px;
            color: #111827;
        }

        .page-title-card p {
            margin: 8px 0 0;
            color: #6b7280;
            font-size: 14px;
            font-weight: 600;
        }

        .summary-card {
            min-width: 150px;
            padding: 15px 18px;
            border-radius: 18px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #ffffff;
            text-align: right;
            box-shadow: 0 14px 28px rgba(37, 99, 235, 0.25);
        }

        .summary-card span {
            display: block;
            font-size: 13px;
            opacity: 0.85;
            margin-bottom: 4px;
        }

        .summary-card strong {
            font-size: 25px;
            font-weight: 900;
        }

        .back-btn {
            border-radius: 12px;
            font-weight: 800;
            padding: 9px 13px;
        }

        .review-card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
            padding: 24px;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .review-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 34px rgba(15, 23, 42, 0.12);
        }

        .review-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        .review-writer {
            font-size: 17px;
            font-weight: 900;
            color: #111827;
        }

        .hospital-name {
            margin-top: 5px;
            color: #6b7280;
            font-size: 13px;
            font-weight: 800;
        }

        .review-date {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            background: #f3f4f6;
            color: #4b5563;
            font-size: 13px;
            font-weight: 800;
            white-space: nowrap;
        }

        .star-rating {
            color: #f59e0b;
            font-size: 18px;
            margin: 14px 0 14px;
        }

        .score-text {
            color: #6b7280;
            font-size: 13px;
            font-weight: 800;
            margin-left: 8px;
        }

        .review-content {
            color: #374151;
            line-height: 1.7;
            margin-bottom: 18px;
            white-space: pre-line;
            font-size: 14px;
            font-weight: 600;
        }

        .review-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .review-id {
            color: #6b7280;
            font-size: 13px;
            font-weight: 800;
        }

        .report-btn {
            border-radius: 11px;
            font-size: 13px;
            font-weight: 800;
        }

        .reported-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            background: #fee2e2;
            color: #dc2626;
            font-size: 13px;
            font-weight: 900;
        }

        .empty-card {
            background: #ffffff;
            border: 1px dashed #cbd5e1;
            border-radius: 22px;
            box-shadow: 0 10px 26px rgba(15, 23, 42, 0.05);
            padding: 58px 20px;
            text-align: center;
            color: #6b7280;
        }

        .empty-card i {
            font-size: 46px;
            color: #9ca3af;
            margin-bottom: 12px;
        }

        .pagination-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 7px;
            margin-top: 30px;
        }

        .page-btn {
            min-width: 40px;
            height: 40px;
            padding: 0 14px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            background: #ffffff;
            color: #374151;
            text-decoration: none;
            font-size: 14px;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .page-btn:hover {
            background: #eff6ff;
            border-color: #2563eb;
            color: #2563eb;
            transform: translateY(-1px);
        }

        .page-btn.active {
            background: #2563eb;
            border-color: #2563eb;
            color: #ffffff;
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
        }

        .page-btn.disabled {
            pointer-events: none;
            opacity: 0.4;
            background: #f9fafb;
        }

        .alert {
            border-radius: 14px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .page-title-card > div {
                flex-direction: column;
                align-items: stretch !important;
            }

            .summary-card {
                text-align: left;
            }

            .review-top {
                flex-direction: column;
            }

            .review-date {
                width: fit-content;
            }
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">
    <div class="review-wrap">

        <div class="mb-3">
            <a th:href="@{/hospital/{id}(id=${hospitalId})}"
               class="btn btn-outline-secondary back-btn">
                <i class="bi bi-arrow-left"></i>
                병원 상세로 돌아가기
            </a>
        </div>

        <div th:if="${message}" class="alert alert-success">
            <span th:text="${message}"></span>
        </div>

        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>

        <!-- 상단 제목 -->
        <div class="page-title-card">
            <div class="d-flex justify-content-between align-items-center gap-3">
                <div>
                    <h3>
                        <i class="bi bi-star"></i>
                        병원 리뷰 전체 목록
                    </h3>

                    <p>
                        해당 병원에 작성된 모든 리뷰를 확인할 수 있습니다.
                    </p>
                </div>

                <div class="summary-card">
                    <span>전체 리뷰</span>
                    <strong>
                        <span th:text="${reviewPage.totalElements}">0</span>개
                    </strong>
                </div>
            </div>
        </div>

        <!-- 리뷰 없음 -->
        <div th:if="${#lists.isEmpty(reviewPage.content)}"
             class="empty-card">

            <i class="bi bi-chat-left-text"></i>

            <h5 class="fw-bold mb-2">
                등록된 리뷰가 없습니다.
            </h5>

            <p class="mb-0">
                진료 완료 후 첫 리뷰를 작성해보세요.
            </p>
        </div>

        <!-- 리뷰 목록 -->
        <div th:each="review : ${reviewPage.content}"
             class="review-card mb-3">

            <div class="review-top">
                <div>
                    <div class="review-writer">
                        <i class="bi bi-person-circle"></i>
                        <span th:text="${review.memberNickname}">
                            닉네임
                        </span>
                    </div>

                    <div class="hospital-name"
                         th:if="${review.hospitalName != null}">
                        <i class="bi bi-hospital"></i>
                        <span th:text="${review.hospitalName}">
                            병원명
                        </span>
                    </div>
                </div>

                <div class="review-date"
                     th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd')}">
                    2026-06-18
                </div>
            </div>

            <div class="star-rating">
                <i th:each="i : ${#numbers.sequence(1, 5)}"
                   th:class="${i <= review.rating} ? 'bi bi-star-fill' : 'bi bi-star'">
                </i>

                <span class="score-text"
                      th:text="${review.rating + '점'}">
                    5점
                </span>
            </div>

            <p class="review-content"
               th:text="${review.content}">
                리뷰 내용
            </p>

            <div class="review-footer">
                <span class="review-id">
                    리뷰 번호:
                    <span th:text="${review.id}">1</span>
                </span>

                <div>
                    <form th:if="${review.isReported != true}"
                          th:action="@{/review/report/{reviewId}(reviewId=${review.id})}"
                          method="post"
                          sec:authorize="isAuthenticated()"
                          style="display:inline;">

                        <button type="submit"
                                class="btn btn-outline-danger btn-sm report-btn"
                                onclick="return confirm('이 리뷰를 신고하시겠습니까?');">
                            <i class="bi bi-flag"></i>
                            신고
                        </button>
                    </form>

                    <span th:if="${review.isReported == true}"
                          class="reported-badge">
                        <i class="bi bi-flag-fill"></i>
                        신고됨
                    </span>
                </div>
            </div>
        </div>

        <!-- 페이징 -->
        <div class="pagination-wrap" th:if="${reviewPage.totalPages > 1}">

            <a class="page-btn"
               th:classappend="${reviewPage.first} ? ' disabled' : ''"
               th:href="${reviewPage.first} ? '#' : @{/review/list/{hospitalId}(hospitalId=${hospitalId}, page=${currentPage - 1})}">
                이전
            </a>

            <a class="page-btn"
               th:each="pageNum : ${#numbers.sequence(0, reviewPage.totalPages - 1)}"
               th:href="@{/review/list/{hospitalId}(hospitalId=${hospitalId}, page=${pageNum})}"
               th:classappend="${pageNum == currentPage} ? ' active' : ''"
               th:text="${pageNum + 1}">
                1
            </a>

            <a class="page-btn"
               th:classappend="${reviewPage.last} ? ' disabled' : ''"
               th:href="${reviewPage.last} ? '#' : @{/review/list/{hospitalId}(hospitalId=${hospitalId}, page=${currentPage + 1})}">
                다음
            </a>

        </div>

    </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
