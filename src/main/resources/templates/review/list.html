<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>병원 리뷰</title>
    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .review-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .star-rating {
            color: #ffa502;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">

    <div th:if="${error}"
         class="alert alert-danger mb-3">
        <span th:text="${error}"></span>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">
            <i class="bi bi-star"></i> 병원 리뷰
        </h4>

        <a th:href="@{/hospital/list}"
           class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> 병원 목록
        </a>
    </div>

    <!-- 리뷰 없을 때 -->
    <div class="text-center py-5"
         th:if="${#lists.isEmpty(reviewList)}">

        <i class="bi bi-star"
           style="font-size:3rem;color:#b2bec3;"></i>

        <p class="mt-3 text-muted">
            아직 리뷰가 없습니다.
        </p>

    </div>

    <!-- 리뷰 목록 -->
    <div class="row g-3">

        <div class="col-12"
             th:each="review : ${reviewList}">

            <div class="card review-card p-4">

                <!-- 작성자 / 날짜 -->
                <div class="d-flex justify-content-between align-items-center mb-2">

                    <span class="fw-bold"
                          th:text="${review.memberNickname}">
                    </span>

                    <span class="text-muted small"
                          th:text="${#temporals.format(review.createdAt,'yyyy-MM-dd')}">
                    </span>

                </div>

                <!-- 별점 -->
                <div class="star-rating mb-2">

                    <span th:each="i : ${#numbers.sequence(1, review.rating)}">
                        <i class="bi bi-star-fill"></i>
                    </span>

                    <span th:each="i : ${#numbers.sequence(review.rating + 1, 5)}">
                        <i class="bi bi-star"></i>
                    </span>

                </div>

                <!-- 리뷰 내용 -->
                <p class="mb-3"
                   th:text="${review.content}">
                </p>

                <!-- 수정 / 삭제 -->
                <div class="d-flex justify-content-end gap-2">

                    <button type="button"
                            class="btn btn-outline-primary btn-sm edit-btn"
                            th:data-review-id="${review.id}"
                            th:data-hospital-id="${review.hospitalId}"
                            th:data-content="${review.content}"
                            th:data-rating="${review.rating}"
                            data-bs-toggle="modal"
                            data-bs-target="#editReviewModal">

                        <i class="bi bi-pencil"></i>
                        수정

                    </button>

                    <form th:action="@{/review/remove/{id}(id=${review.id})}"
                          method="post">

                        <input type="hidden"
                               name="hospitalId"
                               th:value="${review.hospitalId}">

                        <button type="submit"
                                class="btn btn-outline-danger btn-sm"
                                onclick="return confirm('리뷰를 삭제하시겠습니까?')">

                            <i class="bi bi-trash"></i>
                            삭제

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>
<!-- 리뷰 수정 모달 -->
<div class="modal fade" id="editReviewModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <form id="editForm" method="post">

                <div class="modal-header">
                    <h5 class="modal-title">리뷰 수정</h5>

                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden"
                           id="hospitalId"
                           name="hospitalId">

                    <div class="mb-3">
                        <label class="form-label">별점</label>

                        <select class="form-select"
                                id="rating"
                                name="rating">

                            <option value="5">5점</option>
                            <option value="4">4점</option>
                            <option value="3">3점</option>
                            <option value="2">2점</option>
                            <option value="1">1점</option>

                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">리뷰 내용</label>

                        <textarea class="form-control"
                                  rows="5"
                                  id="content"
                                  name="content" ></textarea>
                    </div>

                </div>

                <div class="modal-footer">

                    <button type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">
                        취소
                    </button>

                    <button type="submit"
                            class="btn btn-primary">
                        수정 완료
                    </button>

                </div>

            </form>

        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>

<script>
    document.querySelectorAll('.edit-btn').forEach(btn => {

        btn.addEventListener('click', function () {

            const reviewId = this.dataset.reviewId;
            const hospitalId = this.dataset.hospitalId;
            const content = this.dataset.content;
            const rating = this.dataset.rating;

            document.getElementById('hospitalId').value = hospitalId;
            document.getElementById('content').value = content;
            document.getElementById('rating').value = rating;

            document.getElementById('editForm').action =
                '/review/modify/' + reviewId;
        });

    });
</script>

</body>
</html>
