<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>병원 리뷰</title>
    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .review-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .star-rating { color: #ffa502; }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">
            <i class="bi bi-star"></i> 병원 리뷰
        </h4>
        <a th:href="@{/hospital/list}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> 병원 목록
        </a>
    </div>

    <!-- 데이터 없을 때 -->
    <div class="text-center py-5" th:if="${#lists.isEmpty(reviewList)}">
        <i class="bi bi-star" style="font-size: 3rem; color: #b2bec3;"></i>
        <p class="mt-3 text-muted">아직 리뷰가 없습니다.</p>
    </div>

    <!-- 리뷰 목록 -->
    <div class="row g-3">
        <div class="col-12" th:each="review : ${reviewList}">
            <div class="card review-card p-4">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <!-- 닉네임 -->
                    <span class="fw-bold" th:text="${review.memberNickname}"></span>
                    <!-- 작성일 -->
                    <span class="text-muted small" th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd')}"></span>
                </div>

                <!-- 별점 -->
                <div class="star-rating mb-2">
                    <span th:each="i : ${#numbers.sequence(1, review.rating)}">
                        <i class="bi bi-star-fill"></i>
                    </span>
                    <span th:each="i : ${#numbers.sequence(review.rating + 1, 5)}">
                        <i class="bi bi-star"></i>
                    </span>
                </div>

                <!-- 리뷰 내용 -->
                <p class="mb-0" th:text="${review.content}"></p>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
