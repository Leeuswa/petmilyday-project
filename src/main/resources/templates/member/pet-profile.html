<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
  <title>펫밀리데이 - 반려동물 관리</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/member/pet-profile.css}">
  <style>
    /* 뒤로가기 버튼 공통 스타일 추가 */
    .btn-back-wrap { margin-top: 30px; text-align: right; }
    .btn-back { display: inline-block; padding: 12px 24px; background: #fff; color: var(--pink); text-decoration: none; border-radius: 16px; font-weight: 700; border: 2px solid var(--pink-light); transition: 0.2s; }
    .btn-back:hover { background: var(--pink); color: #fff; border-color: var(--pink); transform: translateY(-2px); }
  </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container">

  <div class="registration-section">
    <div class="sub-title">새 반려동물 등록</div>

    <form th:action="@{/member/pet-profile/register}" method="post" th:object="${newPet}" enctype="multipart/form-data">
      <div class="form-grid">
        <div class="form-group">
          <label for="name">이름</label>
          <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="아이의 이름을 적어주세요">
        </div>

        <div class="form-group">
          <label for="species">종류</label>
          <input type="text" id="species" th:field="*{species}" class="form-control" placeholder="예: 강아지, 고양이">
        </div>

        <div class="form-group">
          <label for="breed">품종</label>
          <input type="text" id="breed" th:field="*{breed}" class="form-control" placeholder="예: 말티즈, 페르시안">
        </div>

        <div class="form-group">
          <label for="age">나이</label>
          <input type="number" id="age" th:field="*{age}" class="form-control" placeholder="나이를 숫자로 입력하세요">
        </div>

        <div class="form-group">
          <label for="gender">성별</label>
          <select id="gender" th:field="*{gender}" class="form-control">
            <option value="여아">여아</option>
            <option value="남아">남아</option>
            <option value="중성화한 여아">중성화한 여아</option>
            <option value="중성화한 남아">중성화한 남아</option>
          </select>
        </div>

        <div class="form-group">
          <label for="file">프로필 사진</label>
          <input type="file" id="file" name="file" class="form-control" accept="image/*">
        </div>
      </div>
      <button type="submit" class="btn-submit">등록하기</button>
    </form>
  </div>

  <div class="pet-management-section">
    <div class="sub-title">나의 반려동물</div>

    <div class="pet-grid">
      <div th:if="${#lists.isEmpty(petList)}" class="empty-msg">
        등록된 반려동물이 없습니다. 위에서 등록해 주세요!
      </div>

      <div class="pet-card-item" th:each="pet : ${petList}">
        <div class="pet-card-photo">
          <img th:src="${pet.photoUrl != null ? pet.photoUrl : '/images/default-pet.png'}" alt="반려동물 사진">
        </div>
        <span class="pet-name" th:text="${pet.name}"></span>
        <span class="pet-species" th:text="${pet.species} + ' - ' + ${pet.breed} + ' | ' + ${pet.gender} + ' | ' + ${pet.age} + '살'"></span>

        <div class="pet-card-actions">
          <a th:href="@{/member/pet-profile/modify/{id}(id=${pet.id})}" class="btn-edit-small">수정</a>
          <form th:action="@{/member/pet-profile/delete/{id}(id=${pet.id})}" method="post" class="delete-form" style="margin:0; flex:1;" onsubmit="return confirm('정말 삭제하시겠습니까?');">
            <button type="submit" class="btn-delete-small">삭제</button>
          </form>
        </div>
      </div>
    </div>

    <div class="btn-back-wrap">
      <a th:href="@{/member/mypage}" class="btn-back">마이페이지로 돌아가기</a>
    </div>
  </div>

</div>

<script th:inline="javascript">
  window.onload = function() {
    var errorMsg = /*[[${errorMsg}]]*/ null;
    if (errorMsg) alert(errorMsg);
    var successMsg = /*[[${successMsg}]]*/ null;
    if (successMsg) alert(successMsg);
  };
</script>
</body>
</html>
