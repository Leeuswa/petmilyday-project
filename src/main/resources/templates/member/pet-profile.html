<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>펫밀리데이 - 반려동물 관리</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/member/pet-profile.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container">

  <div class="left-box">
    <h2 class="page-title">🐾 반려동물 프로필 관리</h2>

    <div class="pet-list">
      <div th:if="${#lists.isEmpty(petList)}" class="empty-msg">
        아직 등록된 반려동물이 없습니다. 우측에서 우리 아이를 등록해 주세요!
      </div>

      <div class="pet-item" th:each="pet : ${petList}">
        <div class="pet-info">
          <span class="pet-name" th:text="${pet.name}"></span>
          <span class="pet-species" th:text="${pet.species} + ' - ' + ${pet.breed} + ' | ' + ${pet.age} + '살'"></span>
        </div>
        <form th:action="@{/member/pet-profile/delete/{id}(id=${pet.id})}" method="post" onsubmit="return confirm('이 프로필을 삭제하시겠습니까?');">
          <button type="submit" class="btn btn-danger">삭제</button>
        </form>
      </div>
    </div>

    <a th:href="@{/member/mypage}" class="btn" style="background-color: #e6e9f2; color: #0d1433; display: inline-block;">마이페이지로 돌아가기</a>
  </div>

  <div class="right-box">
    <div class="sub-title">새 반려동물 등록</div>

    <form th:action="@{/member/pet-profile/register}" method="post" th:object="${newPet}">
      <div class="form-group">
        <label for="name">이름</label>
        <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="아이의 이름을 적어주세요">
        <span class="error-msg" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
      </div>

      <div class="form-group">
        <label for="species">종류</label>
        <input type="text" id="species" th:field="*{species}" class="form-control" placeholder="예: 강아지, 고양이, 토끼">
        <span class="error-msg" th:if="${#fields.hasErrors('species')}" th:errors="*{species}"></span>
      </div>

      <div class="form-group">
        <label for="breed">품종</label>
        <input type="text" id="breed" th:field="*{breed}" class="form-control" placeholder="예: 말티즈, 코리안숏헤어">
        <span class="error-msg" th:if="${#fields.hasErrors('breed')}" th:errors="*{breed}"></span>
      </div>

      <div class="form-group">
        <label for="age">나이 (살)</label>
        <input type="number" id="age" th:field="*{age}" class="form-control" placeholder="예: 3">
        <span class="error-msg" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></span>
      </div>

      <button type="submit" class="btn btn-submit">등록하기</button>
    </form>
  </div>

</div>

</body>
</html>
