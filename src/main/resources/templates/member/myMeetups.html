<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
  <title>펫밀리데이 - 나와 관련된 모임</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/member/myMeetups.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="mypage-container">
  <h2 class="page-title">나와 관련된 모임</h2>

  <div class="section-title">내가 주최한 모임</div>
  <div th:if="${#lists.isEmpty(meetupList)}" class="empty-msg">
    아직 주최하신 모임이 없습니다.
  </div>
  <ul class="post-list" th:unless="${#lists.isEmpty(meetupList)}">
    <li class="post-item" th:each="meetup : ${meetupList}">
      <div>
        <a th:href="@{/community/meetup/read(id=${meetup.id})}" th:text="${meetup.title}">모임 제목</a>
      </div>
      <div class="post-meta">
        <span class="status-badge status-recruiting" th:if="${meetup.status == 'RECRUITING'}">모집중</span>
        <span class="status-badge status-closed" th:if="${meetup.status == 'CLOSED'}">모집마감</span>
        <span th:text="${meetup.location}">장소</span>
        <span th:text="${#temporals.format(meetup.meetupDate, 'yyyy-MM-dd HH:mm')}">일시</span>
        <span th:text="'인원: ' + ${meetup.currentParticipants} + '/' + ${meetup.maxParticipants}"></span>
      </div>
    </li>
  </ul>

  <div class="section-title" style="margin-top: 50px;">내가 참여한 모임</div>
  <div th:if="${#lists.isEmpty(participatedList)}" class="empty-msg">
    아직 참여하신 모임이 없습니다.
  </div>
  <ul class="post-list" th:unless="${#lists.isEmpty(participatedList)}">
    <li class="post-item" th:each="meetup : ${participatedList}">
      <div>
        <a th:href="@{/community/meetup/read(id=${meetup.id})}" th:text="${meetup.title}">모임 제목</a>
      </div>
      <div class="post-meta">
        <span class="status-badge status-recruiting" th:if="${meetup.status == 'RECRUITING'}">모집중</span>
        <span class="status-badge status-closed" th:if="${meetup.status == 'CLOSED'}">모집마감</span>
        <span th:text="${meetup.location}">장소</span>
        <span th:text="${#temporals.format(meetup.meetupDate, 'yyyy-MM-dd HH:mm')}">일시</span>
        <span th:text="'인원: ' + ${meetup.currentParticipants} + '/' + ${meetup.maxParticipants}"></span>
      </div>
    </li>
  </ul>

  <a th:href="@{/member/mypage}" class="btn-back">마이페이지로 돌아가기</a>
</div>

</body>
</html>
