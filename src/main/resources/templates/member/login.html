<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>펫밀리데이 - 로그인</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-header">
      <div class="logo">
        <span class="logo-text">petmilyday</span>
      </div>
      <h1 style="font-size: 24px; font-weight: 800; margin-top: 15px; margin-bottom: 5px;">어서 오세요</h1>
      <p style="font-size: 14px; margin: 0; color: #6B4C6E;">우리 반려동물의 일상을 함께해요</p>
    </div>

    <div class="auth-card">
      <div class="social-login">
        <a th:href="@{/oauth2/authorization/kakao}" class="social-btn kakao-btn">
          <span class="icon" style="margin-right: 8px;">💬</span> 카카오로 로그인
        </a>
        <a th:href="@{/oauth2/authorization/google}" class="social-btn google-btn">
          <span class="icon" style="margin-right: 8px;">G</span> Google로 로그인
        </a>
      </div>

      <div class="divider">
        <span>또는</span>
      </div>

      <form th:action="@{/member/login}" method="post">
        <div class="form-group">
          <label for="username">아이디</label>
          <input type="text" id="username" name="username" class="form-control" placeholder="아이디를 입력하세요" required>
        </div>

        <div class="form-group">
          <label for="password">비밀번호</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
        </div>

        <button type="submit" class="auth-btn">로그인</button>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 18px; font-size: 13px;">
          <label style="display: flex; align-items: center; cursor: pointer; color: #6B4C6E; font-weight: 600;">
            <input type="checkbox" name="remember-me" id="remember-me" style="margin-right: 6px;"> 자동 로그인
          </label>
          <div class="links" style="font-weight: 600;">
            <a th:href="@{/member/find-id}" style="color: #6B4C6E; text-decoration: none; margin-right: 10px;">아이디 찾기</a>
            <a th:href="@{/member/find-pw}" style="color: #6B4C6E; text-decoration: none;">비밀번호 찾기</a>
          </div>
        </div>
      </form>
    </div>

    <div class="auth-footer">
      아직 회원이 아니신가요? <a th:href="@{/member/register}">회원가입하기</a>
    </div>
  </div>

  <script th:if="${globalError}" th:inline="javascript">
    alert([[${globalError}]]);
  </script>
</body>
</html>
