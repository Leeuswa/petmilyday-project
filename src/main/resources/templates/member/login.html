<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>펫밀리데이 - 로그인</title>
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-header">
    <div class="logo">
      <span class="logo-icon">P</span>
      <span class="logo-text">petmilyday</span>
    </div>
    <h1>어서 오세요</h1>
    <p>우리 반려동물의 일상을 함께해요</p>
  </div>

  <div class="social-login">
    <a th:href="@{/oauth2/authorization/kakao}" class="btn btn-kakao" style="text-decoration: none;">
      <span class="icon">💬</span> 카카오로 로그인
    </a>
    <a th:href="@{/oauth2/authorization/google}" class="btn btn-google" style="text-decoration: none;">
      <span class="icon">G</span> Google로 로그인
    </a>
  </div>

  <div class="divider">
    <span>또는</span>
  </div>

  <div class="auth-card">
    <form th:action="@{/member/login}" method="post">
      <div class="input-group">
        <label for="username">아이디</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" required>
        </div>
      </div>

      <div class="input-group">
        <label for="password">비밀번호</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block">로그인</button>

      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" name="remember-me" id="remember-me">
          <span style="margin-left: 8px; font-size: 14px; color: var(--text-sub);">자동 로그인</span>
        </label>
        <div class="links">
          <a href="#">아이디 찾기</a>
          <span class="separator">|</span>
          <a href="#">비밀번호 찾기</a>
        </div>
      </div>
    </form>
  </div>

  <div class="auth-footer">
    아직 계정이 없으신가요? <a th:href="@{/member/register}" class="link-primary">회원가입</a>
  </div>
</div>
</body>
</html>
