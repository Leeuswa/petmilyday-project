<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>펫밀리데이 - 비밀번호 변경</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/member/modify-password.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container">
    <h2 class="page-title">비밀번호 변경</h2>

    <div class="global-error" th:if="${globalError}" th:text="${globalError}"></div>

    <form th:action="@{/member/modify-password}" method="post" th:object="${passwordRequest}" onsubmit="return validatePasswordForm()">

        <div class="form-group">
            <label for="currentPassword">현재 비밀번호</label>
            <input type="password" id="currentPassword" th:field="*{currentPassword}" class="form-control" placeholder="현재 사용 중인 비밀번호를 입력하세요">
            <span class="error-msg" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></span>
        </div>

        <div class="form-group">
            <label for="newPassword">새 비밀번호</label>
            <input type="password" id="newPassword" th:field="*{newPassword}" class="form-control" placeholder="8~20자 영문 대소문자, 숫자, 특수문자 조합">
            <span class="error-msg" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></span>
        </div>

        <div class="form-group">
            <label for="newPasswordConfirm">새 비밀번호 확인</label>
            <input type="password" id="newPasswordConfirm" class="form-control" placeholder="새 비밀번호를 다시 입력해주세요">
        </div>

        <div class="btn-wrap">
            <a th:href="@{/member/mypage}" class="btn btn-cancel">취소</a>
            <button type="submit" class="btn btn-submit">변경 완료</button>
        </div>
    </form>
</div>

<script>
    function validatePasswordForm() {
        const current = document.getElementById("currentPassword").value.trim();
        const newPw = document.getElementById("newPassword").value.trim();
        const newPwConfirm = document.getElementById("newPasswordConfirm").value.trim();

        if (!current) {
            alert("현재 비밀번호를 입력해주세요.");
            return false;
        }

        const pwRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,20}$/;
        if (!pwRegex.test(newPw)) {
            alert("새 비밀번호는 8~20자 이내 영문 대소문자, 숫자, 특수문자 조합이어야 합니다.");
            document.getElementById("newPassword").focus();
            return false;
        }

        if (newPw !== newPwConfirm) {
            alert("새 비밀번호가 일치하지 않습니다. 다시 확인해 주세요.");
            document.getElementById("newPasswordConfirm").focus();
            return false;
        }

        if (current === newPw) {
            alert("새 비밀번호가 현재 비밀번호와 같습니다. 다른 비밀번호를 설정해주세요.");
            document.getElementById("newPassword").focus();
            return false;
        }

        return true;
    }
</script>
</body>
</html>
