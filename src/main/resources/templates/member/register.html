<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>펫밀리데이 - 회원가입</title>
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="auth-wrapper register-wrapper">
  <div class="auth-header">
    <div class="logo">
      <span class="logo-icon">P</span>
      <span class="logo-text">petmilyday</span>
    </div>
    <h1>시작해볼까요</h1>
    <p>반려동물의 모든 일상을 기록하세요</p>
  </div>

  <div class="social-login">
    <a th:href="@{/oauth2/authorization/kakao}" class="btn btn-kakao" style="text-decoration: none;">
      <span class="icon">💬</span> 카카오로 로그인
    </a>
    <a th:href="@{/oauth2/authorization/google}" class="btn btn-google" style="text-decoration: none;">
      <span class="icon">G</span> Google로 로그인
    </a>
  </div>

  <div class="auth-card">
    <form th:action="@{/member/register}" th:object="${registerRequest}" method="post" onsubmit="return validateForm()">

      <div class="input-group">
        <label for="username">아이디 <span style="color: red;">*</span></label>
        <div style="display: flex; gap: 8px;">
          <input type="text" id="username" th:field="*{username}" class="form-control" placeholder="아이디를 입력하세요">
          <button type="button" class="btn btn-outline" onclick="checkUsernameBtn()" style="white-space: nowrap;">중복 확인</button>
        </div>
        <span id="username-check-msg" style="font-size: 13px; margin-top: 4px; display: block;"></span>
        <span class="error-msg" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
      </div>

      <div class="input-group">
        <label for="nickname">닉네임</label>
        <input type="text" id="nickname" th:field="*{nickname}" class="form-control" placeholder="사용할 닉네임을 입력하세요">
        <span class="error-msg" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}"></span>
      </div>

      <div class="input-group">
        <label for="password">비밀번호 <span style="color: red;">*</span></label>
        <input type="password" id="password" th:field="*{password}" class="form-control" placeholder="비밀번호 (8자 이상, 특수문자 포함)">
        <span class="error-msg" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
      </div>
      <div class="input-group">
        <label for="passwordConfirm">비밀번호 확인 <span style="color: red;">*</span></label>
        <input type="password" id="passwordConfirm" class="form-control" placeholder="비밀번호 재입력">
      </div>

      <div class="input-group">
        <label for="name">이름 <span style="color: red;">*</span></label>
        <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="실명을 입력하세요">
      </div>
      <div class="input-group">
        <label for="email">이메일 <span style="color: red;">*</span></label>
        <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="example@petmily.com">
      </div>

      <div class="input-group">
        <label for="phoneNumber">전화번호 <span style="color: red;">*</span></label>
        <input type="text" id="phoneNumber" th:field="*{phoneNumber}" class="form-control" placeholder="010-0000-0000">
      </div>
      <div class="input-group">
        <label for="address">주소 <span style="color: red;">*</span></label>
        <input type="text" id="address" th:field="*{address}" class="form-control" placeholder="도로명 또는 지번 주소">
      </div>
      <div class="input-group">
        <label for="detailAddress">상세 주소</label>
        <input type="text" id="detailAddress" th:field="*{detailAddress}" class="form-control" placeholder="나머지 상세 주소 입력">
      </div>

      <button type="submit" class="btn btn-primary btn-block">회원가입</button>

      <div class="form-options" style="justify-content: center; margin-top: 20px;">
        <div class="links">
          이미 계정이 있으신가요? <a th:href="@{/member/login}">로그인</a>
        </div>
      </div>
    </form>
  </div>
</div>

<script th:inline="javascript">
  let isUsernameChecked = false; // 중복 확인 완료 여부

  // 중복 확인 버튼
  function checkUsernameBtn() {
    const username = document.getElementById('username').value.trim();
    const msg = document.getElementById('username-check-msg');

    if (!username) {
      alert("아이디를 먼저 입력해주세요.");
      return;
    }

    const regex = /^[a-zA-Z0-9]+$/;
    if (!regex.test(username)) {
      alert("아이디는 영문 및 숫자만 허용됩니다.");
      return;
    }

    fetch(`/member/check-username?username=${username}`)
            .then(response => response.json())
            .then(isDuplicate => {
              if (isDuplicate) {
                msg.innerText = "이미 사용 중인 아이디입니다.";
                msg.style.color = "red";
                isUsernameChecked = false;
              } else {
                msg.innerText = "사용 가능한 아이디입니다";
                msg.style.color = "green";
                isUsernameChecked = true;
              }
            })
            .catch(error => {
              alert("서버와 통신 중 오류가 발생했습니다.");
            });
  }

  function validateForm() {
    if (!isUsernameChecked) {
      alert("아이디 중복 확인을 진행해 주세요.");
      return false;
    }

    const pw = document.getElementById("password").value;
    const pwConfirm = document.getElementById("passwordConfirm").value;

    const pwRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,20}$/;
    if (!pwRegex.test(pw)) {
      alert("비밀번호는 8~20자 이내 영문 대소문자, 숫자, 특수문자 조합이어야 합니다.");
      return false;
    }

    if (pw !== pwConfirm) {
      alert("비밀번호가 일치하지 않습니다.");
      return false;
    }
    return true;
  }
</script>
</body>
</html>
