<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>펫밀리데이 - 회원가입</title>
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="auth-wrapper register-wrapper">
  <div class="auth-header">
    <div class="logo">
      <span class="logo-icon">P</span>
      <span class="logo-text">petmilyday</span>
    </div>
    <h1>시작해볼까요</h1>
    <p>반려동물의 모든 일상을 기록하세요</p>
  </div>

  <div class="social-login">
    <a th:href="@{/oauth2/authorization/kakao}" class="btn btn-kakao" style="text-decoration: none;">
      <span class="icon">💬</span> 카카오로 로그인
    </a>
    <a th:href="@{/oauth2/authorization/google}" class="btn btn-google" style="text-decoration: none;">
      <span class="icon">G</span> Google로 로그인
    </a>
  </div>

  <div class="auth-card">
    <form th:action="@{/member/register}" th:object="${registerRequest}" method="post" onsubmit="return validateForm()">

      <div class="input-group">
        <label for="username">아이디</label>
        <input type="text" id="username" th:field="*{username}" class="form-control" placeholder="아이디 (영문, 숫자)">
        <span class="error-msg" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
      </div>

      <div class="input-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" th:field="*{password}" class="form-control" placeholder="비밀번호 (8자 이상, 특수문자 포함)">
        <span class="error-msg" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
      </div>

      <div class="input-group">
        <label for="passwordConfirm">비밀번호 확인</label>
        <input type="password" id="passwordConfirm" class="form-control" placeholder="비밀번호를 다시 입력해주세요">
      </div>

      <div class="input-group">
        <label for="name">이름</label>
        <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="실명을 입력해주세요">
        <span class="error-msg" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
      </div>

      <div class="input-group">
        <label for="email">이메일</label>
        <input type="text" id="email" th:field="*{email}" class="form-control" placeholder="example@petmily.com">
        <span class="error-msg" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
      </div>

      <button type="submit" class="btn btn-primary btn-block" style="margin-top: 20px;">회원가입</button>

      <div class="form-options" style="justify-content: center; margin-top: 20px;">
        <div class="links">
          이미 계정이 있으신가요? <a th:href="@{/member/login}">로그인</a>
        </div>
      </div>
    </form>
  </div>
</div>

<script th:inline="javascript">
  function validateForm() {
    const username = document.getElementById("username").value;
    const pw = document.getElementById("password").value;
    const pwConfirm = document.getElementById("passwordConfirm").value;
    const email = document.getElementById("email").value.trim();

    // 아이디 체크
    const usernameRegex = /^[a-zA-Z0-9]+$/;
    if (!usernameRegex.test(username)) {
      alert("아이디는 영문 및 숫자만 허용됩니다.");
      document.getElementById("username").focus();
      return false;
    }

    const pwRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,20}$/;
    if (!pwRegex.test(pw)) {
      alert("비밀번호는 8~20자 이내 영문 대소문자, 숫자, 특수문자 조합이어야 합니다.");
      document.getElementById("password").focus();
      return false;
    }

    if (pw !== pwConfirm) {
      alert("비밀번호가 일치하지 않습니다. 다시 확인해 주세요.");
      document.getElementById("passwordConfirm").focus();
      return false;
    }

    const emailRegex = /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,6}$/;
    if (!emailRegex.test(email)) {
      alert("올바른 이메일 형식이 아닙니다. (예: example@petmily.com)");
      document.getElementById("email").focus();
      return false;
    }

    return true;
  }
</script>
</body>
</html>
