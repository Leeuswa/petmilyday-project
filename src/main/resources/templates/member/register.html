<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>펫밀리데이 - 회원가입</title>
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="auth-wrapper register-wrapper">
  <div class="auth-header">
    <div class="logo">
      <span class="logo-icon">P</span>
      <span class="logo-text">petmilyday</span>
    </div>
    <h1>시작해볼까요</h1>
    <p>반려동물의 모든 일상을 기록하세요</p>
  </div>

  <div class="social-login">
    <a th:href="@{/oauth2/authorization/kakao}" class="btn btn-kakao" style="text-decoration: none;">
      <span class="icon">💬</span> 카카오로 로그인
    </a>
    <a th:href="@{/oauth2/authorization/google}" class="btn btn-google" style="text-decoration: none;">
      <span class="icon">G</span> Google로 로그인
    </a>
  </div>

  <div class="auth-card">
    <form th:action="@{/member/register}" th:object="${registerRequest}" method="post" onsubmit="return validateForm(this.querySelector('button[type=submit]'))">

      <div class="input-group">
        <label for="username">아이디</label>
        <input type="text" id="username" th:field="*{username}" placeholder="영문, 숫자만 입력 (20자 이내)" required>
      </div>

      <div class="input-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" th:field="*{password}" placeholder="영문 대소문자, 숫자, 특수문자 조합 8~20자" required>
      </div>

      <div class="input-group">
        <label for="passwordConfirm">비밀번호 확인</label>
        <input type="password" id="passwordConfirm" placeholder="비밀번호 재입력" required>
      </div>

      <div class="input-group">
        <label for="name">이름</label>
        <input type="text" id="name" th:field="*{name}" placeholder="이름을 입력하세요" required>
      </div>

      <div class="input-group">
        <label for="email">이메일</label>
        <input type="email" id="email" th:field="*{email}" placeholder="example@petmily.com" required>
      </div>

      <div class="input-group">
        <label for="nickname">닉네임 <span class="optional">(선택)</span></label>
        <input type="text" id="nickname" th:field="*{nickname}" placeholder="미입력 시 아이디로 표시">
      </div>

      <button type="submit" class="btn btn-primary btn-block">회원가입 완료</button>
    </form>
  </div>
</div>

<script th:inline="javascript">
  function validateForm() {
    const username = document.getElementById("username").value;
    const pw = document.getElementById("password").value;
    const pwConfirm = document.getElementById("passwordConfirm").value;

    // 1. 아이디 규칙 검사 (영문 및 숫자만)
    const usernameRegex = /^[a-zA-Z0-9]+$/;
    if (!usernameRegex.test(username)) {
      alert("아이디는 영문 및 숫자만 허용됩니다.");
      document.getElementById("username").focus();
      return false; // 제출 막기 (새로고침 안 됨 = 데이터 유지)
    }

    // 2. 비밀번호 규칙 검사 (대소문자, 숫자, 특수문자 조합 8~20자)
    const pwRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,20}$/;
    if (!pwRegex.test(pw)) {
      alert("비밀번호는 8~20자 이내 영문 대소문자, 숫자, 특수문자 조합이어야 합니다.");
      document.getElementById("password").focus();
      return false;
    }

    // 3. 비밀번호 확인 일치 검사
    if (pw !== pwConfirm) {
      alert("비밀번호가 일치하지 않습니다. 다시 확인해 주세요.");
      document.getElementById("passwordConfirm").focus();
      return false;
    }

// ⭐ 핵심: 모든 검사를 통과하고 서버로 데이터를 보내기 직전, 버튼을 잠가버립니다! (더블클릭 방지)
    button.disabled = true;
    button.disabled = true;
    button.innerText = "가입 처리 중...";
    button.style.backgroundColor = "#cccccc";

    return true; // 모든 검사 통과 시 서버로 제출
  }

  // 서버에서 보내는 에러(예: 중복된 아이디/이메일)가 있을 경우 알림창 띄우기
  window.onload = function() {
    var globalError = [[${globalError}]];
    if (globalError) {
      alert(globalError);
    }
  };
</script>
</body>
</html>
