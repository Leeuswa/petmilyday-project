<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
  <title>펫밀리데이 - 회원가입</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="auth-wrapper register-wrapper">
  <div class="auth-header">
    <div class="logo">
      <span class="logo-text">petmilyday</span>
    </div>
    <h1 style="font-size: 24px; font-weight: 800; margin-top: 15px; margin-bottom: 5px;">시작해볼까요</h1>
    <p style="font-size: 14px; margin: 0; color: #6B4C6E;">반려동물의 모든 일상을 기록하세요</p>
  </div>

  <div class="auth-card">
    <h2 class="auth-title">만나서 반가워요</h2>

    <div class="social-login">
      <a th:href="@{/oauth2/authorization/kakao}" class="social-btn kakao-btn">
        <span class="icon" style="margin-right: 8px;">💬</span> 카카오로 시작하기
      </a>
      <a th:href="@{/oauth2/authorization/google}" class="social-btn google-btn">
        <span class="icon" style="margin-right: 8px;">G</span> Google로 시작하기
      </a>
    </div>

    <div class="divider">
      <span>또는</span>
    </div>

    <form th:action="@{/member/register}" th:object="${registerRequest}" method="post" onsubmit="return validateForm()">
      <div class="form-group">
        <label for="username">아이디</label>
        <input type="text" id="username" th:field="*{username}" class="form-control" placeholder="영문, 숫자 조합 4자에서 12자" required>
        <span class="error-msg" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
      </div>

      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" th:field="*{password}" class="form-control" placeholder="8자에서 20자 이내 대소문자 특수문자 조합" required>
        <span class="error-msg" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
      </div>

      <div class="form-group">
        <label for="passwordConfirm">비밀번호 확인</label>
        <input type="password" id="passwordConfirm" class="form-control" placeholder="비밀번호를 한 번 더 적어주세요" required>
      </div>

      <div class="form-group">
        <label for="name">이름</label>
        <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="성명을 입력하세요" required>
        <span class="error-msg" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
      </div>

      <div class="form-group">
        <label for="nickname">닉네임</label>
        <input type="text" id="nickname" th:field="*{nickname}" class="form-control" placeholder="사용하실 닉네임을 적어주세요" required>
        <span class="error-msg" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}"></span>
      </div>

      <div class="form-group">
        <label for="email">이메일 주소</label>
        <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="example@petmily.com" required>
        <span class="error-msg" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
      </div>

      <button type="submit" class="auth-btn">반려인 회원가입 완료</button>
    </form>
  </div>

  <div class="auth-footer">
    이미 계정이 있으신가요? <a th:href="@{/member/login}">로그인하러 가기</a>
  </div>
</div>

<script th:inline="javascript">
  function validateForm() {
    const pw = document.getElementById("password").value;
    const pwConfirm = document.getElementById("passwordConfirm").value;

    if (pw !== pwConfirm) {
      alert("비밀번호와 비밀번호 확인 칸의 입력값이 서로 다릅니다.");
      document.getElementById("passwordConfirm").focus();
      return false;
    }
    return true;
  }
</script>
</body>
</html>
