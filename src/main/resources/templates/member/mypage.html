<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>펫밀리데이 - 마이페이지</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/member/mypage.css}">
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container">
  <h2 class="page-title">마이페이지</h2>

  <div class="info-section">
    <div class="section-title">내 정보</div>

    <div style="text-align: center; margin-bottom: 20px;">
      <div style="width: 80px; height: 80px; border-radius: 50%; background-color: #f0f2f7; border: 3px solid #d0d5e8; margin: 0 auto 12px; background-image: url('data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%23b8bfdc\'><path d=\'M12 2c-5.52 0-10 4.48-10 10s4.48 10 10 10 10-4.48 10-10-4.48-10-10-10zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z\'/></svg>'); background-size: cover;"></div>
      <div style="font-size: 14px; color: #666; font-style: italic;" th:text="${member.bio != null && member.bio != '' ? member.bio : '등록된 소개글이 없습니다.'}"></div>
    </div>

    <div class="info-row">
      <div class="info-label">아이디</div>
      <div class="info-value" th:text="${member.username}"></div>
    </div>
    <div class="info-row">
      <div class="info-label">이름</div>
      <div class="info-value" th:text="${member.name}"></div>
    </div>
    <div class="info-row">
      <div class="info-label">닉네임</div>
      <div class="info-value" th:text="${member.nickname != null && member.nickname != '' ? member.nickname : '미설정'}"></div>
    </div>
    <div class="info-row">
      <div class="info-label">이메일</div>
      <div class="info-value" th:text="${member.email}"></div>
    </div>

    <div class="info-row">
      <div class="info-label">전화번호</div>
      <div class="info-value" th:text="${member.phoneNumber}"></div>
    </div>
    <div class="info-row">
      <div class="info-label">주소</div>
      <div class="info-value" th:text="${member.address + ' ' + (member.detailAddress != null ? member.detailAddress : '')}"></div>
    </div>

    <div class="btn-wrap">
      <a th:href="@{/member/modify-profile}" class="btn btn-edit">회원정보 수정</a>

      <a th:href="@{/member/modify-password}" class="btn btn-edit">비밀번호 변경</a>

      <a th:href="@{/member/pet-profile}" class="btn btn-pet">🐾 반려동물 관리</a>

      <form th:action="@{/member/me/withdraw}" method="post" onsubmit="return confirm('정말 탈퇴하시겠습니까?');" style="margin-left: auto;">
        <button type="submit" class="btn btn-danger">회원 탈퇴</button>
      </form>
    </div>
  </div>
</div>

</body>
</html>
