<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
  <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
  <title>펫밀리데이 - 마이페이지</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/member/mypage.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container">
  <h2 class="page-title">마이페이지</h2>

  <div class="info-section">
    <div class="section-title">내 정보</div>

    <div style="text-align: center; margin-bottom: 20px;">
      <div style="width: 80px; height: 80px; border-radius: 50%; background-color: #FFF5F9; border: 3px solid #FFE4EF; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #FF7BAC;">
        👤
      </div>
    </div>

    <div class="info-row">
      <div class="info-label">아이디</div>
      <div class="info-value" th:text="${member.username}"></div>
    </div>
    <div class="info-row">
      <div class="info-label">이름</div>
      <div class="info-value" th:text="${member.name}"></div>
    </div>
    <div class="info-row">
      <div class="info-label">닉네임</div>
      <div class="info-value" th:text="${member.nickname != null && member.nickname != '' ? member.nickname : '미설정'}"></div>
    </div>
    <div class="info-row">
      <div class="info-label">이메일</div>
      <div class="info-value" th:text="${member.email}"></div>
    </div>

    <div class="info-row">
      <div class="info-label">전화번호</div>
      <div class="info-value" th:text="${member.phoneNumber}"></div>
    </div>
    <div class="info-row">
      <div class="info-label">주소</div>
      <div class="info-value" th:text="${member.address + ' ' + (member.detailAddress != null ? member.detailAddress : '')}"></div>
    </div>

    <div class="btn-wrap">
      <a th:href="@{/member/pet-profile}" class="btn btn-primary">반려동물 관리</a>
      <a th:href="@{/member/modify-profile}" class="btn btn-secondary">회원정보 수정</a>
      <a th:href="@{/member/modify-password}" class="btn btn-secondary">비밀번호 변경</a>
      <button type="button" onclick="confirmWithdraw()" class="btn-withdraw" style="background: none; border: none; color: #ff4d4d; cursor: pointer;">회원탈퇴</button>
    </div>

    <form id="withdrawForm" th:action="@{/member/withdraw}" method="post" style="display: none;"></form>
  </div>
</div>
</div>

<script>
  function confirmWithdraw() {
    // 정말 탈퇴할 것인지 알림창(Confirm) 띄우기
    if (confirm("정말 탈퇴하시겠습니까?\n탈퇴 시 모든 정보가 삭제되며 되돌릴 수 없습니다.")) {
      // '네(확인)' 선택 시 폼 제출
      document.getElementById("withdrawForm").submit();
    }
  }
</script>

</body>
</html>
