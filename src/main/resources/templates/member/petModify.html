<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>펫밀리데이 - 반려동물 프로필 수정</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/member/petModify.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="modify-container">
    <h2 class="page-title" style="text-align: center; margin-bottom: 25px;">반려동물 프로필 수정</h2>

    <form th:action="@{/member/pet-profile/modify/{id}(id=${petProfileForm.id})}" method="post" th:object="${petProfileForm}" enctype="multipart/form-data">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{photoUrl}">

        <div class="form-group" style="align-items: center;">
            <label>현재 프로필 사진</label>
            <img th:src="*{photoUrl != null ? photoUrl : '/images/default-pet.png'}" class="current-photo" alt="현재 사진">
        </div>

        <div class="form-group">
            <label th:for="name">이름</label>
            <input type="text" th:field="*{name}" class="form-control" required>
        </div>

        <div class="form-group">
            <label th:for="species">종류</label>
            <input type="text" th:field="*{species}" class="form-control" required>
        </div>

        <div class="form-group">
            <label th:for="breed">품종</label>
            <input type="text" th:field="*{breed}" class="form-control" required>
        </div>

        <div class="form-group">
            <label th:for="age">나이</label>
            <input type="number" th:field="*{age}" class="form-control" required>
        </div>

        <div class="form-group">
            <label th:for="gender">성별</label>
            <select th:field="*{gender}" class="form-control" required>
                <option value="여아">여아</option>
                <option value="남아">남아</option>
                <option value="중성화한 여아">중성화한 여아</option>
                <option value="중성화한 남아">중성화한 남아</option>
            </select>
        </div>

        <div class="form-group">
            <label th:for="file">새로운 사진으로 변경 (선택)</label>
            <input type="file" id="file" name="file" class="form-control" accept="image/*">
        </div>

        <div class="btn-wrap" style="display: flex; gap: 12px; margin-top: 30px;">
            <a th:href="@{/member/pet-profile}" class="btn-cancel">취소</a>
            <button type="submit" class="btn-save">수정 완료</button>
        </div>
    </form>
</div>

</body>
</html>
