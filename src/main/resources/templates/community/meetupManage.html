<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>펫밀리데이 - 신청자 관리</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/community/meetupManage.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="manage-wrapper">
    <h2 class="page-header">모임 참여 신청자 현황</h2>
    <h4 th:text="'대상 모임 : ' + ${meetupPost.title}" style="color: var(--mid); margin-top:-10px; margin-bottom: 25px; font-weight:600;"></h4>

    <th:block th:each="applicant : ${applicantList}">
        <div class="host-special-card" th:if="${applicant.member.username == #authentication.name}" style="background-color: var(--pink-pale); border: 2px dashed var(--pink); border-radius: 24px; padding: 25px; margin-bottom: 35px; box-shadow: 0 8px 24px rgba(255, 123, 172, 0.05);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <span style="font-size: 16px; font-weight: 800; color: var(--pink-deep);">모임 주최자 방장</span>
                <span style="background-color: var(--pink); color: #ffffff; padding: 4px 10px; border-radius: 10px; font-size: 12px; font-weight: 800;">방장 개설 완료</span>
            </div>
            <div class="user-info" style="font-size: 16px; font-weight: 800; color: var(--dark);">
                <span th:text="${applicant.member.nickname != null && applicant.member.nickname != '' ? applicant.member.nickname : applicant.member.name}"></span>
                <span th:text="'(' + ${applicant.member.username} + ')'" style="font-size: 13px; color: var(--muted); font-weight:500;"></span>
            </div>
            <div class="pet-info-summary" style="background-color: #ffffff; border: 1px solid var(--pink-light); margin-top: 10px; padding: 15px; border-radius: 16px;">
                <div style="font-weight: 800; margin-bottom: 6px; color: var(--dark); font-size: 13px;">방장 동반 반려동물</div>
                <div th:if="${#lists.isEmpty(applicant.member.petProfiles)}" style="color: var(--muted); font-size: 13px;">등록된 아이 프로필이 없습니다.</div>
                <div th:each="pet : ${applicant.member.petProfiles}" th:text="'- ' + ${pet.name} + ' (' + ${pet.species} + ' / ' + ${pet.breed} + ' / ' + ${pet.gender} + ' / ' + ${pet.age} + '살)'" style="font-size: 13px; color: var(--mid); margin-bottom: 4px;"></div>
            </div>
        </div>
    </th:block>

    <h3 style="font-size: 18px; font-weight: 800; color: var(--dark); margin-bottom: 15px;">참여 신청 및 승인 명단</h3>

    <div th:if="${#lists.size(applicantList) <= 1}" class="applicant-item" style="justify-content:center; color:var(--muted); padding:40px; font-weight:600; background-color: #ffffff;">
        접수된 참여 대기 및 신청 내역이 없습니다.
    </div>

    <th:block th:each="applicant : ${applicantList}">
        <div class="applicant-item" th:unless="${applicant.member.username == #authentication.name}">
            <div class="profile-section">
                <div class="user-info">
                    <span th:text="${applicant.member.nickname != null && applicant.member.nickname != '' ? applicant.member.nickname : applicant.member.name}"></span>
                    <span th:text="'(' + ${applicant.member.username} + ')'" style="font-size: 13px; color: var(--muted); font-weight:500;"></span>
                </div>

                <div class="pet-info-summary">
                    <div style="font-weight: 800; margin-bottom: 5px; color:var(--pink);">동반 예정 반려동물</div>
                    <div th:if="${#lists.isEmpty(applicant.member.petProfiles)}" style="color:var(--muted);">등록된 아이 프로필이 확인되지 않습니다.</div>
                    <div th:each="pet : ${applicant.member.petProfiles}" th:text="'- ' + ${pet.name} + ' (' + ${pet.species} + ' / ' + ${pet.breed} + ' / ' + ${pet.gender} + ' / ' + ${pet.age} + '살)'"></div>
                </div>
            </div>

            <div class="btn-container" th:if="${applicant.status == 'PENDING'}">
                <form th:action="@{/community/meetup/approve/{id}(id=${applicant.id})}" method="post" style="margin: 0;">
                    <button type="submit" class="btn-action-approve">참여 수락</button>
                </form>
                <form th:action="@{/community/meetup/reject/{id}(id=${applicant.id})}" method="post" style="margin: 0;" onsubmit="return confirm('정말 거절하시겠습니까?');">
                    <button type="submit" class="btn-action-reject">거절</button>
                </form>
            </div>

            <div th:if="${applicant.status == 'APPROVED'}" style="color: var(--pink); font-weight: 800; font-size: 15px; padding-right: 15px;">
                수락 승인 완료
            </div>
        </div>
    </th:block>

    <a th:href="@{/community/meetup/read(id=${meetupPost.id})}" class="btn-return-back">이전 상세글로</a>
</div>

<script th:inline="javascript">
    window.onload = function() {
        var successMsg = /*[[${successMsg}]]*/ null;
        if (successMsg) alert(successMsg);
        var errorMsg = /*[[${errorMsg}]]*/ null;
        if (errorMsg) alert(errorMsg);
    };
</script>
</body>
</html>
