<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>펫밀리데이 - 모임 수정</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/community/community-form.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container">
  <h2 class="page-title">모임 정보 수정</h2>

  <form th:action="@{/community/meetup/modify}" method="post" th:object="${postDTO}">

    <input type="hidden" th:field="*{id}">

    <div class="form-group">
      <label for="title">제목</label>
      <input type="text" id="title" th:field="*{title}" class="form-control">
      <span class="error-msg" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">제목 오류</span>
    </div>

    <div class="form-group">
      <label for="location">모임 장소</label>
      <input type="text" id="location" th:field="*{location}" class="form-control">
      <span class="error-msg" th:if="${#fields.hasErrors('location')}" th:errors="*{location}">장소 오류</span>
    </div>

    <div class="form-group">
      <label for="meetupDate">모임 일시</label>
      <input type="datetime-local" id="meetupDate" name="meetupDate"
             th:value="${postDTO.meetupDate != null ? #temporals.format(postDTO.meetupDate, 'yyyy-MM-dd''T''HH:mm') : ''}"
             class="form-control">
      <span class="error-msg" th:if="${#fields.hasErrors('meetupDate')}" th:errors="*{meetupDate}">일시 오류</span>
    </div>

    <div class="form-group">
      <label for="maxParticipants">최대 참여 인원</label>
      <input type="number" id="maxParticipants" th:field="*{maxParticipants}" class="form-control" min="2">
      <span class="error-msg" th:if="${#fields.hasErrors('maxParticipants')}" th:errors="*{maxParticipants}">인원 오류</span>
    </div>

    <div class="form-group">
      <label for="content">내용</label>
      <textarea id="content" th:field="*{content}" class="form-control"></textarea>
      <span class="error-msg" th:if="${#fields.hasErrors('content')}" th:errors="*{content}">내용 오류</span>
    </div>

    <div class="form-actions">
      <button type="submit" class="submit-btn">수정 완료</button>
      <a th:href="@{/community/meetup/read(id=*{id})}" class="cancel-btn" style="text-decoration: none; text-align: center;">취소</a>
    </div>
  </form>
</div>

</body>
</html>
