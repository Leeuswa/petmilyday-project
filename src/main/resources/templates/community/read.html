<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>펫밀리데이 - 게시글 상세</title>
    <meta name="_csrf" th:content="${_csrf?.token}"/>
    <meta name="_csrf_header" th:content="${_csrf?.headerName}"/>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/community/read.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container">
    <div sec:authorize="isAuthenticated()">
        <input type="hidden" id="currentUser" th:value="${#authentication.name}">
    </div>
    <div sec:authorize="isAnonymous()">
        <input type="hidden" id="currentUser" value="anonymousUser">
    </div>

    <input type="hidden" id="currentPostId" th:value="${postDTO.id}">

    <div class="post-header">
        <h1 class="post-title" th:text="${postDTO.title}">제목</h1>
        <div class="post-info">
            <span th:text="'작성자: ' + ${postDTO.writerName}"></span>
            <div class="post-info-right">
                <span th:text="${#temporals.format(postDTO.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                <span th:text="'조회수: ' + ${postDTO.viewCount}"></span>
            </div>
        </div>
    </div>

    <div class="post-content" th:text="${postDTO.content}">본문</div>

    <div class="post-actions">
        <a th:href="@{/community/list}" class="btn btn-list">목록</a>
        <th:block th:if="${#authentication.name == postDTO.writerUsername}">
            <a th:href="@{/community/modify(id=${postDTO.id})}" class="btn btn-modify">수정</a>
            <form th:action="@{/community/remove}" method="post" style="display: inline;" onsubmit="return confirm('정말 삭제하시겠습니까?');">
                <input type="hidden" name="id" th:value="${postDTO.id}">
                <button type="submit" class="btn btn-modify" style="background-color:#fff; color:var(--pink); border:2px solid var(--pink-light);">삭제</button>
            </form>
        </th:block>
    </div>

    <div class="comment-section">
        <h3>댓글</h3>
        <div id="comment-list-container" class="comment-list"></div>

        <div class="comment-form">
            <textarea id="new-comment-text" placeholder="우리 아이들을 위한 따뜻한 댓글을 남겨주세요."></textarea>
            <button type="button" id="btn-comment-submit" class="comment-submit-btn" onclick="submitMainComment()">댓글 등록</button>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const postId = document.getElementById("currentPostId").value;

    function getAuthHeaders() {
        const requestHeaders = {
            "Content-Type": "application/json"
        };
        const csrfMeta = document.querySelector("meta[name='_csrf']");
        const csrfHeaderMeta = document.querySelector("meta[name='_csrf_header']");
        if (csrfMeta && csrfHeaderMeta && csrfHeaderMeta.content) {
            requestHeaders[csrfHeaderMeta.content] = csrfMeta.content;
        }
        return requestHeaders;
    }

    function loadComments() {
        fetch("/comments/list/" + postId)
            .then(response => response.json())
            .then(pageResponse => {
                const container = document.getElementById("comment-list-container");
                container.innerHTML = "";

                if (!pageResponse.dtoList || pageResponse.dtoList.length === 0) {
                    container.innerHTML = "<div style='padding:20px; text-align:center; color:var(--muted); font-weight:600;'>등록된 댓글이 없습니다. 첫 댓글을 남겨보세요.</div>";
                    return;
                }

                pageResponse.dtoList.forEach(comment => {
                    const heartIcon = comment.likedByCurrentUser ? '♥' : '♡';
                    const heartColor = comment.likedByCurrentUser ? 'var(--pink-deep)' : 'var(--muted)';

                    const commentHtml = `
                        <div class="comment-item" style="margin-bottom:15px; padding:15px; border-bottom:1px solid var(--pink-light);">
                            <div class="comment-writer" style="display:flex; justify-content:space-between; margin-bottom:8px; font-weight:700;">
                                <span>${comment.writerName}</span>
                                <div style="display:flex; gap:15px; align-items:center;">
                                    <span class="comment-date" style="color:var(--muted); font-size:13px;">${comment.createdAt}</span>
                                    <span style="cursor:pointer; color:${heartColor}; font-size:14px;" onclick="toggleCommentLike(${comment.id})">
                                        ${heartIcon} ${comment.likeCount}
                                    </span>
                                </div>
                            </div>
                            <div class="comment-body" style="color:var(--dark); font-size:15px;">${comment.content}</div>
                        </div>
                    `;
                    container.innerHTML += commentHtml;
                });
            })
            .catch(error => console.error("댓글 로딩 실패:", error));
    }

    function submitMainComment() {
        const contentInput = document.getElementById("new-comment-text");
        const content = contentInput.value.trim();

        if (!content) {
            alert("댓글 내용을 입력해주세요.");
            return;
        }

        const data = {
            postId: parseInt(postId, 10),
            content: content
        };

        fetch("/comments", {
            method: "POST",
            headers: getAuthHeaders(),
            body: JSON.stringify(data)
        })
            .then(response => {
                if (response.ok) {
                    contentInput.value = "";
                    loadComments();
                } else {
                    alert("로그인이 필요합니다.");
                }
            })
            .catch(error => {
                console.error("통신 장애:", error);
                alert("서버 통신 중 에러가 발생했습니다.");
            });
    }

    // 좋아요 토글 기능
    function toggleCommentLike(commentId) {
        fetch(`/comments/${commentId}/like`, {
            method: "POST",
            headers: getAuthHeaders()
        })
            .then(response => {
                if (response.ok) {
                    loadComments();
                } else {
                    alert("로그인이 필요한 기능입니다.");
                }
            })
            .catch(error => console.error("좋아요 처리 실패:", error));
    }

    document.addEventListener("DOMContentLoaded", function() {
        loadComments();
    });
</script>
</body>
</html>
