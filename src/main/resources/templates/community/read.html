<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>펫밀리데이 - 게시글 상세</title>

    <meta name="_csrf" th:content="${_csrf?.token}"/>
    <meta name="_csrf_header" th:content="${_csrf?.headerName}"/>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/community/read.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container">

    <div sec:authorize="isAuthenticated()">
        <input type="hidden" id="currentUser" th:value="${#authentication.name}">
    </div>
    <div sec:authorize="isAnonymous()">
        <input type="hidden" id="currentUser" value="anonymousUser">
    </div>

    <input type="hidden" id="currentPostId" th:value="${postDTO.id}">

    <div class="post-header">
        <h1 class="post-title" th:text="${postDTO.title}"></h1>
        <div class="post-info">
            <span class="post-writer" th:text="${postDTO.writerName}"></span>
            <div class="post-info-right">
                <span>조회수 <th:block th:text="${postDTO.viewCount}"></th:block></span>
                <span th:text="${postDTO.createdAt != null ? #temporals.format(postDTO.createdAt, 'yyyy-MM-dd HH:mm') : ''}"></span>
            </div>
        </div>
    </div>

    <div class="post-content" th:text="${postDTO.content}"></div>

    <div class="post-actions">
        <a th:href="@{/community/list}" class="btn btn-list">목록으로</a>
        <th:block sec:authorize="isAuthenticated()">
            <th:block th:if="${#authentication.name == postDTO.writerUsername}">
                <a th:href="@{/community/modify(id=${postDTO.id})}" class="btn btn-edit">수정</a>
                <form th:action="@{/community/remove}" method="post" style="display:inline;" onsubmit="return confirm('정말 삭제하시겠습니까?');">
                    <input type="hidden" name="id" th:value="${postDTO.id}">
                    <button type="submit" class="btn btn-delete">삭제</button>
                </form>
            </th:block>
        </th:block>
    </div>

    <div class="comment-section">
        <h3>댓글</h3>
        <ul id="replyList" class="comment-list"></ul>
        <div class="comment-form">
            <textarea id="replyContent" placeholder="따뜻한 댓글을 남겨주세요."></textarea>
            <button type="button" class="comment-submit-btn" onclick="registerComment()">댓글 등록</button>
        </div>
    </div>
</div>

<script>
    const postId = document.getElementById("currentPostId").value;
    const currentUser = document.getElementById("currentUser").value;

    // ★ 스프링 시큐리티 CSRF 토큰 세팅 (POST 통신 403 에러 방지용)
    const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;

    // 안전하게 fetch 요청을 보내기 위한 헤더 생성 함수
    function getAuthHeaders() {
        const headers = { "Content-Type": "application/json" };
        if (csrfToken && csrfHeader) {
            headers[csrfHeader] = csrfToken;
        }
        return headers;
    }

    document.addEventListener("DOMContentLoaded", function() {
        loadComments();
    });

    function loadComments() {
        fetch(`/comments/list/${postId}?page=1&size=100`, { method: "GET", credentials: "include" })
            .then(response => response.json())
            .then(data => {
                const replyList = document.getElementById("replyList");
                replyList.innerHTML = "";
                const comments = data.dtoList || [];

                comments.forEach(comment => {
                    const li = document.createElement("li");
                    li.className = comment.parentId ? "comment-item child" : "comment-item";

                    let deleteButton = '';
                    if (currentUser === comment.writerUsername) {
                        deleteButton = `<button class="comment-btn del" onclick="removeComment(${comment.id})">삭제</button>`;
                    }

                    // ★ 하트 아이콘 및 클래스 동적 렌더링
                    const heartIcon = comment.likedByCurrentUser ? '❤️' : '🤍';
                    const activeClass = comment.likedByCurrentUser ? 'active' : '';

                    li.innerHTML = `
                        <div class="comment-writer">
                            ${comment.writerName}
                            <span class="comment-date">${comment.createdAt ? comment.createdAt.substring(0, 16).replace('T', ' ') : ''}</span>
                        </div>
                        <div class="comment-text">${comment.content}</div>
                        <div class="comment-buttons">
                            <button class="like-btn ${activeClass}" onclick="likeComment(${comment.id})">${heartIcon} ${comment.likeCount || 0}</button>
                            ${!comment.parentId ? `<button class="comment-btn" onclick="showReCommentForm(${comment.id})">답글 쓰기</button>` : ''}
                            ${deleteButton}
                        </div>
                        <div id="recomment-form-container-${comment.id}"></div>
                    `;
                    replyList.appendChild(li);
                });
            })
            .catch(error => console.error(error));
    }

    function registerComment() {
        const contentInput = document.getElementById("replyContent");
        const content = contentInput.value.trim();
        if (!content) return alert("댓글 내용을 입력해주세요.");

        const data = { postId: postId, content: content, writerName: "temp" };
        fetch(`/comments/`, {
            method: "POST",
            headers: getAuthHeaders(),
            credentials: "include",
            body: JSON.stringify(data)
        })
            .then(response => {
                if(response.ok) { contentInput.value = ""; loadComments(); }
                else { alert("로그인이 필요합니다."); }
            }).catch(error => console.error(error));
    }

    function removeComment(commentId) {
        if(!confirm("댓글을 삭제하시겠습니까?")) return;
        fetch(`/comments/${commentId}`, {
            method: "DELETE",
            headers: getAuthHeaders(),
            credentials: "include"
        })
            .then(response => { if(response.ok) loadComments(); else alert("삭제 실패"); })
            .catch(error => console.error(error));
    }

    function likeComment(commentId) {
        if (currentUser === 'anonymousUser') {
            alert("로그인이 필요한 기능입니다.");
            return;
        }

        fetch(`/comments/${commentId}/like`, {
            method: "POST",
            headers: getAuthHeaders(),
            credentials: "include",
            body: JSON.stringify({}) // 빈 데이터를 명시적으로 보내어 서버 에러를 방지합니다.
        })
            .then(response => {
                if(response.ok) loadComments();
                else alert("처리에 실패했습니다. 다시 시도해주세요.");
            })
            .catch(error => console.error(error));
    }

    function showReCommentForm(parentId) {
        const container = document.getElementById(`recomment-form-container-${parentId}`);
        if(container.innerHTML.trim() !== "") return;

        container.innerHTML = `
                <div class="recomment-form">
                    <textarea id="recomment-text-${parentId}" placeholder="답글 내용을 입력해주세요."></textarea>
                    <div class="recomment-actions">
                        <button type="button" class="btn-re-cancel" onclick="cancelReComment(${parentId})">취소</button>
                        <button type="button" class="btn-re-submit" onclick="submitReComment(${parentId})">등록</button>
                    </div>
                </div>
            `;
    }

    function cancelReComment(parentId) {
        document.getElementById(`recomment-form-container-${parentId}`).innerHTML = "";
    }

    function submitReComment(parentId) {
        const contentInput = document.getElementById(`recomment-text-${parentId}`);
        const content = contentInput.value.trim();
        if(!content) return alert("답글 내용을 입력해주세요.");

        const data = { postId: postId, content: content, writerName: "temp", parentId: parentId };
        fetch(`/comments/`, {
            method: "POST",
            headers: getAuthHeaders(),
            credentials: "include",
            body: JSON.stringify(data)
        })
            .then(response => { if(response.ok) loadComments(); else alert("로그인이 필요합니다."); })
            .catch(error => console.error(error));
    }
</script>
</body>
</html>
