<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>펫밀리데이 - 모임 상세</title>
    <meta name="_csrf" th:content="${_csrf?.token}"/>
    <meta name="_csrf_header" th:content="${_csrf?.headerName}"/>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/community/meetupRead.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container" th:object="${postDTO}">

    <div class="post-header">
        <h2 class="page-title" th:text="*{title}"></h2>
        <div class="post-info">
            <div class="post-info-right">
                <button type="button" th:onclick="|sendReport('MEETUP_POST', *{id})|"
                        style="padding: 4px 10px; border-radius: 12px; font-size: 13px; font-weight: 800; cursor: pointer; border: 1px solid #FFCDD2; color: #E53935; background-color: #FFEBEE; outline: none;">
                    🚨 신고
                </button>
            </div>
        </div>
    </div>

    <div class="meetup-detail-box">
        <p><strong>주최 방장</strong> <span th:text="*{hostName}"></span></p>
        <p><strong>모임 장소</strong> <span th:text="*{location}"></span></p>
        <p><strong>모임 일시</strong> <span th:text="${#temporals.format(postDTO.meetupDate, 'yyyy-MM-dd HH:mm')}"></span></p>
        <p><strong>모임 정원</strong> <span th:text="*{currentParticipants} + ' / ' + *{maxParticipants} + ' 명'"></span></p>
    </div>

    <div class="post-content" th:text="*{content}" style="padding:20px 5px; min-height:180px;"></div>

    <div th:if="${#authentication.name == postDTO.hostUsername}">
        <a th:href="@{/community/meetup/manage/{id}(id=*{id})}" class="btn-manage-center">신청자 참여 내역 관리하기</a>
    </div>

    <div class="action-button-zone" th:unless="${#authentication.name == postDTO.hostUsername}">
        <form th:if="*{isParticipating}" th:action="@{/community/meetup/cancel/{id}(id=*{id})}" method="post">
            <button type="submit" class="btn-leave" onclick="return confirm('모임 참여 신청을 취소하시겠습니까?');">모임 참여 취소하기</button>
        </form>

        <form th:if="!*{isParticipating} and *{status == 'RECRUITING'}" th:action="@{/community/meetup/join/{id}(id=*{id})}" method="post">
            <button type="submit" class="btn-join">모임 참여 신청하기</button>
        </form>

        <div th:if="!*{isParticipating} and *{status == 'CLOSED'}" class="btn-block">모집 정원 마감</div>
    </div>

    <div class="btn-group" style="text-align:right; margin-top:30px;">
        <a th:href="@{/community/meetup/list}" class="btn btn-list">목록으로</a>
        <th:block th:if="${#authentication.name == postDTO.hostUsername}">
            <a th:href="@{/community/meetup/modify(id=*{id})}" class="btn btn-modify">정보 수정</a>
            <form th:action="@{/community/meetup/remove}" method="post" style="display: inline;" onsubmit="return confirm('모임을 영구 파기하시겠습니까?');">
                <input type="hidden" name="id" th:value="*{id}">
                <button type="submit" class="btn btn-list" style="background-color:#fff; color:var(--pink); border:2px solid var(--pink-light); margin-left:10px;">모임 폐쇄</button>
            </form>
        </th:block>
    </div>

    <input type="hidden" id="currentPostId" th:value="*{id}">
    <input type="hidden" id="currentUser" th:value="${#authentication.name}">

    <div class="comment-section">
        <h3>댓글</h3>
        <div id="comment-list-container" class="comment-list" style="list-style: none; padding-left: 0;"></ul></div>

        <div class="comment-form">
            <textarea id="new-comment-text" placeholder="우리 아이들을 위한 따뜻한 댓글을 남겨주세요."></textarea>
            <button type="button" id="btn-comment-submit" class="comment-submit-btn" onclick="submitMainComment()">댓글 등록</button>
        </div>
    </div>

</div>

<script th:inline="javascript">
    const meetupPostId = document.getElementById("currentPostId").value;
    const currentUser = document.getElementById("currentUser").value;

    document.addEventListener("DOMContentLoaded", function () {
        loadComments(); // 페이지 로딩 시 댓글 불러오기
    });

    // 메인 댓글 등록 함수
    function submitMainComment() {
        const content = document.getElementById("new-comment-text").value;
        if (!content.trim()) {
            alert("댓글 내용을 입력해주세요.");
            return;
        }
        saveComment({ meetupPostId: meetupPostId, content: content });
    }

    // 댓글 목록 불러오기 (✅ URL 경로 소문자로 통일)
    function loadComments() {
        fetch(`/meetup-comments/list/${meetupPostId}?page=1&size=100`)
            .then(response => response.json())
            .then(data => {
                const commentList = document.getElementById("comment-list-container");
                commentList.innerHTML = "";

                data.dtoList.forEach(comment => {
                    const isChild = comment.parentId != null;
                    const marginLeft = isChild ? "margin-left: 40px; background-color: #f9f9f9;" : "";
                    const replyIcon = isChild ? "↪ " : "";

                    let html = `
                    <li style="border-bottom: 1px solid #eee; padding: 15px; border-radius: 8px; margin-bottom: 10px; ${marginLeft}" id="comment-${comment.id}">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                            <strong style="color: var(--pink);">${replyIcon}${comment.writerName}</strong>
                            <span style="font-size: 0.85em; color: #888;">${comment.createdAt}</span>
                        </div>
                        <div style="margin-bottom: 15px; line-height: 1.5;">${comment.content}</div>

                        <div style="display: flex; gap: 10px; font-size: 0.9em;">
                            <button onclick="toggleLike(${comment.id})" style="border:none; background:none; cursor:pointer; color: #e74c3c;">
                                ${comment.likedByCurrentUser ? '❤️' : '🤍'} <span id="like-count-${comment.id}">${comment.likeCount}</span>
                            </button>

                            ${!isChild && currentUser !== 'anonymousUser' ? `<button onclick="showReCommentForm(${comment.id})" style="border:none; background:none; cursor:pointer; color: #666;">답글 달기</button>` : ''}

                            ${currentUser === comment.writerUsername ? `<button onclick="deleteComment(${comment.id})" style="border:none; background:none; cursor:pointer; color: #999;">삭제</button>` : ''}

                            ${currentUser !== 'anonymousUser' && currentUser !== comment.writerUsername ? `<button onclick="sendReport('MEETUP_COMMENT', ${comment.id})" style="border:none; background:none; cursor:pointer; color: #ff4d4d; margin-left: auto;">🚨 신고</button>` : ''}
                        </div>
                        <div id="recomment-form-${comment.id}" style="display: none; margin-top: 15px; gap: 10px;"></div>
                    </li>
                `;
                    commentList.insertAdjacentHTML('beforeend', html);
                });
            })
            .catch(error => console.error("댓글 로딩 에러:", error));
    }

    // 대댓글 폼 열기
    function showReCommentForm(parentId) {
        const formDiv = document.getElementById(`recomment-form-${parentId}`);

        if (formDiv.style.display === "none" || formDiv.style.display === "") {
            formDiv.style.display = "flex";
            formDiv.innerHTML = `
            <input type="text" id="recomment-input-${parentId}" class="form-control" style="flex: 1; padding: 8px; border-radius: 4px;" placeholder="대댓글을 입력하세요">
            <button onclick="submitReply(${parentId})" class="btn btn-sm" style="background: var(--pink); color: white; border: none; padding: 0 15px; border-radius: 4px; cursor: pointer;">등록</button>
        `;
        } else {
            formDiv.style.display = "none";
            formDiv.innerHTML = "";
        }
    }

    // CSRF 토큰 가져오기 (Spring Security POST 요청 시 필수)
    function getCsrfToken() {
        return {
            token: document.querySelector("meta[name='_csrf']").getAttribute("content"),
            header: document.querySelector("meta[name='_csrf_header']").getAttribute("content")
        };
    }

    // 1. 누락되었던 메인 댓글 저장 함수 추가
    function saveComment(data) {
        const csrf = getCsrfToken();

        fetch(`/meetup-comments`, { // API 엔드포인트는 실제 서버 설정에 맞게 조정하세요
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                [csrf.header]: csrf.token
            },
            body: JSON.stringify(data)
        })
            .then(async response => {
                if (response.ok) {
                    document.getElementById("new-comment-text").value = ""; // 입력창 초기화
                    loadComments(); // 댓글 목록 새로고침
                } else {
                    const errorText = await response.text();
                    alert(`댓글 등록 실패: ${errorText}`);
                }
            })
            .catch(error => console.error("댓글 등록 통신 에러:", error));
    }

    // 2. 누락되었던 대댓글(답글) 등록 함수 추가
    function submitReply(parentId) {
        const inputElement = document.getElementById(`recomment-input-${parentId}`);
        const content = inputElement.value.trim();

        if (!content) {
            alert("대댓글 내용을 입력해주세요.");
            return;
        }

        const csrf = getCsrfToken();
        const data = {
            meetupPostId: meetupPostId, // 전역 변수 활용
            content: content,
            parentId: parentId
        };

        fetch(`/meetup-comments`, { // API 엔드포인트는 실제 서버 설정에 맞게 조정하세요
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                [csrf.header]: csrf.token
            },
            body: JSON.stringify(data)
        })
            .then(async response => {
                if (response.ok) {
                    document.getElementById(`recomment-form-${parentId}`).innerHTML = ""; // 폼 닫기
                    loadComments(); // 댓글 목록 새로고침
                } else {
                    const errorText = await response.text();
                    alert(`대댓글 등록 실패: ${errorText}`);
                }
            })
            .catch(error => console.error("대댓글 등록 통신 에러:", error));
    }

    // 댓글 삭제 (✅ URL 경로 소문자로 통일)
    function deleteComment(commentId) {
        if (!confirm("댓글을 삭제하시겠습니까?")) return;
        fetch(`/meetup-comments/${commentId}`, { method: "DELETE" })
            .then(() => loadComments());
    }

    // 좋아요 토글 (✅ URL 경로 소문자로 통일)
    function toggleLike(commentId) {
        fetch(`/meetup-comments/${commentId}/like`, { method: "POST" })
            .then(response => response.json())
            .then(() => loadComments())
            .catch(() => alert("로그인이 필요합니다."));
    }

    // 신고 함수
    function sendReport(type, id) {
        const reason = prompt("신고 사유를 입력해 주세요 (예: 욕설, 도배, 비방 등):");
        if (!reason || !reason.trim()) {
            return;
        }

        const token = document.querySelector("meta[name='_csrf']").getAttribute("content");
        const header = document.querySelector("meta[name='_csrf_header']").getAttribute("content");

        fetch("/api/reports", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                [header]: token
            },
            body: JSON.stringify({
                targetType: type,
                targetId: id,
                reason: reason
            })
        })
            .then(response => {
                if(response.ok) {
                    alert("신고가 완료되었습니다. 관리자 검토 후 조치됩니다.");
                } else {
                    alert("신고에 실패했습니다. 로그인 상태를 확인해 주세요.");
                }
            })
            .catch(error => console.error("통신 에러:", error));
    }

    window.onload = function() {
        var successMsg = /*[[${successMsg}]]*/ null;
        if (successMsg) alert(successMsg);
        var errorMsg = /*[[${errorMsg}]]*/ null;
        if (errorMsg) alert(errorMsg);
    };
</script>
</body>
</html>
