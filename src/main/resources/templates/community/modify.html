<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>펫밀리데이 - 커뮤니티 수정</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/community/community-form.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container">
    <h2 class="page-title">게시글 수정</h2>

    <form th:action="@{/community/modify}" method="post" th:object="${postDTO}">
        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label for="title">제목</label>
            <input type="text" id="title" th:field="*{title}" class="form-control">
            <span class="error-msg" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
        </div>

        <div class="form-group">
            <label for="content">내용</label>
            <textarea id="content" th:field="*{content}" class="form-control"></textarea>
            <span class="error-msg" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></span>
        </div>

        <div class="form-group">
            <div class="checkbox-wrap">
                <input type="checkbox" id="anonymous" th:field="*{anonymous}">
                <label for="anonymous">익명 유지하기</label>
            </div>
        </div>

        <div class="btn-wrap">
            <a th:href="@{/community/read(id=*{id})}" class="btn btn-secondary">취소</a>
            <button type="submit" class="btn btn-primary">수정 완료</button>
        </div>
    </form>
</div>

</body>
</html>
