<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>펫밀리데이 - 커뮤니티 수정</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/community/community-form.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container">
    <h2 class="page-title">게시글 수정</h2>

    <form th:action="@{/community/modify}" method="post" th:object="${postDTO}">

        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label for="title">제목</label>
            <input type="text" id="title" th:field="*{title}" class="form-control">
            <span class="error-msg" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
        </div>

        <div class="form-group">
            <label for="content">내용</label>
            <textarea id="content" th:field="*{content}" class="form-control"></textarea>
            <span class="error-msg" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></span>
        </div>

        <div class="form-group" style="display: flex; align-items: center; gap: 8px; margin-top: 10px;">
            <input type="checkbox" id="anonymous" th:field="*{anonymous}" style="width: 18px; height: 18px; cursor: pointer;">
            <label for="anonymous" style="margin: 0; cursor: pointer; font-size: 15px; color: #3d4670; font-weight: 600;">
                익명으로 작성하기
            </label>
        </div>

        <div class="btn-wrap">
            <button type="submit" class="btn btn-submit">수정완료</button>
            <a th:href="@{/community/read(id=*{id})}" class="btn btn-cancel">취소</a>
        </div>
    </form>
</div>

</body>
</html>
