<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>펫밀리데이 - 커뮤니티</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/community/list.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container">
  <h2 class="page-title">일반 게시판</h2>

  <div class="search-area">
    <form th:action="@{/community/list}" method="get" id="searchForm" style="display: flex; align-items: center;">
      <label id="anonymousLabel" style="display: none; align-items: center; margin-right: 10px; cursor: pointer; font-size: 14px; font-weight: 500; color: #2b44cc;">
        <input type="checkbox" name="anonymousSearch" id="anonymousSearch" value="true"
               th:checked="${pageRequestDTO != null and pageRequestDTO.anonymousSearch}"
               onchange="toggleKeywordInput()" style="margin-right: 5px;"> 익명만
      </label>

      <select name="type" id="searchType" onchange="toggleAnonymousCheckbox()">
        <option value="t" th:selected="${pageRequestDTO != null and pageRequestDTO.type == 't'}">제목</option>
        <option value="c" th:selected="${pageRequestDTO != null and pageRequestDTO.type == 'c'}">내용</option>
        <option value="w" th:selected="${pageRequestDTO != null and pageRequestDTO.type == 'w'}">작성자</option>
      </select>

      <input type="text" name="keyword" id="searchKeyword" th:value="${pageRequestDTO != null ? pageRequestDTO.keyword : ''}" placeholder="검색어를 입력하세요">
      <button type="submit" class="search-btn">검색</button>
    </form>
  </div>

  <table class="board-table">
    <thead>
    <tr>
      <th width="10%">번호</th>
      <th width="50%">제목</th>
      <th width="15%">작성자</th>
      <th width="15%">작성일</th>
      <th width="10%">조회수</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${responseDTO == null or responseDTO.dtoList.isEmpty()}">
      <td colspan="5">등록된 게시글이 없습니다. 첫 게시글의 주인공이 되어보세요!</td>
    </tr>

    <tr th:each="post : ${responseDTO.dtoList}">
      <td th:text="${post.id}">1</td>
      <td class="title">
        <a th:href="@{/community/read(id=${post.id})}" th:text="${post.title}">게시글 제목</a>
      </td>
      <td th:text="${post.writerName}">작성자</td>
      <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}">작성일</td>
      <td th:text="${post.viewCount}">0</td>
    </tr>
    </tbody>
  </table>

  <div class="bottom-area">
    <div></div> <div class="pagination" th:if="${responseDTO != null and !responseDTO.dtoList.isEmpty()}">

    <a th:if="${responseDTO.prev}"
       th:href="@{/community/list(page=${responseDTO.start - 1}, type=${pageRequestDTO.type}, keyword=${pageRequestDTO.keyword})}">이전</a>

    <a th:each="num : ${#numbers.sequence(responseDTO.start, responseDTO.end)}"
       th:href="@{/community/list(page=${num}, type=${pageRequestDTO.type}, keyword=${pageRequestDTO.keyword})}"
       th:text="${num}"
       th:classappend="${num == responseDTO.page} ? 'active' : ''">1</a>

    <a th:if="${responseDTO.next}"
       th:href="@{/community/list(page=${responseDTO.end + 1}, type=${pageRequestDTO.type}, keyword=${pageRequestDTO.keyword})}">다음</a>
  </div>

    <a href="/community/register" class="write-btn">글쓰기</a>
  </div>
</div>

<script>
  function toggleAnonymousCheckbox() {
    const type = document.getElementById("searchType").value;
    const anonymousLabel = document.getElementById("anonymousLabel");
    const anonymousCheckbox = document.getElementById("anonymousSearch");

    if (type === 'w') {
      anonymousLabel.style.display = 'inline-flex'
    } else {
      anonymousLabel.style.display = 'none';
      anonymousCheckbox.checked = false;
    }
    toggleKeywordInput();
  }

  function toggleKeywordInput() {
    const anonymousCheckbox = document.getElementById("anonymousSearch");
    const keywordInput = document.getElementById("searchKeyword");

    if (anonymousCheckbox.checked) {
      keywordInput.readOnly = true;
      keywordInput.value = "";
      keywordInput.placeholder = "익명 게시글 모아보기";
      keywordInput.style.backgroundColor = "#e6e9f2";
    } else {
      keywordInput.readOnly = false;
      keywordInput.placeholder = "검색어를 입력하세요";
      keywordInput.style.backgroundColor = "#ffffff";
    }
  }

  document.addEventListener("DOMContentLoaded", function() {
    toggleAnonymousCheckbox();
  });
</script>

</body>
</html>
