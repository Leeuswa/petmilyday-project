<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>펫밀리데이 - 커뮤니티</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/community/list.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container">
  <h2 class="page-title">일반 게시판</h2>

  <div class="search-area">
    <form th:action="@{/community/list}" method="get" id="searchForm">
      <label id="anonymousLabel" style="display: none; align-items: center; margin-right: 10px; cursor: pointer; font-size: 14px; font-weight: 700; color: var(--pink);">
        <input type="checkbox" name="anonymousSearch" id="anonymousSearch" value="true"
               th:checked="${pageRequestDTO != null and pageRequestDTO.anonymousSearch}"
               onchange="document.getElementById('searchForm').submit();"> 익명글만 보기
      </label>

      <select name="type" id="searchType" onchange="toggleAnonymousCheckbox()">
        <option value="t" th:selected="${pageRequestDTO.type == 't'}">제목</option>
        <option value="c" th:selected="${pageRequestDTO.type == 'c'}">내용</option>
        <option value="w" th:selected="${pageRequestDTO.type == 'w'}">작성자</option>
      </select>

      <input type="text" name="keyword" id="searchKeyword" th:value="${pageRequestDTO.keyword}" placeholder="검색어를 입력하세요">
      <button type="submit" class="search-btn">검색</button>
    </form>
  </div>

  <table class="board-table">
    <thead>
    <tr>
      <th style="width: 10%;">번호</th>
      <th>제목</th>
      <th style="width: 20%;">작성자</th>
      <th style="width: 15%;">작성일</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="post : ${responseDTO.dtoList}">
      <td th:text="${post.id}"></td>
      <td class="title">
        <span th:if="${post.anonymous}" class="type-badge anonymity-tag" style="background-color: var(--muted); padding: 2px 6px; border-radius: 6px; font-size: 11px; color:#fff; margin-right:5px;">익명</span>
        <a th:href="@{/community/read(id=${post.id})}" th:text="${post.title}"></a>
      </td>
      <td th:text="${post.writerName}"></td>
      <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}"></td>
    </tr>
    </tbody>
  </table>

  <div class="board-footer">
    <div class="pagination">
      <a th:if="${responseDTO.prev}" th:href="@{/community/list(page=${responseDTO.start - 1}, type=${pageRequestDTO.type}, keyword=${pageRequestDTO.keyword}, anonymousSearch=${pageRequestDTO.anonymousSearch})}">이전</a>

      <a th:each="num : ${#numbers.sequence(responseDTO.start, responseDTO.end)}"
         th:href="@{/community/list(page=${num}, type=${pageRequestDTO.type}, keyword=${pageRequestDTO.keyword}, anonymousSearch=${pageRequestDTO.anonymousSearch})}"
         th:classappend="${num == responseDTO.page} ? 'active' : ''" th:text="${num}"></a>

      <a th:if="${responseDTO.next}" th:href="@{/community/list(page=${responseDTO.end + 1}, type=${pageRequestDTO.type}, keyword=${pageRequestDTO.keyword}, anonymousSearch=${pageRequestDTO.anonymousSearch})}">다음</a>
    </div>

    <a th:href="@{/community/register}" class="write-btn">글쓰기</a>
  </div>
</div>

<script>
  function toggleAnonymousCheckbox() {
    const type = document.getElementById("searchType").value;
    const anonymousLabel = document.getElementById("anonymousLabel");
    const anonymousCheckbox = document.getElementById("anonymousSearch");

    if (type === 'w') {
      anonymousLabel.style.display = 'inline-flex';
    } else {
      anonymousLabel.style.display = 'none';
      anonymousCheckbox.checked = false;
    }
    toggleKeywordInput();
  }

  function toggleKeywordInput() {
    const anonymousCheckbox = document.getElementById("anonymousSearch");
    const keywordInput = document.getElementById("searchKeyword");

    if (anonymousCheckbox.checked) {
      keywordInput.readOnly = true;
      keywordInput.value = "";
      keywordInput.placeholder = "익명 게시글 모아보기";
    } else {
      keywordInput.readOnly = false;
      keywordInput.placeholder = "검색어를 입력하세요";
    }
  }

  document.addEventListener("DOMContentLoaded", function() {
    toggleAnonymousCheckbox();
  });
</script>
</body>
</html>
