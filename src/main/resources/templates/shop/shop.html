<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>petmilyday — 동물용품샵</title>
  <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body { background-color: #f8f9fa; font-family: 'Sora', sans-serif; }
    .shop-card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }
    .sidebar-panel {
      position: sticky;
      top: 80px;
      z-index: 10;
    }
    .category-item {
      border: none;
      border-radius: 8px;
      color: #3d4670;
      font-weight: 500;
      padding: 9px 14px;
      transition: all 0.15s;
    }
    .category-item:hover { background-color: #f0f2f7; color: #0d1433; }
    .category-item.on { background-color: #eaedfa; color: #2b44cc; font-weight: 600; }
    .stars { color: #ffa502; }
    .info-label { color: #636e72; font-size: 0.85rem; }
  </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container-fluid py-5 px-4 px-md-5">

  <div class="mb-4">
    <h3 class="fw-bold"><i class="bi bi-bag-heart"></i> 동물용품샵</h3>
  </div>

  <div class="row g-4">

    <div class="col-md-2">
      <div class="card shop-card sidebar-panel p-3">
        <p class="info-label fw-bold mb-2 px-2 text-uppercase">개인맞춤 카테고리</p>
        <div class="list-group list-group-flush gap-1">
          <a th:href="@{/shop?category=ALL}" class="list-group-item list-group-item-action category-item" th:classappend="${param.category == null or #strings.equals(param.category, 'ALL')} ? 'on' : ''">전체 상품</a>
          <a th:href="@{/shop?category=사료}" class="list-group-item list-group-item-action category-item" th:classappend="${#strings.equals(param.category, '사료')} ? 'on' : ''">사료 / 간식</a>
          <a th:href="@{/shop?category=위생}" class="list-group-item list-group-item-action category-item" th:classappend="${#strings.equals(param.category, '위생')} ? 'on' : ''">패드 / 위생</a>
          <a th:href="@{/shop?category=장난감}" class="list-group-item list-group-item-action category-item" th:classappend="${#strings.equals(param.category, '장난감')} ? 'on' : ''">장난감</a>
          <a th:href="@{/shop?category=의류}" class="list-group-item list-group-item-action category-item" th:classappend="${#strings.equals(param.category, '의류')} ? 'on' : ''">의류 / 액세서리</a>
        </div>
        <hr class="opacity-25 my-3">
        <p class="info-label fw-bold mb-2 px-2 text-uppercase">맞춤 필터</p>
        <div class="list-group list-group-flush gap-1">
          <button class="list-group-item list-group-item-action category-item text-start">초코 맞춤</button>
          <button class="list-group-item list-group-item-action category-item text-start">두부 맞춤</button>
        </div>
      </div>
    </div>

    <div class="col-md-7">
      <div class="card shop-card p-3 mb-4 d-flex flex-row justify-content-between align-items-center bg-white">
        <span class="fw-bold text-secondary small" th:text="'상품 ' + ${productList.size()} + '개'"></span>
        <div class="d-flex gap-2 align-items-center">
          <button class="btn btn-outline-secondary btn-sm" onclick="location.href='/shop/order_history'"><i class="bi bi-receipt"></i> 주문내역</button>
          <button id="cartNavBtn" class="btn btn-outline-secondary btn-sm" onclick="location.href='/cart'"><i class="bi bi-cart3"></i> 장바구니 (0)</button>
          <button class="btn btn-outline-secondary btn-sm"><i class="bi bi-heart"></i> 위시리스트</button>
          <select id="shopSortSelect" onchange="sortProducts()" class="form-select form-select-sm" style="width: auto;">
            <option value="popular">인기순</option>
            <option value="name">가나다순</option>
            <option value="priceAsc">가격 낮은순</option>
            <option value="priceDesc">가격 높은순</option>
          </select>
        </div>
      </div>

      <div id="productGrid" class="row row-cols-2 row-cols-xl-4 row-cols-xxl-5 g-3">
        <div class="col prod" th:each="product : ${productList}" th:data-name="${product.name}" th:data-price="${product.price}">
          <div class="card shop-card p-3 bg-white h-100 d-flex flex-column justify-content-between" th:onclick="|location.href='/shop/detail/' + ${product.id}|" style="cursor: pointer;">
            <div>
              <div class="ratio ratio-1x1 bg-light rounded-3 overflow-hidden border mb-3">
                <img th:if="${product.imgUrl != null}" th:src="${product.imgUrl} + '?w=500&h=500&fit=crop'" class="img-fluid" style="object-fit: cover;" alt="상품 이미지" loading="lazy">
                <div th:if="${product.imgUrl == null}" class="d-flex align-items-center justify-content-center text-muted small">No Image</div>
              </div>
              <div class="px-1">
                <span class="text-muted d-block small mb-1 fw-bold" style="font-size: 10px;">PETMILYDAY</span>
                <h6 class="card-title text-dark fw-bold text-truncate" th:text="${product.name}"></h6>
                <div class="stars mb-3">★★★★★</div>
              </div>
            </div>
            <div class="px-1">
              <p class="fw-bold text-dark fs-5 mb-2" th:text="${#numbers.formatInteger(product.price, 3, 'COMMA')} + '원'"></p>
              <button class="btn btn-primary btn-sm w-100 py-2 fw-bold" th:onclick="addToCart(event, [[${product.id}]])">담기</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card shop-card sidebar-panel p-4 bg-white" th:if="${loggedInUser != null}">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <h5 class="fw-bold mb-0 text-dark"><i class="bi bi-calendar-check"></i> 정기구독</h5>
            <p class="info-label mb-0">자동 결제 배송 관리</p>
          </div>
          <button class="btn btn-primary btn-sm px-3" onclick="location.href='/shop/subscription'">관리</button>
        </div>

        <hr class="opacity-25">

        <div class="d-flex flex-column gap-2" style="max-height: 380px; overflow-y: auto;" th:if="${subscriptionList != null and !subscriptionList.isEmpty()}">
          <div class="card border p-3 bg-light rounded-3" th:each="sub : ${subscriptionList}">
            <span class="text-primary fw-bold small"><i class="bi bi-circle-fill" style="font-size: 6px; vertical-align: middle;"></i> 구독 중</span>
            <div class="fw-bold text-dark text-truncate my-1" th:text="${sub.productName}"></div>
            <span class="text-muted small" th:if="${sub.nextDeliveryDate != null}" th:text="${sub.cycleDays} + '일 주기 · ' + ${sub.nextDeliveryDate.getMonthValue()} + '.' + ${sub.nextDeliveryDate.getDayOfMonth()} + ' 배송'"></span>
          </div>
        </div>

        <div class="text-center py-4" th:if="${subscriptionList == null or subscriptionList.isEmpty()}">
          <p class="fw-bold text-secondary mb-1 small">구독 중인 상품이 없습니다.</p>
          <span class="text-muted small">상세페이지에서 신청 가능해요!</span>
        </div>
      </div>
    </div>

  </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>
<script th:inline="javascript">
  document.addEventListener('DOMContentLoaded', () => { updateCartCount(); });

  function updateCartCount() {
    fetch('/api/cart/count')
            .then(res => res.json())
            .then(count => {
              const btn = document.getElementById('cartNavBtn');
              if (btn) btn.innerHTML = `<i class="bi bi-cart3"></i> 장바구니 (${count})`;
            }).catch(err => console.error(err));
  }

  function addToCart(event, productId) {
    event.stopPropagation(); event.preventDefault();
    fetch('/api/cart/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ productId: productId, quantity: 1 })
    }).then(response => {
      if (response.ok) {
        updateCartCount();
        if (confirm('장바구니에 성공적으로 담겼습니다! 장바구니 페이지로 이동할까요?')) location.href = '/cart';
      }
    });
  }

  function sortProducts() {
    const grid = document.getElementById('productGrid');
    const select = document.getElementById('shopSortSelect');
    if(!grid || !select) return;
    const products = Array.from(grid.getElementsByClassName('prod'));
    const sortType = select.value;

    products.sort((a, b) => {
      if (sortType === 'name') return a.getAttribute('data-name').localeCompare(b.getAttribute('data-name'), 'ko');
      if (sortType === 'priceAsc') return parseInt(a.getAttribute('data-price')) - parseInt(b.getAttribute('data-price'));
      if (sortType === 'priceDesc') return parseInt(b.getAttribute('data-price')) - parseInt(a.getAttribute('data-price'));
      return 0;
    });
    products.forEach(p => grid.appendChild(p));
  }
</script>
</body>
</html>
