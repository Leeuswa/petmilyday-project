<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>petmilyday — 동물용품샵</title>
  <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link th:href="@{/css/shop/shop-main.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container-fluid py-5 shop-premium-container">

  <div class="mb-4 page-title-area">
    <h3 class="fw-bold"><i class="bi bi-bag-heart"></i> 동물용품샵</h3>
  </div>

  <div class="row g-4 justify-content-center">

    <!-- 1. 좌측 패널 -->
    <div class="col-md-2 custom-side-col">
      <div class="card shop-card sidebar-panel p-3 bg-white">
        <p class="info-label fw-bold mb-2 px-2 text-uppercase">개인맞춤 카테고리</p>
        <div class="list-group list-group-flush gap-1">
          <a th:href="@{/shop?category=ALL}" class="list-group-item list-group-item-action category-item" th:classappend="${param.category == null or #strings.equals(param.category, 'ALL')} ? 'on' : ''">
            <i class="bi bi-bag-check-fill category-custom-icon"></i><span>전체 상품</span>
          </a>
          <a th:href="@{/shop?category=사료}" class="list-group-item list-group-item-action category-item" th:classappend="${#strings.equals(param.category, '사료')} ? 'on' : ''">
            <img th:src="@{/css/shop/pet-food.png}" class="category-custom-img" alt="사료"><span>사료 / 간식</span>
          </a>
          <a th:href="@{/shop?category=위생}" class="list-group-item list-group-item-action category-item" th:classappend="${#strings.equals(param.category, '위생')} ? 'on' : ''">
            <img th:src="@{/css/shop/pet-shower.png}" class="category-custom-img" alt="위생"><span>패드 / 위생</span>
          </a>
          <a th:href="@{/shop?category=장난감}" class="list-group-item list-group-item-action category-item" th:classappend="${#strings.equals(param.category, '장난감')} ? 'on' : ''">
            <img th:src="@{/css/shop/pet-act.png}" class="category-custom-img" alt="장난감"><span>장난감</span>
          </a>
          <a th:href="@{/shop?category=의류}" class="list-group-item list-group-item-action category-item" th:classappend="${#strings.equals(param.category, '의류')} ? 'on' : ''">
            <img th:src="@{/css/shop/pet-clothes.png}" class="category-custom-img" alt="의류"><span>의류 / 액세서리</span>
          </a>
        </div>
        <hr class="opacity-25 my-3">

        <p class="info-label fw-bold mb-2 px-2 text-uppercase">맞춤 필터</p>
        <div class="list-group list-group-flush gap-1" id="petFilterGroup">
          <div th:if="${petList == null or petList.isEmpty()}" class="px-2 text-muted small" style="font-size: 11px;">
            반려동물을 등록해 주세요.
          </div>

          <button th:each="pet : ${petList}"
                  class="list-group-item list-group-item-action category-item text-start pet-filter-btn"
                  th:data-species="${pet.species}"
                  th:data-age="${pet.age}"
                  onclick="filterByPetProfile(this)">
            <i class="bi bi-stars category-custom-icon"></i><span th:text="${pet.name} + ' 맞춤'"></span>
          </button>
        </div>
      </div>
    </div>

    <!-- 2. 중앙 메인 상품 그리드 영역 (col-md-8 확장형 구조화) -->
    <div class="col-md-7 custom-center-col">
      <div class="card shop-card p-3 mb-4 d-flex flex-row justify-content-between align-items-center bg-white">
        <span class="fw-bold text-secondary small" th:text="'상품 ' + ${productList.size()} + '개'"></span>
        <div class="d-flex gap-2 align-items-center">
          <button class="btn btn-outline-secondary btn-sm" onclick="location.href='/shop/order_history'"><i class="bi bi-receipt"></i> 주문내역</button>
          <button id="cartNavBtn" class="btn btn-outline-secondary btn-sm" onclick="location.href='/cart'"><i class="bi bi-cart3"></i>장바구니 (0)</button>
          <button id="wishlistFilterBtn" class="btn btn-outline-secondary btn-sm" onclick="toggleWishlistFilter()"><i class="bi bi-heart"></i> 위시리스트</button>
          <select id="shopSortSelect" onchange="sortProducts()" class="form-select form-select-sm" style="width: auto;">
            <option value="popular">인기순</option>
            <option value="name">가나다순</option>
            <option value="priceAsc">가격 낮은순</option>
            <option value="priceDesc">가격 높은순</option>
          </select>
        </div>
      </div>

      <div id="productGrid" class="row row-cols-2 row-cols-xl-4 g-4">
        <div class="col prod" th:each="product : ${productList}" th:data-name="${product.name}" th:data-price="${product.price}" th:data-prod-id="${product.id}" th:data-species="${product.petSpecies}">
          <div class="card shop-card p-3 bg-white h-100 d-flex flex-column justify-content-between main-product-card">

            <div th:onclick="|location.href='/shop/detail/' + ${product.id}|" style="cursor: pointer;" class="product-image-container">
              <div class="ratio ratio-1x1 bg-light rounded-3 overflow-hidden border mb-3">
                <img th:src="${product.imgUrl != null and product.imgUrl != '' ? product.imgUrl : '/images/no-image.png'}"
                     class="img-fluid"
                     loading="lazy"
                     style="object-fit: cover;"
                     alt="상품 이미지"
                     onerror="this.src='/images/no-image.png'; this.onerror=null;">
              </div>
            </div>

            <div class="px-1 text-content-area">
              <span class="text-muted d-block small mb-1 fw-bold" style="font-size: 10px;">PETMILYDAY</span>

              <div class="d-flex justify-content-between align-items-start gap-2 mb-1">
                <h6 class="card-title text-dark fw-bold mb-0 product-expanded-title" th:text="${product.name}" th:onclick="|location.href='/shop/detail/' + ${product.id}|"></h6>

                <button class="btn p-0 border-0 text-danger wish-btn" th:data-prod-id="${product.id}" onclick="toggleWishlist(event, this)">
                  <i class="bi bi-heart" style="font-size: 1.15rem;"></i>
                </button>
              </div>

              <div class="stars mb-3">★★★★★</div>
            </div>

            <div class="px-1 mt-auto action-footer-block">
              <p class="fw-bold text-dark fs-5 mb-2" th:text="${#numbers.formatInteger(product.price, 3, 'COMMA')} + '원'"></p>
              <button class="btn btn-primary btn-sm w-100 py-2 fw-bold primary-cart-action" th:onclick="addToCart(event, [[${product.id}]])">담기</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 3. 우측 패널 -->
    <div class="col-md-3 custom-side-col">
      <div class="card shop-card sidebar-panel p-4 bg-white dashboard-subscription-card" th:if="${loggedInUser != null}">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <h5 class="fw-bold mb-0 text-dark"><i class="bi bi-calendar-check"></i> 정기구독</h5>
            <p class="info-label mb-0">자동 결제 배송 관리</p>
          </div>
          <button class="btn btn-primary btn-sm px-3" onclick="location.href='/shop/subscription'">관리</button>
        </div>

        <hr class="opacity-25">

        <div class="d-flex flex-column gap-2 sub-scroll-area" th:if="${subscriptionList != null and !subscriptionList.isEmpty()}">
          <div class="card border p-3 bg-light rounded-3 subscription-inner-item" th:each="sub : ${subscriptionList}">
            <span th:if="${sub.isDeleted}" class="text-danger fw-bold small">
              <i class="bi bi-exclamation-circle-fill" style="font-size: 6px; vertical-align: middle;"></i> 판매 종료
            </span>
            <span th:unless="${sub.isDeleted}" class="text-primary fw-bold small">
              <i class="bi bi-circle-fill" style="font-size: 6px; vertical-align: middle;"></i> 구독 중
            </span>

            <div class="fw-bold text-dark text-truncate my-1 sub-item-title" th:text="${sub.productName}"></div>
            <span class="text-muted small sub-item-date" th:if="${sub.nextDeliveryDate != null}" th:text="${sub.cycleDays} + '일 주기 · ' + ${sub.nextDeliveryDate.getMonthValue()} + '.' + ${sub.nextDeliveryDate.getDayOfMonth()} + ' 배송'"></span>
          </div>
        </div>

        <div class="text-center py-4" th:if="${subscriptionList == null or subscriptionList.isEmpty()}">
          <p class="fw-bold text-secondary mb-1 small">구독 중인 상품이 없습니다.</p>
          <span class="text-muted small">상세페이지에서 신청 가능해요!</span>
        </div>
      </div>
    </div>

  </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>
<script th:inline="javascript">
  let isWishlistFilterOn = false;
  let myLikedProducts = [];

  document.addEventListener('DOMContentLoaded', () => {
    updateCartCount();
    loadMyWishlistStatus();
  });

  function updateCartCount() {
    fetch('/api/cart/count')
            .then(res => res.json())
            .then(count => {
              const btn = document.getElementById('cartNavBtn');
              if (btn) btn.innerHTML = `<i class="bi bi-cart3"></i> 장바구니 (${count})`;
            }).catch(err => console.error(err));
  }

  function addToCart(event, productId) {
    event.stopPropagation(); event.preventDefault();
    fetch('/api/cart/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ productId: productId, quantity: 1 })
    }).then(response => {
      if (response.ok) {
        updateCartCount();
        if (confirm('장바구니에 성공적으로 담겼습니다! 장바구니 페이지로 이동할까요?')) location.href = '/cart';
      }
    });
  }

  function toggleWishlist(event, element) {
    event.stopPropagation();
    event.preventDefault();

    const productId = element.getAttribute('data-prod-id');
    const pId = parseInt(productId);
    const icon = element.querySelector('i');
    const isCurrentlyLiked = icon.classList.contains('bi-heart-fill');

    if (isCurrentlyLiked) {
      icon.className = 'bi bi-heart';
      icon.style.color = '';
    } else {
      icon.className = 'bi bi-heart-fill';
      icon.style.color = '#ff4757';
    }

    fetch('/api/wishlist/toggle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ productId: pId })
    })
            .then(res => {
              if(res.status === 401) {
                alert('로그인이 필요한 기능입니다.');
                icon.className = 'bi bi-heart';
                icon.style.color = '';
                return;
              }
              return res.json();
            })
            .then(data => {
              if (data && data.success) {
                if (data.isLiked) {
                  if (!myLikedProducts.includes(pId)) myLikedProducts.push(pId);
                } else {
                  myLikedProducts = myLikedProducts.filter(id => id !== pId);
                  if (isWishlistFilterOn) {
                    const card = element.closest('.prod');
                    if (card) card.style.display = 'none';
                  }
                }
              }
            })
            .catch(err => {
              console.error('위시리스트 통신 에러:', err);
              if (isCurrentlyLiked) {
                icon.className = 'bi bi-heart-fill';
                icon.style.color = '#ff4757';
              } else {
                icon.className = 'bi bi-heart';
                icon.style.color = '';
              }
            });
  }

  function loadMyWishlistStatus() {
    fetch('/api/wishlist/my')
            .then(res => res.ok ? res.json() : [])
            .then(likedProductIds => {
              myLikedProducts = likedProductIds;
              if (!Array.isArray(likedProductIds)) return;

              const wishBtns = document.querySelectorAll('.wish-btn');
              wishBtns.forEach(btn => {
                const pId = parseInt(btn.getAttribute('data-prod-id'));
                if (likedProductIds.includes(pId)) {
                  const icon = btn.querySelector('i');
                  icon.className = 'bi bi-heart-fill';
                  icon.style.color = '#ff4757';
                }
              });
            }).catch(err => console.log('위시리스트 데이터 로드 실패'));
  }

  function toggleWishlistFilter() {
    const btn = document.getElementById('wishlistFilterBtn');
    const products = document.querySelectorAll('.prod');

    isWishlistFilterOn = !isWishlistFilterOn;

    if (isWishlistFilterOn) {
      btn.classList.replace('btn-outline-secondary', 'btn-danger');
      btn.style.color = '#fff';

      products.forEach(p => {
        const pId = parseInt(p.getAttribute('data-prod-id'));
        if (myLikedProducts.includes(pId)) {
          p.style.display = '';
        } else {
          p.style.display = 'none';
        }
      });
    } else {
      btn.classList.replace('btn-danger', 'btn-outline-secondary');
      btn.style.color = '';

      products.forEach(p => {
        p.style.display = '';
      });
    }
  }

  function filterByPetProfile(element) {
    const products = document.querySelectorAll('.prod');
    const targetSpecies = element.getAttribute('data-species');
    const allPetBtns = document.querySelectorAll('.pet-filter-btn');

    if (element.classList.contains('on')) {
      element.classList.remove('on');
      products.forEach(p => p.style.display = '');
    } else {
      allPetBtns.forEach(btn => btn.classList.remove('on'));
      element.classList.add('on');

      products.forEach(p => {
        const prodSpecies = p.getAttribute('data-species') || '';
        if (prodSpecies.includes(targetSpecies) || targetSpecies.includes(prodSpecies)) {
          p.style.display = '';
        } else {
          p.style.display = 'none';
        }
      });
    }
  }

  function sortProducts() {
    const grid = document.getElementById('productGrid');
    const select = document.getElementById('shopSortSelect');
    if(!grid || !select) return;
    const products = Array.from(grid.getElementsByClassName('prod'));
    const sortType = select.value;

    products.sort((a, b) => {
      if (sortType === 'name') return a.getAttribute('data-name').localeCompare(b.getAttribute('data-name'), 'ko');
      if (sortType === 'priceAsc') return parseInt(a.getAttribute('data-price')) - parseInt(b.getAttribute('data-price'));
      if (sortType === 'priceDesc') return parseInt(b.getAttribute('data-price')) - parseInt(a.getAttribute('data-price'));
      return 0;
    });
    products.forEach(p => grid.appendChild(p));
  }
</script>
</body>
</html>
