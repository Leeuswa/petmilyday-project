<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>petmilyday - 나의 정기구독 관리</title>
    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link th:href="@{/css/shop/shop-subscription-manage.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5 shop-premium-container">

    <div class="mb-4">
        <a th:href="@{/shop}" class="btn btn-outline-secondary btn-sm toolbar-btn">
            <i class="bi bi-arrow-left"></i> 동물용품샵으로 돌아가기
        </a>
    </div>

    <div class="mb-4 history-title-block">
        <h3 class="fw-bold mb-1 text-dark"><i class="bi bi-calendar2-range text-warning"></i> 나의 정기구독 관리</h3>
        <p class="info-label mb-0">정기 결제 주기 변경 및 구독 해지를 편리하게 관리할 수 있습니다.</p>
    </div>

    <div class="d-flex flex-column gap-3" th:if="${subscriptionList != null and !subscriptionList.isEmpty()}">
        <div th:each="sub : ${subscriptionList}" class="card shop-card p-4 bg-white sub-card-item">
            <div class="row align-items-center g-3">

                <div class="col-auto">
                    <div class="bg-light rounded-3 overflow-hidden border product-img-wrap" style="width: 80px; height: 80px;">
                        <img th:if="${sub.imgUrl != null}" th:src="${sub.imgUrl} + '?w=150&h=150&fit=crop'" class="img-fluid h-100 w-100" style="object-fit: cover;" alt="상품 이미지">
                    </div>
                </div>

                <div class="col">
                    <div class="mb-1">
                        <span th:if="${sub.status == 'ACTIVE'}" class="badge badge-custom-success px-2 py-1 small rounded-pill">ACTIVE</span>
                        <span th:if="${sub.status == 'CANCELLED'}" class="badge bg-secondary bg-opacity-10 text-secondary px-2 py-1 small rounded-pill">CANCELLED</span>
                    </div>

                    <h5 class="fw-bold text-dark mb-1" th:text="${sub.productName}"></h5>

                    <div th:if="${sub.isDeleted}" class="mb-2">
                        <span class="badge bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25 rounded-pill">
                            <i class="bi bi-exclamation-triangle-fill"></i> 판매 종료된 상품입니다
                        </span>
                    </div>

                    <p class="mb-1 small text-secondary">
                        결제 금액: <strong class="text-dark" th:text="${#numbers.formatInteger(sub.productPrice, 3, 'COMMA')} + '원'"></strong> (수량: [[${sub.quantity}]]개)
                    </p>

                    <div class="info-label text-muted" th:if="${sub.status == 'ACTIVE'}">
                        <i class="bi bi-arrow-repeat"></i> 주기: <span class="text-dark fw-medium" th:text="${sub.cycleDays} + '일 주기'"></span>
                        <span class="mx-2 text-black-50">|</span>
                        <i class="bi bi-calendar-event"></i> 다음 결제일: <strong class="price-total-tag" th:if="${sub.nextDeliveryDate != null}" th:text="${sub.nextDeliveryDate}"></strong>
                    </div>
                </div>

                <div class="col-auto">
                    <div class="d-flex gap-2">

                        <form th:if="${sub.status == 'ACTIVE'}" th:action="@{/api/subscription/change-cycle}" method="post" class="d-inline" th:id="'cycleForm-' + ${sub.id}">
                            <input type="hidden" name="subId" th:value="${sub.id}"/>
                            <input type="hidden" name="cycleDays" th:id="'cycleInput-' + ${sub.id}"/>
                            <button type="button" class="btn btn-outline-secondary btn-sm px-3 py-2 fw-medium btn-action-secondary" th:onclick="'submitCycle(' + ${sub.id} + ')'">
                                <i class="bi bi-gear"></i> 주기 변경
                            </button>
                        </form>

                        <form th:if="${sub.status == 'ACTIVE'}" th:action="@{/api/subscription/cancel}" method="post" class="d-inline" th:id="'cancelForm-' + ${sub.id}">
                            <input type="hidden" name="subId" th:value="${sub.id}"/>
                            <button type="button" class="btn btn-outline-danger btn-sm px-3 py-2 fw-medium btn-action-danger" th:onclick="'submitCancel(' + ${sub.id} + ')'">
                                <i class="bi bi-trash"></i> 구독 해지
                            </button>
                        </form>

                        <span th:if="${sub.status == 'CANCELLED'}" class="text-muted small px-2 py-1 bg-light rounded border border-dashed text-cancelled-box">
                            <i class="bi bi-check-circle"></i> 해지 완료됨
                        </span>

                    </div>
                </div>

            </div>
        </div>

        <div class="d-flex justify-content-center mt-4 w-100">
            <nav aria-label="Subscription Page Navigation">
                <ul class="pagination pagination-sm mb-0" id="shopPagination">
                </ul>
            </nav>
        </div>
    </div>

    <div class="card shop-card p-5 text-center bg-white" th:if="${subscriptionList == null or subscriptionList.isEmpty()}">
        <p class="fw-bold text-secondary mb-1">현재 이용 중인 정기구독 서비스가 없습니다. 🐾</p>
        <p class="text-muted small mb-4">반려동물을 위한 맞춤 상품을 정기구독해 보세요!</p>
        <a th:href="@{/shop}" class="btn btn-primary btn-sm px-4 py-2.5 primary-cart-action">
            <i class="bi bi-shop"></i> 용품 보러가기
        </a>
    </div>

</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>
<script th:inline="javascript">

    const ITEMS_PER_PAGE = 5;
    let currentPage = 1;

    document.addEventListener('DOMContentLoaded', () => {
        renderSubscriptionPage(1);
    });

    function renderSubscriptionPage(page) {
        currentPage = page;
        const subItems = Array.from(document.querySelectorAll('.sub-card-item'));
        const totalItems = subItems.length;
        const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE) || 1;

        const startIndex = (page - 1) * ITEMS_PER_PAGE;
        const endIndex = startIndex + ITEMS_PER_PAGE;

        subItems.forEach((item, idx) => {
            if (idx >= startIndex && idx < endIndex) {
                item.style.setProperty('display', '', 'important');
            } else {
                item.style.setProperty('display', 'none', 'important');
            }
        });

        const paginationUl = document.getElementById('shopPagination');
        if (!paginationUl) return;
        paginationUl.innerHTML = '';

        const prevLi = document.createElement('li');
        prevLi.className = `page-item ${page === 1 ? 'disabled' : ''}`;
        prevLi.innerHTML = `<a class="page-link" href="javascript:void(0)" onclick="renderSubscriptionPage(1)">«</a>`;
        paginationUl.appendChild(prevLi);

        for (let i = 1; i <= totalPages; i++) {
            const pageLi = document.createElement('li');
            pageLi.className = `page-item ${i === page ? 'active' : ''}`;
            pageLi.innerHTML = `<a class="page-link" href="javascript:void(0)" onclick="renderSubscriptionPage(${i})">${i}</a>`;
            paginationUl.appendChild(pageLi);
        }

        const nextLi = document.createElement('li');
        nextLi.className = `page-item ${page === totalPages ? 'disabled' : ''}`;
        nextLi.innerHTML = `<a class="page-link" href="javascript:void(0)" onclick="renderSubscriptionPage(${totalPages})">»</a>`;
        paginationUl.appendChild(nextLi);
    }

    function submitCycle(subId) {
        const newCycle = prompt("변경할 주기를 입력하세요 (예: 14, 30, 60):", "30");
        if (!newCycle) return;

        if (newCycle !== "14" && newCycle !== "30" && newCycle !== "60") {
            alert("주기는 14, 30, 60일 중에서만 선택 가능합니다!");
            return;
        }

        document.getElementById('cycleInput-' + subId).value = newCycle;
        document.getElementById('cycleForm-' + subId).submit();
    }

    function submitCancel(subId) {
        if (confirm("진짜로 이 소중한 정기구독을 해지하시겠습니까? 😢")) {
            document.getElementById('cancelForm-' + subId).submit();
        }
    }
</script>
</body>
</html>
