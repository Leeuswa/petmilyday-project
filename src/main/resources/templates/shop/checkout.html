<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>주문 / 결제 - petmilyday</title>
    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>

        body { background-color: #f8f9fa; font-family: 'Sora', sans-serif; }
        .detail-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .info-label { color: #636e72; font-size: 0.85rem; }
        .payment-box {
            border: 2px solid #2b44cc;
            background-color: #f0f3ff;
            border-radius: 12px;
            padding: 16px;
        }
        .payment-box-disabled {
            border: 1px solid #dee2e6;
            border-radius: 12px;
            padding: 16px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5" style="max-width: 1100px;">
    <h3 class="fw-bold mb-4"><i class="bi bi-credit-card-2-front"></i> 주문 / 결제</h3>

    <div class="row g-4">
        <!-- 왼쪽: 입력 정보 구역 (2칸 차지, col-md-8) -->
        <div class="col-md-8">

            <!-- 1. 배송지 정보 -->
            <div class="card detail-card p-4 mb-4 bg-white">
                <h5 class="fw-bold mb-3 text-dark pb-2 border-bottom">📦 배송지 정보</h5>
                <div class="d-flex flex-column gap-3">
                    <div>
                        <p class="info-label mb-1">수령인</p>
                        <input type="text" id="receiverName" class="form-control" placeholder="받으실 분 이름을 입력하세요">
                    </div>
                    <div>
                        <p class="info-label mb-1">연락처</p>
                        <input type="text" id="receiverPhone" class="form-control" placeholder="010-XXXX-XXXX">
                    </div>
                    <div>
                        <p class="info-label mb-1">배송지 주소</p>
                        <input type="text" id="deliveryAddress" class="form-control" placeholder="상세 주소를 입력하세요">
                    </div>
                    <div>
                        <p class="info-label mb-1">배송 요청사항 (선택)</p>
                        <input type="text" id="deliveryMemo" class="form-control" placeholder="문 앞에 놓아주세요 등">
                    </div>
                </div>
            </div>

            <!-- 2. 결제 수단 선택 -->
            <div class="card detail-card p-4 mb-4 bg-white">
                <h5 class="fw-bold mb-3 text-dark pb-2 border-bottom">💳 결제 수단</h5>
                <div class="row g-3">
                    <div class="col-6">
                        <label class="d-flex align-items-center justify-content-between payment-box h-100 cursor-pointer">
                            <span class="fw-bold text-dark small">카카오페이 (간편결제)</span>
                            <input type="radio" name="paymentMethod" value="KAKAO_PAY" checked class="form-check-input">
                        </label>
                    </div>
                    <div class="col-6">
                        <label class="d-flex align-items-center justify-content-between payment-box-disabled h-100">
                            <span class="fw-bold text-muted small">신용카드 (준비중)</span>
                            <input type="radio" name="paymentMethod" value="CARD" disabled class="form-check-input">
                        </label>
                    </div>
                </div>
            </div>

            <!-- 3. 주문 상품 확인 패널 -->
            <div class="card detail-card p-4 bg-white">
                <h5 class="fw-bold mb-3 text-dark pb-2 border-bottom">🛒 주문 상품 정보</h5>
                <div id="orderItemsList" class="d-flex flex-column gap-2">
                    <p class="text-muted py-3 text-center small">주문 상품을 불러오는 중...</p>
                </div>
            </div>

        </div>

        <!-- 우측: 최종 결제 금액 및 결제하기 버튼 (1칸 차지, col-md-4) -->
        <div class="col-md-4">
            <div class="card detail-card p-4 bg-white sticky-top" style="top: 80px; z-index: 10;">
                <h5 class="fw-bold mb-4 text-dark text-center">최종 결제 금액</h5>

                <div class="d-flex flex-column gap-2 pb-3 mb-3 border-bottom small text-secondary">
                    <div class="d-flex justify-content-between">
                        <span>총 상품 금액</span>
                        <span id="totalProductPrice" class="fw-bold text-dark">0원</span>
                    </div>
                    <div class="d-flex justify-content-between">
                        <span>배송비</span>
                        <span id="sumShippingPrice" class="text-primary fw-bold">무료 배송</span>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <span class="fw-bold text-dark">최종 결제 금액</span>
                    <span id="finalTotalPrice" class="fs-4 fw-bold text-primary">0원</span>
                </div>

                <button type="button" onclick="submitOrder()" class="btn btn-primary w-100 py-2.5 fw-bold fs-6">
                    <i class="bi bi-wallet2"></i> 결제하기
                </button>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>
<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", () => {
        loadCheckoutData();
    });

    let globalCheckoutItems = [];

    function loadCheckoutData() {
        const sessionData = sessionStorage.getItem("checkoutItems");
        if (!sessionData) {
            alert("주문 정보가 없습니다. 장바구니나 상세페이지에서 다시 시도해 주세요.");
            location.href = "/cart";
            return;
        }

        globalCheckoutItems = JSON.parse(sessionData);
        const listContainer = document.getElementById("orderItemsList");
        listContainer.innerHTML = "";

        let totalPriceAccumulator = 0;

        globalCheckoutItems.forEach(item => {
            const itemTotalPrice = item.price * item.quantity;
            totalPriceAccumulator += itemTotalPrice;

            const itemDiv = document.createElement("div");
            itemDiv.className = "d-flex justify-content-between align-items-center py-2 border-bottom border-light last:border-0 small";
            itemDiv.innerHTML = `
                <div>
                    <p class="fw-bold text-dark mb-0">${item.name || '알 수 없는 상품'}</p>
                    <p class="text-muted mb-0" style="font-size:11px;">수량: ${item.quantity}개 / 단가: ${item.price.toLocaleString()}원</p>
                </div>
                <strong class="text-secondary">${itemTotalPrice.toLocaleString()}원</strong>
            `;
            listContainer.appendChild(itemDiv);
        });

        let shippingPrice = 0;
        if (totalPriceAccumulator > 0 && totalPriceAccumulator < 50000) {
            shippingPrice = 3000;
        }

        const finalTotalPrice = totalPriceAccumulator + shippingPrice;
        document.getElementById("totalProductPrice").innerText = totalPriceAccumulator.toLocaleString() + "원";

        const shippingDisplay = document.getElementById("sumShippingPrice");
        if (shippingDisplay) {
            shippingDisplay.innerText = shippingPrice === 0 ? "무료 배송" : shippingPrice.toLocaleString() + "원";
            shippingDisplay.className = shippingPrice === 0 ? "text-primary fw-bold" : "text-dark fw-bold";
        }

        document.getElementById("finalTotalPrice").innerText = finalTotalPrice.toLocaleString() + "원";
    }

    function submitOrder() {
        const name = document.getElementById("receiverName").value.trim();
        const phone = document.getElementById("receiverPhone").value.trim();
        const address = document.getElementById("deliveryAddress").value.trim();
        const memo = document.getElementById("deliveryMemo").value.trim();
        const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked')?.value || "KAKAO_PAY";

        if (!name) return alert("수령인 이름을 입력해 주세요!");
        if (!phone) return alert("연락처를 입력해 주세요!");
        if (!address) return alert("배송지 주소를 입력해 주세요!");

        if (paymentMethod === 'KAKAO_PAY') {
            fetch('/api/payment/ready', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    receiverName: name,
                    receiverPhone: phone,
                    deliveryAddress: address,
                    detailAddress: memo,
                    itemName: globalCheckoutItems[0]?.name + (globalCheckoutItems.length > 1 ? " 외 " + (globalCheckoutItems.length - 1) + "건" : ""),
                    totalAmount: parseInt(document.getElementById("finalTotalPrice").innerText.replace(/[^0-9]/g, '')) || 0,
                    items: globalCheckoutItems
                })
            })
                .then(res => { if (!res.ok) throw new Error("통신 실패"); return res.json(); })
                .then(data => {
                    if (data.next_redirect_pc_url) {
                        localStorage.setItem("order_address", address);
                        location.href = data.next_redirect_pc_url;
                    } else {
                        alert("카카오페이 통신 실패: " + data.message);
                    }
                })
                .catch(err => { alert("카카오페이 통신 실패: " + err.message); });
        } else if (paymentMethod === 'CARD') {
            alert("신용카드 결제는 현재 준비 중입니다. 카카오페이를 이용해 주세요!");
        }
    }
</script>
</body>
</html>
