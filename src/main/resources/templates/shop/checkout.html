<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>주문 / 결제 - petmilyday</title>
    <!-- 테일윈드 CSS로 깔끔하게 디자인 세팅 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>

<div class="max-w-6xl mx-auto px-4 py-10">
    <h1 class="text-3xl font-bold mb-8 text-slate-800">주문 / 결제</h1>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- 좌측: 입력 정보 구역 (2칸 차지) -->
        <div class="lg:col-span-2 space-y-6">

            <!-- 1. 배송지 정보 (연락처 슬롯까지 테일윈드 그리드로 핏 이쁘게 정렬 완료) -->
            <div class="bg-white p-6 rounded-2xl shadow-xs border border-slate-100">
                <h2 class="text-xl font-bold mb-4 text-slate-700 border-b pb-2">📦 배송지 정보</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">수령인</label>
                        <input type="text" id="receiverName" class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:outline-hidden focus:border-indigo-500" placeholder="받으실 분 이름을 입력하세요">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">연락처</label>
                        <input type="text" id="receiverPhone" class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:outline-hidden focus:border-indigo-500" placeholder="010-XXXX-XXXX">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">배송지 주소</label>
                        <input type="text" id="deliveryAddress" class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:outline-hidden focus:border-indigo-500" placeholder="상세 주소를 입력하세요">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">배송 요청사항 (선택)</label>
                        <input type="text" id="deliveryMemo" class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:outline-hidden focus:border-indigo-500" placeholder="문 앞에 놓아주세요 등">
                    </div>
                </div>
            </div>

            <!-- 2. 결제 수단 선택 -->
            <div class="bg-white p-6 rounded-2xl shadow-xs border border-slate-100">
                <h2 class="text-xl font-bold mb-4 text-slate-700 border-b pb-2">💳 결제 수단</h2>
                <div class="grid grid-cols-2 gap-4">
                    <label class="flex items-center justify-between p-4 border border-indigo-500 bg-indigo-50/50 rounded-xl cursor-pointer">
                        <span class="font-medium text-indigo-900">카카오페이 (간편결제)</span>
                        <input type="radio" name="paymentMethod" value="KAKAO_PAY" checked class="w-4 h-4 text-indigo-600">
                    </label>
                    <label class="flex items-center justify-between p-4 border border-slate-200 rounded-xl opacity-50 cursor-not-allowed">
                        <span class="font-medium text-slate-500">신용카드 (준비중)</span>
                        <input type="radio" name="paymentMethod" value="CARD" disabled class="w-4 h-4 text-slate-400">
                    </label>
                </div>
            </div>

            <!-- 3. 주문 상품 확인 패널 -->
            <div class="bg-white p-6 rounded-2xl shadow-xs border border-slate-100">
                <h2 class="text-xl font-bold mb-4 text-slate-700 border-b pb-2">🛒 주문 상품 정보</h2>
                <div id="orderItemsList" class="divide-y divide-slate-100">
                    <p class="text-slate-400 py-4 text-center">주문 상품을 불러오는 중...</p>
                </div>
            </div>

        </div>

        <!-- 우측: 최종 결제 금액 및 결제하기 버튼 (1칸 차지) -->
        <div class="lg:col-span-1">
            <div class="bg-white p-6 rounded-2xl shadow-xs border border-slate-100 sticky top-6">
                <h2 class="text-xl font-bold mb-6 text-slate-700">최종 결제 금액</h2>

                <div class="space-y-4 border-b pb-4 mb-4 text-sm text-slate-600">
                    <div class="flex justify-between">
                        <span>총 상품 금액</span>
                        <span id="totalProductPrice">0원</span>
                    </div>
                    <div class="flex justify-between">
                        <span>배송비</span>
                        <span id="sumShippingPrice" class="text-indigo-600 font-medium">무료 배송</span>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-6">
                    <span class="text-base font-bold text-slate-800">최종 결제 금액</span>
                    <span id="finalTotalPrice" class="text-2xl font-extrabold text-indigo-600">0원</span>
                </div>

                <button type="button"
                        onclick="submitOrder()"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition-colors duration-200 cursor-pointer text-center block">
                    결제하기
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // 페이지 로드 완료 시에만 안전하게 세션 팩 데이터 로드 실행
    document.addEventListener("DOMContentLoaded", () => {
        loadCheckoutData();
    });

    let globalCheckoutItems = [];

    function loadCheckoutData() {
        const sessionData = sessionStorage.getItem("checkoutItems");
        if (!sessionData) {
            alert("주문 정보가 없습니다. 장바구니나 상세페이지에서 다시 시도해 주세요.");
            location.href = "/cart";
            return;
        }

        globalCheckoutItems = JSON.parse(sessionData);

        const listContainer = document.getElementById("orderItemsList");
        listContainer.innerHTML = "";

        let totalPriceAccumulator = 0;

        globalCheckoutItems.forEach(item => {
            const itemTotalPrice = item.price * item.quantity;
            totalPriceAccumulator += itemTotalPrice;

            const itemDiv = document.createElement("div");
            itemDiv.className = "flex justify-between items-center py-4 border-b border-slate-100 last:border-0";
            itemDiv.innerHTML = `
                <div>
                    <p class="font-semibold text-slate-800 text-base">${item.name || '알 수 없는 상품'}</p>
                    <p class="text-sm text-slate-400 mt-1">수량: ${item.quantity}개 / 단가: ${item.price.toLocaleString()}원</p>
                </div>
                <span class="font-bold text-slate-700 text-lg">${itemTotalPrice.toLocaleString()}원</span>
            `;
            listContainer.appendChild(itemDiv);
        });

        let shippingPrice = 0;
        if (totalPriceAccumulator > 0 && totalPriceAccumulator < 50000) {
            shippingPrice = 3000;
        }

        const finalTotalPrice = totalPriceAccumulator + shippingPrice;

        document.getElementById("totalProductPrice").innerText = totalPriceAccumulator.toLocaleString() + "원";

        const shippingDisplay = document.getElementById("sumShippingPrice");
        if (shippingDisplay) {
            shippingDisplay.innerText = shippingPrice === 0 ? "무료 배송" : shippingPrice.toLocaleString() + "원";
            if(shippingPrice === 0) {
                shippingDisplay.className = "text-indigo-600 font-medium";
            } else {
                shippingDisplay.className = "text-slate-700 font-medium";
            }
        }

        document.getElementById("finalTotalPrice").innerText = finalTotalPrice.toLocaleString() + "원";
    }

    // [★완벽 정밀 수선] 진짜로 결제 버튼을 직접 쾅 눌렀을 때만 동작하는 함수
    function submitOrder() {
        const name = document.getElementById("receiverName").value.trim();
        const phone = document.getElementById("receiverPhone").value.trim();
        const address = document.getElementById("deliveryAddress").value.trim();
        const memo = document.getElementById("deliveryMemo").value.trim();

        // 선택된 결제 수단 확인 (KAKAO_PAY 또는 CARD)
        const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked')?.value || "KAKAO_PAY";

        if (!name) return alert("수령인 이름을 입력해 주세요!");
        if (!phone) return alert("연락처를 입력해 주세요!");
        if (!address) return alert("배송지 주소를 입력해 주세요!");

        // ⭕ [★핵심 분기] 카카오페이를 선택한 경우 -> 정기결제처럼 실제 카카오 API 통신망 작동!
        if (paymentMethod === 'KAKAO_PAY') {

            // 백엔드에 일반 카카오페이 단건 결제 '준비(Ready)'를 요청하도록 설계
            fetch('/api/payment/ready', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    receiverName: name,
                    receiverPhone: phone,
                    deliveryAddress: address,
                    deliveryMemo: memo,
                    itemName: globalCheckoutItems[0]?.name + (globalCheckoutItems.length > 1 ? " 외 " + (globalCheckoutItems.length - 1) + "건" : ""),
                    totalAmount: parseInt(document.getElementById("finalTotalPrice").innerText.replace(/[^0-9]/g, '')) || 0,
                    items: globalCheckoutItems
                })
            })
                .then(response => {
                    if (!response.ok) throw new Error("통신 실패");
                    return response.json();
                })
                .then(data => {
                    if (data.next_redirect_pc_url) {
                        // 임시 주문 데이터 보관용 셋업
                        localStorage.setItem("order_address", address);
                        // 진짜 카카오페이 결제 팝업창으로 화면 리다이렉트 폭격!!
                        location.href = data.next_redirect_pc_url;
                    } else {
                        alert("카카오페이 통신 실패: " + data.message);
                    }
                })
                .catch(error => {
                    // ⭕ 백엔드 API 문이 아직 닫혀있으므로 정기구독창과 똑같이 '통신 실패' 경고가 뜨게 됨!
                    alert("카카오페이 통신 실패: " + error.message);
                });

        } else if (paymentMethod === 'CARD') {
            // 신용카드 선택 시 예외 처리
            alert("신용카드 결제는 현재 준비 중입니다. 카카오페이를 이용해 주세요!");
        }
    }
</script>
</body>
</html>
