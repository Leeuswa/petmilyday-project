<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="ko">
<head>
  <meta charset="UTF-8">
  <title>관리자 - 동물용품 관리</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .product-img {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-5 mb-5">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">⚙️ 동물용품 상품 관리</h2>
    <a th:href="@{/admin/shop/new}" class="btn btn-primary fw-bold">➕ 새 상품 등록</a>
  </div>

  <table class="table table-hover align-middle text-center border">
    <thead class="table-light">
    <tr>
      <th>ID</th>
      <th>이미지</th>
      <th>상품명</th>
      <th>가격</th>
      <th>카테고리</th>
      <th>관리</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(productList)}">
      <td colspan="6" class="text-center py-5 text-muted">등록된 상품이 없습니다.</td>
    </tr>

    <tr th:each="product : ${productList}">
      <td th:text="${product.id}">1</td>
      <td>
        <img th:src="${product.imgUrl}" alt="상품 썸네일" class="product-img">
      </td>
      <td th:text="${product.name}" class="text-start fw-bold">상품명</td>
      <td th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')} + '원'">0원</td>
      <td th:text="${product.petSpecies}">카테고리</td>

      <td>
        <a th:href="@{/admin/shop/edit/{id}(id=${product.id})}" class="btn btn-sm btn-outline-primary">수정</a>

        <form th:action="@{/admin/shop/delete/{id}(id=${product.id})}" method="post" style="display: inline-block;">
          <button type="submit" class="btn btn-sm btn-outline-danger"
                  onclick="return confirm('이 상품을 정말 삭제하시겠습니까?');">
            삭제
          </button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>

</div>

</body>
</html>
