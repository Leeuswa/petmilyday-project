<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 - 동물용품 관리</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link th:href="@{/css/shop/shop-admin-list.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-5 mb-5 shop-premium-container">

  <div class="d-flex justify-content-between align-items-center mb-4 history-title-block">
    <h2 class="fw-bold text-dark mb-0"><i class="bi bi-gear-fill text-warning"></i> 동물용품 상품 관리</h2>
    <div class="d-flex gap-3 align-items-center">
      <select id="adminSortSelect" onchange="changeSort(this.value)" class="form-select form-select-sm" style="width: 140px; border-radius: 8px;">
        <option value="idDesc" th:selected="${sort == 'idDesc' or sort == null}">최신 등록순</option>
        <option value="priceAsc" th:selected="${sort == 'priceAsc'}">가격 낮은순</option>
        <option value="priceDesc" th:selected="${sort == 'priceDesc'}">가격 높은순</option>
        <option value="nameAsc" th:selected="${sort == 'nameAsc'}">상품 가나다순</option>
      </select>
      <a th:href="@{/admin/shop/new}" class="btn btn-primary fw-bold primary-cart-action">➕ 새 상품 등록</a>
    </div>
  </div>

  <div class="card shop-card p-4 bg-white">
    <div class="table-responsive">
      <table class="table table-hover align-middle text-center small mb-0 spec-custom-table">
        <thead>
        <tr class="table-light text-secondary fw-bold">
          <th class="py-3">ID</th>
          <th class="py-3">이미지</th>
          <th class="py-3 text-start">상품명</th>
          <th class="py-3">가격</th>
          <th class="py-3">재고</th>
          <th class="py-3">카테고리</th>
          <th class="py-3">관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(productList.content)}">
          <td colspan="7" class="text-center py-5 text-muted fw-bold">등록된 상품이 없습니다.</td>
        </tr>

        <tr th:each="product : ${productList.content}" class="text-dark">
          <td th:text="${product.id}" class="fw-bold text-muted">1</td>
          <td>
            <div class="product-img-wrap mx-auto">
              <img th:src="${product.imgUrl != null and product.imgUrl != '' ? product.imgUrl : '/images/no-image.png'}" alt="상품 썸네일" class="product-img">
            </div>
          </td>
          <td th:text="${product.name}" class="text-start fw-bold text-dark">상품명</td>
          <td th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')} + '원'" class="fw-bold price-total-tag">0원</td>
          <td>
            <span th:text="${product.stock} + '개'" th:classappend="${product.stock == 0} ? 'text-danger fw-bold' : ''">0개</span>
          </td>
          <td>
            <span class="badge category-badge" th:text="${product.category}">카테고리</span>
          </td>
          <td>
            <div class="d-inline-flex gap-2">
              <a th:href="@{/admin/shop/edit/{id}(id=${product.id})}" class="btn btn-sm btn-action-secondary fw-medium">수정</a>

              <form th:action="@{/admin/shop/delete/{id}(id=${product.id})}" method="post" class="m-0 d-inline-block">
                <button type="submit" class="btn btn-sm btn-action-danger fw-medium"
                        onclick="return confirm('이 상품을 정말 삭제하시겠습니까?');">
                  삭제
                </button>
              </form>
            </div>
          </td>
        </tr>
        </tbody>
      </table>
    </div>

    <div th:if="${productList.totalPages > 1}" class="d-flex justify-content-center mt-4">
      <nav aria-label="Page navigation">
        <ul class="pagination pagination-sm mb-0 gap-1">
          <li class="page-item" th:classappend="${productList.first} ? 'disabled'">
            <a class="page-link border-0 rounded-2" th:href="@{/admin/shop/list(page=${productList.number - 1}, sort=${sort})}" aria-label="Previous">
              <span aria-hidden="true">&laquo;</span>
            </a>
          </li>

          <li class="page-item" th:each="pageIdx : ${#numbers.sequence(0, productList.totalPages - 1)}" th:classappend="${pageIdx == productList.number} ? 'active'">
            <a class="page-link border-0 rounded-2 fw-bold" th:href="@{/admin/shop/list(page=${pageIdx}, sort=${sort})}" th:text="${pageIdx + 1}">1</a>
          </li>

          <li class="page-item" th:classappend="${productList.last} ? 'disabled'">
            <a class="page-link border-0 rounded-2" th:href="@{/admin/shop/list(page=${productList.number + 1}, sort=${sort})}" aria-label="Next">
              <span aria-hidden="true">&raquo;</span>
            </a>
          </li>
        </ul>
      </nav>
    </div>

  </div>
</div>

<script th:inline="javascript">
  // 정렬 값 체인지 시 호출되는 스크립트
  function changeSort(sortValue) {
    const urlParams = new URLSearchParams(window.location.search);
    urlParams.set('sort', sortValue);
    urlParams.set('page', '0'); // 정렬을 바꾸면 무조건 1페이지로 강제 워프
    window.location.href = window.location.pathname + '?' + urlParams.toString();
  }
</script>
</body>
</html>
