<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>petmilyday - 나의 주문 내역</title>

    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Sora', sans-serif; }
        .detail-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .info-label { color: #636e72; font-size: 0.85rem; }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5" style="max-width: 1000px;">

    <!-- 뒤로가기 -->
    <div class="mb-4">
        <a th:href="@{/shop}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> 쇼핑몰로 돌아가기
        </a>
    </div>

    <!-- 타이틀 영역 -->
    <div class="mb-4">
        <h3 class="fw-bold mb-1"><i class="bi bi-box-seam"></i> 나의 일반 주문 내역</h3>
        <p class="info-label mb-0">고객님이 주문하신 상품의 결제 및 배송 내역을 확인할 수 있습니다.</p>
    </div>

    <div class="card detail-card p-4 bg-white" th:if="${orderHistoryList != null and !orderHistoryList.isEmpty()}">
        <div class="table-responsive">
            <table class="table table-hover align-middle small mb-0">
                <thead>
                <tr class="table-light text-secondary fw-bold text-center">
                    <th class="py-3">주문 일자</th>
                    <th class="py-3">주문 번호</th>
                    <th class="py-3 text-start">주문 상품</th>
                    <th class="py-3">수량</th>
                    <th class="py-3">결제 금액</th>
                    <th class="py-3">주문 상태</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order : ${orderHistoryList}" class="text-center text-dark">
                    <!-- 주문 일자 -->
                    <td class="text-muted py-3" th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm')}"></td>

                    <!-- 주문 번호 -->
                    <td class="fw-bold" th:text="${order.orderId}"></td>

                    <!-- 주문 상품 -->
                    <td class="text-start fw-medium" th:text="${order.productName}"></td>

                    <!-- 수량 -->
                    <td class="fw-bold text-secondary" th:text="${order.quantity} + '개'"></td>

                    <!-- 결제 금액 -->
                    <td class="fw-bold text-primary" th:text="${#numbers.formatInteger(order.totalPrice, 3, 'COMMA')} + '원'"></td>

                    <!-- 주문 상태 뱃지 처리 -->
                    <td>
                        <span th:if="${order.orderStatus == '결제완료'}" class="badge bg-success bg-opacity-10 text-success px-3 py-2 rounded-pill small">결제완료</span>
                        <span th:if="${order.orderStatus != '결제완료'}" class="badge bg-secondary bg-opacity-10 text-secondary px-3 py-2 rounded-pill small" th:text="${order.orderStatus}"></span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 2. 주문 내역이 없을 때 -->
    <div class="card detail-card p-5 text-center bg-white" th:if="${orderHistoryList == null or orderHistoryList.isEmpty()}">
        <p class="fw-bold text-secondary mb-1">아직 주문하신 내역이 없습니다.</p>
        <p class="text-muted small mb-4">반려동물을 위한 엄선된 용품들을 구경해 보세요!</p>
        <a th:href="@{/shop}" class="btn btn-primary btn-sm px-4 py-2">
            <i class="bi bi-shop"></i> 용품 보러가기
        </a>
    </div>

</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
