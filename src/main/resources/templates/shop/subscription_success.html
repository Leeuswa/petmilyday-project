<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구독 신청 완료 - petmilyday</title>
    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link th:href="@{/css/shop/shop-subscription-success.css}" rel="stylesheet">
</head>
<body>

<div class="card success-card shop-card p-4 p-md-5 text-center bg-white m-3">

    <div class="mb-4 status-icon-wrap">
        <i class="bi bi-calendar2-check-fill"></i>
    </div>

    <div class="mb-4">
        <h3 class="fw-extrabold text-dark mb-1">구독 신청 완료! 🌟</h3>
        <p class="text-secondary small mb-0">정기구독 멤버십이 성공적으로 시작되었습니다.</p>
    </div>

    <div class="info-box info-box-custom text-start d-flex flex-column gap-2 mb-4 small border">
        <div class="d-flex justify-content-between">
            <span class="text-muted">결제 방식</span>
            <span class="fw-bold text-dark">카카오페이 정기결제</span>
        </div>
        <div class="d-flex justify-content-between">
            <span class="text-muted">첫 결제 금액</span>
            <span class="fw-bold text-dark" th:text="${#numbers.formatInteger(totalPrice, 0, 'COMMA')} + '원'">9,900원</span>
        </div>
        <hr class="opacity-25 my-2 separator-line">
        <div class="d-flex justify-content-between align-items-center">
            <span class="fw-bold text-secondary">구독 상태</span>
            <span class="badge badge-custom-success px-2 py-1.5 rounded fw-bold" style="font-size: 11px;">정기 결제 활성화</span>
        </div>
    </div>

    <div class="d-flex flex-column gap-2 w-100">
        <button onclick="location.href='/shop'" class="btn btn-primary w-100 py-3 fw-bold rounded-3 primary-cart-action">
            쇼핑 계속하기
        </button>

        <button onclick="location.href='/shop/subscription'" class="btn btn-light w-100 py-3 fw-bold rounded-3 toolbar-btn">
            내 정기구독 관리
        </button>
    </div>

</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
