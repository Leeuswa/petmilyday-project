<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>정기구독 신청 완료 - petmilyday</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>

<div class="min-h-screen flex items-center justify-center px-4">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl border border-slate-100 p-8 text-center space-y-6">

        <!-- 구독 성공 전용 보라색 무드 아이콘 -->
        <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-indigo-50">
            <svg class="h-10 w-10 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
            </svg>
        </div>

        <div class="space-y-2">
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">구독 신청 완료! 🌟</h1>
            <p class="text-slate-500 text-sm">정기구독 멤버십이 성공적으로 시작되었습니다.</p>
        </div>

        <div class="bg-slate-50/80 rounded-2xl p-5 text-left space-y-3 text-sm border border-slate-100">
            <div class="flex justify-between">
                <span class="text-slate-400">결제 방식</span>
                <span class="font-semibold text-slate-700">카카오페이 정기결제</span>
            </div>
            <div class="flex justify-between">
                <span class="text-slate-400">첫 결제 금액</span>
                <span class="font-bold text-slate-800" th:text="${#numbers.formatInteger(totalPrice, 0, 'COMMA')} + '원'">9,900원</span>
            </div>
            <div class="flex justify-between border-t border-slate-100 pt-3">
                <span class="text-slate-700 font-bold">구독 상태</span>
                <span class="text-indigo-600 font-bold bg-indigo-50 px-2 py-0.5 rounded-md text-xs">정기 결제 활성화</span>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-3 pt-2">
            <button onclick="location.href='/shop'" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-lg transition-colors duration-200 cursor-pointer text-sm">
                쇼핑 계속하기
            </button>
            <button onclick="location.href='/mypage/subscription'" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-3.5 rounded-xl transition-colors duration-200 cursor-pointer text-sm">
                내 정기구독 관리
            </button>
        </div>
    </div>
</div>

</body>
</html>
