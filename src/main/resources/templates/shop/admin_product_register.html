<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 - 상품 등록</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .form-container { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], input[type="number"], textarea, input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        textarea { height: 100px; resize: vertical; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        .cancel-link { display: block; text-align: center; margin-top: 10px; color: #888; text-decoration: none; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>새 상품 등록</h2>
    <form th:action="@{/admin/shop/new}" th:object="${productRequestDto}" method="post" enctype="multipart/form-data">

        <div class="form-group">
            <label>상품명</label>
            <input type="text" th:field="*{name}" required>
        </div>
        <div class="form-group">
            <label>가격</label>
            <input type="number" th:field="*{price}" required>
        </div>
        <div class="form-group">
            <label>재고</label>
            <input type="number" th:field="*{stock}" required>
        </div>
        <div class="form-group">
            <label>카테고리</label>
            <input type="text" th:field="*{category}">
        </div>
        <div class="form-group">
            <label>상세 설명</label>
            <textarea th:field="*{description}"></textarea>
        </div>
        <div class="form-group">
            <label>상품 이미지</label>
            <input type="file" name="imageFile" accept="image/*" required>
        </div>
        <div class="form-group">
            <label>반려동물 종</label>
            <input type="text" th:field="*{petSpecies}">
        </div>
        <div class="form-group">
            <label>소재</label>
            <input type="text" th:field="*{material}">
        </div>
        <div class="form-group">
            <label>사이즈</label>
            <input type="text" th:field="*{sizeInfo}">
        </div>
        <div class="form-group">
            <label>원산지</label>
            <input type="text" th:field="*{origin}">
        </div>

        <button type="submit">상품 등록하기</button>
        <a href="/admin/shop/list" class="cancel-link">취소</a>
    </form>
</div>

</body>
</html>
