<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>petmilyday — 상품 정보 수정</title>
  <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link th:href="@{/css/shop/shop-product-form.css}" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shop-card form-container p-5 bg-white shadow-sm" style="border-radius: 24px;">

        <div class="text-center mb-4">
          <h3 class="fw-bold text-dark d-flex align-items-center justify-content-center gap-2">
            <i class="bi bi-pencil-square text-warning"></i> 상품 정보 수정
          </h3>
          <p class="text-muted small mb-0">선택한 상품의 정보를 수정하여 데이터베이스에 반영합니다.</p>
        </div>

        <form th:action="@{'/admin/shop/edit/' + ${product.id}}" method="post" enctype="multipart/form-data">

          <div class="mb-3">
            <label class="info-label fw-bold mb-1">상품명</label>
            <input type="text" name="name" class="form-control" th:value="${product.name}" required placeholder="상품 이름을 입력하세요">
          </div>

          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="info-label fw-bold mb-1">가격</label>
              <input type="number" name="price" class="form-control" th:value="${product.price}" required placeholder="0원">
            </div>
            <div class="col-6">
              <label class="info-label fw-bold mb-1">재고</label>
              <input type="number" name="stock" class="form-control" th:value="${product.stock != null ? product.stock : 0}" required placeholder="0개">
            </div>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="info-label fw-bold mb-1">카테고리</label>
              <input type="text" name="category" class="form-control" th:value="${product.category}" required placeholder="예: 사료, 간식">
            </div>
            <div class="col-6">
              <label class="info-label fw-bold mb-1">반려동물 종</label>
              <input type="text" name="petSpecies" class="form-control" th:value="${product.petSpecies}" required placeholder="예: 강아지, 고양이">
            </div>
          </div>

          <div class="mb-3">
            <label class="info-label fw-bold mb-1">상세 설명</label>
            <textarea name="description" class="form-control" rows="4" style="resize: none;" placeholder="상품에 대한 상세한 설명을 적어주세요" th:text="${product.description}"></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label info-label fw-bold mb-1">상품 이미지</label>
            <input class="form-control form-control-sm" type="file" name="imageFile" accept="image/*" onchange="previewEditImage(this)">

            <div id="imagePreviewArea" class="mt-3 text-center">
              <p class="text-muted extra-small-text mb-1 fw-bold">현재 등록된 이미지</p>
              <img id="editImagePreview" th:src="${product.imgUrl != null and product.imgUrl != '' ? product.imgUrl : '/images/no-image.png'}"
                   class="rounded border shadow-sm"
                   style="max-width: 140px; max-height: 140px; object-fit: cover;"
                   alt="미리보기">
            </div>
          </div>

          <div class="row g-2 mb-4">
            <div class="col-4">
              <label class="info-label fw-bold mb-1">소재 / 성분</label>
              <input type="text" name="material" class="form-control" th:value="${product.material}" placeholder="소재">
            </div>
            <div class="col-4">
              <label class="info-label fw-bold mb-1">사이즈 / 용량</label>
              <input type="text" name="sizeInfo" class="form-control" th:value="${product.sizeInfo}" placeholder="사이즈 정보">
            </div>
            <div class="col-4">
              <label class="info-label fw-bold mb-1">원산지</label>
              <input type="text" name="origin" class="form-control" th:value="${product.origin}" placeholder="원산지">
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 py-2.5 fw-bold primary-cart-action mb-2" style="border-radius: 999px;">
            상품 정보 수정하기
          </button>

          <div class="text-center mt-3">
            <a th:href="@{/admin/shop/list}" class="cancel-link fw-bold text-decoration-none">취소</a>
          </div>

        </form>
      </div>

    </div>
  </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>
<script th:inline="javascript">
  function previewEditImage(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = function(e) {
        const previewImg = document.getElementById('editImagePreview');
        if (previewImg) {
          previewImg.src = e.target.result;
        }
      }
      reader.readAsDataURL(input.files[0]);
    }
  }
</script>
</body>
</html>
