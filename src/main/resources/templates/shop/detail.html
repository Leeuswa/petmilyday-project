<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product?.name != null ? product.name + ' — petmilyday' : '상품 상세 — petmilyday'}"></title>
    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body { background-color: #f8f9fa; }
        .detail-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .info-label { color: #636e72; font-size: 0.85rem; }
        .stars { color: #ffa502; }
        .spec-table th { width: 120px; color: #636e72; background-color: #f1f2f6; }
    </style>
</head>
<body th:data-base-price="${product?.price != null ? product.price : 0}">
<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">

    <div class="mb-4">
        <a th:href="@{/shop?category=ALL}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> 목록으로
        </a>
    </div>

    <div class="row g-4" th:if="${product != null}">

        <!-- 왼쪽 영역: 상품 이미지 및 탭 메뉴 -->
        <div class="col-md-8">
            <div class="card detail-card p-4 mb-4">
                <div class="row g-4">
                    <div class="col-md-5">
                        <div class="ratio ratio-1x1 bg-light rounded-3 overflow-hidden border">
                            <img th:if="${product.imgUrl != null}" th:src="${product.imgUrl}" class="img-fluid" style="object-fit: cover;" alt="상품 이미지">
                            <div th:if="${product.imgUrl == null}" class="d-flex align-items-center justify-content-center text-muted">No Image</div>
                        </div>
                    </div>
                    <div class="col-md-7 d-flex flex-column justify-content-between">
                        <div>
                            <div class="mb-2">
                                <span class="badge bg-primary bg-opacity-10 text-primary" th:text="${product.category}"></span>
                                <span class="badge bg-success bg-opacity-10 text-success" th:text="${product.petSpecies}"></span>
                            </div>
                            <h3 class="fw-bold mb-2" th:text="${product.name}"></h3>
                            <div class="mb-3">
                                <span class="stars" id="topStars">★★★★★</span>
                                <span class="small text-muted ms-1" id="topReviewText">(5.0) 후기 0개</span>
                            </div>
                            <h4 class="fw-bold text-primary" th:text="${product.price != null ? #numbers.formatInteger(product.price, 3, 'COMMA') + '원' : '0원'}"></h4>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 하단 정보 탭 구역 -->
            <div class="card detail-card p-4 mb-4">
                <ul class="nav nav-tabs mb-4" id="detailTabs">
                    <li class="nav-item">
                        <button class="nav-link active fw-bold text-dark border-0 border-bottom" onclick="switchTab(0)">상품 정보</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link fw-bold text-secondary border-0 border-bottom" id="reviewTabBtn" onclick="switchTab(1)">리뷰 (0)</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link fw-bold text-secondary border-0 border-bottom" id="qnaTabBtn" onclick="switchTab(2)">문의/Q&A (0)</button>
                    </li>
                </ul>

                <div class="tab-content">
                    <div id="tab-info" class="tab-pane fade show active">
                        <table class="table table-bordered align-middle text-center small mb-4">
                            <tbody>
                            <tr>
                                <th class="spec-table th">상품명</th> <td th:text="${product.name}"></td>
                                <th class="spec-table th">카테고리</th> <td th:text="${product.category}"></td>
                            </tr>
                            <tr>
                                <th class="spec-table th">권장 대상</th> <td th:text="${product.petSpecies}"></td>
                                <th class="spec-table th">주요 성분</th> <td th:text="${product.material != null ? product.material : '상세참조'}"></td>
                            </tr>
                            <tr>
                                <th class="spec-table th">사이즈/용량</th> <td th:text="${product.sizeInfo != null ? product.sizeInfo : '상세참조'}"></td>
                                <th class="spec-table th">제조국</th> <td th:text="${product.origin != null ? product.origin : '상세참조'}"></td>
                            </tr>
                            </tbody>
                        </table>
                        <div class="mt-4">
                            <h5 class="fw-bold mb-2"><i class="bi bi-file-text"></i> Product Story</h5>
                            <p th:text="${product.description != null ? product.description : '상품 상세 설명이 없습니다.'}" class="text-secondary small lh-lg" style="white-space:pre-wrap;"></p>
                        </div>
                    </div>

                    <div id="tab-reviews" class="tab-pane d-none">
                        <div id="reviewContainer" class="d-flex flex-column gap-3"></div>
                    </div>

                    <div id="tab-qna" class="tab-pane d-none">
                        <div class="p-3 bg-light rounded-3 mb-4 border">
                            <textarea class="form-control mb-2" id="qnaInput" rows="3" placeholder="문의 내용을 입력해 주세요." style="resize:none; font-size:13px;"></textarea>
                            <div class="d-flex justify-content-end">
                                <button class="btn btn-primary btn-sm" onclick="addQna()"><i class="bi bi-check-lg"></i> 문의 등록</button>
                            </div>
                        </div>
                        <div id="qnaContainer" class="d-flex flex-column gap-3"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 오른쪽 영역: 주문 옵션 설정 패널 -->
        <div class="col-md-4">
            <div class="card detail-card p-4">
                <h5 class="fw-bold mb-3 text-center">주문 옵션 설정</h5>

                <!-- 수량 선택 -->
                <div class="mb-3">
                    <p class="info-label mb-1"><i class="bi bi-plus-minus"></i> 수량 선택</p>
                    <div class="input-group input-group-sm">
                        <button class="btn btn-outline-secondary fw-bold" type="button" onclick="changeQuantity(-1)">-</button>
                        <input type="number" class="form-control text-center bg-white fw-bold" id="productQty" value="1" readonly>
                        <button class="btn btn-outline-secondary fw-bold" type="button" onclick="changeQuantity(1)">+</button>
                    </div>
                </div>

                <!-- 정기배송 주기 선택 -->
                <div class="mb-3">
                    <p class="info-label mb-1"><i class="bi bi-arrow-repeat"></i> 정기배송 주기</p>
                    <select id="subscriptionCycle" class="form-select form-select-sm fw-bold">
                        <option value="14">14일 마다 (2주)</option>
                        <option value="30" selected>30일 마다 (4주)</option>
                        <option value="60">60일 마다 (8주)</option>
                    </select>
                </div>

                <hr>

                <!-- 실시간 최종 금액 반영 스팟 -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <span class="fw-bold small text-secondary">총 합계 금액</span>
                    <span id="totalPriceDisplay" th:text="${product.price != null ? #numbers.formatInteger(product.price, 3, 'COMMA') + '원' : '0원'}" class="fs-4 fw-bold text-primary"></span>
                </div>

                <div class="d-flex flex-column gap-2">
                    <div class="row g-2">
                        <div class="col-6">
                            <button class="btn btn-outline-primary w-100" th:onclick="addToCart([[${product.id}]])"><i class="bi bi-cart"></i> 담기</button>
                        </div>
                        <div class="col-6">
                            <button class="btn btn-primary w-100" id="btnBuyNow" th:data-id="${product.id}" th:data-name="${product.name}" th:data-price="${product.price}" onclick="buyNow()"><i class="bi bi-credit-card"></i> 바로구매</button>
                        </div>
                    </div>
                    <button class="btn btn-success w-100 py-2.5 fw-bold" id="btnSubBuy" th:data-id="${product.id}" th:data-name="${product.name}" th:data-price="${product.price}" onclick="goToSubscriptionCheckout()"><i class="bi bi-calendar-heart"></i> 정기구독 신청</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 예외 처리 -->
    <div class="card detail-card text-center py-5 my-5" th:if="${product == null}">
        <h4 class="text-danger fw-bold mb-2">존재하지 않는 상품입니다 😢</h4>
        <a th:href="@{/shop?category=ALL}" class="btn btn-primary btn-sm mt-3 px-4">쇼핑몰 홈 가기</a>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>
<script th:inline="javascript">
    const basePrice = parseInt(document.body.getAttribute('data-base-price')) || 0;

    function changeQuantity(amount) {
        const input = document.getElementById('productQty');
        const display = document.getElementById('totalPriceDisplay');
        if(!input || !display) return;
        let val = parseInt(input.value) + amount;
        if (val < 1) return;
        input.value = val;
        display.innerText = (basePrice * val).toLocaleString('ko-KR') + '원';
    }

    function switchTab(idx) {
        const tabs = document.querySelectorAll('#detailTabs .nav-link');
        const panes = [document.getElementById('tab-info'), document.getElementById('tab-reviews'), document.getElementById('tab-qna')];
        tabs.forEach((t, i) => t.classList.toggle('active', i === idx));
        panes.forEach((p, i) => p.classList.toggle('d-none', i !== idx));
    }

    const dummyReviews = [
        { author: '펫밀리러버', rating: 5, date: '2026.05.20', text: '기호성이 너무 좋아요! 우리 애가 이것만 찾네요.' },
        { author: '초코아빠', rating: 5, date: '2026.05.18', text: '배송도 빠르고 포장도 아주 깔끔합니다. 만족해요.' }
    ];

    const dummyQnAs = [
        { author: '김*진', date: '2026.05.24', q: '유통기한이 언제까지인가요?', a: '제조일로부터 18개월입니다. 최근 제조된 상품으로 발송해 드립니다.' }
    ];

    document.addEventListener("DOMContentLoaded", () => {
        const reviewContainer = document.getElementById('reviewContainer');
        let totalRating = 0;
        if (reviewContainer) {
            dummyReviews.forEach(r => {
                totalRating += r.rating;
                reviewContainer.innerHTML += `
                    <div class="pb-3 border-bottom small">
                        <div class="d-flex justify-content-between"><strong>${r.author}</strong><span class="stars">${'★'.repeat(r.rating)}</span></div>
                        <div class="text-muted text-xs">${r.date}</div>
                        <p class="text-secondary mb-0 mt-1">${r.text}</p>
                    </div>`;
            });
        }
        const avgRating = (totalRating / dummyReviews.length).toFixed(1);
        document.getElementById('topReviewText').innerText = `(${avgRating}) 후기 ${dummyReviews.length}개`;
        document.getElementById('reviewTabBtn').innerText = `리뷰 (${dummyReviews.length})`;

        const qnaContainer = document.getElementById('qnaContainer');
        if (qnaContainer) {
            dummyQnAs.forEach(q => {
                qnaContainer.innerHTML += `
                    <div class="pb-3 border-bottom small">
                        <div class="d-flex justify-content-between"><strong>Q. ${q.q}</strong><span class="badge bg-success bg-opacity-10 text-success">답변완료</span></div>
                        <div class="text-muted text-xs">${q.author} · ${q.date}</div>
                        <div class="bg-light p-2 rounded mt-1 border text-secondary"><strong>A. petmilyday:</strong> ${q.a}</div>
                    </div>`;
            });
        }
        document.getElementById('qnaTabBtn').innerText = `문의/Q&A (${dummyQnAs.length})`;
    });

    function addQna() {
        const txt = document.getElementById('qnaInput').value;
        if(!txt.trim()) return alert('내용을 입력하세요!');
        const item = document.createElement('div');
        item.className = 'pb-3 border-bottom small';
        item.innerHTML = `<div class="d-flex justify-content-between"><strong>Q. ${txt}</strong><span class="badge bg-primary bg-opacity-10 text-primary">답변대기</span></div>`;
        document.getElementById('qnaContainer').prepend(item);
        document.getElementById('qnaInput').value = '';
        alert('문의가 성공적으로 등록되었습니다!');
    }

    function addToCart(productId) {
        const qtyInput = document.getElementById('productQty');
        const quantity = qtyInput ? parseInt(qtyInput.value) : 1;
        fetch('/api/cart/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ productId: productId, quantity: quantity })
        }).then(res => { if (res.ok && confirm('장바구니 이동할까요?')) location.href = '/cart'; });
    }

    function buyNow() {
        const btn = document.getElementById('btnBuyNow');
        const qtyInput = document.getElementById('productQty');
        const quantity = qtyInput ? parseInt(qtyInput.value) : 1;
        const checkoutItems = [{ productId: btn.getAttribute('data-id'), quantity: quantity, name: btn.getAttribute('data-name'), price: parseInt(btn.getAttribute('data-price')) }];
        sessionStorage.setItem("checkoutItems", JSON.stringify(checkoutItems));
        location.href = "/shop/checkout";
    }

    function goToSubscriptionCheckout() {
        const btn = document.getElementById('btnSubBuy');
        const cycleDays = parseInt(document.getElementById('subscriptionCycle').value) || 30;
        const quantity = parseInt(document.getElementById('productQty').value) || 1;
        location.href = `/shop/subscription-checkout?productId=${btn.getAttribute('data-id')}&quantity=${quantity}&cycleDays=${cycleDays}&name=${encodeURIComponent(btn.getAttribute('data-name'))}&price=${btn.getAttribute('data-price')}`;
    }
</script>
</body>
</html>
