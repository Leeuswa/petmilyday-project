<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정기구독 신청 / 결제 - petmilyday</title>
    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Sora', sans-serif; }
        .detail-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .info-label { color: #636e72; font-size: 0.85rem; }

        .payment-box {
            border: 2px solid #2b44cc;
            background-color: #f0f3ff;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .payment-box-disabled {
            border: 1px solid #dee2e6;
            border-radius: 12px;
            padding: 16px;
            opacity: 0.5;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5" style="max-width: 1100px;">
    <h3 class="fw-bold mb-4"><i class="bi bi-calendar2-heart"></i> 정기구독 신청 / 결제</h3>

    <div class="row g-4">
        <div class="col-md-8">

            <!-- 1. 배송지 정보 -->
            <div class="card detail-card p-4 mb-4 bg-white">
                <h5 class="fw-bold mb-3 text-dark pb-2 border-bottom">📦 배송지 정보</h5>
                <div class="d-flex flex-column gap-3">
                    <div>
                        <p class="info-label mb-1">수령인</p>
                        <input type="text" id="receiverName" class="form-control" placeholder="받으실 분 이름을 입력하세요">
                    </div>
                    <div>
                        <p class="info-label mb-1">연락처</p>
                        <input type="text" id="receiverPhone" class="form-control" placeholder="010-XXXX-XXXX">
                    </div>
                    <div>
                        <p class="info-label mb-1">배송지 주소</p>
                        <input type="text" id="deliveryAddress" class="form-control" placeholder="상세 주소를 입력하세요">
                    </div>
                    <div>
                        <p class="info-label mb-1">배송 요청사항 (선택)</p>
                        <input type="text" id="deliveryMemo" class="form-control" placeholder="문 앞에 놓아주세요 등">
                    </div>
                </div>
            </div>

            <div class="card detail-card p-4 mb-4 bg-white">
                <h5 class="fw-bold mb-3 text-dark pb-2 border-bottom">💳 결제 수단</h5>
                <div class="row g-3">
                    <div class="col-6">
                        <label class="d-flex align-items-center justify-content-between payment-box h-100 cursor-pointer">
                            <span class="fw-bold text-dark small">카카오페이 (자동결제 등록)</span>
                            <input type="radio" name="payMethod" value="KAKAO" checked class="form-check-input m-0">
                        </label>
                    </div>
                    <div class="col-6">
                        <label class="d-flex align-items-center justify-content-between payment-box-disabled h-100">
                            <span class="fw-bold text-muted small">신용카드 (준비중)</span>
                            <input type="radio" name="paymentMethod" value="CARD" disabled class="form-check-input">
                        </label>
                    </div>
                </div>
            </div>

            <div class="card detail-card p-4 mb-4 bg-white">
                <h5 class="fw-bold mb-3 text-dark pb-2 border-bottom">📅 정기구독 설정 확인</h5>
                <div class="d-flex justify-content-between align-items-center p-3 bg-success bg-opacity-10 text-success rounded-3 border border-success-subtle">
                    <span class="fw-bold small">선택하신 정기 배송 주기</span>
                    <span class="fs-5 fw-bold" th:text="|매 ${cycleDays}일 마다 자동 배송|">매 30일 마다 자동 배송</span>
                </div>
            </div>

            <div class="card detail-card p-4 bg-white">
                <h5 class="fw-bold mb-3 text-dark pb-2 border-bottom">🛒 주문 상품 정보</h5>
                <div class="d-flex justify-content-between align-items-center py-2 small">
                    <div>
                        <p class="fw-bold text-dark mb-0" th:text="${name}">상품명</p>
                        <p class="text-muted mb-0" style="font-size:11px;" th:text="|수량: ${quantity}개 / 단가: ${#numbers.formatInteger(price, 0, 'COMMA')}원|"></p>
                    </div>
                    <strong class="text-secondary fs-5" th:text="${totalPrice != null ? #numbers.formatInteger(totalPrice, 0, 'COMMA') + '원' : '0원'}">0원</strong>
                </div>
            </div>

        </div>

        <div class="col-md-4">
            <div class="card detail-card p-4 bg-white sticky-top" style="top: 80px; z-index: 10;">
                <h5 class="fw-bold mb-4 text-dark text-center">정기 결제 요약</h5>

                <div class="d-flex flex-column gap-2 pb-3 mb-3 border-bottom small text-secondary">
                    <div class="d-flex justify-content-between">
                        <span>회당 결제 금액</span>
                        <span th:text="${totalPrice != null ? #numbers.formatInteger(totalPrice, 3, 'COMMA') + '원' : '0원'}" class="fw-bold text-dark">0원</span>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <span class="fw-bold text-dark">최종 결제 금액</span>
                    <span th:text="${totalPrice != null ? #numbers.formatInteger(totalPrice, 3, 'COMMA') + '원' : '0원'}" class="fs-4 fw-bold text-success">0원</span>
                </div>

                <button type="button" onclick="submitSubscription()" class="btn btn-success w-100 py-2.5 fw-bold fs-6">
                    <i class="bi bi-calendar-check"></i> 정기구독 결제 승인하기
                </button>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>
<script th:inline="javascript">
    function submitSubscription() {
        const name = document.getElementById("receiverName").value.trim();
        const phone = document.getElementById("receiverPhone").value.trim();
        const address = document.getElementById("deliveryAddress").value.trim();
        const memo = document.getElementById("deliveryMemo").value.trim();

        if (!name) return alert("수령인 이름을 입력해 주세요!");
        if (!phone) return alert("연락처를 입력해 주세요!");
        if (!address) return alert("배송지 주소를 입력해 주세요!");

        const selectedMethod = document.querySelector('input[name="payMethod"]:checked')?.value;
        if (!selectedMethod) return alert("결제 수단을 선택해 주세요!");

        if (selectedMethod === 'KAKAO') {
            fetch('/api/subscription/ready', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    productId: [[${productId}]],
                    quantity: [[${quantity}]],
                    cycleDays: [[${cycleDays}]],
                    itemName: [[${name}]],
                    totalAmount: [[${totalPrice}]],
                    receiverName: name,
                    receiverPhone: phone,
                    deliveryAddress: address,
                    detailAddress: memo
                })
            })
                .then(response => {
                    if (!response.ok) throw new Error("서버 통신 에러 발생");
                    return response.json();
                })
                .then(data => {
                    if(data.next_redirect_pc_url) {
                        localStorage.setItem("sub_address", address);
                        location.href = data.next_redirect_pc_url;
                    } else {
                        alert("카카오페이 통신 실패: " + (data.message || "알 수 없는 오류"));
                    }
                })
                .catch(err => {
                    console.error("구독 에러:", err);
                    alert("카카오페이 통신 실패: " + err.message);
                });
        } else if (selectedMethod === 'CARD') {
            alert("신용카드 정기 결제는 현재 준비 중입니다. 카카오페이를 이용해 주세요!");
        }
    }
</script>
</body>
</html>
