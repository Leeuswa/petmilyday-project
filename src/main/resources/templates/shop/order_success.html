<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 완료 - petmilyday</title>
    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Sora', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 0;
        }
        .success-card {
            border: none;
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            max-width: 440px;
            width: 100%;
        }
        .info-box {
            background-color: #f1f2f6;
            border-radius: 16px;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="card success-card p-4 p-md-5 text-center bg-white m-3">

    <div class="mb-4 text-success display-3">
        <i class="bi bi-check-circle-fill"></i>
    </div>

    <div class="mb-4">
        <h3 class="fw-extrabold text-dark mb-1">결제 완료! 🎉</h3>
        <p class="text-secondary small mb-0">주문이 정상적으로 접수되어 배송이 시작됩니다.</p>
    </div>

    <div class="info-box text-start d-flex flex-column gap-2 mb-4 small border">

        <div class="d-flex justify-content-between">
            <span class="text-muted">주문 상품</span>
            <span id="successProductName" class="fw-bold text-dark text-end" style="max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"
                  th:text="${productName}">유산균 가득 락토프리 펫밀크</span>
        </div>
        <div class="d-flex justify-content-between">
            <span class="text-muted">결제 수단</span>
            <span class="fw-bold text-dark">카카오페이 (간편결제)</span>
        </div>
        <div class="d-flex justify-content-between">
            <span class="text-muted">결제 금액</span>
            <span class="fw-bold text-dark" th:text="${totalPrice != null ? #numbers.formatInteger(totalPrice, 0, 'COMMA') + '원' : '0원'}">0원</span>
        </div>
        <hr class="opacity-25 my-2">
        <div class="d-flex justify-content-between align-items-center">
            <span class="fw-bold text-secondary">결제 상태</span>
            <span class="badge bg-success bg-opacity-10 text-success px-2 py-1.5 rounded fw-bold" style="font-size: 11px;">최종 승인 성공</span>
        </div>
    </div>

    <div class="d-flex flex-column gap-2 w-100">
        <button onclick="location.href='/shop'" class="btn btn-primary w-100 py-3 fw-bold rounded-3 shadow-sm border-0">
            쇼핑 계속하기
        </button>

        <button onclick="location.href='/shop/order_history'" class="btn btn-light w-100 py-3 fw-bold rounded-3 border text-secondary">
            주문 내역 확인
        </button>
    </div>

</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>
<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", () => {
        const nameDisplay = document.getElementById("successProductName");

        if (nameDisplay && (!nameDisplay.innerText.trim() || nameDisplay.innerText === "상품 종류")) {
            const sessionData = sessionStorage.getItem("checkoutItems");
            if (sessionData) {
                const items = JSON.parse(sessionData);
                if (items && items.length > 0) {
                    const finalName = items[0].name + (items.length > 1 ? " 외 " + (items.length - 1) + "건" : "");
                    nameDisplay.innerText = finalName;
                }
            }
        }
    });
</script>
</body>
</html>
