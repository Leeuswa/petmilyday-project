<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>결제 완료 - petmilyday</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>

<div class="min-h-screen flex items-center justify-center px-4">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl border border-slate-100 p-8 text-center space-y-6">

        <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-emerald-50">
            <svg class="h-10 w-10 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
        </div>

        <div class="space-y-2">
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">결제 완료! 🎉</h1>
            <p class="text-slate-500 text-sm">주문이 정상적으로 접수되어 배송이 시작됩니다.</p>
        </div>

        <div class="bg-slate-50/80 rounded-2xl p-5 text-left space-y-3 text-sm border border-slate-100">
            <div class="flex justify-between">
                <span class="text-slate-400">결제 수단</span>
                <span class="font-semibold text-slate-700">카카오페이 (간편결제)</span>
            </div>
            <!-- 토큰 숨기고 실제 결제 금액 노출 -->
            <div class="flex justify-between">
                <span class="text-slate-400">결제 금액</span>
                <span class="font-bold text-slate-800" th:text="${#numbers.formatInteger(totalPrice, 0, 'COMMA')} + '원'">1,000원</span>
            </div>
            <div class="flex justify-between border-t border-slate-100 pt-3">
                <span class="text-slate-700 font-bold">결제 상태</span>
                <span class="text-emerald-600 font-bold bg-emerald-50 px-2 py-0.5 rounded-md text-xs">최종 승인 성공</span>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-3 pt-2">
            <button onclick="location.href='/shop'" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-lg transition-colors duration-200 cursor-pointer text-sm">
                쇼핑 계속하기
            </button>
            <button onclick="location.href='/mypage/orders'" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-3.5 rounded-xl transition-colors duration-200 cursor-pointer text-sm">
                주문 내역 확인
            </button>
        </div>
    </div>
</div>

</body>
</html>
