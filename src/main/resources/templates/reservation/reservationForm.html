<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>예약 신청</title>
    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .form-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <!-- 뒤로가기 -->
            <div class="mb-4">
                <a th:href="@{/hospital/{id}(id=${hospitalId})}"
                   class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left"></i> 병원으로
                </a>
            </div>

            <div class="card form-card p-4">
                <h4 class="fw-bold mb-4">
                    <i class="bi bi-calendar-check"></i> 예약 신청
                </h4>

                <form th:action="@{/reservation/register}" method="post">

                    <!-- hospitalId 히든 필드 -->
                    <input type="hidden" name="hospitalId" th:value="${hospitalId}"/>

                    <!-- 반려동물 선택 (더미 고정) -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">반려동물</label>
                        <select class="form-select" name="petId">
                            <option value="1">멍멍이 (골든리트리버)</option>
                        </select>
                    </div>

                    <!-- 진료과 선택 -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">진료과</label>
                        <select class="form-select" name="department">
                            <option value="내과">내과</option>
                            <option value="외과">외과</option>
                            <option value="피부과">피부과</option>
                            <option value="치과">치과</option>
                            <option value="안과">안과</option>
                        </select>
                    </div>

                    <!-- 예약 날짜 -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">예약 날짜</label>
                        <input type="date" class="form-control" name="reserveDate" required/>
                    </div>

                    <!-- 예약 시간 -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">예약 시간</label>
                        <select class="form-select" name="reserveTime">
                            <option value="09:00">09:00</option>
                            <option value="09:30">09:30</option>
                            <option value="10:00">10:00</option>
                            <option value="10:30">10:30</option>
                            <option value="11:00">11:00</option>
                            <option value="11:30">11:30</option>
                            <option value="13:00">13:00</option>
                            <option value="13:30">13:30</option>
                            <option value="14:00">14:00</option>
                            <option value="14:30">14:30</option>
                            <option value="15:00">15:00</option>
                            <option value="15:30">15:30</option>
                            <option value="16:00">16:00</option>
                            <option value="16:30">16:30</option>
                            <option value="17:00">17:00</option>
                            <option value="17:30">17:30</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-3 mt-2">
                        <i class="bi bi-calendar-check"></i> 예약 신청
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
