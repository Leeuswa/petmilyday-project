
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>예약 신청</title>

    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/common/petmilyTheme.css}">
    <link rel="stylesheet" th:href="@{/css/reservation/reservationForm.css}">
</head>
<body class="pm-page">

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <!-- 뒤로가기 -->
            <div class="mb-4">

                <a th:href="@{/hospital/{id}(id=${hospitalId})}"
                   class="btn btn-outline-secondary btn-sm back-link">

                    <i class="bi bi-arrow-left"></i>
                    병원으로

                </a>
            </div>

            <div class="card form-card p-4">

                <!-- 제목 -->
                <h4 class="fw-bold mb-4">

                    <i class="bi bi-calendar-check"></i>
                    예약 신청

                </h4>

                <!-- 에러 메시지 -->
                <div class="alert alert-danger mb-4"
                     th:if="${errorMessage}">

                    <i class="bi bi-exclamation-triangle"></i>

                    <span th:text="${errorMessage}"></span>

                </div>

                <!-- 안내 -->
                <div class="alert alert-warning mb-4">

                    <i class="bi bi-exclamation-circle"></i>

                    예약 신청 후
                    관리자 승인 완료 시
                    예약이 최종 확정됩니다.

                </div>

                <!-- 예약 폼 -->
                <form id="reservationForm"
                      th:action="@{/reservation/register}"
                      method="post">

                    <!-- 병원 ID -->
                    <input type="hidden"
                           name="hospitalId"
                           th:value="${hospitalId}"/>

                    <!-- 예약 시간 -->
                    <input type="hidden"
                           name="reserveTime"
                           id="reserveTimeInput"/>

                    <!-- 반려동물 -->
                    <div class="mb-3">

                        <label class="form-label fw-bold">

                            반려동물

                        </label>

                        <select class="form-select"
                                name="petId">

                            <option th:each="pet : ${petList}"
                                    th:value="${pet.id}"
                                    th:text="${pet.name}">
                            </option>

                        </select>
                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            진료과
                        </label>

                        <select class="form-select"
                                name="department">

                            <option th:each="dept : ${#strings.arraySplit(hospitalDTO.department, ',')}"
                                    th:value="${dept}"
                                    th:text="${dept}">
                            </option>

                        </select>

                    </div>

                    <!-- 예약 날짜 -->
                    <div class="mb-3">

                        <label class="form-label fw-bold">

                            예약 날짜

                        </label>

                        <input type="date"
                               class="form-control"
                               id="reserveDate"
                               name="reserveDate"
                               th:min="${today}"
                               required/>

                    </div>

                    <!-- 예약 시간 -->
                    <div class="mb-3">

                        <label class="form-label fw-bold">

                            예약 가능 시간

                        </label>

                        <div id="slotContainer"
                             class="d-flex flex-wrap gap-2">

                            <div class="text-muted">

                                날짜를 선택해주세요.

                            </div>

                        </div>
                    </div>

                    <!-- 선택 시간 -->
                    <div class="mb-3">

                        <span class="selected-time-label">
                            선택한 시간 :
                        </span>

                        <span id="selectedTimeText"
                              class="selected-time-value">

                            없음

                        </span>

                    </div>

                    <!-- 버튼 -->
                    <button type="submit"
                            class="btn submit-btn w-100 py-3 mt-2">

                        <i class="bi bi-calendar-check"></i>
                        예약 신청

                    </button>

                </form>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>

<script th:inline="javascript">
    window.__PM_HOSPITAL_ID__ = /*[[${hospitalId}]]*/ 0;
</script>

<script th:src="@{/js/reservation/reservationForm.js}"></script>

</body>
</html>
