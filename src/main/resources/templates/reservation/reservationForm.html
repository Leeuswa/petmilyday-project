
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>예약 신청</title>

    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body {
            background-color: #f8f9fa;
        }

        .form-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .slot-btn {
            min-width: 110px;
        }

        .selected-slot {
            background-color: #0d6efd !important;
            color: white !important;
        }

    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <!-- 뒤로가기 -->
            <div class="mb-4">

                <a th:href="@{/hospital/{id}(id=${hospitalId})}"
                   class="btn btn-outline-secondary btn-sm">

                    <i class="bi bi-arrow-left"></i>
                    병원으로

                </a>
            </div>

            <div class="card form-card p-4">

                <!-- 제목 -->
                <h4 class="fw-bold mb-4">

                    <i class="bi bi-calendar-check"></i>
                    예약 신청

                </h4>

                <!-- 에러 메시지 -->
                <div class="alert alert-danger mb-4"
                     th:if="${errorMessage}">

                    <i class="bi bi-exclamation-triangle"></i>

                    <span th:text="${errorMessage}"></span>

                </div>

                <!-- 안내 -->
                <div class="alert alert-warning mb-4">

                    <i class="bi bi-exclamation-circle"></i>

                    예약 신청 후
                    관리자 승인 완료 시
                    예약이 최종 확정됩니다.

                </div>

                <!-- 예약 폼 -->
                <form id="reservationForm"
                      th:action="@{/reservation/register}"
                      method="post">

                    <!-- 병원 ID -->
                    <input type="hidden"
                           name="hospitalId"
                           th:value="${hospitalId}"/>

                    <!-- 예약 시간 -->
                    <input type="hidden"
                           name="reserveTime"
                           id="reserveTimeInput"/>

                    <!-- 반려동물 -->
                    <div class="mb-3">

                        <label class="form-label fw-bold">

                            반려동물

                        </label>

                        <select class="form-select"
                                name="petId">

                            <option th:each="pet : ${petList}"
                                    th:value="${pet.id}"
                                    th:text="${pet.name}">
                            </option>

                        </select>
                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            진료과
                        </label>

                        <select class="form-select"
                                name="department">

                            <option th:each="dept : ${#strings.arraySplit(hospitalDTO.department, ',')}"
                                    th:value="${dept}"
                                    th:text="${dept}">
                            </option>

                        </select>

                    </div>

                    <!-- 예약 날짜 -->
                    <div class="mb-3">

                        <label class="form-label fw-bold">

                            예약 날짜

                        </label>

                        <input type="date"
                               class="form-control"
                               id="reserveDate"
                               name="reserveDate"
                               required/>

                    </div>

                    <!-- 예약 시간 -->
                    <div class="mb-3">

                        <label class="form-label fw-bold">

                            예약 가능 시간

                        </label>

                        <div id="slotContainer"
                             class="d-flex flex-wrap gap-2">

                            <div class="text-muted">

                                날짜를 선택해주세요.

                            </div>

                        </div>
                    </div>

                    <!-- 선택 시간 -->
                    <div class="mb-3">

                        <span class="fw-bold">
                            선택한 시간 :
                        </span>

                        <span id="selectedTimeText"
                              class="text-primary">

                            없음

                        </span>

                    </div>

                    <!-- 버튼 -->
                    <button type="submit"
                            class="btn btn-primary w-100 py-3 mt-2">

                        <i class="bi bi-calendar-check"></i>
                        예약 신청

                    </button>

                </form>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>

<script th:inline="javascript">

    const hospitalId =
        /*[[${hospitalId}]]*/ 0;

    const reserveDateInput =
        document.getElementById("reserveDate");

    const slotContainer =
        document.getElementById("slotContainer");

    const reserveTimeInput =
        document.getElementById("reserveTimeInput");

    const selectedTimeText =
        document.getElementById("selectedTimeText");


    // 날짜 선택 시 슬롯 조회
    reserveDateInput.addEventListener(
        "change",
        async function () {

            const date = this.value;

            if (!date) return;

            // 슬롯 조회
            const response =
                await fetch(
                    `/reservation/slots?hospitalId=${hospitalId}&date=${date}`
                );

            const slots =
                await response.json();

            slotContainer.innerHTML = "";

            // 슬롯 없을 때
            if (slots.length === 0) {

                slotContainer.innerHTML =
                    `
                    <div class="text-danger">
                        예약 가능한 시간이 없습니다.
                    </div>
                    `;

                return;
            }

            // 슬롯 버튼 생성
            slots.forEach(slot => {

                const button =
                    document.createElement("button");

                button.type = "button";

                button.className =
                    "btn btn-outline-primary slot-btn";

                const timeText =
                    String(slot.time);

                const displayTime =
                    timeText.substring(0,5);

                button.innerText =
                    `${displayTime} (${slot.currentCount}/${slot.maxCount})`;

                // 마감
                if (!slot.available) {

                    button.disabled = true;

                    button.classList.remove(
                        "btn-outline-primary"
                    );

                    button.classList.add(
                        "btn-outline-danger"
                    );

                    button.innerText += " 마감";
                }

                // 시간 선택
                button.addEventListener(
                    "click",
                    function () {

                        document
                            .querySelectorAll(".slot-btn")
                            .forEach(btn => {

                                btn.classList.remove(
                                    "selected-slot"
                                );
                            });

                        button.classList.add(
                            "selected-slot"
                        );

                        reserveTimeInput.value =
                            timeText;

                        selectedTimeText.innerText =
                            displayTime;
                    });

                slotContainer.appendChild(button);
            });
        });

    // submit 검증
    document.getElementById("reservationForm")
        .addEventListener("submit", function (e) {

            if (!reserveTimeInput.value) {

                e.preventDefault();

                alert("예약 시간을 선택해주세요.");

                return;
            }
        });

</script>

</body>
</html>
