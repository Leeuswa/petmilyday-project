<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>내 진료기록</title>

    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/common/petmilyTheme.css}">
    <link rel="stylesheet" th:href="@{/css/reservation/medicalRecords.css}">
</head>
<body class="pm-page">

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">
    <div class="medical-wrap">

        <div class="pm-list-page-header">
            <div>
                <h3>
                    <i class="bi bi-clipboard2-pulse"></i>
                    내 진료기록
                </h3>
                <p>진료가 완료된 동물병원 예약 기록을 확인할 수 있습니다.</p>
            </div>

            <div class="pm-list-summary pm-list-summary--mint">
                <span>진료 완료 기록</span>
                <strong>
                    <span th:text="${medicalRecordPage.totalElements}">0</span>건
                </strong>
            </div>
        </div>

        <!-- 기록 없음 -->
        <div class="pm-list-empty"
             th:if="${#lists.isEmpty(medicalRecordPage.content)}">

            <i class="bi bi-clipboard-x pm-list-empty-icon"></i>

            <h5 class="fw-bold mb-2">
                진료기록이 없습니다.
            </h5>

            <p class="mb-3">
                진료가 완료되면 이곳에서 기록을 확인할 수 있습니다.
            </p>

            <a th:href="@{/hospital/list}"
               class="btn btn-primary btn-detail">
                병원 예약하러 가기
            </a>
        </div>

        <!-- 기록 목록 -->
        <div class="row g-3"
             th:if="${!#lists.isEmpty(medicalRecordPage.content)}">

            <div class="col-12"
                 th:each="record : ${medicalRecordPage.content}">

                <div class="pm-list-card">

                        <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                            <h5 class="hospital-name"
                                th:text="${record.hospitalName}">
                                병원명
                            </h5>

                            <span class="done-badge">
                                진료완료
                            </span>
                        </div>

                        <div class="info-grid">

                            <div class="info-item">
                                <i class="bi bi-calendar3"></i>
                                <span>
                                    진료일:
                                    <span th:text="${record.reserveDate}">2026-06-18</span>
                                    <span th:text="${record.reserveTime}">10:00</span>
                                </span>
                            </div>

                            <div class="info-item">
                                <i class="bi bi-heart"></i>
                                <span>
                                    반려동물:
                                    <span th:text="${record.petName}">초코</span>
                                </span>
                            </div>

                            <div class="info-item">
                                <i class="bi bi-clipboard2-heart"></i>
                                <span>
                                    진료과:
                                    <span th:text="${record.department}">내과</span>
                                </span>
                            </div>

                            <div class="info-item">
                                <i class="bi bi-hospital"></i>
                                <span>
                                    예약번호:
                                    <span th:text="${record.id}">1</span>
                                </span>
                            </div>

                        </div>

                        <div class="record-footer">
                            <span class="record-number">
                                기록 기준 예약번호 #
                                <span th:text="${record.id}">1</span>
                            </span>

                            <a th:href="@{/hospital/{id}(id=${record.hospitalId})}"
                               class="btn btn-outline-primary btn-sm btn-detail">
                                <i class="bi bi-hospital"></i>
                                병원 상세 보기
                            </a>
                        </div>

                </div>

            </div>
        </div>

        <!-- 페이징 -->
        <div class="pm-pagination" th:if="${medicalRecordPage.totalPages > 1}">

            <a class="pm-page-btn"
               th:classappend="${medicalRecordPage.first} ? ' disabled' : ''"
               th:href="${medicalRecordPage.first} ? '#' : @{/reservation/medical-records(page=${currentPage - 1})}">
                이전
            </a>

            <a class="pm-page-btn"
               th:each="pageNum : ${#numbers.sequence(0, medicalRecordPage.totalPages - 1)}"
               th:href="@{/reservation/medical-records(page=${pageNum})}"
               th:classappend="${pageNum == currentPage} ? ' active' : ''"
               th:text="${pageNum + 1}">
                1
            </a>

            <a class="pm-page-btn"
               th:classappend="${medicalRecordPage.last} ? ' disabled' : ''"
               th:href="${medicalRecordPage.last} ? '#' : @{/reservation/medical-records(page=${currentPage + 1})}">
                다음
            </a>

        </div>

    </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
