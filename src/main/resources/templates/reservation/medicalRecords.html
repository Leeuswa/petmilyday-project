<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>내 진료기록</title>

    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6fb;
            color: #111827;
        }

        .medical-wrap {
            max-width: 1100px;
            margin: 0 auto;
        }

        .page-header-box {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 24px;
        }

        .page-header-box h3 {
            margin: 0;
            font-size: 30px;
            font-weight: 900;
            letter-spacing: -0.7px;
            color: #111827;
        }

        .page-header-box p {
            margin: 8px 0 0;
            color: #6b7280;
            font-size: 14px;
            font-weight: 600;
        }

        .summary-card {
            min-width: 160px;
            padding: 16px 20px;
            border-radius: 18px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #ffffff;
            text-align: right;
            box-shadow: 0 14px 28px rgba(37, 99, 235, 0.25);
        }

        .summary-card span {
            display: block;
            font-size: 13px;
            opacity: 0.85;
            margin-bottom: 4px;
        }

        .summary-card strong {
            font-size: 26px;
            font-weight: 900;
        }

        .record-card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 22px;
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.07);
            overflow: hidden;
            transition: transform 0.16s ease, box-shadow 0.16s ease;
        }

        .record-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 36px rgba(15, 23, 42, 0.12);
        }

        .record-main {
            padding: 24px;
        }

        .hospital-name {
            margin: 0;
            font-size: 20px;
            font-weight: 900;
            color: #111827;
        }

        .done-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 12px;
            border-radius: 999px;
            background: #dcfce7;
            color: #15803d;
            font-size: 13px;
            font-weight: 900;
        }

        .done-badge::before {
            content: "";
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: currentColor;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px 18px;
            margin-top: 20px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #4b5563;
            font-size: 14px;
            font-weight: 700;
        }

        .info-item i {
            color: #2563eb;
            font-size: 15px;
        }

        .record-footer {
            margin-top: 20px;
            padding: 15px 16px;
            border-radius: 16px;
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .record-number {
            color: #6b7280;
            font-size: 13px;
            font-weight: 800;
        }

        .btn-detail {
            border-radius: 12px;
            font-weight: 800;
            padding: 8px 13px;
        }

        .empty-card {
            background: #ffffff;
            border: 1px dashed #cbd5e1;
            border-radius: 22px;
            box-shadow: 0 10px 26px rgba(15, 23, 42, 0.05);
            padding: 58px 20px;
            text-align: center;
            color: #6b7280;
        }

        .empty-card i {
            font-size: 48px;
            color: #9ca3af;
            margin-bottom: 12px;
        }

        .pagination-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 7px;
            margin-top: 30px;
        }

        .page-btn {
            min-width: 40px;
            height: 40px;
            padding: 0 14px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            background: #ffffff;
            color: #374151;
            text-decoration: none;
            font-size: 14px;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .page-btn:hover {
            background: #eff6ff;
            border-color: #2563eb;
            color: #2563eb;
            transform: translateY(-1px);
        }

        .page-btn.active {
            background: #2563eb;
            border-color: #2563eb;
            color: #ffffff;
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
        }

        .page-btn.disabled {
            pointer-events: none;
            opacity: 0.4;
            background: #f9fafb;
        }

        @media (max-width: 768px) {
            .page-header-box {
                flex-direction: column;
                align-items: stretch;
            }

            .summary-card {
                text-align: left;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">
    <div class="medical-wrap">

        <div class="page-header-box">
            <div>
                <h3>
                    <i class="bi bi-clipboard2-pulse"></i>
                    내 진료기록
                </h3>
                <p>진료가 완료된 동물병원 예약 기록을 확인할 수 있습니다.</p>
            </div>

            <div class="summary-card">
                <span>진료 완료 기록</span>
                <strong>
                    <span th:text="${medicalRecordPage.totalElements}">0</span>건
                </strong>
            </div>
        </div>

        <!-- 기록 없음 -->
        <div class="empty-card"
             th:if="${#lists.isEmpty(medicalRecordPage.content)}">

            <i class="bi bi-clipboard-x"></i>

            <h5 class="fw-bold mb-2">
                진료기록이 없습니다.
            </h5>

            <p class="mb-3">
                진료가 완료되면 이곳에서 기록을 확인할 수 있습니다.
            </p>

            <a th:href="@{/hospital/list}"
               class="btn btn-primary btn-detail">
                병원 예약하러 가기
            </a>
        </div>

        <!-- 기록 목록 -->
        <div class="row g-3"
             th:if="${!#lists.isEmpty(medicalRecordPage.content)}">

            <div class="col-12"
                 th:each="record : ${medicalRecordPage.content}">

                <div class="record-card">
                    <div class="record-main">

                        <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                            <h5 class="hospital-name"
                                th:text="${record.hospitalName}">
                                병원명
                            </h5>

                            <span class="done-badge">
                                진료완료
                            </span>
                        </div>

                        <div class="info-grid">

                            <div class="info-item">
                                <i class="bi bi-calendar3"></i>
                                <span>
                                    진료일:
                                    <span th:text="${record.reserveDate}">2026-06-18</span>
                                    <span th:text="${record.reserveTime}">10:00</span>
                                </span>
                            </div>

                            <div class="info-item">
                                <i class="bi bi-heart"></i>
                                <span>
                                    반려동물:
                                    <span th:text="${record.petName}">초코</span>
                                </span>
                            </div>

                            <div class="info-item">
                                <i class="bi bi-clipboard2-heart"></i>
                                <span>
                                    진료과:
                                    <span th:text="${record.department}">내과</span>
                                </span>
                            </div>

                            <div class="info-item">
                                <i class="bi bi-hospital"></i>
                                <span>
                                    예약번호:
                                    <span th:text="${record.id}">1</span>
                                </span>
                            </div>

                        </div>

                        <div class="record-footer">
                            <span class="record-number">
                                기록 기준 예약번호 #
                                <span th:text="${record.id}">1</span>
                            </span>

                            <a th:href="@{/hospital/{id}(id=${record.hospitalId})}"
                               class="btn btn-outline-primary btn-sm btn-detail">
                                <i class="bi bi-hospital"></i>
                                병원 상세 보기
                            </a>
                        </div>

                    </div>
                </div>

            </div>
        </div>

        <!-- 페이징 -->
        <div class="pagination-wrap" th:if="${medicalRecordPage.totalPages > 1}">

            <a class="page-btn"
               th:classappend="${medicalRecordPage.first} ? ' disabled' : ''"
               th:href="${medicalRecordPage.first} ? '#' : @{/reservation/medical-records(page=${currentPage - 1})}">
                이전
            </a>

            <a class="page-btn"
               th:each="pageNum : ${#numbers.sequence(0, medicalRecordPage.totalPages - 1)}"
               th:href="@{/reservation/medical-records(page=${pageNum})}"
               th:classappend="${pageNum == currentPage} ? ' active' : ''"
               th:text="${pageNum + 1}">
                1
            </a>

            <a class="page-btn"
               th:classappend="${medicalRecordPage.last} ? ' disabled' : ''"
               th:href="${medicalRecordPage.last} ? '#' : @{/reservation/medical-records(page=${currentPage + 1})}">
                다음
            </a>

        </div>

    </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
