<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>내 예약 목록</title>

    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/common/petmilyTheme.css}">
    <link rel="stylesheet" th:href="@{/css/reservation/reservationList.css}">
</head>
<body class="pm-page">

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">
    <div class="reservation-wrap">

        <div class="page-header-box">
            <div>
                <h4>
                    <i class="bi bi-calendar2-check"></i>
                    내 예약 목록
                </h4>
                <p>신청한 동물병원 예약 상태와 대기번호를 확인할 수 있습니다.</p>
            </div>

            <div class="header-actions">
                <div class="summary-card">
                    <span>전체 예약</span>
                    <strong>
                        <span th:text="${reservationPage.totalElements}">0</span>건
                    </strong>
                </div>

                <a th:href="@{/hospital/list}"
                   class="btn btn-outline-primary find-btn">
                    <i class="bi bi-plus"></i>
                    병원 찾기
                </a>
            </div>
        </div>

        <!-- 예약 없을 때 -->
        <div class="empty-card"
             th:if="${#lists.isEmpty(reservationPage.content)}">

            <i class="bi bi-calendar-x"></i>

            <p>
                예약 내역이 없습니다.
            </p>

            <a th:href="@{/hospital/list}"
               class="btn btn-primary mt-3 action-btn">
                병원 찾기
            </a>
        </div>

        <!-- 예약 목록 -->
        <div class="row g-3"
             th:if="${!#lists.isEmpty(reservationPage.content)}">

            <div class="col-12"
                 th:each="reservation : ${reservationPage.content}">

                <div class="reservation-card">

                    <div class="reservation-main">

                        <div class="row align-items-center">

                            <!-- 왼쪽 -->
                            <div class="col-md-8">

                                <!-- 병원명 + 상태 -->
                                <div class="d-flex align-items-center flex-wrap gap-2 mb-2">

                                    <h5 class="hospital-title"
                                        th:text="${reservation.hospitalName}">
                                        병원명
                                    </h5>

                                    <span class="status-badge"
                                          th:classappend="${reservation.status == 'WAITING'} ? 'status-waiting' :
                                                          (${reservation.status == 'APPROVED'} ? 'status-confirmed' :
                                                          (${reservation.status == 'DONE'} ? 'status-done' : 'status-cancel'))"
                                          th:text="${reservation.status == 'WAITING'} ? '승인 대기' :
                                                   (${reservation.status == 'APPROVED'} ? '예약 확정' :
                                                   (${reservation.status == 'DONE'} ? '진료 완료' : '예약 취소'))">
                                        승인 대기
                                    </span>

                                </div>

                                <div class="info-list">

                                    <div class="info-item">
                                        <i class="bi bi-calendar3"></i>
                                        <span th:text="${reservation.reserveDate}">2026-06-18</span>
                                        <span th:text="${reservation.reserveTime}">10:00</span>
                                    </div>

                                    <div class="info-item">
                                        <i class="bi bi-clipboard2-pulse"></i>
                                        <span>
                                            진료과 :
                                            <span th:text="${reservation.department}">내과</span>
                                        </span>
                                    </div>

                                    <div class="info-item">
                                        <i class="bi bi-heart"></i>
                                        <span>
                                            반려동물 :
                                            <span th:text="${reservation.petName}">초코</span>
                                        </span>
                                    </div>

                                    <div class="info-item">
                                        <i class="bi bi-hospital"></i>
                                        <span>
                                            예약번호 :
                                            <span th:text="${reservation.id}">1</span>
                                        </span>
                                    </div>

                                </div>

                                <!-- 대기번호 -->
                                <div class="wait-box"
                                     th:if="${reservation.status == 'WAITING'
                                            or reservation.status == 'APPROVED'}">

                                    <div class="wait-icon">
                                        <i class="bi bi-people-fill"></i>
                                    </div>

                                    <div>
                                        <div class="wait-label">
                                            현재 대기 순번
                                        </div>

                                        <div class="wait-number"
                                             th:id="'wait-number-' + ${reservation.id}"
                                             th:text="${reservation.waitNumber} + '번'">
                                            1번
                                        </div>
                                    </div>

                                </div>

                                <!-- 취소 사유 -->
                                <div class="cancel-reason"
                                     th:if="${reservation.cancelReason != null}">

                                    <i class="bi bi-x-circle"></i>
                                    취소 사유 :
                                    <span th:text="${reservation.cancelReason}">
                                        취소 사유
                                    </span>

                                </div>

                            </div>

                            <!-- 오른쪽 -->
                            <div class="col-md-4">

                                <div class="right-action">

                                    <!-- 예약 취소 -->
                                    <div th:if="${reservation.status == 'WAITING'
                                                 or reservation.status == 'APPROVED'}">

                                        <button class="btn btn-outline-danger btn-sm action-btn"
                                                th:data-id="${reservation.id}"
                                                onclick="showCancelModal(this.dataset.id)">

                                            <i class="bi bi-x-circle"></i>
                                            예약 취소

                                        </button>

                                    </div>

                                    <!-- 리뷰 작성 -->
                                    <div th:if="${reservation.status == 'DONE'}">

                                        <a th:href="@{/hospital/{id}
                                        (id=${reservation.hospitalId},
                                         reservationId=${reservation.id})}"
                                           class="btn btn-outline-warning btn-sm action-btn">

                                            <i class="bi bi-star"></i>
                                            리뷰 작성

                                        </a>

                                    </div>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <!-- 페이징 -->
        <div class="pagination-wrap" th:if="${reservationPage.totalPages > 1}">

            <a class="page-btn"
               th:classappend="${reservationPage.first} ? ' disabled' : ''"
               th:href="${reservationPage.first} ? '#' : @{/reservation/list(page=${currentPage - 1})}">
                이전
            </a>

            <a class="page-btn"
               th:each="pageNum : ${#numbers.sequence(0, reservationPage.totalPages - 1)}"
               th:href="@{/reservation/list(page=${pageNum})}"
               th:classappend="${pageNum == currentPage} ? ' active' : ''"
               th:text="${pageNum + 1}">
                1
            </a>

            <a class="page-btn"
               th:classappend="${reservationPage.last} ? ' disabled' : ''"
               th:href="${reservationPage.last} ? '#' : @{/reservation/list(page=${currentPage + 1})}">
                다음
            </a>

        </div>

    </div>
</div>

<!-- 취소 모달 -->
<div class="modal fade"
     id="cancelModal"
     tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">
                    예약 취소
                </h5>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <form id="cancelForm"
                  method="post">

                <div class="modal-body">

                    <label class="form-label fw-bold">
                        취소 사유
                    </label>

                    <textarea class="form-control"
                              name="cancelReason"
                              rows="3"
                              placeholder="취소 사유를 입력해주세요"
                              required></textarea>

                </div>

                <div class="modal-footer">

                    <button type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">
                        닫기
                    </button>

                    <button type="submit"
                            class="btn btn-danger">
                        취소 확인
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}">
</script>

<script th:src="@{/js/reservation/reservationList.js}"></script>

</body>
</html>
