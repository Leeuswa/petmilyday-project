<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>내 예약 목록</title>

    <link th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
          rel="stylesheet">

    <style>
        body {
            background: #f4f6fb;
            color: #111827;
        }

        .reservation-wrap {
            max-width: 1100px;
            margin: 0 auto;
        }

        .page-header-box {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 24px;
        }

        .page-header-box h4 {
            margin: 0;
            font-size: 30px;
            font-weight: 900;
            letter-spacing: -0.7px;
            color: #111827;
        }

        .page-header-box p {
            margin: 8px 0 0;
            color: #6b7280;
            font-size: 14px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .summary-card {
            min-width: 150px;
            padding: 15px 18px;
            border-radius: 18px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #ffffff;
            text-align: right;
            box-shadow: 0 14px 28px rgba(37, 99, 235, 0.25);
        }

        .summary-card span {
            display: block;
            font-size: 13px;
            opacity: 0.85;
            margin-bottom: 4px;
        }

        .summary-card strong {
            font-size: 25px;
            font-weight: 900;
        }

        .find-btn {
            border-radius: 12px;
            font-weight: 800;
            padding: 10px 14px;
        }

        .empty-card {
            background: #ffffff;
            border: 1px dashed #cbd5e1;
            border-radius: 22px;
            padding: 58px 20px;
            text-align: center;
            box-shadow: 0 10px 26px rgba(15, 23, 42, 0.05);
        }

        .empty-card i {
            font-size: 3.4rem;
            color: #9ca3af;
        }

        .empty-card p {
            margin: 14px 0 0;
            color: #6b7280;
            font-weight: 800;
        }

        .reservation-card {
            border: 1px solid #e5e7eb;
            border-radius: 22px;
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.07);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            overflow: hidden;
            background: #ffffff;
        }

        .reservation-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 36px rgba(15, 23, 42, 0.12);
        }

        .reservation-main {
            padding: 24px;
        }

        .hospital-title {
            font-size: 20px;
            font-weight: 900;
            color: #111827;
            margin: 0;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            padding: 7px 12px;
            font-size: 13px;
            font-weight: 900;
        }

        .status-badge::before {
            content: "";
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: currentColor;
        }

        .status-waiting {
            background: #fef3c7;
            color: #92400e;
        }

        .status-confirmed {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .status-done {
            background: #dcfce7;
            color: #15803d;
        }

        .status-cancel {
            background: #fee2e2;
            color: #dc2626;
        }

        .info-list {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px 18px;
            margin-top: 18px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #4b5563;
            font-size: 14px;
            font-weight: 700;
        }

        .info-item i {
            color: #2563eb;
            font-size: 15px;
        }

        .wait-box {
            margin-top: 18px;
            padding: 15px 16px;
            border-radius: 16px;
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .wait-icon {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #eff6ff;
            color: #2563eb;
            font-size: 20px;
        }

        .wait-label {
            font-size: 13px;
            color: #6b7280;
            font-weight: 800;
        }

        .wait-number {
            font-size: 22px;
            color: #111827;
            font-weight: 900;
            line-height: 1.2;
        }

        .cancel-reason {
            margin-top: 13px;
            padding: 11px 13px;
            border-radius: 12px;
            background: #fef2f2;
            color: #dc2626;
            font-size: 13px;
            font-weight: 800;
        }

        .right-action {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            height: 100%;
        }

        .action-btn {
            border-radius: 12px;
            font-weight: 800;
            padding: 8px 13px;
        }

        .pagination-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 7px;
            margin-top: 30px;
        }

        .page-btn {
            min-width: 40px;
            height: 40px;
            padding: 0 14px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            background: #ffffff;
            color: #374151;
            text-decoration: none;
            font-size: 14px;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .page-btn:hover {
            background: #eff6ff;
            border-color: #2563eb;
            color: #2563eb;
            transform: translateY(-1px);
        }

        .page-btn.active {
            background: #2563eb;
            border-color: #2563eb;
            color: #ffffff;
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
        }

        .page-btn.disabled {
            pointer-events: none;
            opacity: 0.4;
            background: #f9fafb;
        }

        @media (max-width: 768px) {
            .page-header-box {
                flex-direction: column;
                align-items: stretch;
            }

            .header-actions {
                flex-direction: column;
                align-items: stretch;
            }

            .summary-card {
                text-align: left;
            }

            .info-list {
                grid-template-columns: 1fr;
            }

            .right-action {
                justify-content: flex-start;
                margin-top: 18px;
            }
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container py-5">
    <div class="reservation-wrap">

        <div class="page-header-box">
            <div>
                <h4>
                    <i class="bi bi-calendar2-check"></i>
                    내 예약 목록
                </h4>
                <p>신청한 동물병원 예약 상태와 대기번호를 확인할 수 있습니다.</p>
            </div>

            <div class="header-actions">
                <div class="summary-card">
                    <span>전체 예약</span>
                    <strong>
                        <span th:text="${reservationPage.totalElements}">0</span>건
                    </strong>
                </div>

                <a th:href="@{/hospital/list}"
                   class="btn btn-outline-primary find-btn">
                    <i class="bi bi-plus"></i>
                    병원 찾기
                </a>
            </div>
        </div>

        <!-- 예약 없을 때 -->
        <div class="empty-card"
             th:if="${#lists.isEmpty(reservationPage.content)}">

            <i class="bi bi-calendar-x"></i>

            <p>
                예약 내역이 없습니다.
            </p>

            <a th:href="@{/hospital/list}"
               class="btn btn-primary mt-3 action-btn">
                병원 찾기
            </a>
        </div>

        <!-- 예약 목록 -->
        <div class="row g-3"
             th:if="${!#lists.isEmpty(reservationPage.content)}">

            <div class="col-12"
                 th:each="reservation : ${reservationPage.content}">

                <div class="reservation-card">

                    <div class="reservation-main">

                        <div class="row align-items-center">

                            <!-- 왼쪽 -->
                            <div class="col-md-8">

                                <!-- 병원명 + 상태 -->
                                <div class="d-flex align-items-center flex-wrap gap-2 mb-2">

                                    <h5 class="hospital-title"
                                        th:text="${reservation.hospitalName}">
                                        병원명
                                    </h5>

                                    <span class="status-badge"
                                          th:classappend="${reservation.status == 'WAITING'} ? 'status-waiting' :
                                                          (${reservation.status == 'APPROVED'} ? 'status-confirmed' :
                                                          (${reservation.status == 'DONE'} ? 'status-done' : 'status-cancel'))"
                                          th:text="${reservation.status == 'WAITING'} ? '승인 대기' :
                                                   (${reservation.status == 'APPROVED'} ? '예약 확정' :
                                                   (${reservation.status == 'DONE'} ? '진료 완료' : '예약 취소'))">
                                        승인 대기
                                    </span>

                                </div>

                                <div class="info-list">

                                    <div class="info-item">
                                        <i class="bi bi-calendar3"></i>
                                        <span th:text="${reservation.reserveDate}">2026-06-18</span>
                                        <span th:text="${reservation.reserveTime}">10:00</span>
                                    </div>

                                    <div class="info-item">
                                        <i class="bi bi-clipboard2-pulse"></i>
                                        <span>
                                            진료과 :
                                            <span th:text="${reservation.department}">내과</span>
                                        </span>
                                    </div>

                                    <div class="info-item">
                                        <i class="bi bi-heart"></i>
                                        <span>
                                            반려동물 :
                                            <span th:text="${reservation.petName}">초코</span>
                                        </span>
                                    </div>

                                    <div class="info-item">
                                        <i class="bi bi-hospital"></i>
                                        <span>
                                            예약번호 :
                                            <span th:text="${reservation.id}">1</span>
                                        </span>
                                    </div>

                                </div>

                                <!-- 대기번호 -->
                                <div class="wait-box"
                                     th:if="${reservation.status == 'WAITING'
                                            or reservation.status == 'APPROVED'}">

                                    <div class="wait-icon">
                                        <i class="bi bi-people-fill"></i>
                                    </div>

                                    <div>
                                        <div class="wait-label">
                                            현재 대기 순번
                                        </div>

                                        <div class="wait-number"
                                             th:id="'wait-number-' + ${reservation.id}"
                                             th:text="${reservation.waitNumber} + '번'">
                                            1번
                                        </div>
                                    </div>

                                </div>

                                <!-- 취소 사유 -->
                                <div class="cancel-reason"
                                     th:if="${reservation.cancelReason != null}">

                                    <i class="bi bi-x-circle"></i>
                                    취소 사유 :
                                    <span th:text="${reservation.cancelReason}">
                                        취소 사유
                                    </span>

                                </div>

                            </div>

                            <!-- 오른쪽 -->
                            <div class="col-md-4">

                                <div class="right-action">

                                    <!-- 예약 취소 -->
                                    <div th:if="${reservation.status == 'WAITING'
                                                 or reservation.status == 'APPROVED'}">

                                        <button class="btn btn-outline-danger btn-sm action-btn"
                                                th:data-id="${reservation.id}"
                                                onclick="showCancelModal(this.dataset.id)">

                                            <i class="bi bi-x-circle"></i>
                                            예약 취소

                                        </button>

                                    </div>

                                    <!-- 리뷰 작성 -->
                                    <div th:if="${reservation.status == 'DONE'}">

                                        <a th:href="@{/hospital/{id}
                                        (id=${reservation.hospitalId},
                                         reservationId=${reservation.id})}"
                                           class="btn btn-outline-warning btn-sm action-btn">

                                            <i class="bi bi-star"></i>
                                            리뷰 작성

                                        </a>

                                    </div>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <!-- 페이징 -->
        <div class="pagination-wrap" th:if="${reservationPage.totalPages > 1}">

            <a class="page-btn"
               th:classappend="${reservationPage.first} ? ' disabled' : ''"
               th:href="${reservationPage.first} ? '#' : @{/reservation/list(page=${currentPage - 1})}">
                이전
            </a>

            <a class="page-btn"
               th:each="pageNum : ${#numbers.sequence(0, reservationPage.totalPages - 1)}"
               th:href="@{/reservation/list(page=${pageNum})}"
               th:classappend="${pageNum == currentPage} ? ' active' : ''"
               th:text="${pageNum + 1}">
                1
            </a>

            <a class="page-btn"
               th:classappend="${reservationPage.last} ? ' disabled' : ''"
               th:href="${reservationPage.last} ? '#' : @{/reservation/list(page=${currentPage + 1})}">
                다음
            </a>

        </div>

    </div>
</div>

<!-- 취소 모달 -->
<div class="modal fade"
     id="cancelModal"
     tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">
                    예약 취소
                </h5>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <form id="cancelForm"
                  method="post">

                <div class="modal-body">

                    <label class="form-label fw-bold">
                        취소 사유
                    </label>

                    <textarea class="form-control"
                              name="cancelReason"
                              rows="3"
                              placeholder="취소 사유를 입력해주세요"
                              required></textarea>

                </div>

                <div class="modal-footer">

                    <button type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">
                        닫기
                    </button>

                    <button type="submit"
                            class="btn btn-danger">
                        취소 확인
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}">
</script>

<script>
    function showCancelModal(reservationId) {

        document.getElementById('cancelForm').action =
            '/reservation/' + reservationId + '/cancel';

        new bootstrap.Modal(
            document.getElementById('cancelModal')
        ).show();
    }

    // 실시간 대기번호 변경 처리
    // sseNotification.html에서 받은 알림을 petmily-notification 이벤트로 전달하면 여기서 받는다.
    window.addEventListener("petmily-notification", function (event) {

        const data = event.detail;

        if (!data || data.type !== "WAITING_QUEUE_UPDATED") {
            return;
        }

        const waitNumberElement =
            document.getElementById("wait-number-" + data.reservationId);

        if (waitNumberElement) {
            waitNumberElement.textContent = data.waitNumber + "번";
        }
    });
</script>

</body>
</html>
